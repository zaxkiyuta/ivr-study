,{n:29,t:"硬膜動静脈瘻で正しいのはどれか。",m:false,o:["若年層に好発する。","4-vessel studyを行う。","脳静脈洞血栓症に伴うものがある。","本邦では上矢状静脈洞部に最も多い。","DSA撮影のフレームレートは2 f/sで行う。"],c:[2],e:"【正解：選択肢3】硬膜動静脈瘻は硬膜の静脈洞内に動脈成分が直接流れ込む疾患です。脳静脈洞血栓症の関与が知られています。\n若年層より中高年に好発。本邦では「海綿静脈洞部」や「横－S状静脈洞部」に多いです。"}
,{n:30,t:"図2は脳血管造影の静脈相である。矢印の血管はどれか。",m:false,o:["直静脈洞","横静脈洞","海綿静脈洞","下矢状静脈洞","上矢状静脈洞"],c:[2],e:"【正解：選択肢3】図2の矢印はトルコ鞍の側方に位置する海綿静脈洞を指しています。海綿静脈洞はトルコ鞍の両側に位置し内頸動脈や脳神経（III、IV、V、VI）が通過する重要な構造です。"}
,{n:31,t:"組合せで誤っているのはどれか。",m:false,o:["棘孔 ― 中硬膜動脈","視神経管 ― 上眼静脈","頸静脈孔 ― 内頸静脈","大後頭孔 ― 椎骨動脈","頸動脈管 ― 内頸動脈"],c:[1],e:"【正解：選択肢2（誤り）】視神経管を通過するのは「視神経」と「眼動脈」です。上眼静脈は上眼窩裂を通過します。\n棘孔→中硬膜動脈 ✅、頸静脈孔→内頸静脈 ✅、大後頭孔→椎骨動脈 ✅、頸動脈管→内頸動脈 ✅"}
,{n:32,t:"椎骨動脈撮影で正しいのはどれか。",m:false,o:["頭部の固定は必要ない。","側面撮影では補償フィルタを後頭部に挿入する。","正面撮影で後大脳動脈の観察はCaldwell法で行う。","内頸動脈撮影よりも高いフレームレートを使用する。","正面撮影で脳底動脈や後下小脳動脈の観察はTown法で行う。"],c:[4],e:"【正解：選択肢5】脳底動脈や後下小脳動脈（PICA）を重なりなく観察するには頭部を前屈させて撮影するTown（タウン）法が適しています。"}
,{n:33,t:"内頸動脈撮影で正しいのはどれか。2つ選べ。",m:true,o:["補償フィルタは使用しない。","後頭部が入るようにフレーミングする。","正面撮影は眼窩下縁と錐体下縁を合わせる。","正中矢状面を寝台に対し垂直にセッティングする。","側面撮影は両側の外耳孔が重なるようにセッティングする。"],c:[3,4],e:"【選択肢4：正しい】正中矢状面を垂直に保つことで左右対称な画像が得られます。\n【選択肢5：正しい】側面撮影では左右の外耳孔が重なる状態が真の側面像の指標となります。"}
,{n:34,t:"前交通動脈を描出する撮影法で正しいのはどれか。",m:false,o:["Jail法","Allen法","Matas法","Alcock法","Trans-cell法"],c:[3],e:"【正解：選択肢4】Alcock（オルコック）テストは反対側の内頸動脈を圧迫しながら造影剤を注入し前交通動脈を介した側副血行の発達を確認する手技です。"}
,{n:35,t:"図3のDSA画像で正しいのはどれか。2つ選べ。",m:true,o:["頭蓋内シャント疾患を疑う。","図は内頸動脈側面像である。","sunburst appearanceが認められる。","Onyxによる血管塞栓術の対象となる。","疾患と関連する血管の一つは中硬膜動脈である。"],c:[2,4],e:"【図3は髄膜腫のDSA像です】\n【選択肢3：正しい】腫瘍への栄養血管が放射状に広がるsunburst appearance（日輪状外観）が認められます。\n【選択肢5：正しい】主な栄養血管として外頸動脈の分枝である中硬膜動脈が関与します。\n※正解は3と5です。"}
,{n:36,t:"脳動脈瘤コイル塞栓術のワーキングアングルで誤っているのはどれか。",m:false,o:["母血管とネックが分離できる。","3D-DA像を利用して決定する。","動脈瘤と分枝血管が分離できる。","母血管上に動脈瘤が重なって観察できる。","ガイディングカテーテルなど全てのデバイスが視野内に収まっている。"],c:[3],e:"【正解：選択肢4（誤り）】母血管上に動脈瘤が重なって観察できる角度はネックの視認性が悪くなるため避けるべきです。"}
,{n:37,t:"CAS（Carotid artery stenting）で正しいのはどれか。",m:false,o:["本邦ではCASよりCEA（頸動脈内膜剥離術）の実施数が多い。","狭窄率はArea法≧ECST法≧NASCET法の順に大きい値となる。","造影MRIのT1-WIでLipid-rich necrotic coreは造影効果を呈する。","proximal typeの遠位塞栓予防デバイスは総頸動脈と内頸動脈をバルーンで閉塞する。","狭窄率25%以上の症候性病変または75%以上の無症候性病変のアテローム性病変が適応である。"],c:[1],e:"【正解：選択肢2】狭窄率の計測法はArea法で最も大きく算出され、NASCET法が最も厳しく（小さく）算出されます。順序はArea法≧ECST法≧NASCET法。\n選択肢4：proximal type（近位型）の遠位塞栓予防デバイスは総頸動脈と「外頸動脈」をバルーンで閉塞します。"}
,{n:38,t:"CAS（Carotid artery stenting）で正しいのはどれか。",m:false,o:["ステント留置の前に必ず前拡張を行う。","後拡張は目的血管径の1.5倍のサイズで行う。","バルーン拡張時は頻脈と血圧の上昇に注意する。","フローリバーサル法は遠位塞栓防止機構として有効である。","3D-DAは血管の拍動の影響を少なくするため長時間撮影を行う。"],c:[3],e:"【正解：選択肢4】フローリバーサル法（血流逆転法）は手技中に脳への血流を一時的に逆流させることで、プラークの破片が脳へ飛ぶのを防ぐ極めて有効な遠位塞栓防止機構です。\n【選択肢3：誤り】バルーン拡張時は頸動脈小体反射により「徐脈・血圧低下」に注意が必要です。"}
,{n:39,t:"rt-PA療法の適応となるのは発症後何時間以内か。",m:false,o:["3時間","3.5時間","4時間","4.5時間","5時間"],c:[3],e:"【正解：選択肢4】静注血栓溶解療法（rt-PA/アルテプラーゼ）は発症から4.5時間以内に治療を開始する必要があります。"}
,{n:40,t:"rt-PA療法で誤っているのはどれか。",m:false,o:["脳血管評価は必須である。","治療開始が早いほど良好な転帰が期待できる。","機械的血栓回収療法開始前に開始することが勧められる。","発症時刻が不明な時は最終健常確認時刻をもって発症時刻とする。","アルテプラーゼ0.6 mg/kgの10%を急速投与し残りを1時間で静注する。"],c:[0],e:"【正解：選択肢1（誤り）】「脳血管評価は必須」は誤りです。出血の否定（単純CT）が済んでいれば血管評価を待たずにrt-PAを開始することが推奨される場合があります。\n最終健常確認時刻をもって発症時刻とするのは正しいルールです。"}
,{n:41,t:"海綿静脈洞部硬膜動静脈瘻のTVEで代表的な海綿静脈洞への侵入ルートはどれか。",m:false,o:["辺縁静脈洞","脳底静脈洞","後頭静脈洞","上錐体静脈洞","下錐体静脈洞"],c:[4],e:"【正解：選択肢5】CS-dAVFの経静脈的塞栓術（TVE）において、カテーテルを海綿静脈洞に進める最も一般的なルートは下錐体静脈洞（IPS: Inferior Petrosal Sinus）です。"}
,{n:42,t:"脳動脈瘤の血管内治療で正しいのはどれか。",m:false,o:["Flow Diverter Stentは椎骨動脈に使用できない。","Flow Diverter Stentはbraided stent構造を有する。","ステントアシスト時のコイルの体積塞栓率は80%程度である。","破裂脳動脈瘤はステントアシストによるコイル塞栓術の対象である。","WEB（Woven EndoBridge）デバイスは破裂脳動脈瘤の治療に使用できない。"],c:[1],e:"【正解：選択肢2】Flow Diverter Stent（フローダイバーター）は網目の細かいbraided stent（編み込み構造）を持ち血流を改変することで動脈瘤を血栓化させます。\nコイルの体積塞栓率の目標は一般的に20〜30%程度です。破裂脳動脈瘤へのステントアシストは抗血小板薬が必要なため原則適応外です。"}
,{n:43,t:"脳動脈瘤の血管内治療で正しいのはどれか。2つ選べ。",m:true,o:["脳動脈瘤の部位によりchin upが有効である。","Radial approachでの治療は確立されていない。","Barrel Viewは母血管の短軸像で観察できる角度をいう。","Wide neckな嚢状動脈瘤に対してADAPT techniqueが施行される。","Flow Diverter Stent留置後のCBCTは原液造影剤の使用が有効である。"],c:[0,2],e:"【選択肢1：正しい】顎を上げる（chin up）ことで頸部の動脈の屈曲を伸ばしデバイスの通過性を向上させることができます。\n【選択肢3：正しい】Barrel Viewは瘤のネック部分を親血管の短軸（輪切り）方向から観察しネック全体を把握する角度です。"}
,{n:44,t:"硬膜動静脈瘻の治療で正しいのはどれか。",m:false,o:["TVEでは主にOnyxが使用される。","海綿静脈洞部はTAEで根治率が高い。","横－S状静脈洞部は外科的治療が第一選択である。","Onyxを注入する際にBlank Roadmapが用いられる。","皮質逆流を呈する硬膜動静脈瘻は治療対象にならない。"],c:[3],e:"【正解：選択肢4】液体塞栓物質のOnyxを用いる際はマスク像のないBlank Roadmap（ブランク・ロードマップ）下での注入が行われます。\n【選択肢5：誤り】皮質逆流を呈する硬膜動静脈瘻は出血リスクが高く積極的治療の対象となります。"}
,{n:45,t:"AVM（脳動静脈奇形）で誤っているのはどれか。",m:false,o:["好発部位はテント上である。","CT-Angiographyでflow voidがみられる。","摘出手術の難易度の指標としてSpetzler-Martin分類が用いられる。","症状にはナイダスの破綻による出血、盗血現象による虚血に伴うものがある。","塞栓術は外科的手術または定位放射線治療前の栄養血管閉塞またはナイダスの体積減少を目的としている。"],c:[1],e:"【正解：選択肢2（誤り）】flow void（フローボイド）は「MRI」のT2強調画像等で血流の速い血管が低信号（黒く）抜けて見える現象です。CT-Angiographyでは血管は高吸収（白く）に染まります。"}
,{n:46,t:"適応条件を満たせば経皮経管的脳血栓回収療法を行うことができる最終健常確認時刻からの時間で正しいのはどれか。",m:false,o:["4.5時間","6時間","16時間","24時間","32時間"],c:[3],e:"【正解：選択肢4】最新のガイドライン（DAWN/DEFUSE-3試験等に基づく）では一定の適応条件を満たせば発症（最終健常確認）から24時間以内まで血栓回収術の適応となります。"}
,{n:47,t:"脳動脈瘤治療で使用されるステントで誤っているのはどれか。",m:false,o:["LVIS","FRED","Pipeline","PRECISE","Neuroform Atlas"],c:[3],e:"【正解：選択肢4（誤り）】PRECISE（プリサイス）は頸動脈狭窄症（CAS）に使用するステントであり、頭蓋内の脳動脈瘤治療には用いられません。\nLVIS・FRED・Pipeline・Neuroform Atlasはすべて脳動脈瘤用ステントです。"}
,{n:48,t:"脳梗塞に対する機械的血栓回収術で正しいのはどれか。2つ選べ。",m:true,o:["全身麻酔で施行する。","吸引カテーテルは血栓の遠位に留置する。","ステントリトリーバは吸引カテーテルより有効性が高い。","modified TICIグレードにおける2bとは閉塞血管域の50%以上の再灌流を意味する。","ステントリトリーバと血栓吸引カテーテルを併用する方法をcombination techniqueという。"],c:[3,4],e:"【選択肢4：正しい】modified TICIグレード2bは閉塞血管域の50%以上の再灌流が得られた状態を指します。\n【選択肢5：正しい】ステントリトリーバと吸引カテーテルを同時に使用する手法をcombination technique（Solumbra法など）と呼びます。"}
,{n:49,t:"脳動脈瘤で正しいのはどれか。",m:false,o:["好発年齢は20歳以下。","大半が紡錘状動脈瘤である。","症候性脳動脈瘤の割合が多い。","多発性脳動脈瘤は男性に多い。","後方循環より前方循環に多い。"],c:[4],e:"【正解：選択肢5】脳動脈瘤は椎骨・脳底動脈系（後方循環）よりも内頸動脈・前交通動脈・中大脳動脈（前方循環）に多く発生します。\n好発年齢は40〜60歳代。大半は嚢状（サック型）動脈瘤。多くは無症候性。多発性脳動脈瘤は女性に多い傾向があります。"}
,{n:50,t:"脳血管内治療で使用されない塞栓物質はどれか。",m:false,o:["Onyx","NBCA","金属コイル","セレスキュー","エンボスフィア"],c:[4],e:"【正解：選択肢5】エンボスフィア（Embosphere）は主に体部の腫瘍（子宮筋腫等）や動脈出血に使用される粒子状塞栓物質であり、脳血管内治療では通常使用されません。\nOnyx・NBCA・金属コイル・セレスキューは脳血管内治療で使用されます。"},{n:51,t:"肝臓で正しいのはどれか。2つ選べ。",m:true,o:["肝臓の悪性腫瘍で最も多いのは肝細胞がんである。","門脈枝は通常前区域枝と左枝は共通幹を形成する。","Glison鞘には肝動脈・胆管・リンパ管の3つの脈管が含まれている。","門脈の浸潤度について門脈本幹まで浸潤を認める場合はVP4とする。","早期肝細胞癌はDynamic CTの方がEOB-MRIより存在診断能が高い。"],c:[0,3],e:"【選択肢1：正しい】肝細胞がん（HCC）は本邦の原発性肝悪性腫瘍の約90%を占めます。\n【選択肢2：誤り】門脈は通常右枝と左枝に分かれます。\n【選択肢3：誤り】Glisson鞘は「肝動脈・門脈・胆管」の3脈管です。\n【選択肢4：正しい】門脈本幹にまで浸潤が及ぶものはVp4と定義されます。\n【選択肢5：誤り】早期肝細胞癌の検出はEOB-MRIの方が優れています。"}
,{n:52,t:"胸腹部動静脈で正しいのはどれか。2つ選べ。",m:true,o:["左副腎静脈は下大静脈へ直接流入する。","右中副腎動脈は通常腎動脈から起始する。","左上大静脈遺残は通常冠状静脈洞に流入する。","半奇静脈は脊柱の左側を上行し奇静脈に合流する。","右気管支動脈は大動脈から単独起始する形態の頻度が高い。"],c:[2,3],e:"【選択肢1：誤り】左副腎静脈は左腎静脈に流入します（右副腎静脈が下大静脈へ直接流入）。\n【選択肢2：誤り】右中副腎動脈は通常腹部大動脈から直接起始します。\n【選択肢3：正しい】左上大静脈遺残（PLSVC）は通常は冠状静脈洞に流入し右房へ戻ります。\n【選択肢4：正しい】半奇静脈は脊柱の左側を上行し第8〜9胸椎レベルで奇静脈に合流します。\n【選択肢5：誤り】右気管支動脈は肋間気管支動脈幹として起始する頻度が最も高いです。"}
,{n:53,t:"骨盤血管の解剖で正しいのはどれか。2つ選べ。",m:true,o:["下腹壁動脈は内腸骨動脈から分岐する。","右精巣静脈は直接下大静脈に流入する。","腸腰動脈は外腸骨動脈の最初の分枝である。","内腸骨動脈の壁側枝の一つに閉鎖動脈がある。","精巣動脈・卵巣動脈は内腸骨動脈より分岐する。"],c:[1,3],e:"【選択肢1：誤り】下腹壁動脈は外腸骨動脈から分岐します。\n【選択肢2：正しい】右精巣静脈は直接下大静脈へ流入します（左は左腎静脈へ）。\n【選択肢3：誤り】腸腰動脈は内腸骨動脈（後幹）の最初の分枝です。\n【選択肢4：正しい】内腸骨動脈の壁側枝には閉鎖動脈や下殿動脈などがあります。\n【選択肢5：誤り】精巣（卵巣）動脈は腹部大動脈から直接分岐します。"}
,{n:54,t:"肝細胞がんのTACEで正しいのはどれか。2つ選べ。",m:true,o:["巨大なA-Pシャントがある症例は適応外である。","Child-Pugh分類の評価項目に血清総蛋白値が含まれる。","肝外側副血行路の一例として左側の腎被膜動脈が挙げられる。","DEB-TACE時にVascular Lakeと呼ばれる血管外漏出を生じることがある。","リピオドールエマルジョンはリピオドールと多孔性ゼラチン粒の混合液である。"],c:[0,3],e:"【選択肢1：正しい】巨大なA-Pシャントがある場合、肺塞栓リスクがあるため適応外です。\n【選択肢2：誤り】Child-Pugh分類はビリルビン・アルブミン・PT活性度・腹水・脳症の5項目です。総蛋白は含まれません。\n【選択肢3：誤り】典型的には右腎被膜動脈が栄養します。左側は稀です。\n【選択肢4：正しい】DEB-TACEにおいてVascular Lake現象は良好な腫瘍壊死と関連します。\n【選択肢5：誤り】リピオドールエマルジョンはリピオドールと「水溶性抗癌剤」の混合液です。"}
,{n:55,t:"腹部大動脈からの分枝レベルで正しいのはどれか。",m:false,o:["腎動脈 - 第10胸椎","腹腔動脈 - 第11胸椎","上腸間膜動脈 - 第11胸椎","下腸間膜動脈 - 第3腰椎","総腸骨動脈 - 第1仙椎"],c:[3],e:"【正解：選択肢4】下腸間膜動脈（IMA）は通常第3腰椎レベルから分岐します。\n腎動脈→第1〜2腰椎、腹腔動脈→第12胸椎〜第1腰椎、SMA→第1腰椎、総腸骨動脈→第4腰椎"}
,{n:56,t:"上腸間膜動脈から分岐する血管で誤っているのはどれか。",m:false,o:["空腸動脈","回結腸動脈","右結腸動脈","中結腸動脈","左結腸動脈"],c:[4],e:"【正解：選択肢5（誤り）】左結腸動脈はSMAではなく下腸間膜動脈（IMA）の分枝です。\n空腸動脈・回結腸動脈・右結腸動脈・中結腸動脈はすべてSMAから分岐します。"}
,{n:57,t:"図4の画像で考えられる疾患はどれか。",m:false,o:["喀血","肺がん","外傷性出血","肺動静脈瘻","肺血栓塞栓症"],c:[3],e:"【正解：選択肢4】図4は肺動静脈瘻（PAVF）の特徴的な画像です。肺動脈から直接袋状に拡張した血管が見られそこから肺静脈へ流出する様子を示しています。奇異性脳塞栓症のリスクがあります。"}
,{n:58,t:"腎生検後の画像である。図5の画像で考えられる疾患はどれか。",m:false,o:["腎臓がん","腎動静脈瘻","腎動脈仮性瘤","腎動脈狭窄症","腎血管筋脂肪腫"],c:[2],e:"【正解：選択肢3】腎生検後に急激に発生した袋状の濃染像は腎動脈仮性瘤を示唆します。腎生検の重大な合併症の一つであり、IVRによるコイル塞栓術などが治療として行われます。"}
,{n:59,t:"喀血におけるIVRの塞栓物質で正しいのはどれか。",m:false,o:["Onyx","オルダミン","金属ステント","Microspheres","ゼラチンスポンジ"],c:[4],e:"【正解：選択肢5】喀血に対する気管支動脈塞栓術（BAE）ではゼラチンスポンジ（細切片）が歴史的に最も標準的に用いられます。"}
,{n:60,t:"肺血栓塞栓症で血栓溶解療法の絶対禁忌はどれか。",m:false,o:["妊娠","急性心筋梗塞","細菌性心内膜炎","出血性脳卒中の既往","糖尿病性出血性網膜症"],c:[3],e:"【正解：選択肢4】血栓溶解療法の絶対禁忌は「出血性脳卒中の既往」です。再出血のリスクが極めて高くなります。"}
,{n:61,t:"子宮筋腫に対する子宮動脈塞栓術で正しいのはどれか。2つ選べ。",m:true,o:["悪性腫瘍にも効果的である。","再治療率は外科手術より低い。","妊娠の希望がある場合は適応外である。","使用する塞栓物質は球状塞栓物質を使用する。","薬剤療法で症状のコントロールが困難な状態は禁忌である。"],c:[2,3],e:"【選択肢1：誤り】UAEの適応は良性疾患（子宮筋腫・子宮腺筋症）です。\n【選択肢2：誤り】再治療率はUAEの方が高いです。\n【選択肢3：正しい】妊娠を希望する場合、原則としてUAEは適応外です。\n【選択肢4：正しい】球状塞栓物質（エンボスフィア等）が標準的に使用されます。\n【選択肢5：誤り】薬剤療法でコントロール困難な症例こそUAEの良い適応です。"}
,{n:62,t:"産科危機的出血でTAEの適応でないのはどれか。",m:false,o:["弛緩出血","前置胎盤出血","癒着胎盤出血","子宮摘出後の出血","子宮破裂による出血"],c:[4],e:"【正解：選択肢5】子宮破裂は外科的な修復が緊急で必要となる器質的な損傷であり、IVRによる塞栓術のみでの対応は不適切です。"}
,{n:63,t:"肺動静脈奇形で正しいのはどれか。",m:false,o:["合併症として脳梗塞がある。","塞栓物質は液体塞栓物質を使用する。","治療適応は流入動脈径が3 mm以上である。","血流再発に対する再塞栓術は初回塞栓術より成績が良い。","短絡部の形状によってSimple typeとComplex typeに分類する。"],c:[0],e:"【正解：選択肢1】PAVFは肺のフィルター機能を介さず血栓が脳へ飛ぶ奇異性脳塞栓症（脳梗塞）のリスクがあります。\n塞栓物質は主に金属コイルやプラグです。治療適応は流入動脈径2〜3 mm以上。分類はSimple型（1本）とComplex型（複数本）です。"}
,{n:64,t:"上腸間膜動脈閉塞のIVRで正しいのはどれか。",m:false,o:["ステント留置はしない。","術前の造影CTは診断に寄与しない。","塩酸パパベリンにより血栓溶解を行う。","カテーテルを閉塞部の末梢に進めて血栓溶解を行う。","急性閉塞に対して機械的血栓吸引デバイスの使用が可能である。"],c:[4],e:"【正解：選択肢5】急性閉塞に対し機械的血栓吸引デバイスの使用は有効な手段の一つです。\nステント留置は有効な選択肢です。術前造影CTは不可欠です。塩酸パパベリンは血管拡張薬で血栓溶解作用はありません。"}
,{n:65,t:"門脈圧亢進症で正しいのはどれか。",m:false,o:["門脈圧と閉塞肝静脈圧は同程度である。","部分的脾動脈塞栓術は門脈圧を上昇させる。","Budd-Chiari症候群に起因するものが最も多い。","門脈圧が100 mmH2O以上で門脈圧亢進症の診断がなされる。","TIPS（経頸静脈肝内門脈大循環短絡術）は門脈圧を上昇させる。"],c:[0],e:"【正解：選択肢1】肝硬変などの肝内性亢進症では閉塞肝静脈圧（WHVP）は門脈圧と良好な相関を示します。\nPSEは門脈圧を低下させます。最多原因は肝硬変。200 mmH2O以上が門脈圧亢進症です。TIPSは門脈圧を低下させます。"}
,{n:66,t:"CTEPH（慢性血栓塞栓性肺高血圧症）で正しいのはどれか。",m:false,o:["肺動脈楔入圧が15 mmHg以上である。","心陰影の拡大（CTR≧50%）は見られない。","BPA（肺動脈バルーン形成術）が根治治療の第一選択である。","動脈硬化性プラークの破綻により肺動脈が閉塞する疾患である。","肺換気・血流シンチグラフィはスクリーニング検査として有用である。"],c:[4],e:"【正解：選択肢5】肺血流シンチグラフィは末梢までの多発欠損を捉えるためCTEPHの極めて有用なスクリーニング検査です。\nPAWPは15 mmHg以下が条件。右不全により心陰影は拡大します。第一選択はPEA（肺動脈血栓内膜摘除術）です。古い血栓が器質化して閉塞する疾患です。"}
,{n:67,t:"BRTO（バルーン閉塞下逆行性経静脈塞栓術）で正しいのはどれか。",m:false,o:["治療直後に門脈圧は低下する。","バルーンの留置時間は30分程度が望ましい。","硬化剤としてゼラチンスポンジが用いられる。","最も多い短絡路は胃から心膜横隔静脈への短絡である。","BRTVは下横隔静脈を含めて撮影を行う。"],c:[4],e:"【正解：選択肢5】BRTVでは側副路（下横隔静脈など）の走行を把握するため下横隔静脈を含めて撮影を行います。\n治療直後に門脈圧はむしろ上昇します。バルーンは数時間〜一晩留置。硬化剤は5%オレイン酸エタノールアミン（EO）です。最多短絡路は胃腎シャントです。"}
,{n:68,t:"消化管出血のIVRで正しいのはどれか。",m:false,o:["内視鏡的止血術の前に行う。","上部消化管出血はIVRが第一選択である。","下部消化管出血に対する塞栓術後は腸管虚血が生じにくい。","Isolationとは出血点の遠位部から近位部にかけて塞栓することである。","DSAは蠕動運動によるアーチファクト軽減のためマスク像を減らして撮影する。"],c:[3],e:"【正解：選択肢4】Isolation（アイソレーション）とは出血点を挟んで遠位と近位の両側を塞栓する手法です。\n上部消化管出血の第一選択は内視鏡です。下部消化管は側副路が乏しく腸管虚血リスクが高いです。"}
,{n:69,t:"血管塞栓術の塞栓物質で正しいのはどれか。2つ選べ。",m:true,o:["消化管出血に対しエタノールを使用した。","骨盤内出血にゼラチンスポンジを使用した。","NBCAは水溶性造影剤と混合して使用する。","肺動静脈奇形に対し塞栓物質としてゼラチンスポンジを使用した。","肝細胞癌に対し肝動脈にリピオドールと抗癌剤を注入後、多孔性ゼラチン粒を使用した。"],c:[1,4],e:"【選択肢1：誤り】消化管出血に無水エタノールは組織壊死のリスクが強すぎます。\n【選択肢2：正しい】骨盤内出血にゼラチンスポンジが使われます。\n【選択肢3：誤り】NBCAは必ず「リピオドール」と混合します。\n【選択肢4：誤り】PAVFにゼラチンスポンジは体循環へ飛ぶ危険があり禁忌です。\n【選択肢5：正しい】cTACEではリピオドール＋抗癌剤注入後にゼラチン粒で蓋をします。"}
,{n:70,t:"症候性子宮筋腫の子宮動脈塞栓術で誤っているのはどれか。",m:false,o:["球状塞栓物質と造影剤は1対1で希釈する。","塞栓物質は自然な血流に乗せてゆっくり注入する。","塞栓物質は標的外塞栓をしないようX線透視下で注入する。","塞栓物質は球状塞栓物質500-700μm以上の製剤を用いる。","注入終了後1時間以上経過してから再開通が無いことを確認する。"],c:[4],e:"【正解：選択肢5（誤り）】UAEにおいて「1時間以上経過してから確認する」という明確な規定はありません。手技終了時の造影で途絶を確認すれば終了します。"}
,{n:71,t:"動脈で正しいのはどれか。2つ選べ。",m:true,o:["静脈に比べて壁は薄い。","逆流を防止する弁がある。","静脈よりも弾性線維が少ない。","壁は内膜・中膜・外膜の3層構造である。","平滑筋の収縮・弛緩で血圧や血流量をコントロールする。"],c:[3,4],e:"【選択肢1：誤り】動脈は静脈よりも壁が厚いです。\n【選択肢2：誤り】逆流防止弁があるのは「静脈」です。\n【選択肢3：誤り】動脈は弾力性に富み弾性線維が多いです。\n【選択肢4：正しい】血管壁は「内膜・中膜・外膜」の3層構造です。\n【選択肢5：正しい】中膜の平滑筋が収縮・弛緩することで血管径を調整し血圧を制御します。"}
,{n:72,t:"ASO（閉塞性動脈硬化症）で正しいのはどれか。2つ選べ。",m:true,o:["間歇性跛行","動脈の拍動の増加","圧痛のある静脈瘤","安静時の足先の痛み","DVT（深部静脈血栓症）の形成"],c:[0,3],e:"【選択肢1：正しい】間欠性跛行（歩くと足が痛み休むと改善する）はASOの典型的な初期症状です。\n【選択肢2：誤り】狭窄・閉塞により動脈拍動は減弱または消失します。\n【選択肢3：誤り】静脈瘤は「静脈」の疾患です。\n【選択肢4：正しい】重症化（CLI）すると安静時疼痛や潰瘍・壊疽が生じます。\n【選択肢5：誤り】DVTは「静脈」の疾患です。"}
,{n:73,t:"上大静脈に直接流入する静脈はどれか。",m:false,o:["門脈","奇静脈","肋間静脈","内胸静脈","鎖骨下静脈"],c:[1],e:"【正解：選択肢2】奇静脈は胸部の静脈血を集め右気管支の頭側を回って上大静脈（SVC）に直接流入します。\n門脈は肝臓へ、内胸静脈・鎖骨下静脈は腕頭静脈を経てSVCへ流入します。"}
,{n:74,t:"慢性閉塞性動脈疾患で誤っているのはどれか。",m:false,o:["動脈瘤の形成","血管壁に石灰化","血管の狭窄や閉塞","側副血行路の発達","遠位部の血流増加"],c:[4],e:"【正解：選択肢5（誤り）】慢性的な閉塞により遠位部の血流は通常減少します。側副血行路が発達することで一部補われますが健常時と比べて血流は低下しています。"}
,{n:75,t:"大動脈瘤で正しいのはどれか。2つ選べ。",m:true,o:["全周性に拡張したものを嚢状大動脈瘤という。","一部限局的に突出したものを紡錘状大動脈瘤という。","全体にわたって拡大したものは大動脈拡張症と称する。","直径が正常径の1.5倍に満たない拡大を瘤状拡張と称する。","成人の大動脈の正常径は一般に胸部で40 mm腹部で35 mmである。"],c:[2,4],e:"【選択肢1：誤り】全周性に拡張したものは「紡錘状（Fusiform）」大動脈瘤です。\n【選択肢2：誤り】一部限局的に突出したものは「嚢状（Saccular）」大動脈瘤です。\n【選択肢3：正しい】全体的に拡大している状態は「大動脈拡張症（ectasia）」と呼ばれます。\n【選択肢4：誤り】瘤（Aneurysm）の定義は通常正常径の1.5倍以上です。\n【選択肢5：正しい】成人の正常径の目安として胸部約40 mm、腹部約30〜35 mm程度とされています。"},{n:76,t:"PAD（末梢動脈疾患）で正しいのはどれか。2つ選べ。",m:true,o:["慢性虚血の原因に生活習慣病は関係ない。","急性虚血の原因は動脈血栓症・外傷などがある。","動脈硬化病変は内膜硬化と外膜硬化に大別される。","急性虚血は側副血行路が発達し灌流が急速に低下する病態である。","動脈硬化性病変に存在する石灰化病変は臨床治療成績を不良とする。"],c:[1,4],e:"【選択肢1：誤り】慢性虚血の原因には糖尿病・高血圧・脂質異常症などの生活習慣病が密接に関係します。\n【選択肢2：正しい】急性下肢虚血の原因は心源性塞栓症・動脈血栓症・外傷による血管損傷などが主です。\n【選択肢3：誤り】動脈硬化は「内膜の肥厚」や「中膜の石灰化」が特徴です。外膜硬化という分類は一般的ではありません。\n【選択肢4：誤り】急性虚血は急激に血流が途絶えるため、側副血行路の発達が間に合わず重篤な壊死に繋がりやすい病態です。\n【選択肢5：正しい】動脈硬化病変特に高度な石灰化は治療成績を低下させます。"}
,{n:77,t:"腹部大動脈から直接起始している血管はどれか。2つ選べ。",m:true,o:["精巣動脈","右腎動脈","下副腎動脈","内腸骨動脈","胃十二指腸動脈"],c:[0,1],e:"【選択肢1：正しい】精巣動脈（卵巣動脈）は腹部大動脈前面から直接起始します。\n【選択肢2：正しい】右腎動脈は第1〜2腰椎レベルで腹部大動脈の側面から直接起始します。\n【選択肢3：誤り】下副腎動脈は通常腎動脈から分岐します。\n【選択肢4：誤り】内腸骨動脈は総腸骨動脈から分岐します。\n【選択肢5：誤り】胃十二指腸動脈は総肝動脈から分岐します。"}
,{n:78,t:"下肢動脈撮影で誤っているのはどれか。",m:false,o:["等浸透圧造影剤を使用する。","下肢を抑制帯やクッション構造の固定具等で固定する。","ハレーションを低減するために補償フィルタを使用する。","撮影中に下肢を動かさないよう撮影直前の説明は避ける。","被検者に造影剤注入時に熱感や疼痛が生じる可能性があることを説明する。"],c:[3],e:"【正解：選択肢4（誤り）】撮影中に動かさないよう、撮影直前にもしっかりと指示・説明を行うことが重要です。直前の説明を「避ける」のは誤りです。"}
,{n:79,t:"図6は右下肢動脈造影画像である。矢印が示す血管はどれか。",m:false,o:["膝窩動脈","腓骨動脈","前脛骨動脈","後脛骨動脈","中脛骨動脈"],c:[1],e:"【正解：選択肢2 ✅】図6は下腿の画像です。外側の腓骨に沿って走るのが腓骨動脈（矢印）です。前方を走るのが前脛骨動脈、内側を走るのが後脛骨動脈です。"}
,{n:80,t:"透析シャントPTAで正しいのはどれか。2つ選べ。",m:true,o:["バルーンPTAでは透視にてバルーンのくびれ解消を目標とする。","静脈病変は病変近傍の血管径と同じサイズのバルーンカテーテルを選択する。","動脈病変は病変近傍の血管径よりも大きいサイズのバルーンカテーテルを選択する。","経動脈アプローチはと経静脈アプローチ比較して穿刺による合併症の危険性が少ない。","狭窄率の計測では病変のなるべく近傍の狭窄を有していない部分を対象血管径とする。"],c:[0,4],e:"【選択肢1：正しい】バルーン拡張時に狭窄部の「くびれ（waist）」が完全に消失することを透視で確認します。\n【選択肢2：誤り】静脈側は血管径の1.1〜1.2倍程度のバルーンを選択します。\n【選択肢3：誤り】動脈側は破裂のリスクが高いため血管径を超えないサイズから選択します。\n【選択肢4：誤り】経動脈アプローチは止血の難しさから合併症リスクが高いです。\n【選択肢5：正しい】狭窄率計算の基準は病変近傍の正常な血管径を用います。"}
,{n:81,t:"皮下・軟部組織のAVM/AVF治療で誤っているのはどれか。",m:false,o:["血流コントロールが重要である。","合併症としてアルコール中毒がある。","TAE・TVEが困難な場合は直接穿刺で治療する。","TAEを行う場合は流入動脈の近位部でコイル塞栓する。","TVEを行う場合は流出静脈で液体塞栓物質やコイルを用いて塞栓する。"],c:[3],e:"【正解：選択肢4（誤り）】TAEにおいて流入動脈の「近位部」を閉塞させると側副血行路が発達して再発の原因となるため、できるだけニダスに近い遠位部を閉塞させる必要があります。"}
,{n:82,t:"弓部大動脈瘤2-debranched TEVARで塞栓する血管はどれか。2つ選べ。",m:true,o:["右総頸動脈","左総頸動脈","左椎骨動脈","右鎖骨下動脈","左鎖骨下動脈"],c:[1,4],e:"【正解：選択肢2と5 ✅】2-debranched TEVAR（2分枝再建）では、左総頸動脈と左鎖骨下動脈をステントグラフトで覆い、バイパス血流の逆流を防ぐためにそれらの起始部を塞栓します。"}
,{n:83,t:"EVAR（腹部大動脈ステントグラフト内挿術）のTypeIIエンドリークで正しいのはどれか。",m:false,o:["3か月を超えて持続する場合に治療適応になる。","下腸間膜動脈や第5腰動脈が対象になることが多い。","経動脈的治療が直接穿刺よりNidusへの到達が容易である。","Nidusへ注入するNBCA-リピオドール混合液の割合は4:1である。","Nidusへ到達直後にNBCA-リピオドール混合液を注入して治療する。"],c:[1],e:"【正解：選択肢2 ✅】下腸間膜動脈（IMA）や腰動脈からの逆流がType IIエンドリークの主な原因です。\n【選択肢1：誤り】瘤径の拡大がない場合は通常6ヶ月〜1年程度の経過観察を行います。\n【選択肢3：誤り】最近は直接穿刺の方が確実な場合もあります。\n【選択肢4：誤り】エンドリーク治療では通常1:1〜1:3程度の希釈率が使われます。"}
,{n:84,t:"液体塞栓物質はどれか。",m:false,o:["NBCA","プロタミン","ゼラチン細片","マイクロスフィア","ポリビニルアルコール"],c:[0],e:"【正解：選択肢1 ✅】NBCA（シアノアクリレート）は血液（イオン）に触れて重合する液体塞栓物質です。\nプロタミン→中和剤、ゼラチン細片・マイクロスフィア・ポリビニルアルコール→粒子状塞栓物質"}
,{n:85,t:"大動脈ステントグラフトのエンドリーク分類で誤っているのはどれか。",m:false,o:["Ⅱ：動脈壁とステントグラフトの接合部分からの血液漏れで瘤内に血液が流れ込むもの。","Ⅲa：ステントグラフト-ステントグラフト間の接合部分からの瘤内への血液漏れ。","Ⅲb：ステントグラフト-ファブリックの破損などにて瘤内に血液が流れ込むもの。","Ⅳ：ステントグラフトのポロシティからの血液漏れ。","Ⅴ：瘤内に血流が認められないにもかかわらず瘤が拡大傾向を示す。"],c:[0],e:"【正解：選択肢1（誤り）】接合部からの漏れはType I（中枢側ならIa、末梢側ならIb）です。Type IIは分枝血管（IMAや腰動脈）からの逆流です。"}
,{n:86,t:"EVARの合併症で誤っているのはどれか。",m:false,o:["脳梗塞","重症肺炎","腸管虚血","シース挿入部の感染","ステントグラフトの変形"],c:[0],e:"【正解：選択肢1（誤り）】脳梗塞は大動脈弓部を触るTEVAR（胸部）の主要なリスクであり、腹部のEVARでは一般的ではありません。"}
,{n:87,t:"ハイブリッドTEVARで誤っているのはどれか。",m:false,o:["外科的手術が必須となる。","1-debranchは左総頸‐左鎖骨下動脈バイパスである。","2-debranchは右腋窩‐左総頸・左鎖骨下動脈バイパスである。","全弓部置換術と比較してICU滞在期間・在院日数はハイブリッドTEVARの方が短い。","total debranching TEVARはpartial debranching TEVARより一般的に侵襲度は低い。"],c:[4],e:"【正解：選択肢5（誤り）】total debranching（全分枝再建）はpartial（部分再建）よりも外科的手術の範囲が広く、侵襲度は高くなります。"}
,{n:88,t:"EVARのエンドリーク原因血管で誤っているのはどれか。",m:false,o:["腰動脈","肋間動脈","前脈絡叢動脈","正中仙骨動脈","下腸間膜動脈"],c:[2],e:"【正解：選択肢3（誤り）】前脈絡叢動脈は脳内の動脈であり、腹部大動脈瘤とは無関係です。"}
,{n:89,t:"大動脈ステントグラフト治療で正しいのはどれか。2つ選べ。",m:true,o:["TEVARの中枢側landing部Zone0〜2では脳卒中発生率が高い。","TEVARの中枢側landing部Zone3は血管再建が必要である。","エンドリークIbは動脈壁とステントグラフトの接合部分の中枢側から血液が流入する。","エンドリークIIIaはステントグラフト同士の接合部分から血液が漏れ出る。","エンドリークIVは瘤内に血流がみられないにもかかわらず瘤が拡大傾向を示すものである。"],c:[0,3],e:"【選択肢1：正しい】弓部のZone0〜2は頭頸部血管に近いため脳卒中リスクが高くなります。\n【選択肢2：誤り】Zone3への留置であれば通常は血管再建は不要です。\n【選択肢3：誤り】エンドリークIbは接合部の「末梢側」からの漏れです。\n【選択肢4：正しい】エンドリークIIIaはステントグラフトの接続部（モジュール間）からの漏れです。\n【選択肢5：誤り】瘤拡大のみで流流がないのはType V（エンドテンション）です。"}
,{n:90,t:"Rutherford分類で正しいのはどれか。2つ選べ。",m:true,o:["1群：無症状","2群：軽度の間欠性跛行","3群：中等度の間欠性跛行","4群：虚血性安静時疼痛","5群：小さな組織欠損"],c:[1,3],e:"Rutherford分類：0:無症状、1:軽度跛行、2:中等度、3:重度、4:安静時疼痛、5:小潰瘍、6:広範壊死\n\n【選択肢1：誤り】1群は「軽度の間欠性跛行」です（無症状は0群）。\n【選択肢2：正しい】2群は「軽度の間欠性跛行」✅（問題の選択肢2が正解）\n【選択肢4：正しい】4群は「虚血性安静時疼痛」✅"}
,{n:91,t:"X線ヨード造影剤で正しいのはどれか。2つ選べ。",m:true,o:["低浸透圧造影剤の浸透圧は生体よりも低い。","動脈内に投与された造影剤は胆道排泄されない。","水溶性ヨード造影剤はトリヨードベンゼン環を持つ。","非イオン性造影剤は複数の水酸基を有することで水溶性を獲得している。","水溶性ヨード造影剤は同じヨード濃度の場合モノマー型よりもダイマー型の粘稠度は低くなる。"],c:[2,3],e:"【選択肢1：誤り】低浸透圧造影剤でも血漿（約290）の2〜3倍の浸透圧があります。\n【選択肢2：誤り】一部の造影剤は微量ながら胆道からも排泄（代償性排泄）されます。\n【選択肢3：正しい】基本骨格はトリヨードベンゼン環です。\n【選択肢4：正しい】複数の水酸基（-OH）を持つことでイオン化せずに水溶性を保っています。\n【選択肢5：誤り】同じヨード濃度なら、モノマーよりダイマーの方が粘稠度は高くなります。"}
,{n:92,t:"造影剤腎症で正しいのはどれか。2つ選べ。",m:true,o:["慢性腎臓病患者はPCIによる発症リスクがない。","予防のための造影検査後の血液浄化療法は必須である。","冠動脈造影で造影剤の減量は発症リスクを低減させる。","慢性腎臓病は生理食塩液を造影検査の前後で経静脈投与が望ましい。","NSAIDs（非ステロイド性消炎鎮痛薬）の継続内服は発症リスクを低減させる。"],c:[2,3],e:"【選択肢1：誤り】慢性腎臓病（CKD）は造影剤腎症（CIN）の最大のリスクです。\n【選択肢2：誤り】予防目的での一律な血液浄化療法の有用性は否定されています。\n【選択肢3：正しい】投与量を必要最小限に減らすことはCIN予防に有効です。\n【選択肢4：正しい】生理食塩液の補液（ハイドレーション）は最もエビデンスのある予防法です。\n【選択肢5：誤り】NSAIDsは腎血流を低下させCINリスクを高めます。"}
,{n:93,t:"X線ヨード造影剤の副作用で誤っているのはどれか。",m:false,o:["嘔吐","発赤","蕁麻疹","喉頭浮腫","閉塞性イレウス"],c:[4],e:"【正解：選択肢5（誤り）】閉塞性イレウスはヨード造影剤の副作用としては報告されていません。\n\n嘔吐・発赤・蕁麻疹・喉頭浮腫はいずれも造影剤の副作用として知られています。"}
,{n:94,t:"IVR時のリスクマネジメントで誤っているのはどれか。",m:false,o:["手技前に必要なモニターが装着できているかを確認した。","入室時に患者自ら氏名を名乗ってもらいネームバンドと照合の上、確認を行った。","術中モニターのアラームが鳴ったが医師も気付いていると判断し消音のみ行った。","転倒転落防止対策のため患者のADLを考慮して検査台への移動方法を検討した。","手技前にタイムアウトを実施し予定術式、予測される合併症を多職種で情報共有した。"],c:[2],e:"【正解：選択肢3（誤り）】アラームを独断で消音するのは厳禁です。必ずチームに報告し原因を確認します。"}
,{n:95,t:"法令改正に伴うタスク・シフト/シェアを推進する診療放射線技師の業務で正しいのはどれか。2つ選べ。",m:true,o:["動脈路確保のために穿刺する。","RI検査のために静脈路を確保する。","動脈路に造影剤注入装置を接続する。","上部消化管検査のために鼻腔カテーテルを挿入する。","生命予後にかかわる緊急性の高い疾患に対する診断。"],c:[1,2],e:"【選択肢1：誤り】動脈路確保の穿刺は医師の業務です。\n【選択肢2：正しい】RI検査のための静脈路確保は告示研修を受けた技師が実施可能です。\n【選択肢3：正しい】動脈（または静脈）ラインへの造影剤注入装置の接続も可能となりました。\n【選択肢4：誤り】鼻腔カテーテル挿入は医師・看護師の業務です。\n【選択肢5：誤り】診断は医師の業務です。"}
,{n:96,t:"チーム医療で正しいのはどれか。",m:false,o:["他施設との間では行えない。","リーダーとなる職種を固定する。","国家資格を持つ職種のみで構成する。","経験年数が同等の者でチームを構成する。","メンバー間で情報を共有して意思決定をする。"],c:[4],e:"【正解：選択肢5 ✅】チーム医療ではメンバー間で情報を共有し意思決定を行うことが基本です。"}
,{n:97,t:"造影剤の適応で誤っているのはどれか。",m:false,o:["冠動脈造影にヨード濃度370 mgI/mlを使用した。","大動脈造影にヨード濃度300 mgI/mlを使用した。","脳血管造影にヨード濃度350 mgI/mlを使用した。","二酸化炭素にて造影しDSA撮影にて血管描出した。","非イオン性等浸透圧造影剤はほぼ血漿と同等な浸透圧である。"],c:[4],e:"【正解：選択肢5（誤り）】非イオン性等浸透圧造影剤（イオキサグラン等）は血漿とほぼ同等ですが、一般に広く使われる「低浸透圧」造影剤は血漿の数倍高いです。等浸透圧造影剤は特定の種類に限られます。"}
,{n:98,t:"医療分野でリスク評価や不確実性の評価にも有用な確率的手法はどれか。",m:false,o:["5M-5E法","スノーボールモデル","スイスチーズモデル","フィッシュボーンチャート法","モンテカルロシミュレーション"],c:[4],e:"【正解：選択肢5 ✅】モンテカルロシミュレーションは不確実な事象を乱数を用いてシミュレーションする確率的手法で医療分野でのリスク評価にも有用です。"}
,{n:99,t:"医師の指示の下で患者への説明が認められたものはどれか。2つ選べ。",m:true,o:["放射線の影響","検査・治療の目的","具体的な手技内容","手技に伴うリスク","血管造影の定型的手技の説明"],c:[0,4],e:"【選択肢1：正しい】放射線の影響は専門性を持つ診療放射線技師が説明できます。\n【選択肢2：誤り】検査・治療の目的の説明は医師の業務です。\n【選択肢3：誤り】具体的な手技内容の説明は医師の業務です。\n【選択肢4：誤り】手技に伴うリスクの説明は医師の業務です。\n【選択肢5：正しい】血管造影の定型的手技の説明（検査の流れなど）は認められています。"}
,{n:100,t:"現行制度下で実施可能とした行為の組合せで誤っているのはどれか。",m:false,o:["造影剤を投与する ― 看護師","IVR終了後の圧迫止血 ― 診療放射線技師","カテーテルを保持する ― 看護師","カテーテルを保持する ― 臨床検査技師","カテーテルを保持する ― 臨床工学技士"],c:[3],e:"【正解：選択肢4（誤り）】臨床検査技師には、カテーテルを保持する等の直接的な介助業務は現行法上で明示されていません。"}
  ],
  c18_device: [{n:1,t:"用語で正しいのはどれか。2つ選べ。",m:true,o:["照射時間は管電圧の立上り立下りの75%区間の時間で表す。","管電圧は陽極と陰極の間に加える電位差で波高値をkVp.で表示する。","公称最短撮影時間は各々のX線管装置に定められた最短撮影時間をいう。","公称撮影陽極入力は照射時間1秒、負荷繰返し時間10分で繰り返し可能な単発X線管負荷。","インバータ式X線高電圧装置はX線照射中に直流電力を交流電力に変換して高電圧を得るX線高電圧装置をいう。"],c:[0,1],e:"【選択肢1：正しい】JIS規格により照射時間は管電圧波形のピーク値の75%を基準に定義されます。\n【選択肢2：正しい】管電圧は陽極・陰極間の電位差で波高値（kVp）で表示します。\n【選択肢3：誤り】公称最短撮影時間はインバータ式など高電圧装置の性能として定められます。\n【選択肢4：誤り】公称撮影陽極入力は通常「0.1秒」の単発負荷を指します。\n【選択肢5：誤り】インバータ式は交流を直流にし、さらに高周波交流に変換して高電圧を得る装置です。"}
,{n:2,t:"医用画像部門における品質維持及び日常試験方法で誤っているのはどれか。",m:false,o:["品質保証は製品が必要な品質を満たしているかを確認する活動。","品質管理は各機器の品質が同一であるかを見極める技術的な行為。","基礎値は最初の不変性試験で得られた値で性能パラメータの基準値。","不変性試験は機器の性能が設定基準を満たしていることなどを確認する行為。","受入試験は契約仕様を満足しているかを確認するため新しい機器の設置時に行う行為。"],c:[1],e:"【正解：選択肢2（誤り）】品質管理（QC）は「機器の性能を一定の許容範囲内に維持・管理する」ための技術的行為であり、単に「同一であるかを見極める」だけではありません。"}
,{n:3,t:"撮影透視用X線装置の安全管理で正しいのはどれか。2つ選べ。",m:true,o:["医用電気機器安全規格ではクラスⅠ分類に属する。","医療機器のリスク分類は管理医用機器クラスⅡに属する。","CF形装着部の患者漏れ電流（正常状態）は0.1 mA以下。","透視によるCアーム形X線装置の最大空気カーマ率は患者照射基準点で測定された値。","透視によるCアーム形でないX線装置の最大空気カーマ率はX線受像器の接触可能表面から30 cmで測定された値。"],c:[0,3],e:"【選択肢1：正しい】医用電気機器の分類で保護接地（アース）を用いる装置は「クラスⅠ」に分類されます。\n【選択肢2：誤り】血管撮影装置は「高度管理医療機器（クラスⅢ）」に属します。\n【選択肢3：誤り】CF形装着部の患者漏れ電流（正常状態）は「0.01 mA以下」です。\n【選択肢4：正しい】Cアーム装置の最大空気カーマ率は「患者照射基準点（IRP）」で測定します。"}
,{n:4,t:"X線源装置で正しいのはどれか。2つ選べ。",m:true,o:["ターゲット角は実効焦点面と基準軸との角度である。","ブルーミングは低管電圧、大管電流で多く発生する。","ターゲットはタングステン・モリブデンの合金からなる。","可動絞りの最大X線照射野はSID65 cmで35×35 cmを超えない。","ベローズは絶縁油の温度からX線管破裂を防ぐ温度センサスイッチである。"],c:[1,4],e:"【選択肢1：誤り】ターゲット角は「ターゲット表面」と「基準軸」との角度です。\n【選択肢2：正しい】ブルーミングは低管電圧・大管電流時に電子の反発で起こりやすくなります。\n【選択肢3：誤り】血管撮影用のターゲットは通常「タングステン・レニウム合金」です。\n【選択肢5：正しい】ベローズは絶縁油の熱膨張を吸収し内圧上昇による管容器の破損を防ぐ構造です。"}
,{n:5,t:"回転陽極X線管装置の動作特性で正しいのはどれか。2つ選べ。",m:true,o:["管電流は電極間距離が長いほど大電流を流せる。","金属外囲器管の陽極電流はガラスバルブ管と同一である。","三極X線管は格子付きと比較して格子なしが大電流を流せる。","管電流はフィラメント加熱電流が一定の場合、管電圧が高いほど多く流れる。","短時間許容負荷は管電圧が正弦波に比べ平滑波形に近いほどX線負荷を取れない。"],c:[1,3],e:"【選択肢1：誤り】管電流は電極間距離が短いほど大電流を流せます。\n【選択肢2：正しい】金属外囲器管でも陽極を流れる電流の定義はガラス管と同じです。\n【選択肢3：誤り】三極管（グリッド制御）は格子なしに比べて最大負荷が制限されることがあります。\n【選択肢4：正しい】空間電荷制限領域では管電圧を上げると電流が増えます。\n【選択肢5：誤り】波形が平滑（矩形波）に近いほど効率よく負荷をかけられます。"}
,{n:6,t:"図1は共振形インバータ式X線高電圧装置のブロック図である。アで正しいのはどれか。",m:false,o:["共振回路","全波整流回路","高電圧変圧回路","AC-DCコンバータ","フルブリッジインバータ"],c:[1],e:"【正解：選択肢2 ✅】図1の「ア」は高電圧変圧器（トランス）の二次側に位置する回路です。昇圧された交流を直流に戻す「高電圧整流回路（全波整流回路）」を指しています。"}
,{n:7,t:"インバータ式X線高電圧装置の特徴で正しいのはどれか。2つ選べ。",m:true,o:["高電圧変圧器はインバータ周波数が高いため小形化できる。","公称最大定格はインバータ回路があるので電源設備の影響を受けない。","X線の発生・遮断は交流を直流に変化するので電源位相と無関係に制御できる。","管電圧リプル百分率はフィードバック制御によりインバータ周波数と無関係に小さくできる。","管電圧は一次側で検出され比較回路を通して二次側にフィードバックされるので精度が高い。"],c:[0,2],e:"【選択肢1：正しい】インバータ周波数を高くすることで変圧器の鉄心を小さく（小形化）できます。\n【選択肢2：誤り】電源設備のインピーダンスの影響は無視できません。\n【選択肢3：正しい】商用電源の位相に関係なく最短ミリ秒単位で制御可能です。\n【選択肢4：誤り】管電圧リプルはインバータ周波数に依存します。\n【選択肢5：誤り】通常は二次側（管電圧）を直接検出してフィードバックします。"}
,{n:8,t:"インバータ式X線装置で正しいのはどれか。2つ選べ。",m:true,o:["方形波形の管電圧はインバータ回路で制御する。","管電流は一般的に半導体直流加熱回路が用いられる。","X線線質は単相電源でも三相X線装置同等が得られる。","管電圧リプル百分率はX線用高電圧ケーブルが短いほど小さくできる。","FPD搭載形撮影透視装置の自動露出制御の撮影条件は一般的に透視感度設定後のビデオ信号から求める。"],c:[0,2],e:"【選択肢1：正しい】管電圧の立ち上がりを鋭くし方形波（矩形波）に近い波形を制御します。\n【選択肢2：誤り】フィラメント加熱はインバータ制御による交流加熱が一般的です。\n【選択肢3：正しい】単相電源でも高速スイッチングにより三相12ピーク以上の滑らかな質が得られます。\n【選択肢4：誤り】ケーブルはコンデンサ成分を持つため長いほどリプルは小さくなります。\n【選択肢5：誤り】FPDのAECは検出器のデジタルデータから条件を算出します。"}
,{n:9,t:"撮影透視用X線装置の安全管理で正しいのはどれか。2つ選べ。",m:true,o:["基準空気カーマ率の表示値の正確度は±50%を超えない。","IVR用X線装置の患者支持器は通常指定荷重に50 kg以上の追加荷重に耐える構造。","IVR用X線装置のX線照射は衝突防止装置が作動した場合でもX線照射を自動的に停止しない構造。","電動駆動部分が患者にリスクを引き起こす可能性がある場合は接触を感知し速度を1/2に減速する構造。","ラストイメージホールド画像表示（LIH）はLIH表示を透視または撮影時に操作者で切り替えられる構造。"],c:[0,4],e:"【選択肢1：正しい】JIS規格により基準空気カーマ率の表示精度は±50%以内とされています。\n【選択肢2：誤り】IVR用患者台の追加荷重規定はより大きな安全係数が求められます。\n【選択肢3：誤り】衝突防止装置が作動した際は照射を即時停止する構造が必要です。\n【選択肢4：誤り】減速ではなく「停止」または「反転」が基本です。\n【選択肢5：正しい】LIH（ラストイメージホールド）の表示・切り替え機能は必須です。"}
,{n:10,t:"X線受像器動作で誤っているのはどれか。",m:false,o:["I.I.の出力蛍光面は光電子を蛍光像に変換する。","I.I.の入力蛍光面は蛍光像に比例した光電子を放出する。","CCDは光を電荷に変換蓄積し電圧の変化として取出す撮像デバイス。","撮像管は光電面を電子ビームで走査しアナログ映像信号として取り出す。","直接変換方式FPDはX線をX線検出部で発生した電子と陽子を電荷として取り出す。"],c:[4],e:"【正解：選択肢5（誤り）】直接変換方式FPDはX線により発生した「電子と正孔（ホール）」を電荷として取り出します。「陽子」は原子核の構成要素であり光電効果で飛び出してくるものではありません。"}
,{n:11,t:"X線受像器で正しいのはどれか。2つ選べ。",m:true,o:["CCDの画素数は信号雑音比に影響する。","CCDは高電磁場下であっても周辺電磁界の影響を受けない。","FPDのゲイン調整は最大基準入射線量時の信号の均一化を図る。","FPDの直線性補正調整は各画素の呼び出し信号の欠落の均一化を保つ。","I.I.の輝度は出力蛍光面の輝度は（像の拡大率）²×（陽極電圧）に比例する。"],c:[0,2],e:"【選択肢1：正しい】画素サイズや数は光信号の蓄積量やサンプリングに関わるためSNRに影響します。\n【選択肢2：誤り】CCDなどの半導体素子は周辺の強力な電磁界の影響を受ける可能性があります。\n【選択肢3：正しい】ゲイン調整は各画素の感度バラツキを均一化するために行います。\n【選択肢4：誤り】欠落画素の補正は「欠陥画素補正」と呼び直線性の調整とは別です。"}
,{n:12,t:"X線撮影・透視装置で正しいのはどれか。2つ選べ。",m:true,o:["DSAは均一画像を得るのにLog Ampを用いる。","I.I.装置の光学レンズはタンデムレンズが用いられる。","ディジタル画像はX線フィルムに比べ空間分解能が良い。","DR装置はCCDからの得られた画像データをTV装置に送られる。","FPD搭載DR装置は画像信号をA/D変換後TV装置に送られる。"],c:[0,1],e:"【選択肢1：正しい】DSAでは透過像を濃度（対数）に変換するためLog Ampを使用します。\n【選択肢2：正しい】I.I.の出力像をTVカメラに伝えるにはタンデムレンズを用います。\n【選択肢3：誤り】空間分解能はデジタル画像よりもX線フィルムの方が圧倒的に高いです。\n【選択肢4：誤り】CCDそのものが撮像部でありデータをTV装置に送ります。\n【選択肢5：誤り】FPDはパネル内で既にデジタル化されているためA/D変換器はパネル内部にあります。"}
,{n:13,t:"DSAで正しいのはどれか。2つ選べ。",m:true,o:["コントラスト分解能が高い。","体動・呼吸による影響は受けにくい。","加算平均すると雑音分散は大きくなる。","リアルタイムにサブトラクション処理を行う。","リカーシブフィルタは画像の高周波成分を強調する。"],c:[0,3],e:"【選択肢1：正しい】背景（骨など）を除去するため微細な造影剤のコントラストを捉える能力が高いです。\n【選択肢2：誤り】体動があると「アーチファクト（ミスレジストレーション）」が生じ致命的です。\n【選択肢3：誤り】加算平均（アベレージング）を行うとランダムノイズは減少します。\n【選択肢4：正しい】現在の装置はリアルタイムで差分処理・表示が可能です。\n【選択肢5：誤り】リカーシブフィルタは時間的な平滑化（低域通過）を行いノイズを減らすためのものです。"}
,{n:14,t:"医療画像モニタで不変試験の目視試験項目で正しいのはどれか。",m:false,o:["ノイズの確認","輝度応答評価","色度均一性の許容差","輝度均一性の許容差","グレースケール色度評価"],c:[3],e:"【正解：選択肢4 ✅】モニタの不変性試験（目視）で重要なのは「全体的な画質」「幾何学的歪み」「輝度均一性」の確認です。輝度均一性の許容差が目視による確認項目として適切です。"}
,{n:15,t:"心電図で正しいのはどれか。",m:false,o:["PQ時間は心房内伝導時間を示す。","QRS時間は心室内伝導時間を示す。","T波は心房の回復（再分極）過程を示す。","P波は心室の興奮（脱分極）で生じる波。","Q波は心房中隔の興奮（脱分極）で生じる波。"],c:[1],e:"【正解：選択肢2 ✅】QRS時間は「心室の脱分極（興奮）」が心室全体に広がる時間を示します。\nPQ時間は「房室伝導時間」。T波は「心室」の再分極。P波は「心房」の興奮。Q波は「心室中隔」の興奮初期。"}
,{n:16,t:"ポリグラフシステムで解析できる機能で誤っているのはどれか。",m:false,o:["心電図","観血血圧","非観血血圧","活性化凝固時間","動脈血酸素飽和度"],c:[3],e:"【正解：選択肢4（誤り）】ACT（活性化凝固時間）は専用の血液測定装置を用いて手動で行う検査であり、通常ポリグラフの基本機能には含まれません。"}
,{n:17,t:"IVUSカテーテルで正しいのはどれか。",m:false,o:["機械走査式は電子走査式に比べ解像度が低い。","電子走査式はトランスデューサの周波数が非常に高い。","電子走査式ではNURDとよばれるアーチファクトが発生する。","機械走査式はカテーテルの先端からトランスデューサまでの距離を短くできる。","電子走査式はガイドワイヤルーメンがトランスデューサの内側に位置するためガイドワイヤは映らない。"],c:[0],e:"【正解：選択肢1 ✅】機械走査式（単一振動子）の方が電子走査式よりも一般的に空間分解能に優れます。\nNURD（回転ムラ）は「機械走査式」特有のアーチファクトです。電子走査式はガイドワイヤの影が映ります。"}
,{n:18,t:"IVUSの計測で誤っているのはどれか。",m:false,o:["短軸像から血管径を計測する。","長軸像から病変長を計測する。","中膜の低輝度領域の内側をトレースしたものを外弾性板面積という。","外弾性板面積から血管内腔面積を引いたものをプラーク面積という。","病変部において血管内腔とプラークの境界をトレースしたものを血管内腔面積という。"],c:[2],e:"【正解：選択肢3（誤り）】外弾性板（EEM）面積は、低輝度の「中膜」の外側（外境界）をトレースしたものです。内側をトレースしたものは内弾性板付近を指します。"}
,{n:19,t:"10 bitのグレースケール画像で各ピクセルが表現できる階調で正しいのはどれか。",m:false,o:["128","256","512","1024","2048"],c:[3],e:"【正解：選択肢4 ✅】10 bit = 2の10乗 = 1024階調です。\n8 bit=256、9 bit=512、10 bit=1024 ✅、11 bit=2048"}
,{n:20,t:"画像のディジタル化で正しいのはどれか。",m:false,o:["量子化を行ったあとに標本化を行う。","ナイキスト周波数は標本化周波数の2倍である。","標本化定理より適切な量子化ビット数を決める。","量子化ビット数を増やすと量子化誤差は大きくなる。","最高周波数が10 cycles/mmのアナログ画像を0.1 mm間隔で標本化するとエリアシングを生じる。"],c:[4],e:"【正解：選択肢5 ✅】0.1mm間隔=10本/mmの標本化周波数。その半分（5本/mm）がナイキスト周波数です。10本/mmの信号はナイキストを超えているため折り返し雑音（エリアシング）が発生します。\nまず標本化を行い、その後に量子化します。ナイキスト周波数は標本化周波数の「1/2」です。"}
,{n:21,t:"医用画像でファイルサイズを小さくするために「可逆圧縮」を適用する圧縮方式で正しいのはどれか。",m:false,o:["MP4","JPEG","MPEG","JPEG2000","DICOM Lossy"],c:[3],e:"【正解：選択肢4 ✅】JPEG2000は診断用画像でよく使われ元のデータを完全に復元できる「可逆圧縮（ロスレス）」に対応しています。"}
,{n:22,t:"異なる施設および装置で取得された医用画像を統一したフォーマットの適用で正しいのはどれか。",m:false,o:["画像のJPEG圧縮","画像のフーリエ変換","画像のノイズ除去フィルタ","画像のヒストグラム均等化","標準的な撮影プロトコルとDICOM形式の利用"],c:[4],e:"【正解：選択肢5 ✅】異なる施設間で画像をやり取りする国際標準規格はDICOM形式です。"}
,{n:23,t:"医用画像を電子的に保存する際データの長期保存に最も適したストレージで正しいのはどれか。",m:false,o:["SSD","NAS","RAID","光ディスク","クラウドストレージ"],c:[3],e:"【正解：選択肢4 ✅】「長期保存（改ざん防止・耐久性）」に最も適しているのは追記型（WORM）の光ディスク（アーカイブ用）です。"}
,{n:24,t:"HIS（病院情報システム）が他の医療システムとデータを連携する際に使用される標準規格で正しいのはどれか。",m:false,o:["HL7","SQL","JPEG","HTML","SNMP"],c:[0],e:"【正解：選択肢1 ✅】電子カルテ等のHISと他システムを連携させるための標準規約はHL7（Health Level Seven）です。"}
,{n:25,t:"RIS（放射線情報システム）が管理する情報で誤っているのはどれか。",m:false,o:["検査の実施履歴。","放射線検査の報告書。","患者の氏名およびID。","放射線検査の予約状況。","放射線従事者の個人被曝。"],c:[4],e:"【正解：選択肢5（誤り）】RISは「検査の予約・実績・画像」などを管理しますが、放射線従事者の個人被曝線量は通常「放射線管理システム」の役割です。"}
  ],
  c18_rad: [{n:1,t:"医療法施行規則診療用放射線に係る安全管理で正しいのはどれか。",m:false,o:["医療放射線安全管理責任者は医師または歯科医師である。","施設長は診療用放射線の安全利用のための指針を策定する。","放射線診療に従事する者に対する診療用放射線の安全利用のための研修を全職員対象に行う。","研修は年2回以上とし実施内容（開催日時又は受講日時、講師、出席者、研修項目等）を記録する。","放射線による被曝線量の管理及び記録は血管造影装置・CTエックス線装置・診療用放射線同位元素・陽電子断層撮影診療用放射性同位元素である。"],c:[3],e:"【正解：選択肢4 ✅】研修は年2回以上実施し日時・講師・出席者・内容を記録・保存しなければなりません。\n【選択肢1：誤り】医療放射線安全管理責任者は医師・歯科医師・診療放射線技師などから施設長が指名します。\n【選択肢3：誤り】研修の対象は「放射線診療に従事する者」です。"}
,{n:2,t:"放射線防護の原則で正しいのはどれか。2つ選べ。",m:true,o:["正当化はすべての被曝状況において適用される。","防護の最適化は容易に達成可能な限り低く維持すること。","防護の最適化の最善の選択肢が最低の線量をもたらすとは限らない。","職業被曝と公衆被曝の線量限度はすべての被曝状況において適用される。","防護の最適化は放射線被曝状況を変化させるいかなる決定も害より便益を大きくすべきである。"],c:[1,2],e:"【選択肢2：正しい】防護の最適化はALARAの原則（合理的に達成可能な限り低く保つこと）を指します。\n【選択肢3：正しい】最適化とは「最善のバランス」を追求することであり単に線量を最低にすることが常に最善とは限りません。\n【選択肢4：誤り】線量限度は「患者の医療被曝」には適用されません。"}
,{n:3,t:"電離放射線障害防止規則の水晶体等価線量限度で正しいのはどれか。",m:false,o:["1年間で150 mSv。","3年間で100 mSv かつ1年間につき50 mSvを超えない。","3年間で150 mSv かつ1年間につき50 mSvを超えない。","5年間で100 mSv かつ1年間につき50 mSvを超えない。","5年間で150 mSv かつ1年間につき50 mSvを超えない。"],c:[3],e:"【正解：選択肢4 ✅】2021年4月の法改正（電離則）により、放射線業務従事者の水晶体の等価線量限度は「5年間で100 mSv」かつ「1年間で50 mSv」を超えないことと定められました。"}
,{n:4,t:"公衆被曝で誤っているのはどれか。",m:false,o:["線量限度は年間1 mSvである。","皮膚の線量限度は年間50 mSvである。","水晶体の線量限度は年間10 mSvである。","妊娠している診療放射線技師の胎児の被曝。","職業被曝と医療被曝および通常の局地的な自然バックグラウンド放射線を除いた公衆の被曝。"],c:[2],e:"【正解：選択肢3（誤り）】公衆の水晶体の等価線量限度は年間15 mSvです（10 mSvではありません）。"}
,{n:5,t:"診断参考レベルで正しいのはどれか。",m:false,o:["線量限度を表す値である。","最適化の推進ツールである。","実効線量を用いて設定される。","診療行為の是非を分ける境界である。","通常線量分布の平均値が用いられる。"],c:[1],e:"【正解：選択肢2 ✅】DRLは防護の「最適化」を推進するためのツールです。\nDRLは線量限度ではなく目安の数値。通常実効線量ではなく面積線量・CTDI等で設定。診断の是非を分ける禁止ラインではなく、75パーセントタイル値が用いられます。"}
,{n:6,t:"本邦のDRLs 2020で示された基準透視線量率のパーセントタイル値はどれか。",m:false,o:["25","50","75","86","92"],c:[2],e:"【正解：選択肢3 ✅】日本の診断参考レベル（DRLs 2020）を含め国際的にDRLの設定には分布の75パーセントタイル値（上位25%の境界値）が採用されています。"}
,{n:7,t:"IVRのDRLs 2020でDRL値が設定されていないのはどれか。",m:false,o:["頭部/頸部領域","成人心臓領域","胸腹部領域IVR","末梢血管領域IVR","小児心臓領域（年齢幅による区分）"],c:[3],e:"【正解：選択肢4 ✅】DRLs 2020では頭部・心臓・胸腹部（EVAR等）のIVRには値が設定されていますが「末梢血管領域（下肢など）」には明確なDRL値がまだ設定されていません。"}
,{n:8,t:"ヒトの精子分化育成過程で放射線感受性が最も高いのはどれか。",m:false,o:["精子","精細胞","精母細胞","精原細胞","セルトリ細胞"],c:[3],e:"【正解：選択肢4 ✅】ベルゴニー・トリボンドーの法則に基づき分化度が低く分裂が盛んな細胞ほど感受性が高くなります。精子形成過程では「精原細胞」が最も高感受性です。"}
,{n:9,t:"表皮細胞のなかで放射線感受性が最も高いのはどれか。",m:false,o:["角質層","淡明層","顆粒層","有棘層","基底細胞層"],c:[4],e:"【正解：選択肢5 ✅】皮膚では「基底細胞」が最も高感受性です。分裂が盛んな未分化細胞であり、ベルゴニー・トリボンドーの法則に合致します。"}
,{n:10,t:"皮膚の組織加重係数はどれか。",m:false,o:["0.01","0.04","0.08","0.12","0.20"],c:[0],e:"【正解：選択肢1 ✅】ICRP 2007年勧告による皮膚の組織加重係数は0.01です。\n骨髄・結腸・肺・胃・乳房：0.12、肝臓・食道・甲状腺：0.04、皮膚・骨表面：0.01"}
,{n:11,t:"一時的脱毛のしきい線量と発症時期の組合せで正しいのはどれか。",m:false,o:["0.5 Gy - 3週間","1.0 Gy - 1週間","1.0 Gy - 3週間","3.0 Gy - 1週間","3.0 Gy - 3週間"],c:[4],e:"【正解：選択肢5 ✅】一時的脱毛のしきい線量は3.0 Gyで、発症時期は被曝から約3週間後です。"}
,{n:12,t:"体内被曝において精神発達遅滞（知的障害）が最も生じる時期で正しいのはどれか。",m:false,o:["受胎後0〜7週","受胎後8〜15週","受胎後16〜25週","受胎後26〜32週","受胎後33〜40週"],c:[1],e:"【正解：選択肢2 ✅】胎児の精神発達遅滞のリスクが最も高いのは脳の神経細胞が形成・移動する受胎後8〜15週です。"}
,{n:13,t:"直接電離放射線はどれか。2つ選べ。",m:true,o:["α線","β線","γ線","X線","中性子線"],c:[0,1],e:"【正解：選択肢1と2 ✅】電荷を持つ粒子（α線、β線、陽子線など）は直接電離放射線です。γ線・X線・中性子線は間接電離放射線です。"}
,{n:14,t:"カーマが用いられるのはどれか。",m:false,o:["α線","β線","γ線","電子線","陽子線"],c:[2],e:"【正解：選択肢3 ✅】カーマは「非荷電電離放射線（X線、γ線、中性子線）」が物質に与える初期運動エネルギーの総和を指します。選択肢の中ではγ線が該当します。"}
,{n:15,t:"エネルギースペクトルが連続スペクトルになるものはどれか。2つ選べ。",m:true,o:["α線","β線","阻止X線","特性X線","オージェ電子"],c:[1,2],e:"【正解：選択肢2と3 ✅】β線は中微子とエネルギーを分けるため連続スペクトル。制動X線（阻止X線）は電子が原子核の電場で制動されて放出するX線で連続スペクトルです。\nα線・特性X線・オージェ電子は線スペクトルです。"}
,{n:16,t:"制動X線の発生で正しいのはどれか。2つ選べ。",m:true,o:["発生効率は管電圧に比例する。","最短波長は管電流に比例する。","X線強度は管電圧の2乗に比例する。","診断用X線装置の発生効率は約80%である。","発生効率はターゲットの原子番号の2乗に比例する。"],c:[0,2],e:"【選択肢1：正しい】発生効率は管電圧(V)に比例します（η≈kZV）。\n【選択肢2：誤り】最短波長は「管電圧」に反比例します。管電流とは無関係です。\n【選択肢3：正しい】X線強度は管電圧の約2乗に比例します。\n【選択肢4：誤り】診断用X線装置の発生効率は約1%程度です。\n【選択肢5：誤り】発生効率はターゲットの原子番号(Z)に比例します（2乗ではない）。"}
,{n:17,t:"X線の半価層測定に適しているのはどれか。",m:false,o:["ガラス線量計","電離箱線量計","ポケット線量計","フリッケ線量計","ポリマーゲル線量計"],c:[1],e:"【正解：選択肢2 ✅】エネルギー依存性が少なく精度の高い測定が可能な電離箱線量計が半価層測定に標準的に用いられます。"}
,{n:18,t:"正しい組合せはどれか。2つ選べ。",m:true,o:["放射能 ― Bq","実効線量 ― J･kg","吸収線量 ― C/kg","照射線量 ― Sv","空気カーマ ― Gy"],c:[0,4],e:"【選択肢1：正しい】放射能 ― Bq（ベクレル）✅\n【選択肢5：正しい】空気カーマ ― Gy（グレイ）✅\n実効線量→Sv、吸収線量→Gy（J/kg）、照射線量→C/kg"}
,{n:19,t:"線量計の組合せで正しいのはどれか。",m:false,o:["OSL線量計 ― RPL現象","GM式線量計 ― 電子正孔対","半導体線量計 ― 電子なだれ","電離箱式線量計 ― 電離電荷","蛍光ガラス線量計 ― PSL現象"],c:[3],e:"【正解：選択肢4 ✅】電離箱式線量計は電離電荷を収集して線量を測定します。\nOSL→PSL現象、GM式→電子なだれ、半導体→電子正孔対、電離箱→電離電荷✅、蛍光ガラス→RPL現象"}
,{n:20,t:"面積線量計で正しいのはどれか。",m:false,o:["患者最大皮膚線量が測定できる。","患者皮膚面吸収線量の測定ができる。","面積空気カーマ積算値（PKA）を測定する。","X線透視装置への装着が義務化されている。","指頭型チェンバは電離箱線量計の一種である。"],c:[2],e:"【正解：選択肢3 ✅】面積線量計（DAPメータ）は照射野面積と空気カーマの積である面積空気カーマ積算値（PKA）を測定します。最大皮膚線量を直接測るものではありません。"}
,{n:21,t:"照射線量が定義されている放射線はどれか。2つ選べ。",m:true,o:["α線","β線","γ線","X線","中性子線"],c:[2,3],e:"【正解：選択肢3と4 ✅】照射線量（C/kg）は「空気」中で「X線・γ線」によって生じた電荷量として定義されています。α線・β線・中性子線は含まれません。"}
,{n:22,t:"照射線量が定義されているものはどれか。",m:false,o:["水","人体","真空","空気","すべての物質"],c:[3],e:"【正解：選択肢4 ✅】照射線量は「空気」中でX線・γ線によって生じた電荷量として定義されています。空気以外の物質や真空中では定義されていません。"}
,{n:23,t:"コンプトン効果を起こす放射線はどれか。2つ選べ。",m:true,o:["α線","β線","γ線","X線","中性子線"],c:[2,3],e:"【正解：選択肢3と4 ✅】コンプトン効果（散乱）は、X線やγ線などの光子と自由電子との相互作用です。α線・β線は荷電粒子でコンプトン効果は起こしません。"}
,{n:24,t:"吸収線量で正しいのはどれか。2つ選べ。",m:true,o:["防護量である。","非荷電粒子にのみ適用される。","Bragg-Grayの空洞原理に基づいている。","単位面積当たりに吸収されるエネルギーである。","照射線量に空気のW値を乗じることで空気吸収線量が求まる。"],c:[2,4],e:"【選択肢1：誤り】吸収線量（Gy）は運用量（実用量）であり防護量ではありません。\n【選択肢2：誤り】吸収線量は荷電・非荷電を問わず適用されます。\n【選択肢3：正しい】空洞原理（Bragg-Gray）に基づき測定されます。✅\n【選択肢4：誤り】吸収線量は「単位質量」当たりに吸収されるエネルギーです（面積ではない）。\n【選択肢5：正しい】空気の照射線量にW値（34eV）を考慮することで吸収線量が求まります。✅"}
,{n:25,t:"血管撮影室の空間線量分布測定で正しいのはどれか。2つ選べ。",m:true,o:["測定器の校正が必要である。","単位はGyもしくはGy/minで表す。","バックグラウンドの測定が必要である。","X線管からの直接線によるものが主である。","GM計数管式サーベイメータを用いて測定する。"],c:[0,2],e:"【選択肢1：正しい】校正された測定器の使用が必須です。✅\n【選択肢2：誤り】空間線量の単位はSv（シーベルト）またはSv/minで表します。\n【選択肢3：正しい】自然放射線（バックグラウンド）の補正が必須です。✅\n【選択肢4：誤り】IVR室の空間線量は「被写体からの散乱線」が主因です。\n【選択肢5：誤り】通常は電離箱式サーベイメータ等の精度の高い測定器を使用します。"}
  ],
  c17_clinical: [{"n":1,"m":true,"t":"心臓の構造、心機能で正しいのはどれか。2つ選べ。","o":["右心室は左心室の後方に位置する。","心膜は内膜、中膜、外膜で構成される。","三尖弁と僧帽弁は腱索で乳頭筋と繋がる。","前負荷が増大すると1回拍出量は低下する。","心臓の重量は成人でおよそ250〜350 gである。"],"c":[2,4],"e":"【正解：3と5】\n選択肢1：誤り。右心室は左心室の前方（腹側）に位置します。\n選択肢2：誤り。心膜は心臓を包む嚢状の組織であり、内膜・中膜・外膜という構成ではありません。\n選択肢3：正しい ✅ 三尖弁・僧帽弁ともに腱索を介して乳頭筋に繋がり弁の反転を防ぎます。\n選択肢4：誤り。スターリングの法則により前負荷増大→1回拍出量増加です。\n選択肢5：正しい ✅ 成人の心臓の重量は250〜350 g（握りこぶし大）です。"},{"n":2,"m":false,"t":"刺激伝導系で正しいのはどれか。","o":["洞結節―洞房結節―房室結節―ヒス束―脚―プルキンエ線維","洞結節―洞房結節―ヒス束―房室結節―脚―プルキンエ線維","洞房結節―洞結節―ヒス束―房室結節―脚―プルキンエ線維","洞房結節―洞結節―房室結節―ヒス束―脚―プルキンエ線維","房室結節―洞結節―洞房結節―ヒス束―脚―プルキンエ線維"],"c":[3],"e":"【正解：4】\n刺激伝導系の正しい順序：洞結節（洞房結節）→ 房室結節 → ヒス束 → 脚 → プルキンエ線維 です。"},{"n":3,"m":true,"t":"先天性心疾患で正しいのはどれか。２つ選べ。","o":["Ebstein奇形は僧帽弁閉鎖不全をきたす。","心房中隔欠損は心房レベルでの短絡をきたす。","修正大血管転移は右心室から大動脈が起始する。","ファロー四徴症の特徴のひとつに左室肥大がある。","動脈管開存は大動脈弓と肺静脈近位部を繋ぐ血管の遺残である。"],"c":[1,2],"e":"【正解：2と3】\n選択肢1：誤り。Ebstein奇形は三尖弁（右側）の異常です。\n選択肢2：正しい ✅ ASDは心房レベルで左→右短絡が生じます。\n選択肢3：正しい ✅ 修正大血管転位では解剖学的右室から大動脈が起始します。\n選択肢4：誤り。ファロー四徴症は「右室肥大」が特徴です。\n選択肢5：誤り。PDAは大動脈と肺動脈を繋ぐ血管の遺残です。"},{"n":4,"m":false,"t":"心電図の特徴で誤っているのはどれか。","o":["Brugada型心電図はsaddle back型とcoved型がある。","WPW症候群の心電図で常にデルタ波がある症例を顕性WPW症候群という。","Mobits Ⅱ型房室ブロックは房室伝導が徐々に延長し心室の収縮が脱落する。","狭心症によるST変化はDown-slope型、Horizontal型、Up-slope型がある。","QT延長症候群はTorsade de pointesを誘発し失神発作や心臓突然死の原因となる。"],"c":[2],"e":"【正解：3（誤り）】\n「徐々に延長して脱落」するのはWenckebach型（MobitzⅠ型）です。MobitzⅡ型は予兆なく突如として脱落します。"},{"n":5,"m":true,"t":"冠動脈造影の撮影角度で正しいのはどれか。２つ選べ。","o":["左冠動脈：RAO Cranial viewは左前下行枝の描出に優れる。","左冠動脈：LAO Cranial viewは別名Spider viewと呼ばれる。","右冠動脈：LAO viewは右冠動脈近位および中間部の描出に優れる。","左冠動脈：LAO Cranial viewは左回旋枝と後側壁枝の描出に優れる。","左冠動脈：RAO Caudal viewは左前下行枝と対角枝の描出に優れる。"],"c":[0,3],"e":"【正解：1と4】\n選択肢1：正しい ✅ LCA RAO CranialはLAD中間部〜末梢の観察に優れます。\n選択肢2：誤り。Spider viewはLAO Caudalです。\n選択肢4：正しい ✅ LCA LAO Cranialは回旋枝・側壁枝の観察に優れます。"},{"n":6,"m":true,"t":"分類所見で正しいのはどれか。2つ選べ。","o":["Rentrop分類は壁運動の評価である。","Ellis分類 TypeⅢは血管外出血を伴う。","Herman分類は冠動脈の血流の評価である。","Sellers分類Ⅲ度は左房が左室や大動脈よりも造影剤濃度が高い。","TIMI血流分類 Grade 3は再灌流後の冠動脈が造影遅延なく末梢まで造影される。"],"c":[1,3],"e":"【正解：2と4】\n選択肢1：誤り。Rentrop分類は側副血行路（0〜3）の評価です。\n選択肢2：正しい ✅ Ellis TypeⅢは血管外への造影剤漏出を伴う冠動脈穿孔の分類です。\n選択肢3：誤り。Herman分類は左室造影における壁運動評価です。\n選択肢4：正しい ✅ Sellers分類Ⅲ度は左房が左室よりも濃く染まる状態を示します。\n選択肢5：誤り。TIMI 3は正常な造影速度（造影遅延があるのはTIMI 2）。"},{"n":7,"m":true,"t":"図1は冠動脈造影画像である。正しいのはどれか。2つ選べ。（図1：冠動脈造影の各撮影角度a〜e）","o":["aは右冠動脈のLAO viewである。","bは右冠動脈のRAO viewである。","cは左冠動脈のLAO Cranial viewである。","dは左冠動脈のRAO Cranial viewである。","eは左冠動脈のRAO Caudal viewである。"],"c":[0,4],"e":"【正解：1と5】\n各撮影角度と血管の走行から、a＝右冠動脈LAO view、e＝左冠動脈RAO Caudal viewです。"},{"n":8,"m":false,"t":"PCI（経皮的冠動脈形成術）で誤っているのはどれか。","o":["ステント内再狭窄の原因は平滑筋細胞の増殖である。","薬剤溶出性ステントの再狭窄率は20〜30%程度である。","薬剤溶出性ステントに使用される薬剤は免疫抑制剤である。","第3世代薬剤溶出性ステントは生体吸収性ポリマーを使用している。","SYNTAXスコアは最も汎用されているPCIのリスク評価指標である。"],"c":[1],"e":"【正解：2（誤り）】\n最新のDESの再狭窄率は5〜10%以下です。20〜30%はベアメタルステントに近い古い数値です。"},{"n":9,"m":false,"t":"弁膜症と治療法で正しい組み合わせはどれか。","o":["三尖弁逆流 ― TAP（三尖弁輪縫縮術）","僧房弁狭窄症 ― 経皮的僧帽弁クリップ術","大動脈弁狭窄症 ― BPA（肺動脈バルーン形成術）","僧帽弁閉鎖不全症 ― PTMC（経皮経静脈的僧帽弁交連裂開術）","肺動脈弁閉鎖不全症 ― TAVI（経カテーテル的大動脈弁留置術）"],"c":[0],"e":"【正解：1】\n三尖弁逆流→TAP（三尖弁輪形成術）は正しい組み合わせです。\n・MitraClip→僧帽弁「閉鎖不全症」\n・BPA→CTEPH（慢性血栓塞栓性肺高血圧症）\n・PTMC→僧帽弁「狭窄症」\n・TAVI→大動脈弁狭窄症"},{"n":10,"m":true,"t":"ファロー四徴症で正しいのはどれか。2つ選べ。","o":["右室肥大がある。","肺静脈狭窄がある。","大動脈騎乗がある。","心房中隔欠損がある。","非チアノーゼ性の先天性心疾患である。"],"c":[0,2],"e":"【正解：1と3】\nファロー四徴症の4要素：①心室中隔欠損、②肺動脈狭窄、③大動脈騎乗、④右室肥大\n選択肢1：正しい ✅ 右室肥大は要素の一つ。\n選択肢3：正しい ✅ 大動脈騎乗は典型的な所見。"},{"n":11,"m":false,"t":"PCI（経皮的冠動脈形成術）で誤っているのはどれか。","o":["病変のプラークの性状をCT値により評価した。","造影前にカテーテルがウェッジしていないか圧波形を確認した。","慢性完全閉塞症例で側副血行路の描出のため撮影時間を長くした。","高度石灰化症例では冠動脈CTで石灰化の状況を把握することが有用である。","側副血行路のマイクロチャンネルを描出するためにしっかりパニングした。"],"c":[4],"e":"【正解：5（誤り）】\nマイクロチャンネルを観察する際はパニング（透視台の移動）を厳禁とし、静止画で集中して観察します。"},{"n":12,"m":true,"t":"先天性心疾患の病態で正しいのはどれか。2つ選べ。","o":["三尖弁閉鎖不全は体循環が確立できない。","左心低形成症候群は肺循環が確立できない。","総肺静脈還流異常は心房間に交通障害がある。","動脈管開存は肺血管抵抗の低下に伴い肺血流量が減少する。","完全大血管転位は右心室から大動脈、左心室から肺動脈が起始する。"],"c":[2,4],"e":"【正解：3と5】\n選択肢3：正しい ✅ TAPVR（総肺静脈還流異常）では生存に心房間の交通（卵円孔やASD）が不可欠です。\n選択肢5：正しい ✅ 完全大血管転位（d-TGA）は右室から大動脈、左室から肺動脈が起始します。"},{"n":13,"m":true,"t":"図2は冠動脈造影の画像である。正しいのはどれか。2つ選べ。（図2：開胸術後の右冠動脈造影）","o":["開胸手術後である。","ST-Tが上昇している。","矢印（→）は洞結節枝である。","RAO Viewで造影されたものである。","右冠動脈中部にびまん性の病変を認める。"],"c":[0,2],"e":"【正解：1と3】\n図2の画像で胸骨ワイヤ（開胸術後の縫合ワイヤ）が確認でき、矢印が洞結節枝（RCA近位から分岐する右房枝）を指しています。"},{"n":14,"m":true,"t":"ST上昇型心筋梗塞に対するPrimary PCIの推奨とエビデンスレベルで正しいのはどれか。2つ選べ。","o":["薬剤溶出性ステントを用いない。","発症12時間以内の患者に対しできる限り迅速に行う。","血行動態が安定している責任血管へのPrimary PCIは推奨されない。","発症後24時間以上経過し症状が消失している患者に対しPrimary PCIを行う。","発症12時間から24時間以内で臨床的にまたは心電図変化から持続する虚血徴候が認められる患者に対しPrimary PCIを考慮する。"],"c":[1,4],"e":"【正解：2と5】\n選択肢2：正しい ✅ door-to-balloon時間は90分以内が推奨されます。\n選択肢5：正しい ✅ 発症12〜24時間でも虚血症状が持続している場合はPCIの適応となります。"},{"n":15,"m":false,"t":"TAVI（経カテーテル的大動脈弁留置術）のアプローチ部位で誤っているのはどれか。","o":["心尖","大腿動脈","橈骨動脈","上行大動脈","鎖骨下動脈"],"c":[2],"e":"【正解：3（誤り）】\nTAVIデバイスは非常に太いため、細い橈骨動脈からは挿入できません。使用可能なアプローチ：大腿動脈（最も一般的）、心尖部、上行大動脈、鎖骨下動脈など。"},{"n":16,"m":false,"t":"ASD Occluderを用いたカテーテル治療で誤っているのはどれか。","o":["大腿動脈からシースを挿入し左心房側より欠損孔を通し右心房側に入れる。","閉鎖栓を左心房にあるカテーテルの先端まで進めて左心房側の傘状部を開く。","閉鎖栓中心部を広げて欠損孔に近づける。","閉鎖栓中心部の位置に合わせ右心房の傘状部を開く。","閉鎖栓が確実に留置されたことを確認した後、接続を解除する。"],"c":[0],"e":"【正解：1（誤り）】\nカテーテルは「大腿静脈」から挿入し、右心房→欠損孔→左心房へ進めます。「大腿動脈」からとする記述が誤りです。"},{"n":17,"m":false,"t":"図3はLADに対するPCIの画像である。正しいのはどれか。（図3：LADへのPCI画像+IVUS画像）","o":["ガイドワイヤはLADと中隔枝に挿入されている。","IVUS画像では明らかな石灰化プラークを認めない。","IVUS画像でカテーテルの左側にガイドワイヤーが観察される。","IVUS画像から同部位のLADの血管短径は4.0mm以上である。","IVUS画像において心外膜方向は10時方向と推測することができる。"],"c":[0],"e":"【正解：1】\n図3のシネ画像とIVUS画像から、ガイドワイヤがLAD本幹と中隔枝の2本に入っていることが確認できます。"},{"n":18,"m":true,"t":"PCIに用いられるデバルキングデバイスで正しいのはどれか。2つ選べ。","o":["ロータブレータは脂質性プラーク病変に対し有効である。","OAS（Orbital Atherectomy System）は高度石灰化を除去するために使用される。","IVL（血管内破砕術）は機械的振動を用いて新規の重度石灰化病変を破砕し狭窄部の拡張を行う。","ELCA（エキシマレーザー冠動脈形成術）は動脈硬化組織を蒸散させ狭窄部を開大することができる。","DCA（方向性冠動脈粥腫切除術）は回転する小型内蔵型カッターで病変部を吸引してアテロームを取り込む。"],"c":[1,3],"e":"【正解：2と4】\n選択肢1：誤り。ロータブレータは石灰化病変用です（脂質性には不向き）。\n選択肢2：正しい ✅ OASは高度石灰化を物理的に削除します。\n選択肢3：誤り。IVLは「衝撃波（ショックウェーブ）」を用います（機械的振動ではない）。\n選択肢4：正しい ✅ ELCAはエキシマレーザーにより組織を蒸散して開大させます。"},{"n":19,"m":true,"t":"経皮的僧帽弁クリップ術で正しいのはどれか。2つ選べ。","o":["経皮的心房中隔穿刺手技を用いない。","僧帽弁位人工弁置換術後は適応である。","重症僧帽弁閉鎖不全患者に対する治療である。","僧帽弁の前尖・後尖を接合することで僧帽弁の逆流を低減する。","適応はLVEF≧50％以上で重症一次性ならびに重症二次性MR患者で外科的開心術が困難な症例である。"],"c":[2,3],"e":"【正解：3と4】\n選択肢1：誤り。大腿静脈→右房→心房中隔穿刺（TSP）は必須手技です。\n選択肢2：誤り。人工弁留置後は適応外です。\n選択肢3：正しい ✅ 重症の僧帽弁閉鎖不全症（MR）が対象です。\n選択肢4：正しい ✅ 弁の前尖と後尖をクリップで留める（Edge-to-Edge Repair）ことで逆流を減らします。"},{"n":20,"m":true,"t":"先天性心疾患で正しいのはどれか。2つ選べ。","o":["大動脈縮窄は動脈管近辺の狭窄を意味する。","心室中隔欠損に対するカテーテル閉鎖術は国内で承認されている。","心房中隔欠損は経胸壁心エコー法による欠損孔周囲縁の評価が重要である。","動脈管開存に対してはコイルやカテーテル治療、結紮術、離断術などが行われている。","Fallot四徴の心内修復術は心室中隔欠損の閉鎖と右室漏斗部から末梢肺動脈にかけての右室流出路の狭窄解除である。"],"c":[0,3],"e":"【正解：1と4】\n選択肢1：正しい ✅ 大動脈縮窄は動脈管（または索）付近の狭窄です。\n選択肢4：正しい ✅ PDAの治療にはコイル塞栓、プラグ、外科的結紮・離断など多様な選択肢があります。"},{"n":21,"m":true,"t":"カテーテルアブレーションで正しいのはどれか。2つ選べ。","o":["WPW症候群に対する焼灼標的は副伝導路である。","心房細動のトリガーとなる期外収縮の90%以上は肺動脈起源である。","高周波アブレーションカテーテルはイリゲーションタイプだけである。","通常型AVNRT（房室結節リエントリー頻拍）に対する焼灼標的は遅伝導路である。","通常型AFL（心房粗動）は三尖弁輪と上大静脈間の解剖学的峡部の線状焼灼により根治可能である。"],"c":[0,3],"e":"【正解：1と4】\n選択肢1：正しい ✅ WPW症候群では副伝導路（ケント束）を焼灼します。\n選択肢2：誤り。心房細動のトリガーは「肺静脈」起源が約90%（肺動脈ではない）。\n選択肢4：正しい ✅ 通常型AVNRTでは遅伝導路（slow pathway）をターゲットにします。\n選択肢5：誤り。通常型AFLは「三尖弁輪と下大静脈間の峡部（CTI）」の焼灼が必要です。"},{"n":22,"m":true,"t":"経皮的左心耳閉鎖術で正しいのはどれか。2つ選べ。","o":["腎不全の重症度にかかわらず可能である。","術前に左心耳形態や適応を評価する必要がある。","左心耳に由来しない血栓塞栓症に対するリスク低減も期待できる。","デバイス血栓の有無は経胸壁心エコーやCT検査を用いて評価する。","弁膜症性心房細動患者に対する血栓塞栓症のリスクを低減する目的で行われる。"],"c":[1,4],"e":"【正解：2と5】\n選択肢2：正しい ✅ 術前にCT等で左心耳の深さや径を評価し適応とデバイスサイズを決定します。\n選択肢5：正しい ✅（実際の対象は「非弁膜症性」Af患者。弁膜症性AFは適応外）\n選択肢3：誤り。左心耳内の血栓飛散防止が目的で他由来の血栓には効果なし。\n選択肢4：誤り。デバイス血栓の評価には経食道エコー（TEE）が主に使われます。"},{"n":23,"m":false,"t":"心臓および冠動脈の解剖で正しいのはどれか。","o":["冠静脈洞は右心室へ開口する。","左回旋枝から鋭縁枝が分岐する。","左右肺静脈は２本ずつ右心室へ開口する。","右心房と右心室の間には僧帽弁が存在する。","右冠動脈は右冠尖から起始し前室間溝を通って末梢に至る。"],"c":[1],"e":"【正解：2】\n左回旋枝（LCX）からは鈍縁枝（OM）が分岐します（選択肢2の「鋭縁枝」はRCAから分岐するAM枝ですが、本問では2が正解とされます）。\n選択肢1：誤り。冠静脈洞は右「心房」へ開口します。\n選択肢3：誤り。肺静脈は左心房へ開口します。\n選択肢4：誤り。右房と右室の間は三尖弁です。\n選択肢5：誤り。右冠動脈は後室間溝を走行します（前室間溝はLAD）。"},{"n":24,"m":false,"t":"12誘導心電図変化（ST上昇・異常Q波・冠性T波）の組み合わせで誤っているのはどれか。","o":["V2〜V4 ― 前壁梗塞","V1〜V4 ― 前壁中隔梗塞","Ⅱ・Ⅲ・aVF ― 下壁梗塞","Ⅰ・aVL・V1〜V6 ― 広範前壁梗塞","Ⅱ・Ⅲ・aVF・V4〜V6 ― 後壁梗塞"],"c":[4],"e":"【正解：5（誤り）】\nⅡ・Ⅲ・aVF＋V4〜V6の変化は「下壁＋側壁梗塞」を示唆します。純粋な「後壁梗塞」はV1-V2の高いR波やST低下として現れます。"},{"n":25,"m":false,"t":"疾患との組み合わせで正しいのはどれか。","o":["異形狭心症 ― ST低下","労作性狭心症 ― ST上昇","WPW症候群 ― デルタ波","急性心筋梗塞 ― 陰性T波","心房期外収縮 ― QRS波が広く変形"],"c":[2],"e":"【正解：3】\nWPW症候群ではデルタ波（QRSの立ち上がりのなまり）とPR短縮が特徴的です。\n選択肢1：誤り。異形狭心症はST「上昇」。\n選択肢2：誤り。労作性狭心症はST「低下」が典型。\n選択肢4：誤り。急性期はST上昇が典型（陰性T波は回復期）。\n選択肢5：誤り。QRSが広く変形するのは「心室」期外収縮。"},{"n":26,"m":false,"t":"分岐する動脈で正しいのはどれか。","o":["前交通動脈 ― 視床穿通動脈","後交通動脈 ― 前脈絡叢動脈","前大脳動脈 ― 上下垂体動脈","後大脳動脈 ― Heubner反回動脈","中大脳動脈 ― レンズ核線条体動脈"],"c":[4],"e":"【正解：5】\nレンズ核線条体動脈（LSA）は中大脳動脈（MCA）のM1セグメントから分岐する重要な穿通枝です。\n選択肢1：誤り。視床穿通動脈→後大脳動脈やPCoAから。\n選択肢2：誤り。前脈絡叢動脈→内頸動脈のPCoA遠位から。"},{"n":27,"m":false,"t":"脳動脈瘤で正しいのはどれか。","o":["約1%が多発性である。","大半は無症候性である。","多発性のものは圧倒的に男性に多い。","50%は椎骨動脈の灌流域に形成される。","大きさが3mmを超えると破裂率が1%を超える。"],"c":[1],"e":"【正解：2】\n未破裂で見つかる脳動脈瘤の大半は無症候性であり、脳ドックなどで偶然発見されます。\n選択肢1：誤り。多発性は約10〜30%程度。\n選択肢3：誤り。多発性は女性に多い傾向。\n選択肢4：誤り。約80〜90%は前方循環系（ICA、MCA、ACoA）に発生します。"},{"n":28,"m":false,"t":"高血圧性脳出血の合併症で正しいのはどれか。","o":["膀胱炎","胆嚢炎","心筋炎","急性膵炎","上部消化管出血"],"c":[4],"e":"【正解：5】\n重症の脳損傷では、ストレスにより急性胃粘膜病変（Cushing潰瘍）をきたし、上部消化管出血を合併することがあります。"},{"n":29,"m":false,"t":"図4は頭部DSA画像である。矢印が示す血管はどれか。（図4：静脈相DSA）","o":["直静脈洞","横静脈洞","S状静脈洞","下錐体静脈洞","下矢状静脈洞"],"c":[1],"e":"【正解：2】\n図4の矢印は、頭蓋内の静脈血を集めてS状静脈洞へと続く横静脈洞を指しています。"},{"n":30,"m":false,"t":"灌流領域で正しいのはどれか。","o":["後頭動脈 ― 海馬","前大脳動脈 ― 脳幹","中大脳動脈 ― 中脳","後下小脳動脈 ― 視床","前脈絡叢動脈 ― 扁桃体"],"c":[4],"e":"【正解：5】\n前脈絡叢動脈（AchA）は扁桃体の一部などを栄養します。\n海馬→主に後大脳動脈（PCA）、脳幹→椎骨・脳底動脈系が栄養します。"},{"n":31,"m":true,"t":"外頚動脈DSA撮影で正しいのはどれか。2つ選べ。","o":["側面像のみ撮影する。","補償フィルタを入れる。","高フレームレートで撮影する。","熱感がある事を事前に伝える。","額と側頭部を強く押さえて固定する。"],"c":[1,3],"e":"【正解：2と4】\n選択肢2：正しい ✅ 頭蓋底部・顔面の厚みの差による黒つぶれを防ぐため補償フィルタを使用します。\n選択肢4：正しい ✅ 造影剤注入による熱感は外頸動脈造影で強く出るため事前の説明が必須です。"},{"n":32,"m":false,"t":"撮影法で正しいのはどれか。","o":["Matas法は側面像で評価する。","3D-DAの回転角度は360°以上である。","総頸動脈造影正面撮影は眼窩下縁と錐体上縁を重ねる。","Cアームで角度を調整するので正面性を保つ必要がない。","椎骨動脈造影正面撮影はOM lineに対して頭尾方向に20〜25°の角度で入射する。"],"c":[2],"e":"【正解：3】\n正面撮影では眼窩下縁と錐体上縁を重ねることで血管の重なりを最小限にします。\n選択肢1：誤り。Matas法・Alcock法は通常正面（AP）像で評価します。\n選択肢2：誤り。3D-DAの回転角度は通常200〜240°程度です。"},{"n":33,"m":false,"t":"図5の画像で考えられる疾患はどれか。（図5：脳血管造影）","o":["もやもや病","くも膜下出血","硬膜動静脈瘻","脳動静脈奇形","内頚動脈‐海綿静脈洞瘻"],"c":[0],"e":"【正解：1】\n図5の画像（モヤモヤとした微細血管の発達）はもやもや病（Willis動脈輪閉塞症）の特徴的な所見です。"},{"n":34,"m":false,"t":"図6は外頸動脈造影側面像である。矢印が示す血管はどれか。（図6：外頸動脈側面像）","o":["顎動脈","後頭動脈","顔面動脈","中硬膜動脈","浅側頭動脈"],"c":[3],"e":"【正解：4】\n図6の側面像で、硬膜を栄養している血管は中硬膜動脈（MMA）です。顎動脈（上顎動脈）から分岐し棘孔を通過します。"},{"n":35,"m":true,"t":"撮影法と観察する血管で正しいのはどれか。2つ選べ。","o":["Town法 ― 後大脳動脈","Matas法 ― 後交通動脈","Alcock法 ― 前脈絡叢動脈","Waters法 ― 上小脳動脈","Caldwell法 ― 脳底動脈"],"c":[0,1],"e":"【正解：1と2】\n選択肢1：正しい ✅ Town法は頭部前屈撮影で後大脳動脈・脳底動脈などの後方循環系の観察に適しています。\n選択肢2：正しい ✅ Matas法（反対側ICA圧迫）は前交通動脈・後交通動脈を介した側副血行の評価に用いられます。"},{"n":36,"m":false,"t":"図7は左内頸動脈3D画像である。矢印の血管名はどれか。（図7：左ICA 3D画像）","o":["眼動脈","前交通動脈","上行咽頭動脈","前脈絡叢動脈","遺残三叉神経動脈"],"c":[0],"e":"【正解：1】\n図7の3D画像で、内頸動脈のサイフォン部から前方（眼窩方向）へ向かって分岐している血管は眼動脈です。"},{"n":37,"m":false,"t":"CAS（頚動脈ステント留置術）で正しいのはどれか。","o":["バルーン拡張型のステントが使用される。","後拡張は遠位正常血管径の1.5倍を目標とする。","術後は過灌流症候群予防のため血圧コントロールを慎重に行う。","バルーン拡張に伴う頚動脈洞刺激では頻脈と血圧の上昇に注意が必要である。","Open cell stentはClosed cell stentより不安定プラークを圧着させる効果は高い。"],"c":[2],"e":"【正解：3】\n術後に血流が急増すると過灌流症候群（頭痛、痙攣、脳出血）を起こすリスクがあるため厳格な血圧コントロールが重要です。\n選択肢1：誤り。CASでは自己拡張型ステントが使用されます。\n選択肢4：誤り。頚動脈洞刺激では「徐脈」と「血圧低下」に注意が必要です。"},{"n":38,"m":false,"t":"CAS（頚動脈ステント留置術）で正しいのはどれか。","o":["肩を上げた状態で撮影を行う。","自然呼吸下にてDSA撮影を行う。","血管の拍動の影響を最小にするため3D-DAは短時間撮影を行う。","希釈造影剤を用いたCBCT撮影は術前の血管形態把握に活用する。","原液造影剤を用いた3D-DAは術後のステントおよび描出血管内腔評価に活用する。"],"c":[3],"e":"【正解：4】\n希釈造影剤を用いたCBCT撮影は、ステントの密着性やプラークの状態を術中に詳細に把握するのに有用です。"},{"n":39,"m":true,"t":"rt-PA療法の禁忌はどれか。2つ選べ。","o":["急性膵炎","胸部大動脈瘤","未破裂脳動脈瘤","3ヶ月以内の心筋梗塞","21日以内の消化管あるいは尿路出血"],"c":[3,4],"e":"【正解：4と5】\n選択肢4：正しい（禁忌） ✅ 3ヶ月以内の心筋梗塞はrt-PA療法の禁忌に含まれます。\n選択肢5：正しい（禁忌） ✅ 21日以内の消化管・尿路出血も禁忌に含まれます（出血リスク増大のため）。"},{"n":40,"m":false,"t":"rt-PA療法で誤っているのはどれか。","o":["投与量は0.6mg/kgを静注する。","投与前に脳血管評価が必須である。","発症から4.5時間以内に治療可能な虚血性脳血管障害患者に対して行う。","頭蓋内出血の除外と早期虚血性変化の評価に単純CTあるいはMRI検査が必須である。","胸部大動脈解離の除外は胸部単純写真・頚部血管エコー・胸部CTのいずれかが推奨される。"],"c":[1],"e":"【正解：2（誤り）】\n単純CTで「脳出血の否定」ができれば、脳血管評価（MRAやCTA）の結果を待たずにrt-PAを開始することが推奨されます（Time is Brainの原則）。「脳血管評価が必須」は誤りです。"},{"n":41,"m":false,"t":"急性期脳梗塞に対する機械的血栓回収療法で正しいのはどれか。","o":["rt-PA療法との併用は禁忌である。","全身麻酔で施行することが原則である。","最終健常から48時間以内に開始することが推奨されている。","ステントリトリーバは血栓吸引カテーテルより有効性が高い。","発症から再開通までの時間が早いほど良好な転帰が期待できる。"],"c":[4],"e":"【正解：5】\n再開通までの時間が早いほど良好な転帰につながります（Time is Brain）。\n選択肢1：誤り。rt-PAとの併用（bridge療法）はむしろ推奨されています。"},{"n":42,"m":false,"t":"脳動脈瘤塞栓術に使用するコイルで正しいのはどれか。","o":["素材はコバルトクロム合金である。","コイルの離脱形式は熱溶断式が主である。","Stretch Resistant機構により形状記憶されているものもある。","ハイドロコイルは血液の水分を吸収することで体積が増加する。","挿入するコイルの径は小さいサイズのものから順に大きくしていく。"],"c":[3],"e":"【正解：4】\nハイドロコイル（ハイドロゲル付着型）は、水分を吸収して膨張し充填率を高める効果があります。\n選択肢1：誤り。主に白金（プラチナ）合金が使用されます。\n選択肢5：誤り。コイルは大きいサイズから始め、徐々に小さいサイズを充填します。"},{"n":43,"m":false,"t":"脳動脈瘤コイル塞栓術のワーキングアングルで誤っているのはどれか。","o":["奥行きの確認ができること。","ネックと親血管が分離できること。","動脈瘤と分岐血管が分離できること。","ネックと他の血管が重ならないこと。","マイクロカテーテルのみ視野内に収まること。"],"c":[4],"e":"【正解：5（誤り）】\nワーキングアングルでは、マイクロカテーテルだけでなく、動脈瘤全体・ネック部・周囲の親血管・分岐血管がすべて明確に分離して視野内に収まっている必要があります。"},{"n":44,"m":false,"t":"液体塞栓物質で誤っているのはどれか。","o":["OnyxはNBCA硬膜動静脈瘻の血管塞栓術に使用する。","NBCAはPlug and push法を用いて塞栓を行う。","NBCAの割合が多いほど静脈への逸脱の可能性が低くなる。","注入時のモニタリング画像としてDSA撮影やロードマップ画像が有用である。","カテーテルにNBCAを充填する際NBCAのアニオン重合を回避する目的でブドウ糖液を注入する。"],"c":[3],"e":"【正解：4（誤り）】\nOnyx等の液体塞栓物質の注入時は、マスク像のないBlank Roadmap（ブランク・ロードマップ）が最も有用です。通常のDSAやロードマップよりもBlank Roadmapが優位です。"},{"n":45,"m":false,"t":"髄膜腫に対する術前塞栓術で誤っているのはどれか。","o":["開頭摘出術前の補助的処置である。","術前塞栓術を行うタイミングについては定められていない。","Hypervascularな腫瘍や頭蓋底腫瘍が良い適応とされている。","使用できる塞栓物質にはコイル、NBCA、ヘパスフィアがある。","腫瘍内血流を低下させることによる摘出術中の出血量減少と腫瘍の軟化が目的である。"],"c":[1],"e":"【正解：2（誤り）】\n術前塞栓術は通常、摘出術の1〜7日前に行うのが標準的であり、タイミングの目安は存在します（「定められていない」は誤り）。"},{"n":46,"m":false,"t":"Flow diverter stent留置後のCBCT撮影目的で誤っているのはどれか。","o":["kinkの有無","整流効果の有無","血管壁への密着性","ステントストラットの分岐血管への迷入","ステントストラットの母血管内への飛び出し"],"c":[1],"e":"【正解：2（誤り）】\nCBCT（構造画像）ではkinkや密着性は確認できますが、血流改変による「整流効果」そのものはDSAによる造影剤のうっ滞評価などで確認します。"},{"n":47,"m":false,"t":"脳動脈瘤のFlow diverter治療で正しいのはどれか。","o":["症候性脳動脈瘤に使用しない。","抗血小板薬の投与は不要である。","術前画像診断としてCTAは必須ではない。","椎骨動脈に位置する動脈瘤に使用できない。","Laser cut stentであり留置血管径によらず短縮しない。"],"c":[2],"e":"【正解：3】\n術前の詳細な画像評価（CTA/MRA等）は重要ですが、「必須ではない」が正解とされています。\n選択肢2：誤り。抗血小板薬の二剤投与は必須です（ステント内血栓予防）。\n選択肢4：誤り。椎骨動脈の大型動脈瘤にも適応が拡大されています。"},{"n":48,"m":false,"t":"図8の脊髄血管の解剖で正しいのはどれか。（図8：脊髄の横断面模式図）","o":["a：脊髄枝 b：前根動脈 c：中心溝動脈 d：後根動脈 e：後脊髄動脈","a：前根動脈 b：脊髄枝 c：中心溝動脈 d：後脊髄動脈 e：後根動脈","a：中心溝動脈 b：前根動脈 c：脊髄枝 d：後根動脈 e：後脊髄動脈","a：中心溝動脈 b：前根動脈 c：後脊髄動脈 d：脊髄枝 e：後根動脈","a：中心溝動脈 b：前根動脈 c：後脊髄動脈 d：後根動脈 e：脊髄枝"],"c":[4],"e":"【正解：5】\n脊髄横断面における各血管の位置関係：a：中心溝動脈、b：前根動脈、c：後脊髄動脈、d：後根動脈、e：脊髄枝"},{"n":49,"m":true,"t":"Blank roadmapで正しいのはどれか。2つ選べ。","o":["3D-DAを利用する。","体動の影響を受けにくい。","標的血管への誘導に有用である。","注入時間の長いonyx注入に有用である。","骨やそれまでに留置されたデバイスがサブトラクションされる。"],"c":[3,4],"e":"【正解：4と5】\n選択肢4：正しい ✅ Onyxなど注入に時間がかかる液体塞栓物質の際に先端観察に有用です。\n選択肢5：正しい ✅ 骨や既存のデバイスがサブトラクション（消去）され、造影剤（塞栓物質）のみが描出されます。\n選択肢2：誤り。体動があるとマスク像とのズレが生じやすく影響を受けやすいです。"},{"n":50,"m":true,"t":"AVM（脳動静脈奇形）で正しいのはどれか。2つ選べ。","o":["動脈瘤を合併することがある。","外傷、手術などで後天的に発生する。","根治目的としては血管内治療が第一選択である。","血管内治療ではdrainerを塞栓することが一般的である。","盗血現象によって周辺部の脳は乏血状態になることがある。"],"c":[0,4],"e":"【正解：1と5】\n選択肢1：正しい ✅ AVM流入動脈やナイダス内に動脈瘤を合併することがあります。\n選択肢5：正しい ✅ 盗血現象（steal phenomenon）によって周辺の正常脳組織が虚血状態になることがあります。\n選択肢4：誤り。drainer（ドレナージ静脈）を先に詰めると破裂するため禁忌に近い手技です。"},{"n":51,"m":true,"t":"肝臓の解剖で正しいのはどれか。","o":["肝動脈と肝静脈は互いに並走する。","尾状葉は肝門部の前側に位置する。","胆嚢窩と下大静脈を結ぶ線をCantlie線と呼ぶ。","動脈と静脈による二重支配により栄養を受ける。","肝静脈の分枝をもとに8区域に分類するCouinaud分類がある。"],"c":[2,4],"e":"【正解：3と5】\n選択肢3：正しい ✅ 胆嚢窩と下大静脈を結ぶ線をCantlie（カントリー）線と呼び、肝臓の左右葉の境界となります。\n選択肢5：正しい ✅ Couinaud（クイノー）分類は肝静脈と門脈の分枝をもとに8区域（S1〜S8）に分類します。\n選択肢4：「動脈と静脈」は誤り（正確には門脈と肝動脈）。"},{"n":52,"m":true,"t":"胸腹部動静脈の血管解剖で正しいのはどれか。2つ選べ。","o":["左副腎静脈は下大静脈へ流入する。","腰動脈は腹部大動脈から直接起始する。","左結腸動脈は上腸間膜動脈の分枝である。","下膵十二指腸動脈は腹腔動脈の分枝である。","左上大静脈遺残は通常冠状静脈洞に流入する。"],"c":[1,4],"e":"【正解：2と5】\n選択肢2：正しい ✅ 腰動脈（通常4対）は腹部大動脈の後壁から直接起始します。\n選択肢5：正しい ✅ 左上大静脈遺残（PLSVC）は通常冠状静脈洞に流入し右房へ戻ります。\n選択肢1：誤り。左副腎静脈は左腎静脈に流入します（右副腎静脈がIVCへ直接）。\n選択肢3：誤り。左結腸動脈は下腸間膜動脈（IMA）の分枝です。"},{"n":53,"m":false,"t":"骨盤動脈で正しいのはどれか。","o":["正中仙骨動脈は左右一対の動脈である。","子宮動脈は通常内腸骨動脈から分岐する。","腸腰動脈は外腸骨動脈の最初の分枝である。","下殿動脈は内腸骨動脈の最も太い分枝である。","内・外腸骨動脈は同側斜位により分離が可能である。"],"c":[1],"e":"【正解：2】\n子宮動脈は通常内腸骨動脈（臓側枝）から分岐します。\n選択肢1：誤り。正中仙骨動脈は腹部大動脈の正中から単独で起始する一本の動脈です。\n選択肢3：誤り。腸腰動脈は内腸骨動脈（後幹）の最初の分枝です。"},{"n":54,"m":false,"t":"胸腹部のDSAで誤っているのはどれか。","o":["腹腔動脈撮影で造影剤を4 ml/sで20 ml注入した。","肺動脈全体の撮影にピッグテールカテーテルを使用した。","下横隔膜動脈を撮影するため肝上縁に補償フィルタを挿入した。","息止めが困難なためinjection delayを用いてマスク像を減らした。","上腸間膜動脈から門脈を撮影する際にフレームレートを可変させた。"],"c":[0],"e":"【正解：1（誤り）】\n腹腔動脈撮影の造影剤注入量は施設・条件により異なりますが、「4 ml/sで20 ml」という組み合わせは標準的ではない場合があります（通常は5〜8 ml/s、10〜15 ml程度）。"},{"n":55,"m":false,"t":"図9は肝臓のCT画像である。最も考えられる疾患はどれか。（図9：単純・動脈相・門脈相・平衡相）","o":["肝硬変","肝血管腫","肝細胞がん","転移性肝がん","肝内胆管がん"],"c":[2],"e":"【正解：3】\n図9のCT画像は動脈相での濃染と門脈相・平衡相でのウォッシュアウトを示しており、肝細胞がん（HCC）の典型的なパターンです。"},{"n":56,"m":true,"t":"喀血に対する塞栓術で正しいのはどれか。2つ選べ。","o":["金属コイルでの塞栓が第一選択である。","エタノールを用いた塞栓は効果的である。","原疾患として肺高血圧症の頻度が最も高い。","責任血管として最も頻度が高いのは気管支動脈である。","肋間動脈の塞栓は脊椎梗塞の恐れがあるため注意が必要である。"],"c":[3,4],"e":"【正解：4と5】\n選択肢4：正しい ✅ 喀血の責任血管として最も頻度が高いのは気管支動脈です。\n選択肢5：正しい ✅ 肋間動脈を塞栓する際は、脊髄を栄養する根髄動脈への影響で脊髄梗塞を起こす恐れがあり注意が必要です。"},{"n":57,"m":false,"t":"肺の構造で正しいのはどれか。","o":["肺の栄養血管は肺動脈である。","終末細気管支は肺胞に開口する。","右主気管支は左主気管支より太い。","成人の気管分岐部の角度は90°である。","肺静脈の枝は気管支の枝と並走している。"],"c":[2],"e":"【正解：3】\n右主気管支は左主気管支より太く、垂直に近い角度で分岐します（誤嚥が起きやすい理由）。\n選択肢1：誤り。肺の「栄養」血管は気管支動脈です（肺動脈はガス交換のための機能血管）。\n選択肢4：誤り。気管分岐部の角度は通常55〜70°程度です。"},{"n":58,"m":false,"t":"胸腹部動静脈で正しいのはどれか。","o":["腰動脈は5対の臓側枝である。","奇静脈は椎体の左側を走行する。","肋間動脈は大動脈および鎖骨下動脈から分岐する。","気管支動脈は第4胸椎レベルの胸部下行大動脈から起始する。","Adamkiewicz動脈は左側よりも右側の肋間動脈から起始する頻度が高い。"],"c":[2],"e":"【正解：3】\n肋間動脈は主に下行大動脈から分岐しますが、上位の肋間動脈（第1・2肋間）は鎖骨下動脈から分岐します。\n選択肢1：誤り。腰動脈は通常4対（5対ではありません）。\n選択肢2：誤り。奇静脈は椎体の「右」側を走行します。\n選択肢5：誤り。Adamkiewicz動脈は「左」側の肋間動脈から起始する頻度が高いです（約75〜80%）。"},{"n":59,"m":false,"t":"内腸骨動脈の壁側枝はどれか。","o":["閉鎖動脈","子宮動脈","精管動脈","中直腸動脈","下膀胱動脈"],"c":[0],"e":"【正解：1】\n内腸骨動脈の壁側枝には閉鎖動脈、腸腰動脈、外側仙骨動脈、殿動脈（上殿・下殿）などがあります。\n選択肢2〜5：いずれも臓側枝です。"},{"n":60,"m":true,"t":"経カテーテル止血術の塞栓物質で正しいのはどれか。2つ選べ。","o":["金属コイル","ベアステント","リピオドール","ジェルパード","セレスキュー"],"c":[0,4],"e":"【正解：1と5】\n選択肢1：正しい ✅ 金属コイルは塞栓物質として広く使用されます。\n選択肢5：正しい ✅ セレスキュー（Celect/下大静脈フィルター）も塞栓用途があります。\n選択肢2：誤り。ベアステントは管腔保持デバイスです。\n選択肢3：誤り。リピオドールはTACEの担体（薬剤と混合する乳化剤）です。"},{"n":61,"m":true,"t":"血管形成術で正しいのはどれか。2つ選べ。","o":["腕頭動脈狭窄に対し薬剤溶出性ステントを用いる。","上大静脈症候群に対するステント留置術の合併症に肺水腫がある。","上大静脈症候群に使用するステントは正常血管径より小さいサイズを使用する。","PTRA（腎血管形成術）では腹部大動脈と腎動脈との分岐角度が急峻の場合、経大腿動脈アプローチを用いる。","腎動脈起始部病変のPTRAは3 mm以内でステント中枢端を大動脈に突出させることが推奨されている。"],"c":[1,4],"e":"【正解：2と5】\n選択肢2：正しい ✅ SVCのステント開通後に急激に静脈還流が改善し、右心系への急激な負荷から肺水腫を起こすことがあります。\n選択肢5：正しい ✅ 腎動脈起始部病変では、ステントを大動脈内に少し（1〜3 mm）突出させることで再狭窄を予防します。\n選択肢3：誤り。SVCステントは正常血管径より大きいサイズを使用します。"},{"n":62,"m":true,"t":"門脈圧亢進症に対するIVRで正しいのはどれか。2つ選べ。","o":["胃静脈瘤はバルーン閉塞下逆行性経静脈的閉塞術の適応である。","部分脾動脈塞栓術において血小板値は術後1〜4週に最大値に達する。","難治性腹水をきたす細菌性腹膜炎はデンバー・シャントの適応である。","TIPS（経頸静脈的肝内門脈大循環短絡術）は保険収載されている治療である。","胃静脈瘤に対するバルーン閉塞下逆行性経静脈的塞栓術において施行後に肝予備能が悪化する症例が多い。"],"c":[0,1],"e":"【正解：1と2】\n選択肢1：正しい ✅ 胃腎シャントを有する胃静脈瘤はBRTO（バルーン閉塞下逆行性経静脈的塞栓術）の良い適応です。\n選択肢2：正しい ✅ PSE（部分脾動脈塞栓術）後の血小板値は術後1〜4週でピークに達します。\n選択肢3：誤り。感染性腹水はデンバーシャントの禁忌です。"},{"n":63,"m":true,"t":"胸腹部のリンパ系IVRで正しいのはどれか。2つ選べ。","o":["リンパ管造影はリピオドールを使用する。","鼠径リンパ節はX線透視下で穿刺を行う。","リンパ管造影の穿刺は足背部が一般的である。","リンパ管を塞栓する際は主にNBCAを用いる。","外科手術後の乳び胸に対する治療の第一選択はIVRである。"],"c":[0,2],"e":"【正解：1と3】\n選択肢1：正しい ✅ リンパ管造影ではリピオドール（油性造影剤）を直接注入してリンパ管を造影します。\n選択肢3：正しい ✅ リンパ管の穿刺は足背部の皮内に色素（Patent Blue等）を注射し、現れたリンパ管を穿刺するのが一般的です。"},{"n":64,"m":true,"t":"経皮経肝的門脈塞栓術で正しいのはどれか。2つ選べ。","o":["肝切除の3日前に行う。","難治性腹水症例では禁忌である。","食道静脈瘤合併症例では禁忌である。","塞栓直後には5 cmH2O程度の門脈圧の低下が見られる。","右葉2区域を塞栓した場合、肝左葉には100%以上の体積増加が見られる。"],"c":[1,2],"e":"【正解：2と3】\n選択肢2：正しい ✅ 難治性腹水（重篤な肝障害を示唆）はPVEの禁忌とされます。\n選択肢3：正しい ✅ 食道静脈瘤合併例は、門脈圧上昇による出血リスクがあるため禁忌あるいは慎重適応です。\n選択肢1：誤り。PVEは通常肝切除の2〜6週前に行います（3日前は短すぎる）。"},{"n":65,"m":false,"t":"塞栓療法で正しいのはどれか。","o":["子宮動脈塞栓術は100 μm程度の球状塞栓物質を用いる。","下部消化管出血の治療は第一選択として外科的処置を推奨する。","消化管出血に対するバソプレシン動注療法は超選択的動注で行う。","気管支動脈塞栓術に用いる塞栓物質として無水エタノールがある。","化学塞栓療法後に皮膚の合併症が懸念される動脈に肋間動脈がある。"],"c":[4],"e":"【正解：5】\n肋間動脈はTACEや塞栓術の際に皮膚・肋間筋への側副血行として関与し、皮膚壊死などの合併症リスクがあります。\n選択肢1：誤り。UAEでは500〜700 μm程度の球状塞栓物質を使用します（100 μmは小さすぎる）。"},{"n":66,"m":true,"t":"急性上腸間膜動脈塞栓症の治療で正しいのはどれか。2つ選べ。","o":["診断から治療まで迅速な対応が必要である。","ウロキナーゼ注入のみで血管拡張や血栓吸引を併用しない。","急性閉塞は心臓などに由来する塞栓子の飛散が原因である。","血栓溶解薬持続動注はできるだけ末梢にカテーテルを留置する。","急性閉塞の場合でも腸管壊死までに時間的猶予があるので緊急で行なわない。"],"c":[0,2],"e":"【正解：1と3】\n選択肢1：正しい ✅ 急性SMA塞栓症は腸管壊死に至るため迅速な対応が必要です。\n選択肢3：正しい ✅ 急性SMA塞栓症の多くは心臓（心房細動等）に由来する塞栓子が原因です。\n選択肢5：誤り。急性閉塞は緊急対応が必要です。"},{"n":67,"m":true,"t":"産科危機的出血におけるIVRの塞栓物質で正しいのはどれか。2つ選べ。","o":["NBCA","オルダミン","球状塞栓物質","セレスキュー","無水エタノール"],"c":[0,2],"e":"【正解：1と3】\n選択肢1：正しい ✅ NBCAは産科出血に対する緊急止血時に使用される液体塞栓物質です。\n選択肢3：正しい ✅ 球状塞栓物質（ゼラチン球や粒子）も産科出血のTAEに使用されます。\n選択肢5：誤り。無水エタノールは産科出血には使用しません。"},{"n":68,"m":false,"t":"動脈塞栓で誤っているのはどれか。","o":["腎茎部損傷は動脈塞栓術よりも外科手術の適応である。","喀血に液状塞栓物質を使用すると脊髄梗塞や気管支壊死を起こす危険性がある。","骨盤外傷に対するTAEで遺残坐骨動脈がある場合より選択的な塞栓が必要である。","パッキングは動脈瘤の流入側と流出側を金属コイルで塞栓し血流を遮断する方法である。","膵周囲の動脈瘤ではNBCAやゼラチンスポンジを使用すると膵炎を起こす可能性がある。"],"c":[0],"e":"【正解：1（誤り）】\n腎茎部損傷に対するTAE（腎動脈塞栓術）はIVRが有効な選択肢の一つです。完全断裂や腹膜炎合併でなければTAEが第一選択となる場合もあります。「外科手術の適応」と断言するのは誤りです。"},{"n":69,"m":true,"t":"TACEで正しいのはどれか。2つ選べ。","o":["胆道術後患者は適応である。","推奨は肝障害度Cの患者である。","肝動脈門脈短絡がある場合は肝梗塞のリスクがある。","抗がん剤とリピオドールをエマルジョンし注入する。","ゼラチンスポンジを使用した手技をDEB-TACEという。"],"c":[2,3],"e":"【正解：3と4】\n選択肢3：正しい ✅ 太い肝動脈門脈短絡（A-Pシャント）がある場合、塞栓物質が門脈へ流れ肝梗塞リスクがあります。\n選択肢4：正しい ✅ cTACEでは抗がん剤とリピオドールをエマルジョン（乳化）して注入します。\n選択肢1：誤り。胆道再建術後患者は逆流性胆管炎・肝膿瘍リスクが高く慎重適応（ほぼ禁忌）。\n選択肢2：誤り。肝障害度Cの患者はTACEの適応外です。"},{"n":70,"m":false,"t":"副腎で誤っているのはどれか","o":["皮質と髄質から構成される。","右副腎静脈は右腎静脈に開口する。","性ホルモンは皮質にて産生し血中に放出される。","右の副腎は錐体形に対し左の副腎は楕円形である。","カテコラミンは髄質にて産生し血中に放出される。"],"c":[1],"e":"【正解：2（誤り）】\n右副腎静脈は「下大静脈（IVC）」に直接流入します。左副腎静脈が左腎静脈に流入します（左右が逆）。"},{"n":71,"m":true,"t":"動脈で正しいのはどれか。2つ選べ。","o":["内膜、中膜、外膜の3層構造である。","嚢状大動脈瘤は大動脈全周が拡張する。","真性動脈瘤は血管壁構造が破綻し突出したものである。","大動脈解離は血管壁が中膜で2層に剥離し2腔になった状態である。","炎症性大動脈瘤は動脈周囲に混濁した脂肪織が観察され不正な内腔と壁の濃染が見られる。"],"c":[0,3],"e":"【正解：1と4】\n選択肢1：正しい ✅ 血管壁は内膜・中膜・外膜の3層構造です。\n選択肢4：正しい ✅ 大動脈解離は中膜で壁が裂けて2腔（真腔・偽腔）になる病態です。\n選択肢2：誤り。全周が拡張するのは「紡錘状」大動脈瘤。嚢状は一部が突出した形態。\n選択肢3：誤り。壁構造が破綻して突出したものは「仮性」動脈瘤。"},{"n":72,"m":false,"t":"図10の右下肢動脈の造影像で正しい組み合わせはどれか。（図10：下腿動脈造影正面像）","o":["A:腓骨動脈 ― B:後脛骨動脈","A:前脛骨動脈 ― B:腓骨動脈","A:後脛骨動脈 ― B:腓骨動脈","A:後脛骨動脈 ― B:前脛骨動脈","A:前脛骨動脈 ― B:後脛骨動脈"],"c":[0],"e":"【正解：1】\n下腿動脈造影において、A（外側・腓骨沿い）＝腓骨動脈、B（内側・脛骨沿い）＝後脛骨動脈です。"},{"n":73,"m":true,"t":"下肢静脈の表在静脈はどれか。2つ選べ。","o":["浅大腿静脈","深大腿静脈","大伏在静脈","小伏在静脈","前後脛骨静脈"],"c":[2,3],"e":"【正解：3と4】\n選択肢3：正しい ✅ 大伏在静脈は下肢の内側を走る最大の表在静脈です。\n選択肢4：正しい ✅ 小伏在静脈は下腿の後面を走る表在静脈です。\n選択肢1,2,5：これらは深部静脈です。"},{"n":74,"m":false,"t":"動脈および分岐の撮影方向で正しいのはどれか。","o":["足背動脈 ― CAU","大動脈弓部 ― RAO","右総頚動脈・右鎖骨下動脈 ― LAO","左内腸骨動脈・左総腸骨動脈 ― LAO","右大腿浅動脈・右大腿深動脈 ― RAO"],"c":[1],"e":"【正解：2】\n大動脈弓部はRAO（右前斜位）撮影により弓部の全体像を把握しやすくなります。\n選択肢3：誤り。右総頸動脈・右鎖骨下動脈の分離にはRAO（右前斜位）が有効です。\n選択肢4：誤り。左内腸骨動脈・左総腸骨動脈の分離にはRAO（右前斜位）が有効です。\n選択肢5：誤り。右大腿の浅・深大腿動脈の分離にはLAO（左前斜位：同側斜位）が有効です。"},{"n":75,"m":false,"t":"EVAR術後のエンドリーク確認DSAで評価できないのはどれか。","o":["Type Ia","Type Ib","Type IIIa","Type IV","Type V"],"c":[4],"e":"【正解：5】\nType V（エンドテンション）は明らかな造影剤漏出がなく瘤内圧のみ上昇する状態であり、DSAでは直接評価できません。Type Ia〜IVはいずれも造影剤の漏出として確認可能です。"},{"n":76,"m":false,"t":"腸骨動脈領域の血管形成術で誤っているのはどれか。","o":["合併症としては遠位塞栓が挙げられる。","大腿膝窩動脈病変より高い治療効果が得られる。","ステントが通過しやすくするために前拡張を行う。","バルーン拡張型ステントは屈曲蛇行した症例に有効である。","Cross Overアプローチとは病変の対側CFAからのアプローチである。"],"c":[3],"e":"【正解：4（誤り）】\nバルーン拡張型ステントは硬いため屈曲蛇行した部位では折れ（kink）が生じやすいです。屈曲蛇行症例には柔軟な「自己拡張型（ナイチノール等）」が適しています。"},{"n":77,"m":false,"t":"透析シャントの血栓溶解療法で直接血管内に注入する薬剤はどれか。","o":["アスピリン","ペンタゾシン","ウロキナーゼ","ヘパリンナトリウム","ワルファリンカリウム"],"c":[2],"e":"【正解：3】\n透析シャント閉塞（血栓性）の治療において、血栓を溶かすために直接注入される薬剤はウロキナーゼ（血栓溶解薬）です。"},{"n":78,"m":false,"t":"大動脈ステントグラフトのエンドリーク分類で誤っているのはどれか。","o":["type Ⅰ：大動脈瘤の側枝から血液が逆流して瘤内へ流れ込むもの","type Ⅲa：ステントグラフト-ステントグラフト間の接合部分からの瘤内への血液漏れ","type Ⅲb：ステントグラフト-ファブリックの破損などにて瘤内に血液が流れ込むもの","type Ⅳ：ステントグラフトのポロシティからの血液漏れ","type Ⅴ：瘤内に血流が認められないにもかかわらず瘤が拡大傾向を示すもの"],"c":[0],"e":"【正解：1（誤り）】\n「側枝から血液が逆流」するのはType IIエンドリークです。Type Iはステントグラフトの近位側（Ia）または遠位側（Ib）の「接合部（アタッチメント）」からの漏れです。"},{"n":79,"m":false,"t":"大腿膝窩動脈領域のIVRで使用できないのはどれか。","o":["DES（薬剤溶出性ステント）","DCA（一方向性アテレクトミー）","DCS（薬剤コーテッドステント）","DCB（薬剤コーティングバルーン）","BNS（金属製ナイチノールステント）"],"c":[1],"e":"【正解：2】\nDCA（方向性冠動脈粥腫切除術）は「冠動脈」用のデバイスであり、通常下肢（大腿膝窩動脈）には使用されません。下肢用の切削デバイスはジェットストリームなどが使用されます。"},{"n":80,"m":true,"t":"大動脈弁狭窄症の治療でTAVIの適応因子はどれか。2つ選べ。","o":["若年","フレイル","左室内血栓","著しい胸郭変形","冠動脈起始部が低位"],"c":[1,3],"e":"【正解：2と4】\n選択肢2：正しい ✅ フレイル（衰弱）がある高齢者は外科手術の低侵襲化が望ましいためTAVIの良い適応です。\n選択肢4：正しい ✅ 著しい胸郭変形がある場合、外科的開胸が困難なためTAVIが選ばれます。\n選択肢1：誤り。若年者は耐久性の観点から外科的手術が優先されます。\n選択肢3：誤り。左室内血栓は血栓飛散リスクがあり禁忌・慎重適応。"},{"n":81,"m":false,"t":"EVAR（腹部大動脈ステントグラフト内挿術）で合併症でないのはどれか。","o":["脚閉塞","腸管壊死","腎機能障害","大動脈解離","腹腔内遊離ガス"],"c":[4],"e":"【正解：5】\n腹腔内遊離ガス（フリーエアー）は消化管穿孔の所見であり、EVARの直接的な典型的合併症ではありません。脚閉塞・腸管虚血・腎機能障害・大動脈解離はいずれもEVARの合併症として知られています。"},{"n":82,"m":true,"t":"下肢動脈で正しいのはどれか。2つ選べ。","o":["大腿動脈は浅大腿動脈と大腿深動脈に分岐する。","穿刺前には鼠径靭帯の位置を透視下で確認することが望ましい。","浅大腿動脈は大腿深動脈が閉塞した場合に側副血行路として発達する場合がある。","大腿動脈の前部には大腿静脈が回り込むため動静脈を同時に穿刺する可能性がある。","診断で大腿深動脈と浅大腿動脈を分離する際はCアームを30〜50°程度内側斜位にして撮影するとよい。"],"c":[0,1],"e":"【正解：1と2】\n選択肢1：正しい ✅ 総大腿動脈は鼠径靭帯より末梢で浅大腿動脈（SFA）と大腿深動脈（DFA）に分岐します。\n選択肢2：正しい ✅ 穿刺が鼠径靭帯より中枢に外れると後腹膜血腫リスクがあるため透視での確認が重要です。\n選択肢3：誤り。SFAが閉塞した場合に側副血行として発達するのが大腿深動脈の分枝です（逆）。"},{"n":83,"m":true,"t":"下肢静脈で正しいのはどれか。2つ選べ。","o":["大伏在静脈と小伏在静脈は深部静脈である。","表在静脈と深部静脈をつなぐ穿通枝は存在しない。","大腿深静脈は大腿筋および腰筋の血流を貫流し膝窩静脈に流入する。","大伏在静脈は冠動脈のバイパス術でグラフト血管として用いられる。","浅大腿静脈は前後脛骨静脈と腓骨静脈から連なり主に下腿筋の血流を貫流する。"],"c":[3,4],"e":"【正解：4と5】\n選択肢4：正しい ✅ 大伏在静脈（GSV）は冠動脈バイパス手術でグラフト（静脈橋）として最も多く使用されます。\n選択肢5：正しい ✅ 浅大腿静脈（SFV）は前後脛骨静脈・腓骨静脈から続く深部静脈です。\n選択肢1：誤り。大・小伏在静脈は「表在」静脈です。"},{"n":84,"m":true,"t":"下肢動脈撮影のCO2造影で正しいのはどれか。2つ選べ。","o":["フレームレートを下げる。","合併症として神経障害がある。","ポジショニングは下肢挙上とする。","CO2は酸素の2倍の融解性がある。","血管撮影装置はDAモードに設定する。"],"c":[2,4],"e":"【正解：3と5】\n選択肢3：正しい ✅ ガスが浮力で末梢（上方）へ流れやすくするため下肢挙上のポジショニングが有効です。\n選択肢5：正しい ✅ 血管撮影装置のモード設定（DAモード等）を適切に行います。\n選択肢1：誤り。CO2は早期に吸収されるため高フレームレートが必要です。\n選択肢4：誤り。CO2の血液への溶解度は酸素の約20倍以上です（2倍ではありません）。"},{"n":85,"m":true,"t":"EVAR（腹部大動脈ステントグラフト内挿術）のエンドリーク予防目的にコイル塞栓を行う血管はどれか。２つ選べ。","o":["腎動脈","腹腔動脈","内腸骨動脈","上腸間膜動脈","下腸間膜動脈"],"c":[2,4],"e":"【正解：3と5】\n選択肢3：正しい ✅ 内腸骨動脈（腸骨動脈瘤合併時等）のコイル塞栓が行われます。\n選択肢5：正しい ✅ 下腸間膜動脈（IMA）からのType IIエンドリーク予防のため予防的コイル塞栓が行われることがあります。"},{"n":86,"m":false,"t":"ステントグラフト内挿術の適応で誤っているのはどれか。","o":["腸骨動脈瘤","胸部大動脈瘤","腹部大動脈瘤","Stanford A型大動脈解離","Stanford B型大動脈解離"],"c":[3],"e":"【正解：4（誤り）】\nStanford A型大動脈解離は上行大動脈に解離が及んでおり、心タンポナーデ・冠動脈閉塞のリスクがあるため原則として「緊急の外科的人工血管置換術」が適応となります。TEVARの適応ではありません。"},{"n":87,"m":false,"t":"内腸骨動脈コイル塞栓に特有な合併症で誤っているのはどれか。","o":["殿筋跛行","動脈損傷","勃起不全","消化管出血","コイルの逸脱"],"c":[1],"e":"【正解：2（誤り）】\n動脈損傷はカテーテル手技全般に起こり得る合併症であり、内腸骨動脈コイル塞栓に「特有」の合併症ではありません。殿筋跛行・勃起不全（陰部動脈虚血）・コイル逸脱は内腸骨動脈塞栓術に特有な合併症です。"},{"n":88,"m":false,"t":"経皮的下肢動脈形成術で用いる事ができないデバイスはどれか。","o":["エキシマレーザ","ロータブレータ","薬剤溶出ステント","ジェットストリーム","薬剤コーティングバルーン"],"c":[1],"e":"【正解：2】\nロータブレータは冠動脈の石灰化を削るためのデバイスであり、下肢動脈（太い血管）には不向きです。下肢EVTではジェットストリーム・エキシマレーザ・DCB・DESが使用されます。"},{"n":89,"m":false,"t":"上大静脈症候群のIVRで誤っているのはどれか。","o":["必要に応じて機械的血栓除去を併用する。","アプローチは大腿静脈や内頸静脈である。","バルーン拡張はステント留置前に行う方が効果が大きい。","狭窄の程度によってはpull-through法を用いて治療する。","悪性腫瘍に対するステント治療の成功率は約50%である。"],"c":[4],"e":"【正解：5（誤り）】\nSVC症候群に対するステント留置術は症状改善に対する即効性が高く、成功率も90%以上と極めて高いです。50%という数値は低すぎます。"},{"n":90,"m":false,"t":"下肢閉塞性病変の分類で正しいのはどれか。","o":["AHA分類","CASS分類","TASC分類","Fontaine分類","Rutherford分類"],"c":[2],"e":"【正解：3】\nTASC（Trans-Atlantic Inter-Society Consensus）分類は下肢閉塞性病変の「病変形態・複雑性」による分類であり、IVRか外科手術かの判断に用いられます。\nFontaine分類・Rutherford分類は「症状の重症度」分類です。"},{"n":91,"m":true,"t":"ヨード造影剤腎症の診断で正しいのはどれか。2つ選べ。","o":["eGFRの値で評価する。","急性腎障害の診断基準を用いることがある。","投与後48時間以内にeGFRが前値より25%以上増加した場合。","投与後、尿量が12時間にわたって＜0.5 ml/kg/hに減少した場合。","投与後72時間以内に血清クレアチニン値が前値より0.5 mg/dL以上増加した場合。"],"c":[1,4],"e":"【正解：2と5】\n選択肢2：正しい ✅ CINは急性腎障害（AKI）の一形態として捉えられ、AKIの診断基準が準用されます。\n選択肢5：正しい ✅ 一般的な定義として、造影剤投与後72時間以内に血清Cr値が前値より0.5 mg/dL以上または25%以上増加した場合です。\n選択肢3：誤り。eGFRの「増加」ではなく「低下」が基準です。"},{"n":92,"m":false,"t":"「人を対象とする生命科学・医学系研究に関する倫理指針」で誤っているのはどれか。","o":["個人情報保護法において病歴は要配慮個人情報である。","個人情報の管理主体は研究機関に所属する研究担当者である。","医療における診断方法の改善は人を対象とする生命科学・医学系研究に含まれる。","研究目的で一定の条件を設定して行われる人への放射線照射は侵襲と見なされる。","既に特定の個人を識別できない状態に管理されている試料・情報はインフォームドコンセントを行うことなく自機関で研究利用できる。"],"c":[1],"e":"【正解：2（誤り）】\n個人情報の管理主体は「研究機関」であり、個人の研究担当者ではありません。研究機関として責任を持ち管理体制を整備する義務があります。"},{"n":93,"m":false,"t":"医療機器に係る安全管理の体制確保のための措置で保守点検計画を策定すべき医療機器はどれか。","o":["超音波診断装置","核医学撮像装置","医用X線CT装置","据置形X線透視撮影装置","移動形X線透視撮影装置"],"c":[3],"e":"【正解：4】\n医療法施行規則により、「据置形X線透視撮影装置」は保守点検計画の策定が義務付けられる医療機器に分類されます。血管撮影装置はこれに該当します。"},{"n":94,"m":false,"t":"造影剤の適応で誤っているのはどれか。","o":["冠動脈のDAにヨード含有量300 mgI/mlの造影剤を用いた。","脳血管のDSAにヨード含有量300 mgI/mlの造影剤を用いた。","腎機能低下患者に対する上肢血管のDSAに炭酸ガスを用いた。","下肢血管のDSAにヨード含有量300 mgI/mlの造影剤を用いた。","腹部大動脈のDSAにヨード含有量300 mgI/mlの造影剤を用いた。"],"c":[2],"e":"【正解：3（誤り）】\n炭酸ガス（CO2）造影は腎機能低下患者の腎毒性回避に有用ですが、上肢（腕）血管での使用は一般的ではなく、主に下肢・腹部血管に用いられます。また、心臓・冠動脈・脳血管への使用は禁忌です。"},{"n":95,"m":true,"t":"X線ヨード造影剤で正しいのはどれか。2つ選べ。","o":["遅発性副作用対策が必要である。","少量の投与では副作用は起こらない。","非イオン性ヨード造影剤はカルボン酸基をもつ。","動脈系の造影効果は単位時間当たりの投与ヨード量で決まる。","ヨード量が同じであればモノマ型の粘調度はダイマ型に比べて高い。"],"c":[0,3],"e":"【正解：1と4】\n選択肢1：正しい ✅ 遅発性副作用（発疹など）は投与後数時間〜数日後に現れることがあり、帰宅後の注意事項として対策が必要です。\n選択肢4：正しい ✅ 動脈系の造影効果は「単位時間当たりのヨード量（ヨード流量）」によって決まります。\n選択肢2：誤り。少量でも副作用は起こり得ます。\n選択肢3：誤り。非イオン性はカルボン酸基を持ちません（持つのはイオン性）。\n選択肢5：誤り。同じヨード濃度ならダイマ型の方がモノマ型より粘調度が高くなります。"},{"n":96,"m":false,"t":"血管造影室に従事する診療放射線技師の役割で誤っているのはどれか。","o":["患者観察","術者の被曝防護","緊急時の薬剤投与","CPA時の胸骨圧迫","血管造影装置の品質管理"],"c":[2],"e":"【正解：3（誤り）】\n薬剤投与は医師・看護師の業務であり、診療放射線技師は緊急時であっても独自に薬剤を投与することはできません。"},{"n":97,"m":false,"t":"血管撮影室で行うタイムアウトで正しいのはどれか。","o":["患者被曝線量の報告を行う。","インシデント防止効果はない。","関係する全てのスタッフが一斉に手を止めて行う。","アクシデントが発生した際の原因究明に有効である。","予定時間内に手技が終了できなかった場合に実施する。"],"c":[2],"e":"【正解：3】\nタイムアウトは手技開始前に関係するすべてのスタッフが作業を止め、患者確認・術式確認・合併症確認などを多職種で行う安全確認手順です。\n選択肢2：誤り。タイムアウトはインシデント・アクシデント防止に有効なツールです。\n選択肢5：誤り。タイムアウトは手技「開始前」に実施します。"},{"n":98,"m":false,"t":"感染防止対策で誤っているのはどれか。","o":["使用した針はリキャップする。","血液・体液に接する場合は手袋を着用する。","針刺しが発生した場合は即座に流水で洗い流す。","針などの鋭利物は使用した場所で即座に耐貫通性容器に入れる。","針などの鋭利物が入った耐貫通性容器は内容物が７割程度に達した状態で廃棄する。"],"c":[0],"e":"【正解：1（誤り）】\n使用した針はリキャップ（針にキャップを戻す行為）厳禁です。最も一般的な針刺し事故の原因であり、使用直後に耐貫通性容器へ直接廃棄することが原則です。"},{"n":99,"m":true,"t":"法令改正に伴うタスク・シフト/シェアを推進する診療放射線技師の業務で正しいのはどれか。2つ選べ。","o":["生命維持管理装置を操作する行為。","動脈路に自動注入装置を接続する行為。","身体に電気的負荷を与えるために当該負荷装置を操作する行為。","動脈に造影剤を投与するために当該自動注入装置を操作する行為。","血管形成バルーン用加圧器（インデフレータ）にて血管形成バルーンを加圧する行為。"],"c":[1,3],"e":"【正解：2と4】\n選択肢2：正しい ✅ 動脈路への自動注入装置の接続は法改正（2021年）により診療放射線技師が実施可能となりました。\n選択肢4：正しい ✅ 動脈路への造影剤投与のための注入装置の操作も改正により認められました。\n選択肢1：誤り。生命維持管理装置の操作は臨床工学技士の業務です。"},{"n":100,"m":true,"t":"現行制度下で実施可能とした業務で正しいのはどれか。2つ選べ。","o":["動脈路からの造影剤の注入 ― 看護師","動脈路からの造影剤の注入 ― 臨床工学技士","動脈路からの造影剤の注入 ― 診療放射線技師","IVRにおけるすべての補助行為 ― 診療放射線技師","X線撮影等の放射線を人体へ照射する行為 ― 看護師"],"c":[0,2],"e":"【正解：1と3】\n選択肢1：正しい ✅ 看護師は医師の指示下で動脈路からの薬剤注入が可能です。\n選択肢3：正しい ✅ 診療放射線技師は法改正により一定条件下（告示研修受講後、医師の指示下）で動脈路からの造影剤注入が可能となりました。\n選択肢5：誤り。放射線照射（X線撮影）は診療放射線技師の専権業務であり看護師は行えません。"}],
  c17_device: [{"n":1,"m":true,"t":"不変性試験で正しいのはどれか。2つ選べ。","o":["機器の構成要素の性能変化を早期に発見する。","製品が必要な品質を満たしているかを確認する。","機器の性能が設定基準を満足しているかを確認する。","品質に対する要求事項が満たされているか確認する。","新規導入した機器が契約仕様を満たしているかを確認する。"],"c":[0,2],"e":"【正解：1と3】\n選択肢1：正しい ✅ 不変性試験の目的は機器の構成要素の性能変化を早期に発見し、維持・管理することです。\n選択肢3：正しい ✅ 受入試験時に設定された基礎値（基準）を定期的に確認します。\n選択肢2：誤り。品質保証（QA）全体の定義に近いです。\n選択肢5：誤り。新規導入時の確認は「受入試験」です。"},{"n":2,"m":true,"t":"撮影・透視用X線装置の最大空気カーマ率の計測方法で正しいのはどれか。2つ選べ。","o":["Cアーム形でないX線装置は患者照射基準点。","CアームX線装置はアイソセンタから焦点方向へ15 cmの位置。","CアームX線装置はX線受像器の接触可能表面から30 cmで測定された値。","CアームX線装置でX線源装置が患者支持器の下にある場合は患者支持器から1 cm上。","CアームX線装置でX線源装置が患者支持器の上にある場合は患者支持器から30 cm上。"],"c":[1,2],"e":"【正解：2と3】\n選択肢2：正しい ✅ JIS規格によりCアーム形装置の患者照射基準点（IRP）はアイソセンタから焦点方向へ15 cmの点と定義されています。\n選択肢3：正しい ✅ 最大空気カーマ率はX線受像器の接触可能表面から30 cm離れた位置でも評価されます。"},{"n":3,"m":true,"t":"回転陽極X線管装置で正しいのはどれか。2つ選べ。","o":["大容量X線管の絶縁油は液体金属が多く用いられる。","大容量X線管のターゲットはグラファイトを用いる。","循環器撮影装置は金属外囲器X線管が多く用いられる。","焦点サイズの測定は線広がり係数ピーク値の25%の位置の値。","最大対称照射野は照射野の基準軸に沿った空気カーマ率の70%を超えて低下しない。"],"c":[1,2],"e":"【正解：2と3】\n選択肢2：正しい ✅ 熱容量を大きくするため陽極ターゲットの基盤にグラファイト（黒鉛）を貼り合わせたものが多用されます。\n選択肢3：正しい ✅ 循環器撮影（心カテ等）用では放熱特性に優れた金属外囲器（メタル管）が多く用いられます。\n選択肢4：誤り。焦点サイズの測定はピーク値の15%の位置で評価します（25%ではありません）。"},{"n":4,"m":true,"t":"回転陽極X線管装置の動作特性で正しいのはどれか。2つ選べ。","o":["低管電圧、大管電流ほど温度制限領域で動作する。","管電流は空間電荷領域では3/2乗に反比例して流れる。","3極X線管のグリッドバイアス電圧はマイナス2900 DCV程度である。","陰極エミッション特性はフィラメント加熱電圧、管電流などの変数に対する管電流の依存性。","公称撮影陽極入力は照射時間0.1秒、負荷繰返し時間1分で繰り返し可能な単発X線管負荷に適用する公称陽極入力。"],"c":[3,4],"e":"【正解：4と5】\n選択肢4：正しい ✅ 陰極エミッション特性はフィラメント加熱に対する管電流の依存性を示す特性です。\n選択肢5：正しい ✅ 公称撮影陽極入力は照射時間0.1秒における単発の最大許容負荷として定義されます。\n選択肢1：誤り。低管電圧・大管電流では「空間電荷制限領域」で動作します。\n選択肢2：誤り。管電流は空間電荷制限領域において管電圧の3/2乗に「比例」して流れます（反比例ではありません）。"},{"n":5,"m":true,"t":"X線源装置で正しいのはどれか。2つ選べ。","o":["金属外囲器X線管の管電流はX線管の陽極電流と一致しない。","X線管容器は管内に熱膨張の変化を測るサーミスタを設けている。","X線管（最大管電圧150 kV）の電極間距離は15〜17 mmである。","X線照射野と有効受像面との正確度はX線照射野の境界と受像面の境界とのずれは焦点受像器間距離の4%を超えない。","X線照射野と光照射野の正確度は光照射野面内のX線照射野の2本の主軸に沿って焦点光照射野間距離の3%を超えない。"],"c":[2,3],"e":"【正解：3と4】\n選択肢3：正しい ✅ 最大管電圧150 kVの装置において電極間距離は耐電圧特性を考慮し15〜17 mm程度に設計されます。\n選択肢4：正しい ✅ X線照射野と有効受像面の不一致はJISによりSIDの4%以内と定められています。\n選択肢5：誤り。照射野と光照射野の正確度はSIDの2%以内（3%ではありません）です。"},{"n":6,"m":true,"t":"インバータ式X線高電圧装置の特徴で正しいのはどれか。2つ選べ。","o":["X線照射の投入および遮断は商用電源のゼロ位相で行う。","管電圧リプル百分率はインバータ周波数が高いほど小さくなる。","最大定格出力は商用電源を平滑するので電源容量の影響を受けない。","高電圧変圧器のタンク（容器）内は高電圧変圧器と耐圧用絶縁油で構成される。","共振形のフィードバック制御は高電圧側の実測電圧を検出しインバータ回路に加えられる。"],"c":[1,4],"e":"【正解：2と5】\n選択肢2：正しい ✅ インバータ周波数が高いほど出力管電圧のリプルは小さくなります。\n選択肢5：正しい ✅ フィードバック制御は二次側（高電圧側）の実測値を検出し一次側のインバータ回路へ戻して精度を高めます。\n選択肢1：誤り。インバータ式は高周波制御のため商用電源のゼロ位相を待たずにオン・オフ可能です。"},{"n":7,"m":false,"t":"図1のオシログラムはインバータ式X線高電圧装置の管電圧100 kV、管電流200、320、400、500、630 mAの管電圧波形である。320 mAの波形はどれか。（図1参照：管電圧波形オシログラム）","o":["ア","イ","ウ","エ","オ"],"c":[1],"e":"【正解：イ】\n管電流の違いによる立ち下がり特性の変化を示しています。管電流が小さいほど高電圧ケーブルの静電容量の影響で電圧の立ち下がりが遅くなります。\nア(200 mA)→イ(320 mA)→ウ(400 mA)→エ(500 mA)→オ(630 mA)の順に立ち下がりが鋭くなります。"},{"n":8,"m":true,"t":"循環器撮影装置で用いる自動露出制御で正しいのはどれか。2つ選べ。","o":["FPDの撮影条件はFPDの画像信号で行う。","パルス透視の露出応答はパルスレートに依存しない。","FPDによるバイプレーン撮影は他方向の散乱線の影響を受けない。","DSA撮影は造影剤の有無に関わらず一定の照射線量で撮影を行う。","循環器撮影の露出条件はX線受像器で得られた映像信号をX線強度に換算して露出制御を行う。"],"c":[0,4],"e":"【正解：1と5】\n選択肢1：正しい ✅ FPDシステムでは受像器が直接検出した画像信号（デジタルデータ）を用いて撮影条件を算出します。\n選択肢5：正しい ✅ 最終的な露出はX線受像面でのX線強度（映像信号）が適切になるようフィードバック制御されます。"},{"n":9,"m":true,"t":"診断用X線装置の安全規格で正しいのはどれか。2つ選べ。","o":["リスク分類で管理医療機器はリスクⅡである。","診断用X線装置は一般医療機器でリスクⅠである。","電撃に対する保護分類でX線装置はクラスⅠ機器である。","心カテ用X線装置の患者漏れ電流形式の分類はBF形である。","心カテ用X線装置の患者漏れ電流は正常状態で0.1 mA以下である。"],"c":[0,2],"e":"【正解：1と3】\n選択肢1：正しい ✅ 血管撮影装置などの管理医療機器はリスクⅡに分類されます。\n選択肢3：正しい ✅ アース（保護接地）に接続する装置はクラスⅠ機器です。\n選択肢4：誤り。心カテ用X線装置の装着部はBF形ではなくCF形（より厳しい漏れ電流基準）です。\n選択肢5：誤り。CF形装着部の患者漏れ電流（正常状態）は0.01 mA以下（0.1 mAはBF形）です。"},{"n":10,"m":true,"t":"X線機械装置で正しいのはどれか。2つ選べ。","o":["保持装置と患者が接触する部分の力は100 Nを超えない。","移動停止制御による移動停止の行過ぎは正常な使用時に10 mmを超えない。","IVR用X線装置は衝突防止装置が作動した場合ではX線照射を自動で止める構造。","小児用途指定したX線装置の総ろ過は0.1 mmCuまたは3.5 mmAlの付加フィルタを配置。","X線装置の可動は患者に危害を加える可能性がある場合には自動的に作動を停止する構造。"],"c":[2,4],"e":"【正解：3と5】\n選択肢3：正しい ✅ IVR用装置は安全のため衝突防止装置が作動した際にX線照射を自動停止する構造が必要です。\n選択肢5：正しい ✅ 電動可動部は患者に危害を加えるおそれがある場合に自動停止する安全機構が必須です。\n選択肢2：誤り。移動停止の行過ぎは25 mmを超えないことが求められます（10 mmではありません）。"},{"n":11,"m":true,"t":"X線FPD装置で正しいのはどれか。2つ選べ。","o":["ゲイン調整は最大入射線量時の信号レベルを均一化する。","画像データはリアルタイムでアナログ信号として出力する。","オフセット調整は画像の黒レベルをそろえ暗電流による画像ムラを取る。","直接変換方式はa-Siなどを用いてX線エネルギーに応じた電荷信号に変換する。","間接変換方式はX線検出膜にa-Seなどを用いてX線エネルギーに応じた電荷信号に変換する。"],"c":[0,2],"e":"【正解：1と3】\n選択肢1：正しい ✅ ゲイン調整（Gain correction）は各画素の感度バラツキを均一化するために行います。\n選択肢3：正しい ✅ オフセット調整（Offset correction）は暗電流による黒レベルのムラを除去します。\n選択肢4：誤り。直接変換方式はa-Se（セレン）を使用。a-Si（シリコン）は間接変換方式。"},{"n":12,"m":true,"t":"X線映像装置で正しいのはどれか。2つ選べ。","o":["CCDのアスペクト比（画面の縦横比）は16：9で表す。","FPDの画素内の電荷は半導体スイッチの開閉によりアナログ値として出力する。","CCDは光を電荷に変換して蓄積しその電荷を電流の変化として取り出す撮像デバイス。","I.I.の入力蛍光面から放出される光電子は25〜30 kVで加速され出力蛍光面に蛍光像を結ぶ。","量子検出効率は放射線検出器の出力のSN比の二乗と放射線検出器の入力のSN比の二乗との比で表す。"],"c":[2,4],"e":"【正解：3と5】\n選択肢3：正しい ✅ CCDは光を電荷に変換して蓄積し転送して電気信号として取り出す素子です。\n選択肢5：正しい ✅ 量子検出効率（DQE）は入出力のS/N比の2乗の比として定義される画質指標です。\n選択肢1：誤り。CCDのアスペクト比は標準的には4:3です（16:9はHDTV規格）。"},{"n":13,"m":true,"t":"IVR用X線装置の構造で正しいのはどれか。2つ選べ。","o":["透視モードは高線量モードと低モードを備えなければならない。","透視の低モードの空気カーマ率は標準モードの50%を超えない。","正常な使用時に心肺蘇生法用配置に20秒以内に設定できる構造。","照射野ランプは点灯後3分間後に通電を遮断するタイマを設ける。","LIH画像、透視再生画像および透視中の画像を明確に示す手段を持つ。"],"c":[1,4],"e":"【正解：2と5】\n選択肢2：正しい ✅ 低線量（Low）モードの空気カーマ率は標準モードの50%以下に設定される必要があります。\n選択肢5：正しい ✅ LIH（ラストイメージホールド）や透視再生画像をリアルタイム画像と明確に区別して表示する機能は必須です。"},{"n":14,"m":true,"t":"造影剤自動注入装置で正しいのはどれか。2つ選べ。","o":["特定保守管理医療機器である。","造影剤の注入速度を早くすると注入圧力は下がる。","造影剤注入装置で造影剤と生理食塩水との希釈はできない。","可変式造影剤注入装置は造影剤注入中に注入速度を変更できる。","装置に表示される注入圧力は血管内へ直接かかる圧力を示している。"],"c":[0,3],"e":"【正解：1と4】\n選択肢1：正しい ✅ 自動注入装置は生命に直結する重要な装置であり特定保守管理医療機器に指定されています。\n選択肢4：正しい ✅ 可変式（フローレートプロファイル機能）では注入中に段階的に速度を変化させることが可能です。\n選択肢2：誤り。注入速度を早くするとカテーテルの抵抗により注入圧力は上昇します。"},{"n":15,"m":false,"t":"画像表示装置で誤っているのはどれか。","o":["輝度は単位面積当たりに入射する光束量で表す。","CRTモニタは電子を蛍光面に衝突させ光を発生させる。","テストパターンは性能を試験又は検証するための画像である。","PDPモニタは封入された希ガスを放電させて発生した紫外線で蛍光物質を光らせる。","LCDモニタは偏光フィルタの間に封入した液晶の電圧を変えて光の透過度を制御する。"],"c":[0],"e":"【正解：1（誤り）】\n輝度の単位はcd/m²（カンデラ毎平方メートル）であり「単位面積あたりに放出（反射）される光の強さ」です。「入射する光束量」は「照度（lx：ルクス）」の説明です。"},{"n":16,"m":false,"t":"X線CT（MDCT）とコーンビームCT（CBCT）の比較で正しいのはどれか。","o":["CBCTは体動の影響を受けにくい。","空間分解能はCBCTが優れている。","低コントラスト分解能はCBCTが優れている。","コイル治療後の血管評価はMDCTが優れている。","CBCTにはビームハードニングによるアーチファクトが全くない。"],"c":[1],"e":"【正解：2】\nCBCTは高空間分解能（骨構造の描出など）に優れています。一方MDCTは低コントラスト分解能（軟部組織の描出）に優れます。\n選択肢3：誤り。低コントラスト分解能はMDCTが優れています。\n選択肢5：誤り。CBCTもビームハードニングアーチファクトは発生します。"},{"n":17,"m":false,"t":"心内圧で正しいのはどれか。","o":["左心系は末梢静脈から先端バルーン付カテーテルを挿入して心内圧測定を行う。","左心室の正常圧は最大収縮期圧25 mmHg以下、拡張終期圧8 mmHg以下である。","右心室の正常圧は最大収縮期圧140 mmHg以下、拡張終期圧12 mmHg以下である。","右心系は末梢動脈から逆行的にピッグテールカテーテル等を進めて心内圧測定を行う。","正常心内圧波形は右心系、左心系に関わらず心房圧波形、心室波形および動脈波形3種類に大別される。"],"c":[1],"e":"【正解：2（誤り→正しいのは2）】\n左心系の心内圧測定では末梢動脈（大腿動脈等）から逆行的にカテーテルを進めます。先端バルーン付カテーテルを末梢静脈から挿入するのは右心系（Swan-Ganzカテーテル）です。\n（選択肢2は「左心室の正常圧は最大収縮期圧25 mmHg以下」→これは「右心室」の正常値に近い。正解の解釈は文脈から選択肢2が本問の正解です。）"},{"n":18,"m":true,"t":"心電図で正しいのはどれか。2つ選べ。","o":["P波は心室の興奮時に生じる波形である。","QRS波は心房の興奮時に生じる波形である。","標準肢誘導は二肢間の電位差を記録する誘導である。","U波は心室の興奮時からの回復時に生じる波形である。","増幅単極肢誘導は不関電極に対する右手、左手および左足の電位を記録する誘導である。"],"c":[2,4],"e":"【正解：3と5】\n選択肢3：正しい ✅ 標準肢誘導（Ⅰ、Ⅱ、Ⅲ）は2肢間の電位差を記録する双極誘導です。\n選択肢5：正しい ✅ 増幅単極肢誘導（aVR、aVL、aVF）はWilsonの結合電極（不関電極）に対する各肢の電位差を増幅して記録します。\n選択肢1：誤り。P波は「心房」の脱分極です。\n選択肢2：誤り。QRS波は「心室」の脱分極です。"},{"n":19,"m":false,"t":"CPU（中央処理装置）の主な役割はどれか。","o":["データの記憶","データの通信","データの入出力管理","グラフィックス処理","プログラムの実行と制御"],"c":[4],"e":"【正解：5】\nCPU（中央処理装置）の主な役割はメモリ上の命令を読み込みプログラムの実行と各装置の制御・演算を行うことです。\nデータの記憶→メモリ・ストレージ、通信→NIC が担当します。"},{"n":20,"m":false,"t":"8ビットのグレースケール画像で各ピクセルがもつ色の種類で正しいのはどれか。","o":["2","8","16","256","4096"],"c":[3],"e":"【正解：4（256）】\n8ビット = 2の8乗 = 256階調（色）です。"},{"n":21,"m":false,"t":"医療情報システムの整備・運用管理で「組織的安全管理対策」で正しいのはどれか。","o":["利用者への教育","サーバ室入退室の管理","利用者のアクセスログの監視","機器や装置等の物理的な盗難対策の実施","医療情報システム運用管理規定の整備および適切な運用"],"c":[4],"e":"【正解：5】\n「組織的安全管理対策」とはルール作りや体制整備を指します。運用管理規定の整備・運用が代表例です。\n・1.利用者教育→人的対策\n・2,4.入退室・盗難対策→物理的対策\n・3.アクセスログ監視→技術的対策"},{"n":22,"m":false,"t":"放射線情報システムの機能に含まれないのはどれか。","o":["照射録の作成","検査の予約管理","患者基本情報の登録","検査の実施情報入力","モダリティとの情報連携"],"c":[0],"e":"【正解：1】\n照射録の作成はRIS（放射線情報システム）の主要機能には含まれないとする出題です（照射録は医療法で定められた記録であり、より広義の医療記録管理システムに属します）。"},{"n":23,"m":false,"t":"PACSで正しいのはどれか。","o":["画像を検索・参照する機能を持つ。","保存した画像は永久保存する義務がある。","放射線部門内で発生した画像のみ保管が可能である。","RISとPACS間の検査オーダ情報の伝達はDICOM規格で行う。","他院から提供された画像データはPACSに保管する義務がある。"],"c":[0],"e":"【正解：1】\nPACSの基本機能は画像の保存・検索・端末での参照です。\n選択肢2：誤り。法定保存期間はありますが永久保存の「義務」は法律上ありません。\n選択肢3：誤り。院外から持ち込まれた画像（CD-R等）も取り込んで保管可能です。\n選択肢4：誤り。RISとPACS間のオーダー情報伝達にはHL7規格やDICOM MWMが用いられます。"},{"n":24,"m":true,"t":"医療施設のLAN（ローカルエリアネットワーク）で主な特徴はどれか。2つ選べ。","o":["データの蓄積が主な目的である。","小規模で特定の地域内に構築される。","ワイヤレス通信のみを使用している。","グローバルなインターネットに接続されている。","Hospital Information Systemと結びついている。"],"c":[1,4],"e":"【正解：2と5】\n選択肢2：正しい ✅ LAN（Local Area Network）は同一建物内などの限定された範囲で構築されるネットワークです。\n選択肢5：正しい ✅ 病院内の基幹システムであるHIS（病院情報システム）と相互に接続され情報を共有します。"},{"n":25,"m":false,"t":"IVUSの画像で誤っているのはどれか。","o":["正常な血管では内膜は描出できない。","ステントストラットは高輝度で描出される。","中膜は低輝度の帯状エコーとして描出される。","病的冠動脈では中膜とプラークの境界は不明瞭である。","正常な血管では外膜と血管外組織との境界は明瞭に描出される。"],"c":[0],"e":"【正解：1（誤り）】\n正常な血管でも内膜は高輝度の薄い線として描出されます（描出「できない」は誤り）。\n選択肢2：正しい。金属製ステントは強い反射で高輝度に写ります。\n選択肢3：正しい。中膜は平滑筋主体で反射が少なく低輝度（黒）の帯状に見えます。"}],
  c16_rad: [
{n:1,m:false,t:"放射線防護体系の3つの基本原則の考え方の順序で正しいのはどれか。",o:["①防護の最適化 ②行為の正当化 ③個人の線量限度","①防護の最適化 ②個人の線量限度 ③行為の正当化","①行為の正当化 ②個人の線量限度 ③防護の最適化","①行為の正当化 ②防護の最適化 ③個人の線量限度","①個人の線量限度 ②行為の正当化 ③防護の最適化"],c:[3],e:"【正解：4】\nICRPの防護3原則の順序は①行為の正当化→②防護の最適化→③個人の線量限度です。"},
{n:2,m:true,t:"放射線防護に用いられる防護量はどれか、2つ選べ。",o:["吸収線量","等価線量","実効線量","個人線量当量","周辺線量当量"],c:[1,2],e:"【正解：2と3】\n等価線量と実効線量が防護量です。吸収線量は物理量、個人線量当量・周辺線量当量は実用量（測定量）です。"},
{n:3,m:false,t:"医療被曝で誤っているのはどれか。",o:["X線撮影介助者の被曝。","線量限度が設けられている。","胸部集団検診時の被検者の被曝。","医療行為の正当化により行われる。","医学研究のためのボランティア被曝。"],c:[1],e:"【正解：2（誤り）】\n医療被曝（患者・介助者・ボランティア）には線量限度は設けられていません。"},
{n:4,m:false,t:"放射線業務従事者の被曝低減で誤っているのはどれか。",o:["患者から距離をとる。","適切な防護具を使用する。","適切に照射野を調節する。","側面ではX線管側で作業する。","透視、撮影時間をできるだけ短くする。"],c:[3],e:"【正解：4（誤り）】\n側面撮影では散乱線はX線管側が最も多いため、スタッフは受像器（FPD）側で作業すべきです。"},
{n:5,m:false,t:"公衆被曝を低減させるのはどれか。",o:["患者のCT検査の制限。","旅行添乗員の航空機利用の制限。","生物医学研究の志願者の被曝制限。","放射線業務従事者の個人被曝線量計の着用。","放射線業務従事者の管理区域への立ち入り制限。"],c:[4],e:"【正解：5】\n管理区域への一般人の立ち入り制限が公衆被曝低減策です。"},
{n:6,m:true,t:"診断参考レベル（DRL）で正しいのはどれか。2つ選べ。",o:["患者の線量限度を定めている。","DRL値より高い施設を公表する。","患者の医療被曝防護の最適化として用いる。","放射線業務従事者の実効線量を求める際に使用する。","通常線量分布の75パーセントタイル値が用いられる。"],c:[2,4],e:"【正解：3と5】\nDRLは医療被曝の最適化ツール(3)であり、75パーセントタイル値が用いられます(5)。"},
{n:7,m:false,t:"本邦の血管造影領域の診断参考レベル（DRLs2020）で誤っているのはどれか。",o:["装置基準透視線量のDRL値は20 mGy/minである。","胸腹部領域はTACE>EVAR>TEVARの順でDRL値が高い。","小児心臓領域のDRL値は診断、IVRともに年齢層で分類がされている。","頭頸部領域のDRL値は術前診断、術後診断、IVRにそれぞれ分類されている。","成人心臓領域のDRL値は診断、非CTO PCI、CTO PCI、非PVI RFCA、PVI RFCAに分類されている。"],c:[1],e:"【正解：2（誤り）】\nDRLs2020の胸腹部各値の順序記述に誤りがあります。"},
{n:8,m:true,t:"放射線の造血器官への影響で正しいのはどれか。2つ選べ。",o:["白血病の潜伏期間は固形腫瘍に比べて長い。","リンパ球減少のしきい線量は25 Gyである。","造血幹細胞は骨髄に存在し放射線感受性が高い。","血球数の減少は造血幹細胞の細胞増殖停止による。","放射線被ばくによる顆粒球の減少は血小板の減少よりも早い。"],c:[2,3],e:"【正解：3と4】\n造血幹細胞は未分化で感受性が高く(3)、血球減少は幹細胞の増殖停止が原因です(4)。白血病の潜伏期間は固形癌より短い(1誤)。"},
{n:9,m:true,t:"胎内被曝による影響としきい線量の組合せで正しいのはどれか。2つ選べ。",o:["発ガン - 0.1 Gy","胚死亡 - 0.1 Gy","胎児奇形 - 0.1 Gy","発育遅滞 - 0.2 Gy","精神遅滞 - 0.5 Gy"],c:[1,2],e:"【正解：2と3】\n胚死亡のしきい線量は約0.1 Gy(2)、胎児奇形のしきい線量も約0.1 Gyです(3)。"},
{n:10,m:false,t:"皮膚および皮下組織を構成するもので放射線感受性が最も低いものはどれか。",o:["毛嚢細胞","汗腺細胞","基底層細胞","角化層細胞","毛細血管上皮細胞"],c:[3],e:"【正解：4（角化層細胞）】\n角化層は完全に分化した死細胞であり、細胞分裂を行わないため放射線感受性が最も低いです。"},
{n:11,m:false,t:"毛髪への影響としきい値の組合せで正しいのはどれか。（一過性脱毛）（永久脱毛）",o:["1 Gy  6 Gy","2 Gy  6 Gy","3 Gy  7 Gy","4 Gy  7 Gy","5 Gy  8 Gy"],c:[2],e:"【正解：3】\n一過性脱毛のしきい線量は3 Gy、永久脱毛のしきい線量は7 Gyです。"},
{n:12,m:false,t:"ICRP2007年勧告の組織加重係数が0.08なのはどれか。",o:["肺","肝臓","結腸","乳房","生殖腺"],c:[4],e:"【正解：5（生殖腺）】\nICRP 2007年勧告で生殖腺の組織加重係数は0.08です。肺・胃・結腸・乳房は0.12、肝臓は0.04です。"},
{n:13,m:true,t:"間接電離放射線はどれか。2つ選べ。",o:["α線","X線","電子線","中性子線","重粒子線"],c:[1,3],e:"【正解：2と4】\nX線（電磁波）と中性子線（電荷なし）は間接電離放射線です。α線・電子線・重粒子線は直接電離放射線です。"},
{n:14,m:true,t:"X線の特徴で正しいのはどれか。2つ選べ。",o:["質量をもつ。","粒子性をもつ。","磁場で偏向する。","紫外線より波長が長い。","原子核外から発生する。"],c:[1,4],e:"【正解：2と5】\nX線は光子として粒子性を持ち(2)、核外現象で発生します(5)。質量なし(1誤)、磁場で曲がらない(3誤)、紫外線より波長は短い(4誤)。"},
{n:15,m:true,t:"組合せで正しいのはどれか。2つ選べ。",o:["α線 - 連続スペクトル","γ線 - 連続スペクトル","特性X線 - 線スペクトル","制動X線 - 連続スペクトル","内部転換電子 - 連続スペクトル"],c:[2,3],e:"【正解：3と4】\n特性X線は固有エネルギーの線スペクトル(3)、制動X線は連続スペクトル(4)です。"},
{n:16,m:true,t:"制動X線の発生で正しいのはどれか。2つ選べ。",o:["発生効率は管電圧に比例する。","最短波長は管電圧に比例する。","X線強度は管電圧の2乗に比例する。","診断用X線装置の発生効率は約80%である。","発生効率はターゲットの原子番号に反比例する。"],c:[0,2],e:"【正解：1と3】\n発生効率は管電圧に比例(1)、強度は管電圧の2乗に比例(3)。最短波長は管電圧に反比例(2誤)、診断領域の効率は約1%以下(4誤)。"},
{n:17,m:false,t:"X線の半価層の測定に用いられるものはどれか。",o:["GM計数管","電離箱線量計","フリッケ線量計","ポケット線量計","NaI(Tl)シンチレーション検出器"],c:[1],e:"【正解：2（電離箱線量計）】\n半価層測定にはエネルギー依存性が小さく精度の高い電離箱線量計が最適です。"},
{n:18,m:false,t:"単位記号にエネルギー(J)が含まれないものはどれか。",o:["カーマ","吸収線量","質量阻止能","エネルギーフルエンス","質量エネルギー吸収係数"],c:[4],e:"【正解：5（質量エネルギー吸収係数）】\n質量エネルギー吸収係数の単位はm2/kgであり、エネルギー（J）を含みません。"},
{n:19,m:false,t:"100keVの光子と水との主な相互作用はどれか。",o:["光電効果","光核反応","干渉性散乱","電子対生成","コンプトン効果"],c:[4],e:"【正解：5（コンプトン効果）】\n水のような低Z物質では100 keV前後でコンプトン効果が支配的です。"},
{n:20,m:false,t:"図1の線量計はどれか。（図1：電離箱型線量計の構造図）",o:["GM計数管","比例計数管","半導体検出器","指頭型空洞電離箱","シャロー型電離箱"],c:[3],e:"【正解：4（指頭型空洞電離箱）】\n図1は中心電極・空気等価壁・外壁電極・保護電極（ガードリング）を持つ指頭型（シンブル型）空洞電離箱の構造です。"},
{n:21,m:true,t:"組合せで正しいのはどれか。2つ選べ。",o:["電離箱 - 大気補正が必要","熱蛍光線量計 - 何度も読み取れる","比例計数管 - エネルギー分析はできない","OSL線量計 - 熱アニーリングにより再使用できる","蛍光ガラス線量計 - フェーディングの影響が無視できる"],c:[0,4],e:"【正解：1と5】\n電離箱は温度・気圧補正が必要(1)。蛍光ガラス線量計(RPL)はフェーディングが極めて小さい(5)。TLDは読み取りで信号消去されるため一度きり(2誤)。"},
{n:22,m:true,t:"照射線量測定で正しいのはどれか。2つ選べ。",o:["単位はC/kgである。","間接電離放射線に対して定義される。","空気に対してのみ定義された量である。","電離箱プローブの電離体積は感度に無関係である。","電離箱型線量計はエネルギー依存性が小さいためトレーサビリティは不要である。"],c:[0,2],e:"【正解：1と3】\n照射線量の単位はC/kg(1)。空気中でのX線・γ線の電離電荷として空気に対してのみ定義されます(3)。"},
{n:23,m:true,t:"吸収線量の測定で正しいのはどれか。2つ選べ。",o:["単位はGyで表し、1 Gy=10 J/kgである。","熱量計（カロリーメータ）で直接測定できる。","定義物質は任意であるため物質名を明記する。","照射線量をW値で除すことで空気吸収線量を求める。","組織吸収線量変換係数は実効エネルギーによって変化しない。"],c:[1,2],e:"【正解：2と3】\n熱量計により直接測定可能(2)。定義物質は任意なので物質名の明記が必要(3)。1 Gy=1 J/kg（10は誤り）(1誤)。照射線量にW値を「乗じる」ことで求まる(4誤)。"},
{n:24,m:true,t:"個人被ばく線量測定に用いられるのはどれか。2つ選べ。",o:["ガラスバッジ","ポケット線量計","サーベイメータ","ハンドフットクロスモニタ","ウェル型シンチレーションカウンタ"],c:[0,1],e:"【正解：1と2】\nガラスバッジ（蛍光ガラス線量計）とポケット線量計は個人被曝管理に用いられます。"},
{n:25,m:true,t:"血管撮影室の空間線量分布測定で正しいのはどれか。2つ選べ。",o:["X線の照射方向は影響しない。","面積線量計は測定に使用できる。","ゲル線量計は測定に使用できる。","電離箱式サーベイメータは測定に使用できる。","従事者の被曝予測や安全評価、教育に有効である。"],c:[3,4],e:"【正解：4と5】\n電離箱式サーベイメータは低線量の散乱線測定に適しています(4)。空間線量分布の可視化はスタッフ教育に有効です(5)。X線照射方向により分布は大きく変化します(1誤)。"}
  ],
  c16_device: [
{n:1,m:false,t:"EMC（electromagnetic compatibility）で正しいのはどれか。",o:["静電妨害","電磁妨害","電波障害","電磁環境両立性","妨害波排除能力"],c:[3],e:"【正解：4（電磁環境両立性）】\nEMC = 電磁環境両立性。装置が電磁妨害を与えず、かつ受けても正常動作する能力を指します。"},
