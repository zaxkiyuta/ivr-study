<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IVR認定技師試験 学習アプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f4f6f9;color:#1a1d2e;font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;min-height:100vh;}

/* NAV */
nav{background:#ffffff;border-bottom:1px solid #dde1e7;padding:10px 16px;position:sticky;top:0;z-index:100;display:flex;gap:6px;flex-wrap:wrap;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.nav-title{font-size:13px;font-weight:700;color:#1558b0;margin-right:8px;}
.nav-btn{background:none;border:1px solid transparent;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;color:#57606a;}
.nav-btn:hover{background:#f0f2f5;}
.nav-btn.on{background:#e8f0fe;border-color:#c5d5f7;color:#1558b0;font-weight:600;}
.nav-right{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.nbadge{font-size:11px;padding:2px 9px;border-radius:20px;background:#f0f2f5;border:1px solid #dde1e7;color:#57606a;white-space:nowrap;}
.nbadge b{color:#1a7f37;}
.nbadge.red b{color:#d1242f;}

/* SCREENS */
.scr{display:none;max-width:720px;margin:0 auto;padding:18px 14px;}
.scr.on{display:block;}

/* HOME */
.home-hero{margin-bottom:18px;}
.home-hero h2{font-size:20px;font-weight:600;margin-bottom:4px;color:#1a1d2e;}
.home-hero p{font-size:13px;color:#57606a;}
.today-card{background:#fff;border:1px solid #dde1e7;border-radius:12px;padding:14px 16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.today-title{font-size:12px;color:#57606a;margin-bottom:8px;font-weight:600;letter-spacing:.05em;}
.today-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f0f2f5;}
.today-row:last-child{border-bottom:none;}
.today-empty{font-size:13px;color:#8b949e;text-align:center;padding:8px 0;}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}
.stat-c{background:#fff;border:1px solid #dde1e7;border-radius:10px;padding:12px 12px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.stat-l{font-size:11px;color:#57606a;margin-bottom:4px;}
.stat-v{font-size:22px;font-weight:600;}
.stat-v.g{color:#1a7f37;}.stat-v.r{color:#d1242f;}.stat-v.b{color:#1558b0;}
.sec-title{font-size:13px;font-weight:600;color:#57606a;margin-bottom:8px;margin-top:16px;letter-spacing:.05em;text-transform:uppercase;}
.exam-card{background:#fff;border:1px solid #dde1e7;border-radius:12px;padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.exam-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.exam-name{font-size:15px;font-weight:600;flex:1;color:#1a1d2e;}
.ebadge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500;}
.ebadge.ok{background:#dcfce7;color:#1a7f37;border:1px solid #bbf7d0;}
.ebadge.warn{background:#fff8e1;color:#b35900;border:1px solid #fde68a;}
.cat-pills{display:flex;gap:6px;flex-wrap:wrap;}
.cpill{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid #dde1e7;cursor:pointer;background:#f4f6f9;color:#1a1d2e;transition:all .15s;font-weight:500;}
.cpill:hover{border-color:#1558b0;background:#e8f0fe;color:#1558b0;}
.cpill.ready{border-color:#1a7f37;color:#1a7f37;background:#f0fdf4;}
.cpill.soon{opacity:.4;cursor:default;}
.cpill .cnt{font-size:10px;color:#57606a;margin-left:3px;}
.weak-btn{width:100%;background:#f4f6f9;border:1px solid #dde1e7;color:#1a1d2e;border-radius:10px;padding:12px;font-size:13px;cursor:pointer;margin-top:4px;font-weight:500;}
.weak-btn:hover{border-color:#1558b0;background:#e8f0fe;color:#1558b0;}
.weak-btn:disabled{opacity:.4;cursor:default;}

/* QUIZ */
.quiz-hd{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.back-btn{background:#fff;border:1px solid #dde1e7;color:#57606a;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:500;}
.back-btn:hover{border-color:#1558b0;color:#1558b0;}
.qinfo{font-size:12px;color:#57606a;font-weight:500;}
.qpbar-wrap{flex:1;min-width:60px;}
.qpbar{height:5px;background:#e0e4ea;border-radius:3px;overflow:hidden;}
.qpfill{height:100%;background:#1558b0;border-radius:3px;transition:width .3s;}

.qcard{background:#fff;border:1px solid #dde1e7;border-radius:14px;padding:20px;box-shadow:0 2px 6px rgba(0,0,0,.07);}
.qmeta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
.qnum{font-size:11px;padding:3px 10px;border-radius:20px;background:#e8f0fe;color:#1558b0;font-weight:600;border:1px solid #c5d5f7;}
.qtag{font-size:11px;color:#57606a;background:#f4f6f9;padding:3px 10px;border-radius:20px;border:1px solid #dde1e7;}
.qmtag{font-size:11px;padding:3px 10px;border-radius:20px;background:#fff8e1;color:#b35900;font-weight:600;border:1px solid #fde68a;}
.qtext{font-size:15px;line-height:1.8;color:#1a1d2e;font-weight:500;}
.opts{display:flex;flex-direction:column;gap:9px;margin-top:16px;}
.opt{display:flex;align-items:flex-start;gap:11px;background:#f4f6f9;border:1px solid #dde1e7;border-radius:10px;padding:13px 14px;cursor:pointer;width:100%;text-align:left;color:#1a1d2e;font-size:14px;line-height:1.6;transition:all .12s;}
.opt:hover{border-color:#1558b0;background:#e8f0fe;}
.opt.dis{cursor:default;pointer-events:none;}
.mk{flex-shrink:0;width:24px;height:24px;border-radius:50%;border:2px solid #c8d0da;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#57606a;background:#fff;}
.opts.multi .mk{border-radius:5px;}
.opt.sel{border-color:#1558b0;background:#e8f0fe;}
.opt.sel .mk{background:#1558b0;border-color:#1558b0;color:#fff;}
.opt.ok{border-color:#1a7f37;background:#f0fdf4;}
.opt.ok .mk{background:#1a7f37;border-color:#1a7f37;color:#fff;}
.opt.ng{border-color:#d1242f;background:#fff0f0;}
.opt.ng .mk{background:#d1242f;border-color:#d1242f;color:#fff;}
.opt.miss{border-color:#b35900;background:#fffbf0;}
.opt.miss .mk{border-color:#b35900;color:#b35900;}
.sbtn{width:100%;margin-top:11px;padding:13px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid #dde1e7;background:#f4f6f9;color:#57606a;}
.sbtn.ready{background:#1558b0;border-color:#1558b0;color:#fff;}
.sbtn.ready:hover{background:#1246a0;}
.sbtn:disabled{opacity:.4;cursor:default;}
.rbox{margin-top:13px;padding:14px 16px;border-radius:10px;display:none;}
.rbox.ok{background:#f0fdf4;border:1px solid #bbf7d0;}
.rbox.ng{background:#fff0f0;border:1px solid #fecaca;}
.rlabel{font-size:17px;font-weight:700;margin-bottom:3px;}
.rlabel.ok{color:#1a7f37;}.rlabel.ng{color:#d1242f;}
.rans{font-size:13px;color:#b35900;font-weight:500;}
.explbox{margin-top:11px;padding:14px;background:#f8f9fb;border:1px solid #dde1e7;border-radius:10px;font-size:13px;line-height:1.85;color:#2d3748;white-space:pre-wrap;}
.expl-ttl{font-size:11px;color:#57606a;letter-spacing:.08em;font-weight:700;margin-bottom:6px;text-transform:uppercase;}
.nextbtn{width:100%;margin-top:11px;padding:14px;border-radius:10px;border:none;background:#1558b0;color:#fff;font-size:15px;font-weight:600;cursor:pointer;}
.nextbtn:hover{background:#1246a0;}

/* ANALYSIS */
.an-card{background:#fff;border:1px solid #dde1e7;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.an-title{font-size:12px;color:#57606a;margin-bottom:8px;font-weight:600;}
.an-body{font-size:13px;line-height:1.7;color:#2d3748;}
.wi{background:#f4f6f9;border:1px solid #dde1e7;border-radius:8px;padding:9px 13px;margin-bottom:6px;font-size:12px;}
.wi-m{color:#57606a;margin-bottom:2px;font-size:11px;}
.hi{background:#f4f6f9;border-radius:8px;padding:9px 13px;margin-bottom:6px;font-size:12px;}
.hi-d{color:#57606a;margin-bottom:2px;font-size:11px;}
.empty-msg{font-size:13px;color:#8b949e;padding:8px 0;}
.subj-card{background:#fff;border:1px solid #dde1e7;border-radius:10px;padding:11px 14px;margin-bottom:7px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.subj-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.subj-name{font-size:13px;font-weight:600;color:#1a1d2e;}
.subj-cnt{font-size:12px;color:#d1242f;font-weight:600;background:#fff0f0;padding:2px 8px;border-radius:20px;border:1px solid #fecaca;}
.subj-btn{font-size:12px;padding:5px 12px;border-radius:8px;border:1px solid #1558b0;background:#e8f0fe;color:#1558b0;cursor:pointer;font-weight:500;}
.subj-btn:hover{background:#1558b0;color:#fff;}
.hi-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#57606a;}
.hi-rate{font-weight:600;color:#1a7f37;}
.hi-rate.low{color:#d1242f;}
.today-row span.cat-tag{font-size:10px;background:#e8f0fe;color:#1558b0;border-radius:20px;padding:1px 7px;margin-left:5px;border:1px solid #c5d5f7;}

/* CALENDAR */
.cal-card{background:#fff;border:1px solid #dde1e7;border-radius:12px;padding:14px 16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.cal-title{font-size:12px;color:#57606a;margin-bottom:10px;font-weight:600;letter-spacing:.05em;}
.cal-table{width:100%;border-collapse:collapse;font-size:11px;}
.cal-table th{background:#f4f6f9;color:#57606a;padding:5px 3px;text-align:center;border:1px solid #e0e4ea;font-weight:600;}
.cal-table td{padding:5px 3px;text-align:center;border:1px solid #e0e4ea;white-space:nowrap;}
.cal-table td.cal-date{color:#57606a;font-weight:500;background:#fafbfc;font-size:10px;}
.cal-cell{display:inline-block;width:18px;height:18px;border-radius:50%;line-height:18px;font-size:10px;font-weight:600;}
.cal-cell.done{background:#1a7f37;color:#fff;}
.cal-cell.part{background:#fde68a;color:#b35900;}
.cal-cell.none{color:#dde1e7;}
.cal-legend{display:flex;gap:10px;margin-top:8px;font-size:11px;color:#57606a;align-items:center;}
.cal-legend span{display:inline-flex;align-items:center;gap:3px;}

/* GENRE PILLS */
.genre-pill{font-size:11px !important;padding:4px 10px !important;border-color:#b35900 !important;color:#b35900 !important;background:#fffbf0 !important;}
.genre-pill:hover{background:#b35900 !important;color:#fff !important;}
</style>
</head>
<body>

<nav>
  <span class="nav-title">IVR 認定試験</span>
  <button class="nav-btn on" id="nb-home" onclick="goTab('home')">ホーム</button>
  <button class="nav-btn" id="nb-quiz" style="display:none" onclick="goTab('quiz')">問題中</button>
  <button class="nav-btn" id="nb-an" onclick="goTab('an')">学習分析</button>
  <div class="nav-right">
    <span class="nbadge">正解 <b id="hC">0</b></span>
    <span class="nbadge red">苦手 <b id="hW">0</b>問</span>
    <span class="nbadge">累計 <b id="hT">0</b>問</span>
  </div>
</nav>

<!-- HOME -->
<div class="scr on" id="scrHome">
  <div class="home-hero"><h2>IVR認定技師試験 学習アプリ</h2><p>年度・科目を選んで練習できます。学習履歴と苦手問題を自動で記録します。</p></div>
  <div class="today-card">
    <div class="today-title">今日の学習</div>
    <div id="todayInner"><div class="today-empty">まだ学習していません</div></div>
  </div>
  <div class="stat-row">
    <div class="stat-c"><div class="stat-l">累計回答</div><div class="stat-v b" id="sTotal">0</div></div>
    <div class="stat-c"><div class="stat-l">正解率</div><div class="stat-v g" id="sRate">-</div></div>
    <div class="stat-c"><div class="stat-l">苦手問題</div><div class="stat-v r" id="sWeak">0</div></div>
    <div class="stat-c"><div class="stat-l">学習日数</div><div class="stat-v" id="sDays">0</div></div>
  </div>
  <div class="cal-card">
    <div class="cal-title">📅 学習カレンダー（直近14日）</div>
    <div id="calTable"></div>
    <div class="cal-legend">
      <span><span class="cal-cell done">✓</span> 正解率60%以上</span>
      <span><span class="cal-cell part">△</span> 60%未満</span>
      <span><span class="cal-cell none">－</span> 未学習</span>
    </div>
  </div>
  <div class="sec-title">年度・科目を選んで練習</div>
  <div id="examList"></div>
  <div class="sec-title">苦手問題（教科別）</div>
  <div id="weakBySubject"></div>
  <button class="weak-btn" id="weakBtn" onclick="startWeak()" disabled>苦手問題まとめて復習する（0問）</button>
</div>

<!-- QUIZ -->
<div class="scr" id="scrQuiz">
  <div class="quiz-hd">
    <button class="back-btn" onclick="exitQuiz()">← 戻る</button>
    <span class="qinfo" id="qInfo">1/25</span>
    <div class="qpbar-wrap"><div class="qpbar"><div class="qpfill" id="qPF" style="width:0%"></div></div></div>
    <span class="qinfo" id="qScore">正解 0</span>
  </div>
  <div class="qcard">
    <div class="qmeta">
      <span class="qnum" id="qNum">問題1</span>
      <span class="qtag" id="qTag"></span>
      <span class="qmtag" id="qMtag" style="display:none">2つ選べ</span>
    </div>
    <p class="qtext" id="qText"></p>
    <div class="opts" id="qOpts"></div>
    <button class="sbtn" id="qSub" onclick="doSubmit()" style="display:none" disabled>回答する</button>
    <div class="rbox" id="qRbox"><div class="rlabel" id="qRL"></div><div class="rans" id="qRA"></div></div>
    <div class="explbox" id="qExpl"><div class="expl-ttl">解説</div><span id="qExplTxt"></span></div>
    <button class="nextbtn" id="qNext" onclick="doNext()">次の問題へ</button>
  </div>
</div>

<!-- ANALYSIS -->
<div class="scr" id="scrAn">
  <div class="sec-title" style="margin-top:0">AI苦手傾向分析</div>
  <div class="an-card"><div class="an-title">AIによる分析</div><div class="an-body" id="anText">問題を解くと苦手傾向が表示されます</div></div>
  <div class="sec-title">苦手問題（教科別）</div>
  <div id="weakListBySubject"></div>
  <div class="sec-title">学習履歴（全記録）</div>
  <div id="histList"></div>
</div>

<script>
// ================================================================
// DATABASE
// 問題追加方法: QUESTIONS オブジェクトに新キーで配列を追加し、
// EXAMS の cats の data キーに合わせるだけ
// ================================================================
var CLINICAL_GENRES = [
  { name:"心臓領域", range:[1,25] },
  { name:"脳神経領域", range:[26,50] },
  { name:"腹部・末梢血管", range:[51,75] },
  { name:"大動脈・造影剤・安全", range:[76,100] }
];

var EXAMS = [
  { year:"第18回(2025)", cats:[
    { name:"臨床概論", total:100, available:100, key:"c18_clinical" },
    { name:"　├ 心臓領域", total:25, available:25, key:"c18_clinical", genre:[1,25] },
    { name:"　├ 脳神経領域", total:25, available:25, key:"c18_clinical", genre:[26,50] },
    { name:"　├ 腹部・末梢血管", total:25, available:25, key:"c18_clinical", genre:[51,75] },
    { name:"　└ 大動脈・造影剤・安全", total:25, available:25, key:"c18_clinical", genre:[76,100] },
    { name:"医用機器", total:25, available:25, key:"c18_device" },
    { name:"放射線防護", total:25, available:25, key:"c18_rad" }
  ]}
  ,{ year:"第17回(2024)", cats:[
    { name:"臨床概論", total:100, available:100, key:"c17_clinical" },
    { name:"　├ 心臓領域", total:25, available:25, key:"c17_clinical", genre:[1,25] },
    { name:"　├ 脳神経領域", total:25, available:25, key:"c17_clinical", genre:[26,50] },
    { name:"　├ 腹部・末梢血管", total:25, available:25, key:"c17_clinical", genre:[51,75] },
    { name:"　└ 大動脈・造影剤・安全", total:25, available:25, key:"c17_clinical", genre:[76,100] },
    { name:"医用機器", total:25, available:25, key:"c17_device" },
    { name:"放射線防護", total:25, available:25, key:"c17_rad" }
  ]}
  ,{ year:"第16回(2023)", cats:[
    { name:"臨床概論", total:100, available:100, key:"c16_clinical" },
    { name:"　├ 心臓領域", total:25, available:25, key:"c16_clinical", genre:[1,25] },
    { name:"　├ 脳神経領域", total:25, available:25, key:"c16_clinical", genre:[26,50] },
    { name:"　├ 腹部・末梢血管", total:25, available:25, key:"c16_clinical", genre:[51,75] },
    { name:"　└ 大動脈・造影剤・安全", total:25, available:25, key:"c16_clinical", genre:[76,100] },
    { name:"医用機器", total:25, available:25, key:"c16_device" },
    { name:"放射線防護", total:25, available:25, key:"c16_rad" }
  ]}
  ,{ year:"第15回(2022)", cats:[
    { name:"臨床概論", total:100, available:100, key:"c15_clinical" },
    { name:"　├ 心臓領域", total:25, available:25, key:"c15_clinical", genre:[1,25] },
    { name:"　├ 脳神経領域", total:25, available:25, key:"c15_clinical", genre:[26,50] },
    { name:"　├ 腹部・末梢血管", total:25, available:25, key:"c15_clinical", genre:[51,75] },
    { name:"　└ 大動脈・造影剤・安全", total:25, available:25, key:"c15_clinical", genre:[76,100] },
    { name:"医用機器", total:25, available:25, key:"c15_device" },
    { name:"放射線防護", total:25, available:25, key:"c15_rad" }
  ]}
];

var QUESTIONS = {
  c15_clinical: [{"n":1,"m":true,"t":"刺激伝導系で正しいのはどれか。2つ選べ。","o":["洞結節は分界稜の中心にある心内膜下の結節である。","房室結節は自発的に刺激を生じるが洞結節よりは遅脈である。","房室結節は長さが約5~7mm程度で冠静脈口の近くの心房中隔にある。","ヒス束は心房内では心房中隔心筋内にあり左線維三角を通って心室中隔に入る。","乳頭筋は心室筋から分岐するプルキンエ線維で刺激されるため心室の壁より後に収縮する。"],"c":[1,2],"e":"【正解：2と3】\n選択肢2：正しい ✅ 房室結節の出すリズム（40〜60回/分）は主周期である洞結節（60〜100回/分）よりも遅いのが特徴です。\n選択肢3：正しい ✅ 房室結節は右房の下方、冠静脈口に近い「Kochの三角」と呼ばれる心房中隔の領域に位置しています。\n選択肢1：誤り。洞結節は心臓の最も外側にある「心外膜下」に存在します。\n選択肢4：誤り。ヒス束は「右線維三角」を貫いて心室中隔へと向かいます。\n選択肢5：誤り。乳頭筋は心室壁が本格的に収縮する直前あるいは同時に収縮を開始し、腱索を緊張させて弁の逆流を防ぎます。"},{"n":2,"m":true,"t":"心筋梗塞の心電図所見で正しいのはどれか。2つ選べ。","o":["発症直後にT波増高を認める。","発症後6~12時間以内にST上昇を認める。","急性心筋梗塞ではST上昇の鏡像となるST低下を示す。","発症12~24時間で異常Q波が出現し数日後にはT波が陰性化し始める。","Ⅱ、Ⅲ、aVF誘導にST上昇及び異常Q波を認めるときは前壁中隔梗塞である。"],"c":[2,3],"e":"【正解：3と4】\n選択肢3：正しい ✅ 梗塞部位（ST上昇誘導）の反対側の誘導では鏡に映したようにSTが下がる「鏡面像（ミラーイメージ）」が認められます。\n選択肢4：正しい ✅ 心筋壊死を反映する異常Q波は発症後12時間以降に顕著になり、その後T波が深く逆転する冠性T波（陰性T波）が現れます。\n選択肢1：発症直後には超急性期T波（テント状T波）が現れますが、本問では選択肢3・4がより明確な正解です。\n選択肢2：誤り。ST上昇は発症直後の数分〜数時間以内に出現し、6〜12時間経ってからでは遅すぎます。\n選択肢5：誤り。Ⅱ・Ⅲ・aVF誘導の変化は「下壁梗塞」を示します。前壁中隔梗塞はV1〜V4誘導に変化が現れます。"},{"n":3,"m":true,"t":"心拍出量測定で正しいのはどれか。2つ選べ。","o":["熱希釈法では心内シャントがあると不正確となる。","心拍出量をBMIで除すことにより心係数を算出できる。","間接Fick法では酸素消費量を呼気ガス分析装置で測定する。","Fick法では大動脈血ならびに混合静脈血の酸素飽和度が必要である。","熱希釈法ではスワン・ガンツカテーテル先端を右心房に配置して測定する。"],"c":[0,3],"e":"【正解：1と4】\n選択肢1：正しい ✅ 心室中隔欠損などのシャント（短絡）があると血液が漏れ出したり混ざったりするため、熱希釈法では正確な拍出量が計算できなくなります。\n選択肢4：正しい ✅ 動脈血（大動脈等）と混合静脈血（肺動脈）の酸素含量の差を利用するため、それぞれの酸素飽和度の測定が必須です。\n選択肢2：誤り。心係数（CI）は心拍出量を「体表面積（BSA）」で割った値です。\n選択肢3：間接Fick法で呼気ガス分析装置により酸素消費量を測定するのも正しい記述ですが、本問では選択肢1・4がより直接的な正解です。\n選択肢5：誤り。熱希釈法のカテーテル先端は「肺動脈」に留置し、冷水の注入は右心房の近位ポートから行います。"},{"n":4,"m":false,"t":"左心室造影評価で正しいのはどれか。","o":["左室壁肥厚を評価する。","大動脈弁逆流の重症度を評価する。","area-length法により左室容積を算出し駆出率を評価する。","撮影角度RAO30°で心室中隔、側壁及び後壁の壁運動を評価する。","撮影角度LAO60°で前壁、心尖部及び下壁領域の壁運動を評価する。"],"c":[2],"e":"【正解：3】\n造影された左室のシルエットの面積（area）と長軸長（length）から容積を求め、駆出率（EF）を計算する標準的な手法（area-length法）です。\n選択肢1：誤り。LVGは左室の内腔（形）を造影する検査であり、壁肥厚の評価には超音波・CT・MRIが適しています。\n選択肢2：誤り。大動脈弁逆流の評価には大動脈造影を用います。LVGは僧帽弁逆流（MR）の評価に用いられます。\n選択肢4・5：本来RAO30°では前壁・心尖部・下壁、LAO60°では中隔・側壁の壁運動を評価しますが、選択肢4・5は角度と評価部位の組合せが入れ替わっており、いずれも文面通りでは誤りです。"},{"n":5,"m":true,"t":"図1の冠動脈造影の所見で正しいのはどれか。2つ選べ。","o":["Spider viewである。","僧帽弁が機械弁に置換されている。","左冠動脈主幹部に高度狭窄を認める。","大動脈弁がTAVI弁に置換されている。","両心室ペースメーカが植え込まれている。"],"c":[1,3],"e":"【正解：2と4】\n選択肢2：正しい ✅ 画像中央付近に、はっきりとした円形の不透過な人工弁（機械弁）のリングが認められます。\n選択肢4：正しい ✅ 大動脈の根元に網目状のステント構造を持つ人工弁が留置されており、TAVIが行われている所見です。\n選択肢1：誤り。図は脊椎が左側にあり心臓全体が右側に広がるRAO系の角度であり、Spider view（LAO Caudal）ではありません。\n選択肢3：誤り。左冠動脈主幹部の起始部は造影されており、明らかな高度狭窄は見られません。\n選択肢5：誤り。ペースメーカ本体やリード線などは認められません。"},{"n":6,"m":true,"t":"心臓の構造・生理機能で正しいのはどれか。2つ選べ。","o":["後室間溝は左回旋枝が走行する。","冠状溝は心房と心室の境界である。","冠動脈には250ml/分の血液が流れる。","心臓の収縮期に血液が冠動脈に流れ込む。","前室間溝は左心室と右心房を前方で分ける。"],"c":[1,2],"e":"【正解：2と3】\n選択肢2：正しい ✅ 冠状溝（房室溝）は外表面から見て心房と心室を分ける境界の溝です。\n選択肢3：正しい ✅ 成人の安静時、全心拍出量の約5％にあたる250ml/分程度の血液が冠動脈に供給されます。\n選択肢1：誤り。後室間溝を走行するのは通常、右冠動脈の枝である後下行枝です。\n選択肢4：誤り。冠動脈への血流は心筋が弛緩する拡張期に最も多く流れます。\n選択肢5：誤り。前室間溝は前方で左心室と右心室を分ける溝です。"},{"n":7,"m":true,"t":"心疾患で正しい組合せはどれか。2つ選べ。","o":["肥大型心筋症 ― 心筋の菲薄化","拡張型心筋症 ― 左室収縮障害","完全大血管転位 ― 非チアノーゼ","心房中隔欠損症 ― 幼少期の無自覚症状","たこつぼ型心筋症 ― 右室流出路狭窄"],"c":[1,3],"e":"【正解：2と4】\n選択肢2：正しい ✅ 拡張型心筋症（DCM）は左室の拡大とポンプ機能低下（収縮障害）を主病態とします。\n選択肢4：正しい ✅ 心房中隔欠損症（ASD）は子供の頃は無症状で経過することが多い疾患です。\n選択肢1：誤り。肥大型心筋症（HCM）は心筋の「肥厚」が特徴です。\n選択肢3：誤り。完全大血管転位（TGA）は典型的なチアノーゼ性心疾患です。\n選択肢5：誤り。たこつぼ型心筋症は左室心尖部の一時的な収縮不全をきたす疾患です。"},{"n":8,"m":false,"t":"図2は症例が異なる心臓CTの3つの画像である。誤っているのはどれか。","o":["アはCurved MPR画像である。","アはLADでプラークを認める。","イはMIP画像でRAO Cranial viewである。","ウは右冠動脈の慢性完全閉塞症例である。","ウはLADから心尖部を経由して側副血行路を認める。"],"c":[2],"e":"【正解：3（誤り）】\n図2の「イ」は血管を立体的に浮き立たせたVR（ボリュームレンダリング）画像であり、MIP（最大値投影）ではありません。他の選択肢はいずれも正しい記述です。"},{"n":9,"m":true,"t":"図3に3枚の同一患者から得られたCAG画像を示す。正しいのはどれか。2つ選べ。","o":["中隔枝から明瞭な側副血行路を認める。","アはRAO viewで右冠動脈全体の観察に適している。","右冠動脈の高度狭窄部位よりRV Branchが分岐している。","イはRAO/Cranial viewで主に回旋枝の観察に適している。","ウはAP/Cranial viewで主に左前下行枝の評価に適している。"],"c":[0,3],"e":"【正解：1と4】\n選択肢1：正しい ✅ LADの枝である中隔枝を通り、RCA方向へ流れる明瞭な側副血行路が見られます。\n選択肢4：正しい ✅ 左回旋枝（LCX）の起始部や走行を評価するのに適した標準的な撮影角度です。\n選択肢2：誤り。画像「ア」は脊椎が右側にあり心臓が左にあるためLAO系の画像です。\n選択肢3：誤り。RV Branch（右室枝）は通常、高度狭窄部位よりも近位（手前）側から分岐しています。\n選択肢5：誤り。画像「ウ」はRCAの側面像に近い角度であり、LADの評価用ではありません。"},{"n":10,"m":true,"t":"冠動脈の生理学的診断法であるiFR及びFFRで正しいのはどれか。2つ選べ。","o":["iFRは血流予備量比である。","iFRはニコランジルを使用して最大充血を得る。","FFRのカットオフ値は0.70、iFRのカットオフ値は0.89である。","iFRは拡張期後半75%に存在するWave-free-periodにて計測する。","Wave-free-periodにおいて冠内圧と冠血流量の間に直線的な相関関係が成り立つ。"],"c":[3,4],"e":"【正解：4と5】\n選択肢4：正しい ✅ 拡張期後半75％に存在するWave-free-periodにて計測するという記述は正しい計測期間の説明です。\n選択肢5：正しい ✅ この期間は血管抵抗が一定かつ最小になるため、圧の比がそのまま流量の比を反映するという理論的根拠に基づいています。\n選択肢1：誤り。「血流予備量比」はFFRの日本語訳です。iFRはInstantaneous Wave-free Ratioです。\n選択肢2：誤り。iFRは薬剤（アデノシンやニコランジル）を使用せず、安静時に計測するのが特徴です。\n選択肢3：誤り。虚血の有無を判断する基準値はFFR 0.80、iFR 0.89です。"},{"n":11,"m":true,"t":"大動脈弁狭窄症の説明で正しいのはどれか。2つ選べ。","o":["病因は動脈硬化である。","左室の前負荷を増大する疾患である。","心不全、失神及び胸痛などの自覚症状が出現する。","治療法として経カテーテル大動脈弁留置術（TAVI)がある。","重症度評価には心エコーにおける大動脈弁最小血流速度、弁口面積などが用いられる。"],"c":[2,3],"e":"【正解：3と4】\n選択肢3：正しい ✅ ASの代表的な三主徴であり、これらが出現すると予後が急激に悪化します。\n選択肢4：正しい ✅ 外科的手術が困難な高齢者などに対して行われる低侵襲なカテーテル治療です。\n選択肢1：誤り。加齢に伴う動脈硬化性変性のほか、先天性の二尖弁やリウマチ熱の後遺症なども重要な原因となります。\n選択肢2：誤り。弁が狭く血液が出にくいため、左室が押し出す際の抵抗（後負荷）が増大します。\n選択肢5：誤り。評価に用いるのは「最大（ピーク）」血流速度や平均圧較差です。"},{"n":12,"m":true,"t":"先天性心疾患に関する組合せで正しいはどれか。2つ選べ。","o":["動脈管開存 ― PFO Occluder","心房中隔欠損 ― WATCHMAN","心室中隔欠損 ― アイゼンメンジャ症候群","ファロー四徴症 ― 肺静脈狭窄症","総肺静脈還流異常 ― snowman sign"],"c":[2,4],"e":"【正解：3と5】\n選択肢3：正しい ✅ 心室中隔欠損（VSD）による左→右シャントが長期間続くと肺高血圧が進み、右→左シャントへ逆転するアイゼンメンジャ症候群を呈します。\n選択肢5：正しい ✅ 上大静脈などへ還流する異常血管と心影の重なりが胸部X線で雪だるま（snowman）のように見える特徴的所見です。\n選択肢1：誤り。PFO Occluderは「卵円孔開存」用です。\n選択肢2：誤り。WATCHMANは心房細動による脳卒中予防のための「左心耳閉鎖」デバイスです。\n選択肢4：誤り。ファロー四徴症の一つは肺静脈ではなく「肺動脈」の狭窄です。"},{"n":13,"m":true,"t":"IVUSで正しいのはどれか。2つ選べ。","o":["石灰化の厚みを把握することができる。","周波数が高いほど血管の深部まで観察することができる。","脆弱プラークでは深部減衰を伴うAttenuation plaqueを認める。","血球エコーが高エコーの場合は虚血が生じている可能性を示唆している。","機械走査式IVUSにおいて回転ムラによって生じるアーチファクトをRing downという。"],"c":[2,3],"e":"【正解：3と4】\n選択肢3：正しい ✅ 背後が暗く写るアッテネーションは脂質に富んだ不安定なプラークの特徴です。\n選択肢4：正しい ✅ 血流が停滞すると血球が重なり（もやもやエコー）、虚血や高度狭窄を示唆するサインとなります。\n選択肢1：誤り。超音波は強い石灰化の表面で反射・減衰するため厚みを測ることはできません。\n選択肢2：誤り。周波数が高いほど画像は鮮明になりますが、深部への到達力は低下します。\n選択肢5：誤り。回転ムラによる歪みはNURD（Non-Uniform Rotational Distortion）と呼びます。"},{"n":14,"m":true,"t":"図4のIVUS画像で正しいのはどれか。2つ選べ。","o":["血栓を認める。","ステントを認める。","脂質プラークを認める。","石灰化プラークを認める。","Reverberation (多重エコー)を認める。"],"c":[1,4],"e":"【正解：2と5】\n選択肢2：正しい ✅ 血管の壁に沿って高輝度な点（ステントの支柱）が規則的に並んでいます。\n選択肢5：正しい ✅ ステントなどの金属の背後に、等間隔に繰り返す偽像（リバーバレーション）が認められます。\n選択肢1：誤り。内腔に浮遊するような不規則な影（血栓）は認められません。\n選択肢3：誤り。主所見はステントであり、典型的な脂質プラークの盛り上がりは見られません。\n選択肢4：誤り。背後に強いシャドー（影）を伴う石灰化像は認められません。"},{"n":15,"m":true,"t":"図5のOCT画像で正しいのはどれか。2つ選べ。","o":["赤色血栓を認める。","脂質プラークを認める。","ガイドワイヤを認める。","石灰化プラークを認める。","180°以上の中膜を視認できる。"],"c":[2,3],"e":"【正解：3と4】\n選択肢3：正しい ✅ 左側の強い反射点と、そこから広がる大きな影はガイドワイヤによるものです。\n選択肢4：正しい ✅ 右側の、境界が明瞭で内部が比較的透き通って見える領域が石灰化プラークです。\n選択肢1：誤り。赤色血栓は背後が強く減衰して見えなくなりますが、そのような所見はありません。\n選択肢2：誤り。境界が不明瞭な低輝度領域（脂質）は認められません。\n選択肢5：誤り。ガイドワイヤの影や石灰化の影響により、全周（180°以上）の中膜を観察することは困難です。"},{"n":16,"m":true,"t":"石灰化プラークで正しいのはどれか。2つ選べ。","o":["OCTで石灰化の厚みの計測は困難である。","PCI時にアテレクトミーデバイスを用いることがある。","病変部の石灰化の量が多いとPCI後のステントはよく拡張する。","PCI後のIVUSでは石灰化のクラック(亀裂)の評価が可能である。","冠動脈造影における高度石灰化病変とは造影前の心拍動中のみ不透過部分を認めることである。"],"c":[1,3],"e":"【正解：2と4】\n選択肢2：正しい ✅ 高度な石灰化を削るために、ロータブレータなどの特殊なデバイスを使用します。\n選択肢4：正しい ✅ バルーン拡張によって石灰化が割れた（クラック）ことを確認し、治療効果を判定できます。\n選択肢1：誤り。OCT（近赤外線）は石灰化を透過するため、IVUSとは異なり厚みを正確に測ることができます。\n選択肢3：誤り。石灰化は非常に硬いため、ステントの十分な拡張を妨げる要因となります。\n選択肢5：誤り。高度石灰化は造影剤を入れる前から、心拍動に関わらず常にはっきりと不透過像として見えます。"},{"n":17,"m":false,"t":"MitraClipによる治療で誤っているのはどれか。","o":["留置予定部位に石灰化を認めても治療可能である。","心臓内腫瘍や心臓内血栓を認めた症例は治療適応外である。","治療対象は重症一次性、二次性MR (僧帽弁閉鎖不全)ともに含まれる。","食道疾患などにより経食道心エコーの実施が不可能な症例は不適当症例である。","カテーテル先端にあるクリップで僧帽弁の弁尖を留め逆流を軽減する治療方法である。"],"c":[0],"e":"【正解：1（誤り）】\nクリップで掴む予定の弁尖に強い石灰化があると、適切にクリップをかけられないため不適当（禁忌に近い）とされます。他の選択肢はいずれも正しい記述です。"},{"n":18,"m":true,"t":"心房中隔欠損症で正しいのはどれか。2つ選べ。","o":["Qp/Qs<1.5はよい治療適応である。","心室間の中隔の先天的欠損のことである。","静脈洞型は経皮的デバイス閉鎖術の適応である。","経皮的デバイス閉鎖術の適応は欠損孔の径が38mm未満の症例である。","欠損孔の部位により一次孔欠損型、二次孔欠損型、静脈洞型、冠静脈洞型に分類される。"],"c":[3,4],"e":"【正解：4と5】\n選択肢4：正しい ✅ 閉鎖栓のサイズ限界から、一定以上の大きな穴（通常38mm以上）は適応外となります。\n選択肢5：正しい ✅ 欠損孔の部位による正しい分類の記述です。\n選択肢1：誤り。治療適応となるのは肺血流量が体血流量の1.5倍以上（Qp/Qs≧1.5）の場合です。\n選択肢2：誤り。それは「心室」中隔欠損（VSD）です。ASDは「心房」間の壁の欠損です。\n選択肢3：誤り。デバイス閉鎖術の主な対象は「二次孔欠損型」です。静脈洞型は外科的手術が標準的です。"},{"n":19,"m":true,"t":"PCIで正しいのはどれか。2つ選べ。","o":["ステント留置は必須である。","FFRは病変性状の把握が可能である。","OCTはStent edge dissectionや血種の評価に不適である。","ガイドワイヤで冠動脈末梢の血管穿孔を引き起こすことがある。","Slow flowはPCI中もしくはPCI後に末梢の造影遅延を認めた状態である。"],"c":[3,4],"e":"【正解：4と5】\n選択肢4：正しい ✅ 特に硬いワイヤの操作中に、細い末梢血管を突き破ってしまうリスクがあります。\n選択肢5：正しい ✅ プラークの一部が末梢に飛び、微小血管が詰まることで血流が遅くなる現象です。\n選択肢1：誤り。バルーン拡張のみ（POBA）や薬剤コーティングバルーン（DCB）のみの治療も行われます。\n選択肢2：誤り。FFRは「虚血があるか（機能的評価）」を見るもので、プラークの性状はIVUSやOCTで評価します。\n選択肢3：誤り。OCTは非常に高解像度なため、ステント端のわずかな解離の評価に最も適しています。"},{"n":20,"m":true,"t":"機能的虚血評価におけるPhysiology測定で正しいのはどれか。2つ選べ。","o":["PCI適応閾値としてiFRは0.80が用いられる。","FFRやiFRは薬物による心筋最大充血の誘発時に測定される。","アーチファクトとしてAortic pressure ventricularizationがある。","検査24時間前のカフェイン摂取はアデノシンによるFFR測定値に影響を与える。","iFRに用いられるwave-free periodは冠血管抵抗が一定かつ十分高い時相である。"],"c":[2,3],"e":"【正解：3と4】\n選択肢3：正しい ✅ カテーテルが深く入りすぎた（ウェッジした）際、大動脈圧が心室圧のような形になる現象です。\n選択肢4：正しい ✅ カフェインはアデノシンの働きをブロックするため、最大充血が得られずFFRが不正確になります。\n選択肢1：誤り。iFRの適応基準は0.89です。0.80はFFRの基準です。\n選択肢2：誤り。FFRは最大充血下で測りますが、iFRは安静時に測定します。\n選択肢5：誤り。この時相の血管抵抗は一定かつ「最小」となります。"},{"n":21,"m":true,"t":"抗血栓療法には抗血小板療法、抗凝固療法、線溶療法がある。抗凝固療法で用いる薬剤はどれか。2つ選べ。","o":["t-PA","ヘパリン","アスピリン","ワルファリン","ウロキナーゼ"],"c":[1,3],"e":"【正解：2と4】\nヘパリンはPCI中や透析などで最も多用される代表的な抗凝固薬、ワルファリンはビタミンKに拮抗する経口の抗凝固薬です。t-PAとウロキナーゼは血栓を溶かす「線溶薬」、アスピリンは「抗血小板薬」です。"},{"n":22,"m":true,"t":"PCI中に冠動脈穿孔になった場合の対処法で正しいのはどれか。2つ選べ。","o":["ヘパリン投与。","プロタミン投与。","穿孔部位にDESを留置。","穿孔部位にcovered stentを留置。","虚血の原因となる病変の治療を継続する。"],"c":[1,3],"e":"【正解：2と4】\n選択肢2：正しい ✅ ヘパリンの効果を打ち消す（中和する）薬剤で速やかに投与します。\n選択肢4：正しい ✅ 膜付きステント（カバードステント）で血管の内側から物理的に穴を塞ぎます。\n選択肢1：誤り。ヘパリンは血を止まりにくくするため穿孔時は中和または中止が必要です。\n選択肢3：誤り。通常の薬剤溶出ステント（DES）は網目状であり血液の漏れを止めることはできません。\n選択肢5：誤り。穿孔時は直ちに止血と心タンポナーデの防止を最優先し、本来の手技は中断を検討します。"},{"n":23,"m":true,"t":"小児カテーテル治療で正しいのはどれか。2つ選べ。","o":["死亡率の平均は3%程度である。","カテーテル治療総件数は減少傾向にある。","新生児期の有害事象発生リスクは小児や成人と比べて低い。","新生児・乳児は放射線感受性が高いため被ばく管理に注意する。","患者及びその家族に十分説明しインフォームドコンセントを得ておくことは重要である。"],"c":[3,4],"e":"【正解：4と5】\n選択肢4：正しい ✅ 子供は放射線の影響を受けやすく、将来への影響も考慮した厳格な管理が必須です。\n選択肢5：正しい ✅ リスクを伴う手技が多く、家族との信頼関係と同意は極めて重要です。\n選択肢1：誤り。3％という記述は不適切（もっと低い）です。\n選択肢2：誤り。技術の進歩によりカテーテル治療の件数は維持または増加しています。\n選択肢3：誤り。新生児は臓器や機能が未熟なため合併症のリスクは成人より高いです。"},{"n":24,"m":true,"t":"図6の冠動脈造影所見で正しいのはどれか。2つ選べ。","o":["左回旋枝が閉塞している。","右冠動脈のRAO画像である。","側副血行路はbridge collateralである。","側副血行路はjeopardized collateralである。","右室枝より側副血行路が最も鮮明に見られる。"],"c":[1,3],"e":"【正解：2と4】\n選択肢2：正しい ✅ 脊椎（背骨）が画面左側にあり血管が右側に展開されているためRAO（右斜位）画像です。\n選択肢4：正しい ✅ 他枝の狭窄などの影響を受けやすい、危機的な側副血行路が存在する所見です。\n選択肢1：誤り。図6は右冠動脈（RCA）の画像です。\n選択肢3：誤り。閉塞部を橋渡しするような枝は見られません。\n選択肢5：誤り。画像上の主眼は側副血行路の有無やその出どころです。"},{"n":25,"m":true,"t":"PCIの技術で正しいのはどれか。2つ選べ。","o":["プラスチックワイヤは安全性が高く最初に用いる。","第3世代DESは生体吸収性ポリマーが使用されている。","オーバーザワイヤのバルーンカテーテルは交換が容易である。","ジャドキンスタイプよりアンプラッツタイプの方がバックアップ力に優れる。","ステント内側からガイドワイヤを側枝通過させる方法をパラレルワイヤテクニックと呼ぶ。"],"c":[1,3],"e":"【正解：2と4】\n選択肢2：正しい ✅ 最新のステントは長期的には薬剤を塗り固めたポリマーが溶けて無くなる設計になっています。\n選択肢4：正しい ✅ アンプラッツ型は広い範囲で大動脈壁に接するため、カテーテルを押し進める力が強く得られます。\n選択肢1：誤り。親水性（プラスチック）ワイヤは滑りすぎて血管を突き破るリスクがあります。\n選択肢3：誤り。バルーン単体の交換は短いワイヤで済むモノレール型の方が圧倒的に容易です。\n選択肢5：誤り。パラレルワイヤは閉塞部に2本のワイヤを入れる技法です。"},{"n":26,"m":true,"t":"内頚動脈から分岐するのはどれか。2つ選べ。","o":["眼動脈","脳底動脈","前脊髄動脈","前脈絡叢動脈","前下小脳動脈"],"c":[0,3],"e":"【正解：1と4】\n選択肢1：正しい ✅ 眼動脈は内頚動脈がサイフォン部（C1セグメント）を通過する際に最初に分岐する主要な枝です。\n選択肢2：誤り。脳底動脈は左右の椎骨動脈が合流して形成される後方循環の主幹であり、ICAの分枝ではありません。\n選択肢3：誤り。前脊髄動脈は左右の椎骨動脈の終末部付近から分岐します。\n選択肢4：正しい ✅ 前脈絡叢動脈はICAの終末部（分岐直前）から分岐し、側脳室下角などへ向かう重要な分枝です。\n選択肢5：誤り。前下小脳動脈（AICA）は脳底動脈から分岐します。"},{"n":27,"m":true,"t":"頭蓋内の硬膜に関して正しいのはどれか。2つ選べ。","o":["硬膜下腔には硬膜動脈や静脈が走行する。","硬膜下血腫は頭部CTで三日月状を呈する。","硬膜外血腫は頭部CTで凸レンズ状を呈する。","硬膜外腔には脳表静脈と静脈洞を結ぶ橋静脈が走行する。","硬膜とくも膜の間は脳脊髄液で満たされ主要動脈が走行する。"],"c":[1,2],"e":"【正解：2と3】\n選択肢1：誤り。中硬膜動脈などは骨と硬膜の間（硬膜外腔）を走行します。\n選択肢2：正しい ✅ 硬膜下血腫は橋静脈の破綻により硬膜とくも膜の間に血液が溜まるため、CTで三日月状の形態を呈します。\n選択肢3：正しい ✅ 硬膜外血腫は骨と硬膜の間に出血が溜まり硬膜が骨から剥がされるように広がるため、凸レンズ状を呈します。\n選択肢4：誤り。橋静脈が走行するのは硬膜下腔です。\n選択肢5：誤り。主要な動脈や脳脊髄液（CSF）が存在するのはくも膜下腔です。"},{"n":28,"m":false,"t":"脳動脈瘤で正しいのはどれか。","o":["好発年齢は20歳以下。","大半が紡錘状動脈瘤である。","症候性脳動脈瘤の割合が多い。","多発性脳動脈瘤は男性に多い。","後方循環より前方循環に多い。"],"c":[4],"e":"【正解：5】\n脳動脈瘤の約85〜90％は内頚動脈系などの前方循環系に発生します。\n選択肢1：誤り。好発年齢は40〜60代以上の中高年層です。\n選択肢2：誤り。大部分は血管の分岐部にできる嚢状動脈瘤です。\n選択肢3：誤り。破裂で発見されるものより検診などで見つかる無症候（未破裂）の割合が多いです。\n選択肢4：誤り。多発性脳動脈瘤は統計的に女性に多く見られます。"},{"n":29,"m":false,"t":"頭部CT画像の脳梗塞におけるearly CT signで誤っているのはどれか。","o":["松果体の石灰化。","脳溝の狭小化、消失。","レンズ核の不明瞭化。","皮髄境界の不明瞭化。","hyperdense MCA sign。"],"c":[0],"e":"【正解：1（誤り）】\n松果体の石灰化は正常な加齢変化であり、脳梗塞のサインではありません。\n脳溝の狭小化・消失は脳浮腫による所見、レンズ核の不明瞭化は基底核領域の虚血、皮髄境界の不明瞭化は灰白質の虚血、hyperdense MCA signはMCA内の新鮮血栓を示す所見でいずれもearly CT signです。"},{"n":30,"m":false,"t":"海綿静脈洞を通過しない脳神経はどれか。","o":["顔面神経","滑車神経","外転神経","上顎神経","動眼神経"],"c":[0],"e":"【正解：1】\n顔面神経（第Ⅶ脳神経）は内耳道を通るため海綿静脈洞とは関連しません。滑車神経・外転神経・動眼神経は海綿静脈洞内または側壁を走行し、上顎神経（第Ⅴ脳神経第2枝）は側壁下部を走行します。"},{"n":31,"m":false,"t":"図7は頭部のDSA側面像である。矢印の血管はどれか。","o":["眼動脈","前脈絡動脈","前交通動脈","前下小脳動脈","眼窩前頭動脈"],"c":[0],"e":"【正解：1】\n内頚動脈サイフォン部（C1）から前方（眼窩方向）へ向かって最初に分岐する細い血管（矢印）は眼動脈です。"},{"n":32,"m":false,"t":"脳血管撮影で使用されるカテーテルはどれか。","o":["コブラ","シモンズ","ジャドキンス","アンプラッツ","シェファード・フック"],"c":[1],"e":"【正解：2】\nシモンズ型は大動脈弓が蛇行している場合や高齢者の頸部血管挿入に極めて有用です。コブラ型は腹部内臓動脈、ジャドキンス型・アンプラッツ型は冠動脈造影用、シェファード・フック型は腹部の鋭角な分岐に用いられます。"},{"n":33,"m":true,"t":"3D-RAで正しいのはどれか。2つ選べ。","o":["1回転の撮影で回転DSA像が観察できる。","観察対象に応じて適切な造影剤濃度を調整する。","観察対象が回転方向と平行になるようにポジショニングを行う。","金属ステントやコイルが撮影範囲にある場合は観察が困難である。","カテーテルの先端が血管壁にあたっていないか撮影前に確認する。"],"c":[1,4],"e":"【正解：2と5】\n選択肢2：正しい ✅ 観察対象の血管径や流速に合わせて最適な造影剤濃度・注入速度を調整することが高品質な3D構築に必須です。\n選択肢5：正しい ✅ Cアームが高速回転するため、カテーテル先端が血管壁に当たって損傷させないよう事前の安全確認が重要です。\n選択肢1：誤り。1回転で得られるのは生データであり、3D画像として観察するには専用の再構成処理が必要です。\n選択肢3：誤り。通常、関心領域（ROI）が回転の中心（アイソセンタ）に位置するようポジショニングします。\n選択肢4：誤り。金属デバイスがあっても撮影自体は可能で、アーチファクト補正等で観察を試みます。"},{"n":34,"m":true,"t":"脳動静脈奇形の所見で正しいのはどれか。2つ選べ。","o":["MRIでflow voidがみられる。","Willis動脈輪の閉塞がみられる。","MRIの拡散強調像で高信号域を認める。","nidusやearly venous fillingがみられる。","CTで鞍上部周囲のくも膜下腔に高吸収域を認める。"],"c":[0,3],"e":"【正解：1と4】\n選択肢1：正しい ✅ T2強調像などで高速血流による無信号域（flow void）が認められます。\n選択肢4：正しい ✅ 血管造影で異常血管塊（nidus）と動脈相での早期静脈描出（early venous filling）が確認されます。\n選択肢2：誤り。Willis動脈輪の閉塞は「もやもや病」の特徴的な所見です。\n選択肢3：誤り。拡散強調像の高信号域は主に急性期脳梗塞の所見です。\n選択肢5：誤り。鞍上部くも膜下高吸収域は破裂動脈瘤による出血の典型像です。"},{"n":35,"m":false,"t":"経皮的脳血栓回収療法で誤っているのはどれか。","o":["術前DSA撮影 ― 側副血行の有無・状態の確認","術前DSA撮影 ― 秒間6フレームの高速撮影","術中DSA撮影 ― ロードマップの活用","術後DSA撮影 ― 遠位塞栓の確認","術後DSA撮影 ― 再灌流部分の確認"],"c":[1],"e":"【正解：2（誤り）】\n秒間6フレームの高速撮影は術前評価としては被曝が多すぎ、通常は2〜4 fpsが推奨されます。側副血行の確認、ロードマップの活用、遠位塞栓の確認、再灌流の評価はいずれも正しい記述です。"},{"n":36,"m":false,"t":"図8の画像で考えられる疾患は何か。","o":["脳動静脈奇形","破裂脳動脈瘤","硬膜動静脈瘻","急性脳動脈閉塞","内頚動脈海綿静脈洞瘻"],"c":[2],"e":"【正解：3】\n硬膜上の異常なシャントにより静脈側が早期かつ拡張して描出されており、硬膜動静脈瘻（dAVF）の所見に合致した画像です。"},{"n":37,"m":false,"t":"図9の画像で考えられる疾患は何か。","o":["脳梗塞","脳動脈瘤","もやもや病","脳動静脈奇形","頸動脈狭窄症"],"c":[2],"e":"【正解：3】\n内頚動脈終末部の閉塞と、それに代償して発達した基底核部のモヤモヤとした異常血管網（穿通枝）を認める、典型的なもやもや病の画像です。"},{"n":38,"m":true,"t":"Blank roadmapで正しいのはどれか。2つ選べ。","o":["3D-RAを利用する。","体動の影響を受けにくい。","標的血管への誘導に有用である。","注入時間が長いonyx注入に有用である。","骨やそれまでに留置されたデバイスがサブトラクションされる。"],"c":[3,4],"e":"【正解：4と5】\n選択肢4：正しい ✅ Onyxなど注入に時間がかかる液体塞栓物質の際、物質の溜まり具合を強調観察するのに適しています。\n選択肢5：正しい ✅ 背景の骨や既に留置されたデバイスがサブトラクション（消去）されます。\n選択肢1：誤り。3D回転撮影ではなく透視ベースの2D技術です。\n選択肢2：誤り。サブトラクション技術のため体動には非常に弱いです。\n選択肢3：誤り。目的血管への誘導は通常のロードマップの役割です。"},{"n":39,"m":true,"t":"頚動脈ステント留置術(CAS)で正しいのはどれか。2つ選べ。","o":["自己拡張型ステントを使用する。","ステントの放射線透過性が高い。","薬剤溶出ステントが用いられる。","Distal protectionは外頚動脈をballoonで閉塞する。","Proximal protectionは総頚動脈と外頚動脈をballoonで閉塞する。"],"c":[0,4],"e":"【正解：1と5】\n選択肢1：正しい ✅ 頸部の外部からの圧迫や屈曲に対応するため、形状記憶合金の自己拡張型ステント（ナイチノール等）を使用します。\n選択肢5：正しい ✅ Proximal protectionは総頚動脈（CCA）と外頚動脈（ECA）をバルーンで一時閉塞し、血流を止めるか逆流させて脳梗塞を防ぎます。\n選択肢2：誤り。ステントには不透過性マーカーが付いており視認性は高いですが、「放射線透過性が高い」という記述自体は不正確です。\n選択肢3：誤り。CASで用いられるのは主にベアメタルステント（BMS）です。\n選択肢4：誤り。Distal protectionは狭窄部の末梢側（ICA）でフィルタ等を用いて破片をトラップします。"},{"n":40,"m":true,"t":"CASで使用するOpen cell typeステントをbraded stentと比較した特徴で正しいのはどれか。2つ選べ。","o":["屈曲病変に強い。","拡張時に短縮する。","ストラットが細かい。","プラークの突出が少ない。","CBCT時のアーチファクトが少ない。"],"c":[0,4],"e":"【正解：1と5】\n選択肢1：正しい ✅ Open cellは柔軟性が高いため、屈曲した血管への追従性に優れています。\n選択肢5：正しい ✅ 網目がまばらなため、コーンビームCT（CBCT）撮影時の金属アーチファクトが比較的少ないという利点があります。\n選択肢2：誤り。展開時の短縮は一部の製品に見られますがOpen cell全般の特徴ではありません。\n選択肢3：誤り。ストラットの細さは製品により様々です。\n選択肢4：誤り。網目が粗いため、プラークが網目から漏れ出す（protrusion）リスクはOpen cellの方が高いです。"},{"n":41,"m":true,"t":"急性期脳梗塞の治療で正しいのはどれか。2つ選べ。","o":["発症後4.5時間以内のrt-PA静注療法は強く勧められる。","rt-PA静脈投与後に機械的血栓回収療法を開始することは勧められない。","rt-PA静注療法が実施できない施設は機械的血栓回収療法を実施できない。","発症後12時間を超えると機械的血栓回収療法を開始することが勧められない。","機械的血栓回収療法であるCombined techniqueはステント単独で血栓を絡めとる方法である。"],"c":[0,3],"e":"【正解：1と4】\n選択肢1：正しい ✅ 発症4.5時間以内であれば、rt-PA静注療法が最優先の標準治療です。\n選択肢4：正しい ✅ 画像診断に基づく適応判断がなければ、原則として発症12時間を超えると機械的血栓回収療法の開始は推奨されにくくなります（選択的な症例では24時間まで考慮されることもあります）。\n選択肢2：誤り。rt-PA投与中であっても、主幹動脈閉塞がある場合は並行して速やかに機械的血栓回収を開始すべきです。\n選択肢3：誤り。rt-PAが実施できない施設でも、適切な診断の下で血栓回収のみを行うことはあります。\n選択肢5：誤り。Combined techniqueはステントリトリーバと吸引カテーテルを併用する手法です。"},{"n":42,"m":true,"t":"静注血栓溶解(rt-PA)療法の適応指針で正しいのはどれか。2つ選べ。","o":["脳血管評価は必須である。","発症時間は患者が倒れているのを発見した時刻である。","0.6 mg/kgの10%を急速投与し残りを1時間で静注する。","ウロキナーゼを用いる発症後8時間以内の局所線溶療法は中大脳動脈閉塞症の転帰を改善させ得る。","発症時刻が不明な時でもMRIによる拡散強調画像の虚血性変化がFLAIR画像で明瞭でない場合は行うことを考慮しても良い。"],"c":[2,4],"e":"【正解：3と5】\n選択肢3：正しい ✅ 国内での標準用量は0.6 mg/kgであり、最初の10％をボーラス投与し、残りを1時間で滴下します。\n選択肢5：正しい ✅ 発症時刻不明でもMRIのDWI高信号・FLAIR変化なし（ミスマッチ）であれば、ペナンブラが存在する可能性が高いとして治療を検討します。\n選択肢1：誤り。脳血管の直接評価は必須条件ではなく、CTやMRIでの診断が基本です。\n選択肢2：誤り。発症時刻は患者が「最後に健常であったことが確認された時刻」を指します。\n選択肢4：誤り。ウロキナーゼの動注療法はrt-PAの適応とは別の基準（発症8時間以内等）で行われるものであり、rt-PAの適応指針ではありません。"},{"n":43,"m":false,"t":"海綿静脈洞部硬膜動静脈瘻のTVE（静脈塞栓術）でアプローチルートとなるのはどれか。","o":["横静脈洞","内頸動脈","下虫部静脈","下錐体静脈洞","透明中隔静脈"],"c":[3],"e":"【正解：4】\nCS-dAVFの経静脈的塞栓術（TVE）において、内頚静脈から海綿静脈洞へ至る最も標準的で最短のルートは下錐体静脈洞（IPS）です。"},{"n":44,"m":true,"t":"動眼神経を圧迫して複視や患側の眼瞼下垂症状が出現する脳動脈瘤の部位はどれか。2つ選べ。","o":["前交通動脈","中大脳動脈","脳底動脈先端部","内頚動脈海綿静脈洞部","内頚動脈-後交通動脈分岐部"],"c":[3,4],"e":"【正解：4と5】\n選択肢4：正しい ✅ 内頚動脈海綿静脈洞部の動脈瘤は、洞内を走る動眼神経を直接圧迫します。\n選択肢5：正しい ✅ 内頚動脈―後交通動脈分岐部（IC-PCoA）動脈瘤は、その走行上で動眼神経を圧迫しやすく、眼瞼下垂などの症状を来します。\n動眼神経は海綿静脈洞やその近傍を走行するため、これら以外の部位の動脈瘤では圧迫しにくいとされます。"},{"n":45,"m":false,"t":"脳動脈瘤治療に使用しないデバイスはどれか。","o":["Pipeline","CASPER","PulseRider","WEBデバイス","Neuroform Atlas"],"c":[1],"e":"【正解：2】\nPipeline、PulseRider、WEB、Neuroform Atlasはすべて動脈瘤治療用デバイスです。CASPERは頚動脈ステント留置術（CAS）専用のステントであり、脳動脈瘤には使いません。"},{"n":46,"m":true,"t":"次の組合せで正しいのはどれか。2つ選べ。","o":["Onyx － 接着性液体塞栓物質","NBCA － 非接着性液体塞栓物質","Allcockテスト － P-com分岐部動脈瘤塞栓術","proximal protection － 頚動脈ステント留置術","Flow Diverter Stent － 経静脈的塞栓術"],"c":[2,3],"e":"【正解：3と4】\n選択肢4：正しい ✅ proximal protectionはCAS中の脳梗塞予防としての血流遮断法です。\n選択肢3：正しい ✅ Allcockテストは椎骨動脈注入時に同側頸動脈を圧迫し、後交通動脈を介した側副血行を確認する試験であり、CAS等の血流遮断手技の術前評価に関連します。\n選択肢1：誤り。Onyxは非接着（非粘着）性です。\n選択肢2：誤り。NBCAは接着（粘着）性です。\n選択肢5：誤り。Flow Diverterは動脈（瘤の母血管）に置くデバイスであり、経静脈的塞栓術のデバイスではありません。"},{"n":47,"m":true,"t":"次の組合せで正しいのはどれか。2つ選べ。","o":["脳動脈瘤 ― Stent assisted coil embolization","頸動脈狭窄 ― Drug coating balloon","ラクナ梗塞 ― Stent retriever","硬膜動静脈瘻 ― Detachable coil","脳動静脈奇形 ― Balloon assist"],"c":[0,3],"e":"【正解：1と4】\n選択肢1：正しい ✅ 脳動脈瘤 ― Stent assisted coil embolizationは一般的な治療法です。\n選択肢4：正しい ✅ 硬膜動静脈瘻 ― Detachable coilは、異常な静脈洞や血管を閉塞する際によく用いられます。\n選択肢2：誤り。CASでDrug coating balloon（DCB）は標準的に用いられません。\n選択肢3：誤り。ラクナ梗塞（細い穿通枝の梗塞）にステントリトリーバ（太い主幹動脈用）は使いません。"},{"n":48,"m":true,"t":"経皮経管的脳血栓回収用機器適正使用指針第4版で主幹動脈閉塞による急性期脳梗塞に対して脳血栓回収用機器の適応条件はどれか。2つ選べ。","o":["年齢が20歳以上。","NIHSSスコアが4未満。","前方循環系の主幹動脈閉塞。","発症前のmRSスコアが0または1。","頭部CTまたはMRI DWI画像でASPECTSが10点以上。"],"c":[2,3],"e":"【正解：3と4】\n選択肢3：正しい ✅ 前方循環系（ICAやMCA）の主幹動脈閉塞が主に対象となります。\n選択肢4：正しい ✅ 発症前のmRSが0または1（自立した生活）であることが、良好な予後を期待できる条件です。\n選択肢1,2：年齢やNIHSSスコアには柔軟性があり、より重要なのは血管部位と生活機能です。\n選択肢5：誤り。ASPECTSは6点以上（広範な梗塞がないこと）が目安であり、満点の必要はありません。"},{"n":49,"m":true,"t":"頭頸部血管用ステントデバイスの放射性不透過マーカーに用いられる材質で正しいのはどれか。2つ選べ。","o":["クロム","チタン","プラチナ","マンガン","タングステン"],"c":[2,4],"e":"【正解：3と5】\nX線での視認性を高めるため、密度が高くX線吸収能が非常に高いプラチナ（白金）やタングステンがマーカーの材質として用いられます。"},{"n":50,"m":false,"t":"脳血管内治療で使用されない塞栓物質はどれか。","o":["Onyx","NBCA","金属コイル","セレスキュー","エンボスフィア"],"c":[4],"e":"【正解：5】\nOnyx、NBCA、金属コイル、セレスキューは脳血管内治療で使用されます。エンボスフィア（球状塞栓物質）は主に体部の血管（子宮筋腫等）の治療に用いられ、脳内IVRでは通常使用されません。"},{"n":51,"m":false,"t":"肺動静脈瘻（肺動静脈奇形）および起こりうる合併症で誤っているのはどれか。","o":["慢性低酸素血症。","労作性呼吸困難。","治療法の第一選択は塞栓術。","左心系の血液が毛細血管を介さずに右心系に流入する。","肺動脈と肺静脈が血管嚢あるいは迷路状拡張血管で交通する異常血管。"],"c":[3],"e":"【正解：4（誤り）】\nPAVMは「右心系（肺動脈）から左心系（肺静脈）」への短絡（右→左シャント）です。記述が逆のため誤りです。\n慢性低酸素血症・労作性呼吸困難・塞栓術が第一選択・血管嚢による異常構造はいずれも正しい記述です。"},{"n":52,"m":false,"t":"脾動脈の分枝で誤っているのはどれか。","o":["膵枝","脾枝","短胃動脈","右胃大網動脈","左胃大網動脈"],"c":[3],"e":"【正解：4（誤り）】\n右胃大網動脈は胃十二指腸動脈（GDA）の分枝です。脾動脈から出るのは「左」胃大網動脈です。膵枝・脾枝・短胃動脈・左胃大網動脈は脾動脈の分枝として正しい記述です。"},{"n":53,"m":false,"t":"外腸骨動脈の枝として正しいのはどれか。","o":["臍動脈","子宮動脈","腸腰動脈","下臀動脈","下腹壁動脈"],"c":[4],"e":"【正解：5】\n下腹壁動脈は外腸骨動脈から鼠径靭帯のすぐ近位で分岐し、腹壁を上行します。臍動脈・子宮動脈・下臀動脈は内腸骨動脈前枝、腸腰動脈は内腸骨動脈後枝から分岐します。"},{"n":54,"m":false,"t":"腹部血管撮影の技術で誤っているのはどれか。","o":["横隔膜直上にフィルタ挿入を行う。","患者に呼吸停止の説明と練習を行う。","撮影目的に合わせた視野で撮影する。","身体を動かさないことの必要性を説明する。","静脈層も動脈と同じ撮影フレームレートを用いる。"],"c":[4],"e":"【正解：5（誤り）】\n静脈相は血流が遅いため、被曝低減のために動脈相より低いレート（例：動脈4fps→静脈1fps）に落とすのが一般的です。他の選択肢はいずれも正しい記述です。"},{"n":55,"m":false,"t":"CTガイド下肺生検の合併症で誤っているのはどれか。","o":["気胸","腫瘍播種","空気塞栓","動脈解離","心タンポナーデ"],"c":[4],"e":"【正解：5（誤り）】\n肺や胸膜を対象とする肺生検において、心臓を直接損傷する心タンポナーデの発生は通常想定されません。気胸・腫瘍播種・空気塞栓・動脈解離はいずれも起こりうる合併症です。"},{"n":56,"m":true,"t":"肝外傷に対するTAEの適応で正しいのはどれか。2つ選べ。","o":["血管狭窄","仮性動脈瘤","造影剤血管外漏出","動脈門脈シャント","循環動態が改善しないもの"],"c":[1,2],"e":"【正解：2と3】\n選択肢2：正しい ✅ 外傷で形成された仮性動脈瘤は破裂リスクが極めて高いため塞栓術の適応です。\n選択肢3：正しい ✅ 造影剤血管外漏出は現在進行形の活動性出血を示しており、直ちに塞栓術が必要です。\n選択肢1：誤り。血管狭窄は緊急IVRの主目的ではありません。\n選択肢4：誤り。動脈門脈シャントは見られることもありますが、止血そのものが優先されます。\n選択肢5：誤り。循環動態が改善しない超緊急時はIVRではなく開腹手術が優先されます。"},{"n":57,"m":false,"t":"症候性子宮筋腫の子宮動脈塞栓術で誤っているのはどれか。","o":["球状塞栓物質と造影剤は1対1で希釈する。","塞栓物質は自然な血流に乗せてゆっくり注入する。","塞栓物質は標的外塞栓をしないようX線透視下で注入する。","塞栓物質は球状塞栓物質500–700μm以上の製剤を用いる。","注入終了後1時間以上経過してから再開通が無いことを確認する。"],"c":[4],"e":"【正解：5（誤り）】\n手技の終了直後に造影を行い標的血管の消失（閉塞）を確認します。1時間待つ必要はありません。他の選択肢はいずれも正しい記述です。"},{"n":58,"m":true,"t":"腎動脈狭窄に対する形成術で正しいのはどれか。2つ選べ。","o":["遠位部の病変は良い適応である。","狭窄直後の血管径を正常径とする。","希釈造影剤を使用することが望ましい。","治療は原則として薬物療法が第一選択である。","線維筋性異形成においてはステント留置が適応となる。"],"c":[0,2],"e":"【正解：1と3】\n選択肢1：正しい ✅ 線維筋性異形成（FMD）などは末梢寄りに生じやすく、拡張術が非常に有効です。\n選択肢3：正しい ✅ 腎機能の保護と狭窄部位のコントラストを最適化するために推奨されます。\n選択肢2：誤り。狭窄部の直後は「狭窄後拡張」で太くなっていることが多く正常径の基準にはできません。\n選択肢4：誤り。症例によりますが血管性高血圧や腎機能維持のために積極的な形成術が検討されます。\n選択肢5：誤り。FMDはバルーン拡張のみで良好な結果が得られ、原則ステントは使いません。"},{"n":59,"m":false,"t":"B-RTOで用いるオルダミンの希釈剤で誤っているのはどれか。","o":["注射用水","イオプロミド製剤","イオヘキソール製剤","イオパミドール製剤","イオメプロール製剤"],"c":[0],"e":"【正解：1（誤り）】\n注射用水は透明で透視下に見えないため希釈剤としては不適切です。各種ヨード造影剤は薬剤の広がりをリアルタイムで監視できるよう必ず用いられます。"},{"n":60,"m":true,"t":"門脈圧亢進症の治療で門脈圧を低下させる治療はどれか。2つ選べ。","o":["部分的脾動脈塞栓術（PSE）","経皮経肝的静脈瘤塞栓術（PTO）","経回結腸静脈的静脈瘤塞栓術（TIO）","経皮的肝内門脈静脈シャント術（TIPS）","バルーン下逆行性経静脈的塞栓術（B-RTO）"],"c":[0,3],"e":"【正解：1と4】\n選択肢1：正しい ✅ 部分的脾動脈塞栓術（PSE）は脾臓への流入血を減らし間接的に門脈圧を低下させます。\n選択肢4：正しい ✅ TIPSは門脈と肝静脈の間にバイパスを作るため、直接的かつ強力に門脈圧を下げます。\n選択肢2,3：誤り。PTO・TIOは側副路（逃げ道）を塞ぐため、門脈圧はむしろ上昇する傾向にあります。\n選択肢5：誤り。B-RTOは胃腎シャントを塞いで硬化させるため門脈圧は確実に上昇します。"},{"n":61,"m":false,"t":"産科危機的出血に対するIVRで誤っているはどれか。","o":["塞栓物質はゼラチンスポンジパウダを用いる。","子宮動脈近位でのコイル単独塞栓の成功率は低い。","動脈塞栓術は観血的手術による止血と比較して優れる。","子宮動脈結紮後の出血に対しても動脈塞栓術は適応である。","大動脈造影を行う際は出血源同定の為に卵巣動脈も描出されるよう腎動脈分岐より上部から造影を行う。"],"c":[0],"e":"【正解：1（誤り）】\n粉末（パウダ）は細かすぎて毛細血管レベルを完全に殺してしまい子宮壊死を招くため禁忌に近く、通常は1mm角程度の「細片」を用います。他の選択肢はいずれも正しい記述です。"},{"n":62,"m":true,"t":"骨盤部の循環で正しいのはどれか。2つ選べ。","o":["外腸骨静脈と大腿静脈が合流し総腸骨静脈となる。","内腸骨動脈は鼠径靱帯の下を通過して大腿動脈となる。","腹部大動脈は第4腰椎近傍で左右一対の総腸骨動脈に分岐する。","脾静脈および上・下腸間膜静脈は脾臓の後方で合流し肝静脈となる。","子宮動脈は内腸骨動脈前枝より前方に閉鎖動脈および上・下膀胱動脈に近接した部位から分岐する。"],"c":[2,4],"e":"【正解：3と5】\n選択肢3：正しい ✅ 第4腰椎近傍で腹部大動脈は左右の総腸骨動脈に分岐します。\n選択肢5：正しい ✅ 子宮動脈は内腸骨動脈の前枝から分岐し、閉鎖動脈や膀胱動脈と近接して起始します。\n選択肢1：誤り。外腸骨静脈は内腸骨静脈と合流して総腸骨静脈になります。大腿静脈は鼠径靭帯を越えて外腸骨静脈になります。\n選択肢2：誤り。外腸骨動脈が鼠径靭帯の下を通過して大腿動脈になります。内腸骨動脈は骨盤腔内へ向かいます。\n選択肢4：誤り。脾静脈と上腸間膜静脈が合流して門脈となります。肝静脈は肝臓から下大静脈に直接注ぎます。"},{"n":63,"m":true,"t":"血管塞栓術の塞栓物質で正しいのはどれか。2つ選べ。","o":["ゼラチンスポンジはブタや牛の臓器を加工したものである。","NBCAはX線透視下で注入するためイオパミドールと混合する。","本邦で利用可能な塞栓物質は金属コイル、ゼラチンスポンジとNBCAである。","無水エタノール注射剤はX線透視下などで注入するためイオパミドールを混合する。","本邦ではNBCAは薬事上、接着効果による止血を目的とした皮膚損傷のみへの適用であり血管内投与は適応外使用である。"],"c":[0,2],"e":"【正解：1と3】\n選択肢1：正しい ✅ ゼラチンスポンジはブタ由来のコラーゲンが主原料で、本邦で広く用いられる一時的塞栓物質です。\n選択肢3：正しい ✅ 金属コイル、ゼラチンスポンジ、NBCAは臨床で最も多用される承認済みの3種です。\n選択肢2：誤り。NBCA（接着剤）は水溶性造影剤と接すると瞬時に固まるため、油性のリピオドールと混合して使用します。\n選択肢4：誤り。無水エタノールも造影が必要な場合はリピオドール等を用います。\n選択肢5：誤り。現在は脳動静脈奇形や肝細胞癌などの血管内投与に対し正式に薬事承認されています。"},{"n":64,"m":true,"t":"肺動脈バルーン形成術（BPA）で正しいのはどれか。2つ選べ。","o":["合併症には喀血、血痰、肺水腫などがある。","閉塞血管を拡張する場合はステントを用いる。","吸気と呼気で肺動脈の分岐位置が変わることに注意する。","治療を行う分枝本数は肺動脈圧に関係なく可能な限り行う。","慢性血栓塞栓性肺高血圧症（CTEPH）治療の第一選択である。"],"c":[0,2],"e":"【正解：1と3】\n選択肢1：正しい ✅ バルーンによる血管損傷や再灌流による浮腫が主なリスクです。\n選択肢3：正しい ✅ 肺は呼吸で大きく動くため、ターゲットの血管を正確に捉える際に注意が必要です。\n選択肢2：誤り。BPAは通常バルーン拡張のみで行われ、ステントは原則使用しません。\n選択肢4：誤り。一気に広げると肺水腫が悪化するため、肺動脈圧を見ながら段階的に行います。\n選択肢5：誤り。CTEPH治療の第一選択は外科的な肺動脈内膜摘除術（PEA）です。"},{"n":65,"m":true,"t":"急性上腸間膜動脈塞栓症の血栓溶解療法で正しいのはどれか。2つ選べ。","o":["術前の造影CTは診断に寄与しない。","カテーテルを閉塞部の末梢に進めて血栓溶解を行う。","パルススプレーカテーテルは血栓溶解薬を効率よく注入できる。","非閉塞性腸間膜虚血症ではウロキナーゼ1万単位/minで注入する。","血栓を飛散させないようにカテーテルを閉塞部にウェッジさせた状態で血栓溶解薬の注入を行う。"],"c":[1,2],"e":"【正解：2と3】\n選択肢2：正しい ✅ カテーテルを血栓に直接接触させて薬剤を注入することで溶解効率を上げます。\n選択肢3：正しい ✅ パルススプレーカテーテルは血栓溶解薬を勢いよく噴射し、血栓を物理的に砕きながら溶かすことが可能です。\n選択肢1：誤り。造影CTはSMA塞栓症の第一選択の診断法として極めて有用です。\n選択肢4：誤り。1万単位/minは過剰な量であり標準的な投与量ではありません。\n選択肢5：誤り。ウェッジさせると血流が完全に止まり、薬剤の浸透や溶解が妨げられるため不適切です。"},{"n":66,"m":true,"t":"門脈圧亢進症で正しいのはどれか。2つ選べ。","o":["門脈圧は200 mmH2O以上である。","Budd-Chiari症候群に起因するものが最も多い。","特発性門脈圧亢進症は肝細胞癌や肝不全をきたす。","脾臓に血液がうっ滞して脾腫がおこり脾機能が低下する。","経皮経肝的穿刺法により門脈圧の測定を行うことが可能である。"],"c":[0,4],"e":"【正解：1と5】\n選択肢1：正しい ✅ 正常値（100〜150）を超え200 mmH2O（約15 mmHg）以上を亢進症と定義するのが一般的です。\n選択肢5：正しい ✅ 経皮経肝的穿刺により直接穿刺で正確な実測が可能です。\n選択肢2：誤り。圧倒的に肝硬変によるもの（肝内性）が最多です。\n選択肢3：誤り。特発性門脈圧亢進症は肝機能が比較的保たれ、癌の発生も稀であることが特徴です。\n選択肢4：誤り。脾腫により脾機能は「亢進」（血球破壊が進む）するため、「低下する」は誤りです。"},{"n":67,"m":true,"t":"下大静脈フィルタ留置で正しいのはどれか。2つ選べ。","o":["正中皮静脈よりアプローチする。","合併症として下大静脈閉塞がある。","留置時の確認では下大静脈造影を行う。","腎静脈合流上部に留置するのが基本である。","抗凝固療法が禁忌の場合フィルタ留置の適応にはならない。"],"c":[1,2],"e":"【正解：2と3】\n選択肢2：正しい ✅ 長期間の留置や血栓捕捉によりIVC自体が詰まることがあります。\n選択肢3：正しい ✅ 腎静脈の合流部を確認し適切な位置に置くために必須です。\n選択肢1：誤り。腕の静脈は細すぎるため、通常は大腿静脈や内頸静脈から挿入します。\n選択肢4：誤り。原則は腎静脈より下（足側）です。\n選択肢5：誤り。むしろ「抗凝固療法ができない」ことがフィルタ留置の最大の適応理由です。"},{"n":68,"m":false,"t":"B-RTOで正しいのはどれか。","o":["胃腎短絡がみられないことが多い。","破裂している緊急胃静脈瘤症例は適応でない。","造影CTより内視鏡検査が短絡位置の同定をしやすい。","流入側（供血路）からアプローチしバルーン閉塞下で硬化剤を注入する。","硬化剤では5％EOI（モノエタノールアミンオレイン酸塩）が一般的である。"],"c":[4],"e":"【正解：5】\n5％EOIは血管内皮を強力に傷害して血栓化させる標準的な硬化剤です。\n選択肢1：誤り。胃腎短絡が存在することがB-RTOを行うための前提条件です。\n選択肢2：誤り。内視鏡的止血が困難な破裂時などの緊急処置としても有効で適応となります。\n選択肢3：誤り。血管の走行や短絡路の把握には造影CTが圧倒的に優れています。\n選択肢4：誤り。B-RTOは出口である静脈側から遡る逆行性の治療法です。"},{"n":69,"m":false,"t":"CTAで誤っているのはどれか。","o":["CTAPでは肝細胞癌は陰性像として描出される。","CTHAは通常早期相と後期相の2相の撮影を行う。","CTHAの後期相は造影剤注入開始50秒後に撮影する。","CTHAは300 mg/mlのヨード造影剤を原液で注入速度5 ml/sで注入する。","CTAPでは門脈造影能を改善させるため末梢血管拡張薬を使用する場合がある。"],"c":[3],"e":"【正解：4（誤り）】\nカテーテルからの直接注入（CTHA/CTAP）では、血管損傷防止と濃度調整のため、造影剤を生理食塩水で希釈（例：2倍希釈）して注入するのが一般的です。他の選択肢はいずれも正しい記述です。"},{"n":70,"m":true,"t":"肝細胞癌で正しいのはどれか。2つ選べ。","o":["初期診断は超音波検査が用いられる。","腫瘍マーカーはCEA、PIVKA-Ⅱが異常値を示す。","Dynamic CTでは門脈相で腫瘍がwashoutされる。","超音波検査においてモザイクパターンは特徴的な所見である。","早期肝細胞癌はDynamic CTの方がEOB-MRIより診断能が高い。"],"c":[2,3],"e":"【正解：3と4】\n選択肢3：正しい ✅ 動脈相で白く染まり門脈相で周囲より黒く抜ける（早出し・早抜け）のが典型像です。\n選択肢4：正しい ✅ 超音波やマクロ割面で内部に隔壁や結節を伴い不均一に見える特徴的な所見です。\n選択肢1：誤り。有用ですが確定診断や術前評価にはDynamic CTやMRIが不可欠です。\n選択肢2：誤り。CEAは主に大腸癌等で上昇し、肝細胞癌の特異的マーカーはAFPとPIVKA-Ⅱです。\n選択肢5：誤り。早期肝細胞癌はEOB-MRIの方が診断能は明らかに高いです。"},{"n":71,"m":true,"t":"大動脈解離の病変分類で正しいのはどれか。2つ選べ。","o":["Killip分類","Shaher分類","Stanford分類","DeBakey分類","Crawford分類"],"c":[2,3],"e":"【正解：3と4】\nStanford分類は上行大動脈に解離があるか（A型）ないか（B型）で分ける最も汎用される分類、DeBakey分類は解離の起点と範囲に基づきⅠ、Ⅱ、Ⅲ型に分ける伝統的な分類です。Killip分類は急性心筋梗塞の心不全重症度、Shaher分類は先天性心疾患の冠動脈走行分類、Crawford分類は胸腹部大動脈瘤の範囲による分類です。"},{"n":72,"m":true,"t":"末梢動脈疾患の重症度分類で正しいのはどれか。2つ選べ。","o":["TIMI分類","TASC分類","Rastelli分類","Fontaine分類","Rutherford分類"],"c":[3,4],"e":"【正解：4と5】\nFontaine分類は冷感(Ⅰ)、跛行(Ⅱ)、安静時痛(Ⅲ)、潰瘍(Ⅳ)の4段階、Rutherford分類はこれをより詳細に（0〜6段階）した臨床的分類です。TIMI分類は冠動脈血流速度、TASC分類は病変形態、Rastelli分類は複雑心奇形の術式分類です。"},{"n":73,"m":true,"t":"四肢の動静脈で正しいのはどれか。2つ選べ。","o":["浅大腿動脈は大腿の筋肉と骨を栄養する。","上腕動脈は肘窩に入り橈骨動脈と尺骨動脈に分かれる。","膝窩動脈は後脛骨動脈と腓骨動脈に分岐するまでである。","橈骨動脈は橈骨神経とともに第5中手骨背側より手掌に入り深掌動脈弓となる。","大伏在静脈は冠動脈や下肢静脈のバイパス術におけるグラフト血管として用いられる。"],"c":[1,4],"e":"【正解：2と5】\n選択肢2：正しい ✅ 肘の高さで橈骨動脈と尺骨動脈に分岐します。\n選択肢5：正しい ✅ 心臓バイパス手術などの代用血管として最も頻繁に使用される静脈です。\n選択肢1：誤り。浅大腿動脈は主に下腿へ血流を運ぶ主幹で、大腿部の深い筋肉や骨は深大腿動脈が主に栄養します。\n選択肢3：誤り。膝窩動脈は前脛骨動脈を分岐した後に、後脛骨動脈と腓骨動脈に分かれるまでを含みます。\n選択肢4：誤り。橈骨動脈は「親指側」の第1中手骨付近を通ります。"},{"n":74,"m":true,"t":"図10の下腿動脈造影正面像の読影で正しいのはどれか。2つ選べ。","o":["左腓骨動脈閉塞","右前脛骨動脈狭窄","右前脛骨動脈閉塞","右後脛骨動脈閉塞","左後脛骨動脈狭窄"],"c":[2,3],"e":"【正解：3と4】\n膝下で分岐する3本の主要動脈のうち、外側の前脛骨動脈および内側の後脛骨動脈が途中で途絶（閉塞）しており、中央の腓骨動脈のみが末梢まで開通している所見が認められます。"},{"n":75,"m":false,"t":"急性末梢動脈閉塞の症状で誤っているのはどれか。","o":["疼痛","蒼白","脈拍消失","運動麻痺","間欠性跛行"],"c":[4],"e":"【正解：5（誤り）】\n急性閉塞の5つの徴候（5P：疼痛・蒼白・脈拍消失・しびれ・麻痺）に基づきます。間欠性跛行は血管が徐々に狭くなる「慢性」の閉塞性動脈硬化症（ASO）で見られる典型症状であり、急性に現れる症状ではありません。"},{"n":76,"m":true,"t":"下肢静脈で正しいのはどれか。2つ選べ。","o":["下肢静脈に静脈弁はない。","下肢表在静脈は筋肉内を走行する。","血栓性静脈炎は深部静脈の血栓による静脈炎をいう。","下肢深部静脈は下肢深部で動脈と並走する静脈系である。","深部静脈系に障害が生じた場合は表在静脈系がバイパスとして働く。"],"c":[3,4],"e":"【正解：4と5】\n選択肢4：正しい ✅ 前・後脛骨静脈や腓骨静脈などが動脈と並走する深部静脈系です。\n選択肢5：正しい ✅ 深部が閉塞すると血液は表在系を通って心臓へ戻ろうとします。\n選択肢1：誤り。下肢静脈には血液の逆流を防ぐための静脈弁が豊富に存在します。\n選択肢2：誤り。表在静脈は皮下を走り、深部静脈が筋肉内を走行します。\n選択肢3：誤り。通常、表層の静脈炎を「血栓性静脈炎」、深部のものを「深部静脈血栓症（DVT）」として区別します。"},{"n":77,"m":true,"t":"下肢動脈造影で正しいのはどれか。2つ選べ。","o":["腎機能障害のある患者に炭酸ガスを用いて撮影した。","熱感を感じることがあるため高浸透圧造影剤を用いた。","下腿領域のDSA撮影を行う際、抑制帯などの固定具を用いた。","浅大腿動脈と深大腿動脈を分離するためＣアームを内側斜位にした。","大腿動脈穿刺部位は大腿動脈分岐部と鼠径靭帯の間の深大腿動脈である。"],"c":[0,2],"e":"【正解：1と3】\n選択肢1：正しい ✅ 炭酸ガス（CO2）は腎毒性がないため、造影剤が使えない症例で有効です。\n選択肢3：正しい ✅ 下腿は血管が細く、わずかな体動も大きなアーチファクトになるため固定が重要です。\n選択肢2：誤り。熱感を抑えるには血漿と浸透圧が等しい等浸透圧造影剤を用いるべきです。\n選択肢4：誤り。両者を分離するには外側斜位（同側斜位）での撮影が有効です。\n選択肢5：誤り。標準的な穿刺部位は分岐部より手前の総大腿動脈（CFA）です。"},{"n":78,"m":true,"t":"四肢領域の血管形成術の組合せで正しいのはどれか。2つ選べ。","o":["VAIVT ― コイル塞栓","上肢動脈の損傷 ― ステントグラフト","VAIVTのステント適応 ― 1ヶ月未満の再狭窄","ステント留置の晩期合併症 ― ステント破損","バルーン拡張エンドポイント ― 50 %程度の残存狭窄"],"c":[1,3],"e":"【正解：2と4】\n選択肢2：正しい ✅ 外傷等による損傷部に対し、カバードステントで開存を維持しつつ止血する手法があります。\n選択肢4：正しい ✅ 特に下肢などの可動部では、長期間のストレスでステントが折れる（fracture）ことがあります。\n選択肢1：誤り。VAIVTはシャントの狭窄を広げる血管拡張術であり、塞栓術ではありません。\n選択肢3：誤り。通常は3ヶ月未満などの早期再狭窄が考慮対象です。\n選択肢5：誤り。通常は30％以下の残存狭窄を目標とします。"},{"n":79,"m":false,"t":"四肢領域の血管塞栓物質で誤っているのはどれか。","o":["NBCA","金属コイル","ウロキナーゼ","無水エタノール","マイクロスフェア"],"c":[2],"e":"【正解：3（誤り）】\nウロキナーゼは血栓を溶かす「血栓溶解薬」であり、血管を詰める「塞栓物質」ではありません。NBCA、金属コイル、無水エタノール、マイクロスフィアはいずれも塞栓物質として用いられます。"},{"n":80,"m":false,"t":"ハイブリッドTEVARで誤っているのはどれか。","o":["1 debranchはZone 1の症例に適応である。","2 debranchはZone 1の症例に適応である。","1 debranchは左総頚‐左鎖骨下動脈バイパスである。","2 debranchは右腋窩‐左総頚・左鎖骨下動脈バイパスである。","Total debranching TEVARとpartial debranching TEVARがある。"],"c":[0],"e":"【正解：1（誤り）】\nZone 1（左総頸動脈起始部を含む）をカバーするには2本のバイパス（2 debranch）が必要です。1 debranchはZone 2（左鎖骨下動脈のみ）に適応します。他の選択肢はいずれも正しい記述です。"},{"n":81,"m":false,"t":"PADでステント留置の適応血管はどれか。","o":["膝窩動脈","腓骨動脈","総大腿動脈","浅大腿動脈","前脛骨動脈"],"c":[3],"e":"【正解：4】\n浅大腿動脈（SFA）はTASC II分類等に基づき、ステント留置の有効性が確立されています。膝窩動脈や膝下動脈は屈曲による破損や血栓閉塞リスクが高いため原則としてステントは推奨されません。"},{"n":82,"m":false,"t":"末梢動脈疾患で誤っているのはどれか。","o":["ABIが1.50以下の場合はPADである。","診断としてABIの測定が第一選択となる。","侵襲的治療は基本的に有症状患者のみである。","SFAにおける限局性の短区域（4 cm未満）はPOBAが最も有効である。","TASC II分類では限局性および中等度の病変にはEVTが推奨されている。"],"c":[0],"e":"【正解：1（誤り）】\nPADの診断基準はABI 0.90以下です。1.40以上は血管の石灰化を疑います。他の選択肢はいずれも正しい記述です。"},{"n":83,"m":true,"t":"下肢動脈の急性血栓性閉塞治療で正しいのはどれか。2つ選べ。","o":["ウロキナーゼは古い塞栓子に有効である。","血栓溶解療法の合併症として脳梗塞がある。","ウロキナーゼの総投与量は1万単位/kgである。","閉塞後12〜24時間が救肢のゴールデンアワーである。","ウロキナーゼは血栓内にカテーテルをwedgeした状態で使用する。"],"c":[2,4],"e":"【正解：3と5】\n選択肢3：正しい ✅ 本資料での回答基準では総投与量1万単位/kgとされています。\n選択肢5：正しい ✅ 血栓内に確実に薬剤を届けるための手法として挙げられています。\n選択肢1：誤り。ウロキナーゼは新しい（新鮮な）血栓に最も有効です。\n選択肢2：誤り。再灌流に伴う脳出血が重大なリスクです。\n選択肢4：誤り。救肢のゴールデンアワーは6〜8時間です。"},{"n":84,"m":true,"t":"大動脈ステントグラフト治療で正しいのはどれか。2つ選べ。","o":["TEVARの中枢側landing部Zone0～2では脳卒中発生率が高い。","TEVARの中枢側landing部Zone3は血管再建が必要である。","エンドリークIbは動脈壁とステントグラフトの接合部分の中枢側から血液が流入する。","エンドリークIIIaはステントグラフト同士の接合部分から血液が漏れ出る。","エンドリークIVは瘤内に血流がみられないにもかかわらず瘤が拡大傾向を示すものである。"],"c":[0,3],"e":"【正解：1と4】\n選択肢1：正しい ✅ 弓部枝に近いためリスクが上がります。\n選択肢4：正しい ✅ パーツの接続不良による漏れです。\n選択肢2：誤り。Zone 3は左鎖骨下動脈の後ろであり、通常再建は不要です。\n選択肢3：誤り。Ibは末梢（遠位）側の接合部からの漏れです。中枢はIaです。\n選択肢5：誤り。それはType V（エンドテンション）の説明です。IVはポロシティ（布目）からの透過です。"},{"n":85,"m":true,"t":"鎖骨下動脈のIVRで正しいのはどれか。2つ選べ。","o":["鎖骨下動脈損傷は損傷部にOnyxを注入する。","鎖骨下動脈狭窄では70 %以上の狭窄が治療適応になる。","術前のCTAから椎骨動脈や内胸動脈の分岐を確認することが重要である。","左鎖骨下動脈起始部の病変ではpull through法にて治療することが有効である。","鎖骨下動脈起始部狭窄に対するステント留置には自己拡張型ステントが適している。"],"c":[2,3],"e":"【正解：3と4】\n選択肢3：正しい ✅ 重要な分枝を閉塞しないために術前評価が必須です。\n選択肢4：正しい ✅ カテーテルを通しにくい症例で、両側からワイヤを貫通させる手法が有効です。\n選択肢1：誤り。損傷にはカバードステントや、閉塞目的のコイル、NBCAが選ばれます。\n選択肢2：誤り。解剖学的適応のほか、通常は50％以上の狭窄が考慮されます。\n選択肢5：誤り。起始部は石灰化が強いため、バルーン拡張型ステントが好まれることが多いです。"},{"n":86,"m":true,"t":"Fontaine分類の臨床症状で正しいのはどれか。2つ選べ。","o":["Ⅰa：軽度の間欠性跛行","Ⅰb：中等度～重度の間欠性跛行","Ⅱ：安静時冷感","Ⅲ：安静時疼痛","Ⅳ：潰瘍・壊死"],"c":[3,4],"e":"【正解：4と5】\nⅢ度は安静時疼痛、Ⅳ度は潰瘍・壊死です。Ⅰ度は無症状・冷感・しびれ、Ⅱ度は間欠性跛行（IIa：軽度、IIb：重度）であり、跛行はすべてII度に含まれます。"},{"n":87,"m":true,"t":"末梢動脈疾患に対する検査で石灰化の影響を受ける検査はどれか。2つ選べ。","o":["MRA","DSA","足趾上腕血圧比（TBI）","足関節上腕血圧比（ABI）","カラーデュプレックス超音波検査法"],"c":[3,4],"e":"【正解：4と5】\n選択肢4：正しい ✅ 石灰化が強いと血圧計で血管が潰れず、数値が異常高値（1.40以上）になります。\n選択肢5：正しい ✅ 石灰化の影（アコースティック・シャドー）により血管内部が見えにくくなります。"},{"n":88,"m":true,"t":"腎血管形成術（PTRA）で正しいのはどれか。2つ選べ。","o":["通常使用されるステント径は8～10 mmである。","腎動脈狭窄による腎血管性高血圧は高血圧患者の約1 %である。","分腎レニン採血は左右の腎動脈本幹および腎静脈上下のIVCで行う。","腎動脈起始部病変ではステントを1～2 mm大動脈に出して留置する。","腎動脈狭窄の原因は動脈硬化症であり若年者（10～20歳代）の適応はない。"],"c":[1,3],"e":"【正解：2と4】\n選択肢2：正しい ✅ 腎血管性高血圧は全体の約1％とされます。\n選択肢4：正しい ✅ 起始部を確実にカバーするための手法です。\n選択肢1：誤り。通常5 mm程度の径を使用します。\n選択肢3：誤り。採血は左右の腎静脈本幹で行うのが基本です。\n選択肢5：誤り。FMD（線維筋性異形成）による狭窄に対し、若年者でも非常に有効です。"},{"n":89,"m":true,"t":"造影剤腎症（CIN）のリスク因子で正しいのはどれか。2つ選べ。","o":["若年者","骨粗鬆症","予防的利尿薬の使用","非ステロイド性抗炎症薬の使用","慢性腎臓病（CKD）を伴わない糖尿病"],"c":[3,4],"e":"【正解：4と5】\n選択肢4：正しい ✅ NSAIDsは腎血流を低下させるためCINのリスクを高めます。\n選択肢5：正しい ✅ 糖尿病自体が重要なリスク因子の一つです。\n選択肢1：誤り。高齢者の方がリスクが高いです。\n選択肢2：誤り。骨粗鬆症は直接的なリスク因子ではありません。\n選択肢3：誤り。むしろ脱水がリスクであり、利尿薬は慎重に扱うべきです。"},{"n":90,"m":false,"t":"造影剤の種類と選択の組合せで誤っているのはどれか。","o":["脳血管造影 － 非イオン性モノマー型造影剤","下肢血管造影 － イオン性ダイマー型造影剤","子宮卵管造影 － 油性ヨード造影剤","ヨード過敏症患者 － 炭酸ガス（CO2）","静脈性胆嚢胆道造影 － イオン性ダイマー型造影剤"],"c":[1],"e":"【正解：2（誤り）】\n下肢血管造影では痛みや熱感を抑えるために非イオン性（モノマーまたはダイマー）を用いるのが標準です。イオン性ダイマーは一般的ではありません。他の選択肢はいずれも正しい組合せです。"},{"n":91,"m":false,"t":"ヨード造影剤の副作用で誤っているのはどれか。","o":["嘔吐","蕁麻疹","喉頭浮腫","閉塞性イレウス","乳酸アシドーシス"],"c":[3],"e":"【正解：4（誤り）】\n閉塞性イレウスは消化管の物理的閉塞であり、ヨード造影剤の直接的な副作用ではありません。嘔吐・蕁麻疹・喉頭浮腫、およびメトホルミン併用時の乳酸アシドーシスは副作用や関連リスクとして知られています。"},{"n":92,"m":false,"t":"ヨード系造影剤注入時の確認で誤っているのはどれか。","o":["造影剤注入量","造影剤注入速度","ライン内エアーの残存","抗血小板薬内服の有無","造影剤アレルギーの既往"],"c":[3],"e":"【正解：4（誤り）】\n抗血小板薬内服の有無は穿刺部位の止血に関わる確認事項であり、造影剤「注入時」に直接確認すべき副作用・安全事項（注入量・速度・エア・既往）とは性質が異なります。"},{"n":93,"m":true,"t":"医療機器に係る安全管理の保守点検計画が必要なものはどれか。2つ選べ。","o":["MRI装置","X線CT装置","核医学撮像装置","据置形X線透視撮影装置","移動形X線透視撮影装置"],"c":[0,1],"e":"【正解：1と2】\n医療法等に基づき、特に高度な管理が必要な機器として、MRI装置およびX線CT装置の保守点検計画の策定が代表的に義務付けられています。"},{"n":94,"m":true,"t":"チーム医療で正しいのはどれか。2つ選べ。","o":["医療の主体は患者である。","診療放射線技師主体で構成する。","医師の指示を無条件で受け入れる。","チームメンバー間で情報共有を行う。","チームメンバーの能力が均一である。"],"c":[0,3],"e":"【正解：1と4】\n選択肢1：正しい ✅ チーム医療の根本原則です。\n選択肢4：正しい ✅ 情報共有は不可欠な要素です。\n選択肢2：誤り。多職種が対等かつ専門性を発揮して構成します。\n選択肢3：誤り。専門職として、安全上疑義があれば確認・提案を行うべきです。\n選択肢5：誤り。各職種が異なる専門能力を持ち寄ることに意味があります。"},{"n":95,"m":true,"t":"医療安全と関連する方法の組合せで正しいのはどれか。2つ選べ。","o":["院内感染対策 － プライマリナーシング","医療の質の保証 － スキンケア","医療事故防止対策 － インシデントレポート","患者誤認防止対策 － スタンダードプリコーション","手技時の安全対策 － タイムアウト"],"c":[2,4],"e":"【正解：3と5】\n選択肢3：正しい ✅ インシデントレポートは事故の予兆を把握し対策を練るための標準的な手法です。\n選択肢5：正しい ✅ タイムアウトは手を止めて患者・術式を確認する重要な安全手技です。\n選択肢1：誤り。プライマリナーシングは看護提供方式の一つです。\n選択肢2：誤り。スキンケアはケアの一部です。\n選択肢4：誤り。スタンダードプリコーションは「標準予防策（感染対策）」です。"},{"n":96,"m":false,"t":"感染予防で正しいのはどれか。","o":["標準予防策は感染症患者のみに適応される。","患者由来の体液は全て感染源として取り扱う。","単回使用医療機器は洗浄を行えば再利用可能である。","同一患者に対しては処置毎の手指衛生は不要である。","感染対策の基本は標準予防策と感染経路別予防策である。"],"c":[4],"e":"【正解：5】\n感染対策の基本は標準予防策と感染経路別予防策という二段構えの考え方です。\n選択肢1：誤り。標準予防策はすべての患者に対し、感染症の有無に関わらず適用します。\n選択肢3：誤り。単回使用医療機器は再利用禁止（使い捨て）です。\n選択肢4：誤り。処置ごとに手指衛生が必要です。"},{"n":97,"m":true,"t":"血管造影検査に従事する診療放射線技師の役割で正しいのはどれか。2つ選べ。","o":["抗凝固薬投与。","患者への治療結果の説明。","ワーキングアングルの提案。","バルーンインフレーション。","血管造影室内におけるスタッフの被ばく管理。"],"c":[2,4],"e":"【正解：3と5】\n選択肢3：正しい ✅ 最適な撮影角度（ワーキングアングル）を術者に進言するのは技師の重要な役割です。\n選択肢5：正しい ✅ 装置の品質管理や術者・スタッフの被曝防護は技師の中心的役割です。\n選択肢1,2,4：抗凝固薬投与・治療結果の説明・バルーン操作（インフレーション）は医師の業務範囲であり、技師が独自に行うものではありません。"},{"n":98,"m":false,"t":"IVR施行の直前に行う情報共有項目で誤っているのはどれか。","o":["予定術式","予定時間","治療部位","使用機材","家族構成"],"c":[4],"e":"【正解：5（誤り）】\n家族構成は安全な手技実施のための直前共有項目（術式・時間・部位・機材）には含まれません。"},{"n":99,"m":true,"t":"IVR手技に必要な衛生管理手法はどれか。2つ選べ。","o":["放射線防護衝立の使用。","IVR室専用術衣の使用。","消毒用スポンジの再利用。","清潔野における手技の熟知。","多数のスタッフによる清潔介助。"],"c":[1,3],"e":"【正解：2と4】\n選択肢2：正しい ✅ IVR室専用の術衣を使用することで清潔野の汚染を防ぎます。\n選択肢4：正しい ✅ 清潔野における手技の熟知は不要な接触や汚染を避けるために重要です。\n選択肢1：誤り。放射線防護衝立は被曝防護のための対策であり、衛生管理（感染対策）とは異なる文脈です。\n選択肢3：誤り。消毒用スポンジの再利用は感染のリスクを高めるため行ってはならず、単回使用が原則です。\n選択肢5：誤り。清潔操作に関わる人員は必要最小限にすべきであり、多数のスタッフによる清潔介助は接触機会を増やしリスクを高めます。"},{"n":100,"m":true,"t":"血管撮影室の環境で正しいのはどれか。2つ選べ。","o":["靴の履き替えは不要である。","照明の調光機能は不要である。","清浄度クラスはⅢ（準清潔区域）である。","テーブルやマウスなどの消毒は月に一度程度でよい。","ステントグラフトを実施するIVR室の清浄度クラスはⅡである。"],"c":[2,4],"e":"【正解：3と5】\n選択肢3：正しい ✅ 一般的な血管撮影室の清浄度クラスはⅢ（準清潔区域）です。\n選択肢5：正しい ✅ ステントグラフト等の植込みを実施するIVR室ではより高度な清潔度（クラスⅡ）が求められます。\n選択肢1：誤り。感染対策のため靴の履き替えは推奨されます。\n選択肢2：誤り。透視画像観察のため照明の調光機能は必要です。\n選択肢4：誤り。テーブルやマウス等の高頻度接触面は使用の都度、あるいは少なくとも毎日の消毒が必要です。"}],
  c15_device: [{"n":1,"m":true,"t":"医用画像部門における品質維持及び日常試験方法で正しいのはどれか。2つ選べ。","o":["現状試験は契約内容を満足しているかを確認するため設置後に行う行為。","受入試験は機器受入後、性能パラメータが維持されているか否かを確認する行為。","品質管理は品質に対して要求事項を満たすために使用される操作上の技術行為。","不変性試験は機器の性能パラメータが受入試験と同等であるかを確認する行為。","基礎値は現状試験直後の最初の不変性試験で得られた値で性能パラメータの基準値をいう。"],"c":[2,3],"e":"【正解：3と4】\n品質管理は品質要求事項を満たすために用いられる操作上の技術・活動を指します。不変性試験は機器の性能が基準時（受入時）から変化していないかを定期的に確認する試験です。現状試験は設置直後の性能把握、受入試験は仕様を満たすかの確認、基礎値は受入試験や現状試験直後の最初の不変性試験で得られた値です。"},{"n":2,"m":true,"t":"日本産業規格（JIS）で定義された用語で正しいのはどれか。2つ選べ。","o":["公称最短照射時間はパルス透視において実質的なパルス幅を均一にできる最短撮影時間。","インバータ式X線高電圧装置はX線照射中に交流電力を直流電力に変換して必要な高電圧を得るX線高電圧装置。","公称撮影陽極入力は照射時間0.1秒、負荷繰返し時間1分で繰り返し可能な単発X線管負荷に適用する公称陽極入力。","X線［管負荷］条件はX線管負荷特性に影響を及ぼす条件で管電流、撮影時間、連続陽極入力、管電圧及びリプル百分率をいう。","連続負荷定格は連続した個々のX線管負荷の総和に対して陽極入力電力と透視時間との関係で与えられる最大許容X線管負荷。"],"c":[3,4],"e":"【正解：4と5】\nX線［管負荷］条件は管電流、撮影時間、連続陽極入力、管電圧、リプル百分率など負荷特性に影響を及ぼす条件の総称です。連続負荷定格は個々の負荷の総和に対し陽極入力電力と透視時間の関係から定められた最大許容負荷を指します。公称最短照射時間・インバータ式の定義・公称撮影陽極入力の説明はいずれも誤りです。"},{"n":3,"m":true,"t":"X線装置の安全管理（漏れ電流・防護）で正しいのはどれか。2つ選べ。","o":["BF形装着部を持つ装置の漏れ電流は正常状態で1 mA以下。","CF形装着部を持つ装置の漏れ電流は正常状態で0.01 mA以下。","基準空気カーマ率はCアーム形装置でなくても接触可能表面から15 cm離れた点。","Cアーム形装置の患者照射基準点はアイソセンタから焦点方向へ30 cm離れた点。","アイソセンタのないCアーム式X線装置は製造業者が定義したX線ビーム軸に沿った患者皮膚面とX線ビーム軸との交点。"],"c":[1,2],"e":"【正解：2と3】\nCF形装着部は心臓に直接接触するため最も厳しく、正常状態で0.01 mA以下と規定されています。基準空気カーマ率はCアーム形でない装置では接触可能表面から15 cm離れた位置で測定します。BF形装着部の漏れ電流は0.1 mA以下（1 mAは誤り）、患者照射基準点はアイソセンタから焦点方向へ15 cm（30 cmは誤り）です。"},{"n":4,"m":true,"t":"回転陽極X線管装置で正しいのはどれか。2つ選べ。","o":["循環器撮影用X線管は格子付き三極管が用いられる。","循環器撮影用は金属外囲器X線管が多く用いられる。","大容量X線管のターゲットはグラファイトが用いられる。","大容量X線管のベアリングは金属潤滑剤が多く用いられている。","公称最大管電圧150 kVでは陽極－陰極管間距離は約22 mmである。"],"c":[1,2],"e":"【正解：2と3】\n金属外囲器X線管は絶縁油の汚染が少なく放熱に優れるため、IVR用の大容量装置で多用されます。グラファイト（黒鉛）は陽極の熱容量を増やすためターゲットの裏打ち材として広く用いられます。ベアリング潤滑剤は高温真空下のため固体潤滑剤（銀）や液体金属が使われ、150 kV耐圧のための電極間距離は通常15〜17 mm程度です。"},{"n":5,"m":true,"t":"回転陽極X線管の特性で正しいのはどれか。2つ選べ。","o":["循環器で用いられるX線管は温度制限領域で動作する。","焦点寸法は線広がり係数のピーク値の15 %で測定した値。","短時間許容負荷は管電圧波形が正弦波に近いほど大きく取れる。","X線管入力を表す特別な単位［HU］は単相装置を基準としている。","陰極エミッション特性はフィラメント加熱電流、撮影時間に対する管電流の依存性。"],"c":[1,3],"e":"【正解：2と4】\n焦点寸法は線広がり分布のピーク値の15％の位置の幅として定義・測定されます。HU（Heat Unit）は単相全波整流装置（波高値kV×mA×s）を1とした熱量の単位です。IVR等の大電流領域は空間電荷制限領域で動作し、短時間許容負荷は管電圧波形が定電圧（リプル小）に近いほど大きく取れ、陰極エミッション特性は撮影時間ではなく加熱電流に対する管電流の依存性です。"},{"n":6,"m":false,"t":"定電圧形X線高電圧装置で管電圧100 kV、管電流400 mA、照射時間0.02 sで撮影した。X線管入力［J］で正しいのはどれか。","o":["767","800","801","1080","1128"],"c":[1],"e":"【正解：2（800 J）】\n管電圧100 kV × 管電流400 mA × 時間0.02 s ＝ 800 Jとなります。"},{"n":7,"m":true,"t":"照射野限定器で正しいのはどれか。2つ選べ。","o":["漏れ線量は焦点から100 cmで1.0 mGy/hを超えない。","X線照射野と開度表示との誤差はSIDの5 %を超えない。","最小X線照射野はSID 100 cmにおいて2×2 cmを超えない。","最大X線照射野はSIDの65 cmにおいて35×35 cmを超えない。","光照射野の平均照度はSID 100 cmにおいて90 lx以上で180 lx以上が望ましい。"],"c":[0,4],"e":"【正解：1と5】\n漏れ線量は焦点から100 cmの位置で1.0 mGy/h以下である必要があります。光照射野の平均照度は160 lx以上（あるいは条件により100 lx以上）が求められます。照射野と表示の不一致はSIDの2%以内、最小照射野はSID100 cmで5×5 cm以下、最大照射野は一律のJIS規定値はありません。"},{"n":8,"m":true,"t":"X線高電圧装置で正しいのはどれか。2つ選べ。","o":["単相装置は三相X線装置と比較して軟線が少ない。","コンデンサ式装置の管電流時間積はX線出力と直線的に比例する。","単巻変圧器は一つの連続した巻線で一次および二次回路の一部を共通にした変圧器。","X線用高電圧変圧器は絶縁油の他に整流回路およびフィラメント加熱変圧器が組込まれる。","エネルギー蓄積形インバータ式X線装置は撮影時にX線照射エネルギーを電源設備から供給される。"],"c":[1,2],"e":"【正解：2と3】\nコンデンサ式装置の管電流時間積（mAs）はX線出力と直線的に比例します。単巻変圧器は一つの連続した巻線で一次・二次回路の一部を共通にした変圧器です。単相装置は三相装置に比べ管電圧のリプルが大きく線質は軟らかくなり、変圧器タンクには整流器なども組み込まれ、エネルギー蓄積形は撮影時のエネルギーを蓄電池等から供給し電源設備への負荷を抑えます。"},{"n":9,"m":true,"t":"インバータ式X線高電圧装置の特性で正しいのはどれか。2つ選べ。","o":["最大定格は商用電源を平滑するので電源設備と無関係に出力ができる。","管電圧リプル百分率は高電圧ケーブルの長さに関係なく低減ができる。","X線用高電圧変圧器は従来の高電圧変圧器に比べ高周波で駆動するので小形化できる。","商用電源を整流・平滑して直流に変換するので電源位相に関係なくX線の開閉ができる。","フィードバック制御は一次側で管電圧を検出し二次側のDC-DCコンバータまたはインバータ回路を制御する。"],"c":[2,3],"e":"【正解：3と4】\n高周波で駆動するため変圧器の鉄心を小さくでき、装置の小形化が可能です。直流をインバートするため商用電源の位相に関わらず任意のタイミングでX線のオン・オフが可能です。最大定格は電源設備のインピーダンスや容量による制限を必ず受け、リプル百分率は高電圧ケーブルが短いほど低減され、フィードバック制御は通常二次側で検出し一次側の回路へ戻して制御します。"},{"n":10,"m":false,"t":"図1は共振形インバータ回路の原理図である。アとイにあてはまる電流波形はどれか。","o":["アー②、イー③","アー①、イー③","アー③、イー⑤","アー⑤、イー③","アー①、イー⑤"],"c":[1],"e":"【正解：2（アー①、イー③）】\nア（インバータ出力）は共振により正弦波状の交流電流となり（③...ではなく①はスイッチング波形）、イ（変圧器二次側整流後）は全波整流され一方向のパルス状電流（③）となります。"},{"n":11,"m":true,"t":"循環器撮影に用いる自動露出制御で正しいのはどれか。2つ選べ。","o":["シネ撮影では各パルスごとに動作する。","FPDを用いたシネ撮影の応答フレーム数は最大120 f/sである。","FPDシステムの撮影条件は画像情報に遅れがあるので光量を調整する。","I.Iの視野サイズに関係なく1フレーム当たりの線量を一定に動作する。","DSA撮影でのライブ像撮影は造影剤の有無にかかわらず一定の線量で動作する。"],"c":[0,3],"e":"【正解：1と4】\nシネ撮影ではパルスごとに線量を検出し次のパルスの条件にフィードバックします。I.I.視野サイズが変わっても受像面での線量を一定に保つよう動作します。FPDシネの応答はパルスレートに依存し120 fps固定ではなく、FPDシステムは画像信号そのものを用いて直接計算・調整し、DSA撮影は造影剤による吸収変化を考慮して線量を調整します。"},{"n":12,"m":true,"t":"撮影・透視用X線装置で正しいのはどれか。2つ選べ。","o":["正常な使用時の焦点皮膚間距離は30 cm以上で使用できる構造。","IVR用足踏スイッチは25 mmの食塩水で覆われた場合でも操作ができる。","移動停止制御から起こる移動の行過ぎは正常な使用時に25 mmを超えない。","手術中に使用する移動形装置の焦点皮膚間距離は15 cm以上で使用できる構造。","テーブルサイドの操作部の保持装置、患者支持器は触れる・見るだけで識別できなければならない。"],"c":[0,4],"e":"【正解：1と5】\n正常な使用における焦点皮膚間距離（SSD）は30 cm以上を確保できる構造が必要です。テーブルサイドの操作器は触覚や視覚で明確に識別できなければなりません。足踏スイッチは深さ10 mm（25 mmではない）の食塩水でも操作可能であることが求められ、移動の行過ぎは25 mmを超えないことが正しいですがここでは3ではなく1・5が正解、移動形装置のSSDは一律15 cmではありません。"},{"n":13,"m":true,"t":"撮影・透視用X線装置で正しいのはどれか。2つ選べ。","o":["正常な使用での透視モードは標準・高・低モードを備える。","X線照射野の面積はその80 ％以上が受像面と重なる構造。","ラストイメージホールド画像は撮影画像と異なる保存をする手段を持つ。","IVRにおける透視の標準モードは基準空気カーマ率より高い値に設定ができる構造。","小児用途と指定したIVR用X線装置では散乱線除去グリッドは工具を使用せず容易に着脱可能な構造。"],"c":[0,4],"e":"【正解：1と5】\n正常な使用における透視モードは標準（Normal）・高（High）・低（Low）線量モードの備えが一般的です。小児用装置のグリッドは被曝低減のため工具なしで容易に着脱できる構造が必須です。照射野と受像面の不一致はSIDの4%以内、LIH画像は保存機能は必須ですが撮影画像と異なる手段である必要はなく、標準モードが基準空気カーマ率を超える設定になることはありません。"},{"n":14,"m":true,"t":"X線FPD装置で正しいのはどれか。2つ選べ。","o":["空間分解能は画素サイズに依存しない。","入射X線量は基本的にFOVに依存する。","画像補正で使われるゲイン補正は画像の均一化を図る。","直接変換方式のX線検出膜にはアモルファスシリコンが用いられている。","X線検出膜で得られた電荷はマトリックス状に配置された薄膜トランジスタでアナログ値として読みだされる。"],"c":[1,2],"e":"【正解：2と3】\n視野（FOV）を絞ると受像面輝度を保つためのAEC動作により入射X線量が変化します。ゲイン補正は各画素の感度バラツキを補正し画像を均一化します。空間分解能は画素サイズに直接依存し、直接変換方式のX線検出膜にはアモルファスセレン（a-Se）が用いられ、電荷はTFTで読み出されますが最終的にはデジタル値に変換されます。"},{"n":15,"m":true,"t":"X線I.I.装置で正しいのはどれか。2つ選べ。","o":["コントラストはFOVに影響しない。","入力蛍光面からは光電子を放出させる。","集束電極は25～30 kVで光電子を加速集束する。","出力蛍光面の輝度は（拡大率）2×（陽極電圧）に比例する。","変換係数（Gx）は出力像の中心における空気カーマ率に対する入射野の中心での輝度の比をいう。"],"c":[1,2],"e":"【正解：2と3】\n入力蛍光面はX線を光に変え、さらにフォトカソードから光電子を放出させます。集束電極は25〜30 kVの加速電圧により光電子を加速・集束させます。コントラストは散乱線等の影響によりFOVに依存して変化し、出力輝度は加速電圧に比例し縮小率の2乗に比例し、変換係数は入射側の空気カーマ率に対する出力面の輝度の比です（定義の順序が逆）。"},{"n":16,"m":true,"t":"撮像素子CCDで正しいのはどれか。2つ選べ。","o":["画素サイズが小さいと取り出される電荷量は少ない。","画素数と解像度は比例するが画素サイズはS/N比に影響を及ぼす。","空間的にリニアリティが確保されているが電磁界の影響を受ける。","構造は画素ごとに分割されているが滲み込みによる鮮鋭度の低下がある。","光を電荷に変換、蓄積しその電荷を電流の変化として取り出す撮像デバイスである。"],"c":[0,4],"e":"【正解：1と5】\n画素サイズが小さいほど蓄積できる飽和電荷量は少なくなります。CCDは光を電荷に変換し蓄積して転送し、電気信号として取り出すデバイスです。CCDは半導体素子であり電磁界の影響をほとんど受けず、画素ごとに仕切られているため光の滲み込みによる鮮鋭度低下は抑えられています。"},{"n":17,"m":true,"t":"X線CT（MDCT）とコーンビームCT（CBCT）で正しいのはどれか。2つ選べ。","o":["空間分解能はCBCTが優れる。","ダイナミックレンジはCBCTが広い。","低コントラスト分解能はCBCTが優れる。","コイル治療後の血管評価にはMDCTが優れる。","CBCTはビームハードニングによるアーチファクトがない。"],"c":[0,3],"e":"【正解：1と4】\n画素サイズが小さいCBCTの方が微細な構造の描出（空間分解能）に優れます。アーチファクト補正精度の高いMDCTがコイル治療後の血管評価に優れるとされます。ダイナミックレンジは一般にMDCTの方が広く、低コントラスト分解能はMDCTが優れ、CBCTもビームハードニングの影響を受けます。"},{"n":18,"m":false,"t":"心内圧測定で正しいのはどれか。","o":["血圧トランスデューサの位置は体表面に合わせる。","右心系の測定は末梢静脈から逆行的にカテーテル等を挿入する。","左心系の測定は末梢動脈からバルーン付きカテーテルを挿入する。","Water-filled圧測定の信頼性はカテーテルの内腔が狭く長いとき高い。","Water-filled圧測定ではカテーテル内に造影剤などが混入した場合ダンピングが生じる。"],"c":[4],"e":"【正解：5】\n粘稠度の高い造影剤や気泡が混入すると波形がなまるダンピング現象が起きます。トランスデューサの位置は右房の高さ（腋窩中線レベル）に合わせ、右心系は末梢静脈から順行的に、左心系は末梢動脈から逆行的に挿入し、Water-filled圧測定はカテーテルが狭く長いほど応答性・信頼性は低下します。"},{"n":19,"m":false,"t":"心電図波形で正しいのはどれか。","o":["PR（Q）波は心房伝導時間。","QRS波は心房興奮（脱分極）。","P波は心房の興奮時（脱分極）。","U波は回復（再分極）の終了時。","T波は心房興奮がさめる（再分極）。"],"c":[2],"e":"【正解：3】\nP波は心房の脱分極（興奮）を表すという記述は正しいです。\n選択肢1：誤り。PR間隔は心房の興奮開始から心室の興奮開始までの時間です。\n選択肢2：誤り。QRS波は「心室」の脱分極を表します（心房ではありません）。\n選択肢4：誤り。再分極の終了を示すのはT波であり、U波は特定の条件下で現れる付随的な波です。\n選択肢5：誤り。T波は「心室」の再分極（回復過程）を表します（心房ではありません）。\n※本問は「2つ選べ」の形式で出題されていますが、選択肢の文言を厳密に見ると明確に正しいのは選択肢3のみです。"},{"n":20,"m":false,"t":"IVUSの画像で誤っているのはどれか。","o":["正常な血管では内膜は描出できない。","ステントストラットは高輝度で描出される。","中膜は低輝度の帯状エコーとして描出される。","病的冠動脈では中膜とプラークの境界は不明瞭である。","正常な血管では外膜と血管外組織との境界は明瞭に描出される。"],"c":[0],"e":"【正解：1（誤り）】\n正常な内膜は非常に薄いですが、高輝度なラインとして明瞭に描出されます。「描出できない」は誤りです。ステントストラットは金属のため高輝度、中膜は低輝度の帯状エコー、病的冠動脈では層構造が壊れ境界不明瞭、正常血管の外膜と周囲組織の境界は明瞭に識別可能です。"},{"n":21,"m":true,"t":"IVUSの計測で正しいのはどれか。2つ選べ。","o":["血管サイズは内弾性板と中膜の境界を計測する。","中膜と外膜の境界で囲まれた領域を外弾性板面積という。","内腔偏心率は（最大内腔径－最小内腔径）／最小内腔径で表される。","音響陰影を伴う石灰化が30°以上存在する場合、計測は勧められない。","Plaque burden（プラーク＋中膜面積率）は血管断面積に対するプラーク断面積の比率。"],"c":[1,4],"e":"【正解：2と5】\n外弾性板面積は中膜と外膜の境界（外弾性板）で囲まれた面積のことです。Plaque burdenは血管断面積（EEM面積）に対するプラーク面積（EEM面積－内腔面積）の比率です。血管サイズは通常外弾性板（EEM）を基準に測ります。"},{"n":22,"m":true,"t":"ディジタル画像で正しいのはどれか。2つ選べ。","o":["量子化誤差が小さいと擬似輪郭が発生する。","一度発生したモアレは後で取り除くことができない。","標本化定理を満たす場合は元の信号に復元することはできない。","モアレ模様は散乱線除去用グリッドが原因で発生する場合がある。","解像度はマトリックスサイズが大きくなると小さいときに比べ悪い。"],"c":[1,3],"e":"【正解：2と4】\nサンプリング時に発生した干渉縞（モアレ）は後から完全に除去するのは困難です。グリッドの箔の密度と受像器の画素ピッチが干渉しモアレの原因となることがあります。量子化誤差はビット数が小さい場合に擬似輪郭として目立ち、標本化定理を満たせば元の信号に復元可能で、マトリックスサイズを大きくすると解像度は向上します。"},{"n":23,"m":true,"t":"階調処理はどれか。2つ選べ。","o":["ウィンドウィング処理","リージョングローイング","リカーシブフィルタ処理","ヒストグラム平坦化処理","モルフォロジカルフィルタ処理"],"c":[0,3],"e":"【正解：1と4】\nウィンドウィングは表示する輝度範囲（WL/WW）を変える最も基本的な階調処理です。ヒストグラム平坦化処理は画像のコントラストを自動的に最適化する階調処理です。リージョングローイングは領域抽出、リカーシブフィルタ処理はノイズ低減、モルフォロジカルフィルタ処理は空間フィルタ処理に分類され、階調処理ではありません。"},{"n":24,"m":false,"t":"ディジタル画像システムの画質特性を表す指標で値が低いほど低コントラスト分解能が高いのはどれか。","o":["CNR","DQE","MTF","NEQ","NPS"],"c":[4],"e":"【正解：5】\nNPS（Noise Power Spectrum）はノイズの空間周波数特性であり、この値が低い（ノイズが少ない）ほどわずかなコントラスト差を識別しやすくなります。CNR・DQE・MTF・NEQは値が高いほど高性能とされる指標です。"},{"n":25,"m":true,"t":"医用画像の電子保存の条件で求められるのはどれか。２つ選べ。","o":["安全性","見読性","機密性","真正性","再現性"],"c":[1,3],"e":"【正解：2と4】\n電子保存の3原則は真正性・見読性・保存性です。見読性は必要に応じて直ちに画像を表示・印刷できること、真正性は作成者が正当であり改ざんされていないことが証明されていることです。"}],
  c15_rad: [{"n":1,"m":false,"t":"診断用X線防護用具の規格（JIS Z4831）で誤っているのはどれか。","o":["防護エプロンの減弱特性は通常の使用条件下で変化してはならない。","防護エプロンの材料は均一に分布されている高原子番号の元素を含有しなければならない。","防護エプロン及び防護コートの鉛当量は0.25 mmPb、0.35 mmPb、0.5 mmPbの3種類である。","防護エプロンの材料は一層または二層以上に重ね合わせたもので、均一な鉛当量をもたなければならない。","防護エプロンは管電圧100 kV未満のX線で診療を行う場合に、個人が体外から受ける迷X線（散乱線）量を低減させるために着用するものである。"],"c":[3],"e":"【正解：4（誤り）】\n規格で規定されているのは「鉛当量」であり、「均一な鉛の重量」という表現は誤りです。他の選択肢はいずれも正しい記述です。"},{"n":2,"m":false,"t":"放射線防護に用いられる実用量はどれか。","o":["カーマ","照射線量","実効線量","周辺線量当量","預託実効線量"],"c":[3],"e":"【正解：4】\n周辺線量当量（H*(10)）は、区域管理や環境測定に用いられる代表的な実用量です。カーマ・照射線量は物理量、実効線量・預託実効線量は防護量です。"},{"n":3,"m":false,"t":"医療被ばく低減方法で正しいのはどれか。","o":["低管電圧での撮影","付加フィルタの使用","高格子比グリッドの使用","IVR術者の放射線防護衣の着用","高パルスレートのX線透視の使用"],"c":[1],"e":"【正解：2】\n付加フィルタの使用により、軟X線（低エネルギー成分）をカットし、患者の皮膚線量を効果的に低減できます。低管電圧は透過力が弱く皮膚線量を増大させることがあり、高格子比グリッドは露出倍数増加で患者線量が増加し、術者の防護衣着用は職業被曝対策です。"},{"n":4,"m":true,"t":"線量限度が適用される被ばくはどれか。2つ選べ。","o":["IVR術者の被ばく","検診受診者の被ばく","患者の介護を行う家族の被ばく","生物医学研究者の志願者の被ばく","診療放射線技師の業務に伴う被ばく"],"c":[0,4],"e":"【正解：1と5】\n線量限度は職業被曝と公衆被曝に対してのみ適用されます。IVR術者および診療放射線技師の被曝は「職業被曝」であり線量限度が適用されます。検診受診者・介護家族・志願者はすべて「医療被曝」であり線量限度は適用されません。"},{"n":5,"m":true,"t":"公衆被ばくはどれか。2つ選べ。","o":["宇宙飛行士の被ばく","航空機の客室乗務員の被ばく","航空機を利用する乗客の被ばく","放射線業務従事者の胎児の被ばく","母体が受けた医療行為に伴う胎児の被ばく"],"c":[1,2],"e":"【正解：2と3】\n航空機の客室乗務員の被曝は管理が必要な被曝として、航空機の乗客の被曝は公衆被曝に該当します。宇宙飛行士は特殊な職業被曝、作業者の胎児の被曝は職業被曝に関連します。"},{"n":6,"m":false,"t":"診断参考レベル（DRL）で誤っているのはどれか。","o":["拘束力をもたない目安となる数値である。","通常は線量分布の75パーセンタイル値が用いられる。","放射線診療における患者の医療被ばくに対する防護の最適化のために用いる。","各施設で線量測定を行いDRL値より下回っていれば以後線量測定は不要である。","IVRでは患者照射基準点線量（Ka,r）[mGy]、面積空気カーマ積算量（PKA）[Gy・cm2]が用いられている。"],"c":[3],"e":"【正解：4（誤り）】\n「DRL値を下回っていれば以降の測定は不要」ということはありません。DRLは継続的な最適化のための目安であり、定期的な線量調査と見直しが必要です。"},{"n":7,"m":false,"t":"本邦において2020年に改定されたIVRの診断参考レベル（DRLs2020）ではDRLs2015から装置の基準透視線量率の改定に加え新たに4領域が示された。該当しないのはどれか。","o":["下肢領域","胸腹部領域","成人心臓領域","小児心臓領域（年齢幅による区分）","頭部/頸部領域"],"c":[0],"e":"【正解：1】\nDRLs2020において下肢領域にはDRL値がまだ設定されていませんでした（最新のDRLs2025では下肢領域も追加されています）。"},{"n":8,"m":false,"t":"低LET放射線急性全身被ばくでリンパ球減少が生じるしきい線量(mGy)はどれか。","o":["5","10","50","100","500"],"c":[4],"e":"【正解：5】\n低LET放射線による急性全身被曝で、リンパ球の一時的な減少が生じるしきい線量は500 mGy（0.5 Gy）です。"},{"n":9,"m":false,"t":"精巣の被ばくによる一時的受胎能力の低下のしきい線量(Gy)はどれか。","o":["0.05","0.15","0.65","1.5","3.0"],"c":[1],"e":"【正解：2】\n精巣への被曝による一時的不妊（受胎能力低下）のしきい値は0.15 Gy前後とされています。"},{"n":10,"m":false,"t":"放射線の皮膚への影響で誤っているのはどれか。","o":["放射線性皮膚炎の治療は熱傷に準じる。","1回照射に比べて分割照射では障害は小さい。","皮膚の放射線感受性は糖尿病により亢進する。","皮膚の放射線感受性はがん化学療法により亢進する。","10 Gyの皮膚のX線被ばくにより乾性落屑が生じる。"],"c":[0],"e":"【正解：1（誤り）】\n皮膚障害の治療が熱傷（火傷）に準じることはありません。放射線障害は細胞分裂の阻害が原因であり、通常の熱傷とは対応が異なります。"},{"n":11,"m":false,"t":"女性放射線従事者の妊娠期間の腹部表面における等価線量限度（mSv）はどれか。","o":["1","2","5","10","20"],"c":[1],"e":"【正解：2】\n妊娠を届け出た女性放射線作業者の腹部表面における等価線量限度は、出産までの期間において2 mSvです。"},{"n":12,"m":false,"t":"毛髪への影響としきい線量の組み合わせで正しいのはどれか。（一過性脱毛）（永久脱毛）","o":["1 Gy　6 Gy","2 Gy　6 Gy","3 Gy　7 Gy","4 Gy　7 Gy","5 Gy　8 Gy"],"c":[2],"e":"【正解：3】\n放射線による脱毛のしきい値は、一過性：3 Gy、永久：7 Gyです。"},{"n":13,"m":true,"t":"直接電離放射線はどれか。2つ選べ。","o":["β線","γ線","陽子線","中性子線","特性X線"],"c":[0,2],"e":"【正解：1と3】\nそれ自体が電荷を持ち、直接物質を電離させるものはβ線（電子）および陽子線です。γ線・中性子線などは間接電離放射線です。"},{"n":14,"m":false,"t":"電子対生成のしきいエネルギー(MeV)はどれか。","o":["0.06","0.17","0.34","0.51","1.02"],"c":[4],"e":"【正解：5】\n電子対生成が起こるためには、光子のエネルギーが電子2個分の静止質量エネルギーである1.02 MeV以上である必要があります。"},{"n":15,"m":false,"t":"エネルギースペクトルが連続スペクトルになるのはどれか。","o":["α線","特性X線","阻止X線","オージェ電子","内部転換電子"],"c":[2],"e":"【正解：3】\n阻止X線（制動X線）は連続スペクトルを示します。特性X線などは線スペクトルです。"},{"n":16,"m":false,"t":"制動X線の発生で誤っているのはどれか。","o":["連続スペクトルを示す。","発生効率は管電圧に比例する。","最短波長は管電圧に反比例する。","診断用X線装置の発生効率は約80％である。","発生効率はターゲットの原子番号に比例する。"],"c":[3],"e":"【正解：4（誤り）】\n診断用X線の発生効率は「1％以下」です。大部分（99％以上）は熱になります。80％という記述は誤りです。最短波長が管電圧に反比例する点はDuane-Huntの法則として正しい記述です。"},{"n":17,"m":false,"t":"組み合わせで誤っているのはどれか。","o":["半価層測定 ― NaI(Tl)シンチレーション検出器","漏洩線量測定 ― 電離箱式サーベイメータ","個人被ばく測定 ― 電子式ポケット線量計","患者入射線量測定 ― 面積線量計","エネルギースペクトル測定 ― Ge半導体検出器"],"c":[0],"e":"【正解：1（誤り）】\n半価層（線質評価）には感度特性が安定した電離箱線量計が適しています。NaI(Tl)は主に核種同定などに用いられます。"},{"n":18,"m":true,"t":"組合せで正しいのはどれか。2つ選べ。","o":["照射線量 ― J/kg","吸収線量 ― C/kg","質量減弱係数 ― m2/kg","エネルギーフルエンス ― J/kg","質量エネルギー吸収係数 ― m2/kg"],"c":[2,4],"e":"【正解：3と5】\n照射線量の単位はC/kg、吸収線量の単位はJ/kg（Gy）です（選択肢1,2は逆）。質量減弱係数・質量エネルギー吸収係数の単位はいずれもm2/kgで正しい組合せです。"},{"n":19,"m":true,"t":"100 keV以下の光子と水の相互作用はどれか。2つ選べ。","o":["光電効果","光核反応","捕獲反応","三対子生成","コンプトン効果"],"c":[0,4],"e":"【正解：1と5】\n診断領域のエネルギー範囲（100 keV以下）では、光電効果とコンプトン効果が支配的です。"},{"n":20,"m":false,"t":"放射線の電離作用を直接利用するのはどれか。","o":["フリッケ線量計","Ge半導体検出器","蛍光ガラス線量計","チェレンコフ検出器","CsI(Tl)シンチレーション検出器"],"c":[0],"e":"【正解：1】\nフリッケ線量計は、水の電離に伴う化学変化を利用する化学線量計です。蛍光ガラス、シンチレーションなどは電離後の励起に伴う発光を利用します。"},{"n":21,"m":true,"t":"放射線検出器の特性で正しいのはどれか。2つ選べ。","o":["CdTl半導体検出器は冷却する必要がある。","熱ルミネッセンス線量計は繰返し読出可能である。","面積線量計はX線透過型平行平板電離箱線量計である。","GM計数管は電離量の取り出しにガス増幅作用を利用している。","光刺激ルミネッセンス線量計は熱によるアニーリングが必要である。"],"c":[2,3],"e":"【正解：3と4】\n面積線量計はX線透過型の平行平板電離箱です。GM計数管はガス増幅作用を利用しています。熱ルミネッセンス（TLD）は読み取りで信号が消えるため一度きりであり、光刺激ルミネッセンス（OSL）は光で読み取ります（熱ではありません）。"},{"n":22,"m":true,"t":"線量計の組合わせで正しいのはどれか。2つ選べ。","o":["比例計数管 ― 窒息現象","半導体検出器 ― 空乏層","蛍光ガラス線量計 ― プレヒート","熱ルミネッセンス線量計 ― OSL","光刺激ルミネッセンス線量計 ― RPL"],"c":[1,3],"e":"【正解：2と4】\n半導体検出器は空乏層を利用します。熱ルミネッセンス線量計とOSLは蓄積型線量計として対比される組合せです。窒息現象はGM計数管に関連する現象です。"},{"n":23,"m":true,"t":"電離箱線量計の照射線量測定で正しいのはどれか。2つ選べ。","o":["湿度補正が必要である。","温度気圧補正が必要である。","空気との相互作用を測定する。","すべての放射線で測定可能である。","電離箱線量計はエネルギー依存性が悪い。"],"c":[1,2],"e":"【正解：2と3】\n開放型電離箱には温度・気圧補正が不可欠です。照射線量はX線・γ線が空気中で生じる電離を測定する量です。"},{"n":24,"m":true,"t":"吸収線量で正しいのはどれか。2つ選べ。","o":["防護量である。","非荷電粒子にのみ適用される。","Bragg-Grayの空洞原理に基づいている。","単位面積当たりに吸収されるエネルギーである。","照射線量に空気のW値を乗じることで空気吸収線量が求まる。"],"c":[2,4],"e":"【正解：3と5】\n吸収線量はBragg-Gray（ブラッグ・グレー）の空洞原理に基づいています。照射線量に空気のW値（33.97 eV）を乗じることで空気吸収線量が求まります。"},{"n":25,"m":false,"t":"血管撮影室空間線量分布測定で誤っているのはどれか。","o":["照射野サイズに影響される。","焦点－受像器間距離に影響される。","一般的にサーベイメータを使用する。","術者・スタッフの放射線防護教育に有用である。","Cアームの角度に影響され、受像器側が高線量である。"],"c":[4],"e":"【正解：5（誤り）】\nIVRでは、散乱線はX線管（線源）がある「下側（床側）」およびX線管側が最も高くなります。受像器側が高線量という記述は誤りです。空間分布の把握はスタッフの安全教育に極めて有効です。"}]

  c18_clinical: [
    {n:1,t:"心臓の構造・生理機能で正しいのはどれか。2つ選べ。",m:true,o:["冠血流は収縮期優位に流れる。","心筋は副交感神経の支配である。","心臓の成人の拍出量は4～5 l/minである。","心臓の大きさは成人で400～500 gである。","冠動脈は安静時に約250 ml/minの血液を供給する。"],c:[2,4],e:"【選択肢1：誤り】\n冠血流（特に左冠動脈）は「拡張期」に優位に流れます。収縮期は心筋の収縮で血管が圧迫されます。\n\n【選択肢2：誤り】\n心臓は交感神経と副交感神経の両方（二重支配）を受けています。\n\n【選択肢3：正しい ✅】\n成人の安静時の心拍出量は4〜5 L/minです（約70ml × 約70回/分）。\n\n【選択肢4：誤り】\n成人の心臓の重さは200〜300 g程度です。400〜500 gは心拡大・心肥大の状態です。\n\n【選択肢5：正しい ✅】\n冠動脈は安静時に全心拍出量の約5%（250 ml/min）を供給します。"},
    {n:2,t:"心電図波形で正しいのはどれか。2つ選べ。",m:true,o:["QRS幅は正常で0.20秒以下である。","P波は右房成分と左房成分の和である。","PQ時間は0.12秒以上0.20秒未満が正常である。","ST上昇はJ点で0.3 mV以上の上昇が有意な所見である。","QT時間はQRSの終わりからT波の始まりまでの時間である。"],c:[1,2],e:"【選択肢1：誤り】\nQRS幅の正常値は0.10秒（2.5目盛り）以下です。\n\n【選択肢2：正しい ✅】\nP波は前半部が右房、後半部が左房の興奮を示す合成波です。\n\n【選択肢3：正しい ✅】\nPQ時間の正常範囲は0.12〜0.20秒（3〜5目盛り）です。\n\n【選択肢4：誤り】\n有意なST上昇はJ点から0.1 mV（1mm）以上の上昇です。\n\n【選択肢5：誤り】\nQT時間はQRS「始まり」からT波「終わり」までの時間です。"},
    {n:3,t:"心臓の疾患で正しい組合せはどれか。2つ選べ。",m:true,o:["肥大型心筋症 ― 心筋の菲薄化","急性心筋梗塞 ― 心筋逸脱酵素の低下","たこつぼ型心筋症 ― 後壁の壁運動異常","心サルコイドーシス ― 高度房室ブロック","虚血性非閉塞性冠疾患 ― 微小血管障害"],c:[3,4],e:"【選択肢1：誤り】\n肥大型心筋症は「肥厚」が特徴です。「菲薄化」は拡張型心筋症です。\n\n【選択肢2：誤り】\n心筋梗塞では心筋逸脱酵素（トロポニン、CKなど）は「上昇」します。\n\n【選択肢3：誤り】\nたこつぼ型は「心尖部」の無収縮と基部の収縮保持を呈します。\n\n【選択肢4：正しい ✅】\n心サルコイドーシスは刺激伝導系を侵し、高度房室ブロックなどを頻発します。\n\n【選択肢5：正しい ✅】\nINOCAは明らかな狭窄がないにもかかわらず冠微小血管障害などで虚血を呈します。"},
    {n:4,t:"図1は冠動脈CT（a-dはそれぞれ異なる症例）の画像である。誤っているのはどれか。",m:false,o:["aは斑状石灰化である。","bは低減衰プラークである。","cは脆弱性プラークを示唆する。","cはナプキンリングサインである。","dはネガティブリモデリングである。"],c:[4],e:"【正解：選択肢5（誤り）】\n画像dではプラークが存在する部位の血管外径が健康な部位より拡大しており、これは「ポジティブリモデリング」の所見です。「ネガティブリモデリング」は血管が縮小する変化を指します。\n\n・a：斑状石灰化 ✅\n・b：低吸収（低減衰）プラーク ✅\n・c：ナプキンリングサイン → 脆弱性プラークの特徴 ✅"},
    {n:5,t:"冠動脈の撮影角度と観察部位の適切な組合せはどれか。2つ選べ。",m:true,o:["右冠動脈 RAO view ― 右冠動脈末梢","右冠動脈 LAO view ― 右冠動脈近位および中間部","左冠動脈 LAO Cranial view ― 左回旋枝","左冠動脈 LAO Caudal view ― 左冠動脈主幹部","左冠動脈 RAO Caudal view ― 左前下行枝と対角枝"],c:[1,3],e:"【選択肢1：誤り】\nRCA RAOは中隔枝や中間部の観察に適します。末梢はLAO系が適切です。\n\n【選択肢2：正しい ✅】\nRCA LAOは起始部から中間部を長く伸展して観察するのに適します。\n\n【選択肢3：誤り】\nLCA LAO CranialはLAD中間部〜末梢の観察に適します。\n\n【選択肢4：正しい ✅】\nLCA LAO Caudal（スパイダービュー）はLMTやLAD/LCX分岐部観察の定番角度です。\n\n【選択肢5：誤り】\nLCA RAO CaudalはLCX（回旋枝）の走行観察に適します。"},
    {n:6,t:"PCI（経皮的冠動脈形成術）で誤っているのはどれか。",m:false,o:["血管造影画像で欠損像を認めた場合、血栓を疑う。","ステントの隙間から突出したプラークは予後に関係する。","非侵襲的FFR（血流予備量比）の値を用いてPCIを行った。","アコーディオン現象とは屈曲した血管が拡張したように描出される。","線維性皮膜を破った石灰化病変はステント留置後の長期臨床予後が悪い。"],c:[3],e:"【正解：選択肢4（誤り）】\nアコーディオン現象とは、硬いガイドワイヤやデバイスを通すことで曲がった血管が「直線化（不自然に引き伸ばされる）」し、偽の狭窄像が見える現象です。「拡張したように見える」わけではありません。"},
    {n:7,t:"PCI（経皮的冠動脈形成術）のデバイスで正しいのはどれか。2つ選べ。",m:true,o:["ロータブレータは血栓を除去することができる。","OAS（Orbital Atherectomy System）は石灰化を除去することができる。","DCA（方向性冠動脈粥腫切除術）は動脈硬化を直接削り取ることができる。","ELCA（エキシマレーザー冠動脈形成術）は動脈硬化を退縮することができる。","IVL（血管内破砕術）はshockwaveを放出し脂質性プラークを破砕することができる。"],c:[1,2],e:"【選択肢1：誤り】\nロータブレータは「石灰化」を削るデバイスです。血栓吸引は行えません。\n\n【選択肢2：正しい ✅】\nOASは公転運動によって石灰化病変を物理的に破砕・除去します。\n\n【選択肢3：正しい ✅】\nDCAはカッターで粥腫（プラーク）を直接削り取り、体外へ回収するデバイスです。\n\n【選択肢4：誤り】\nELCAは組織を蒸散させますが、動脈硬化を「退縮」させる効果とは異なります。\n\n【選択肢5：誤り】\nIVLが破砕するのは脂質ではなく「石灰化」です。"},
    {n:8,t:"弁膜症とIVRの組合せで正しいのはどれか。2つ選べ。",m:true,o:["僧帽弁狭窄症 ― M-TEER","大動脈弁狭窄症 ― TAVI","僧帽弁閉鎖不全症 ― PTMC","三尖弁閉鎖不全症 ― PTSMA","慢性肺動脈血栓塞栓症 ― BPA"],c:[1,4],e:"【選択肢1：誤り】\nM-TEERは僧帽弁「閉鎖不全症」に対する治療です。\n\n【選択肢2：正しい ✅】\nTAVIは重症の大動脈弁狭窄症に対するカテーテル治療です。\n\n【選択肢3：誤り】\nPTMCは僧帽弁「狭窄症」をバルーンで広げる治療です。\n\n【選択肢4：誤り】\nPTSMAは「肥大型心筋症（流出路障害）」に対する治療です。\n\n【選択肢5：正しい ✅】\nBPAはCTEPHで狭窄した肺動脈を広げる治療です。"},
    {n:9,t:"心房中隔欠損のIVRで正しいのはどれか。2つ選べ。",m:true,o:["欠損孔が40 mmを超えること。","合併症には閉鎖栓の脱落がある。","肺体血流比が1.5未満は実施できない。","閉鎖栓での治療対象は一次孔欠損である。","経食道心エコー法による欠損孔周囲縁の評価が重要である。"],c:[1,4],e:"【選択肢1：誤り】\n欠損孔が38mm以上の場合は外科的閉鎖が検討されます。\n\n【選択肢2：正しい ✅】\n留置した閉鎖栓（オクルーダー）の脱落は重大な合併症です。\n\n【選択肢3：誤り】\nQp/Qsが「1.5以上」が治療の適応基準となります。\n\n【選択肢4：誤り】\n治療対象は「二次孔」欠損です。「一次孔」欠損は外科手術の適応です。\n\n【選択肢5：正しい ✅】\n欠損孔周囲の縁（リム）をTEEで評価することが極めて重要です。"},
    {n:10,t:"心臓の構造と機能で正しいのはどれか。2つ選べ。",m:true,o:["後室間溝は左回旋枝が走行する。","右心室は肺静脈へ血液を送り出す。","ヒス束は心室の収縮を直接開始する。","左心房は下大静脈から血液を受け取る。","僧帽弁は左心房と左心室の間に存在する。"],c:[2,4],e:"【選択肢1：誤り】\n後室間溝を走行するのは通常「右冠動脈」のPD枝です。\n\n【選択肢2：誤り】\n右心室は「肺動脈」へ血液を送り出します。肺静脈は左心房へ戻ります。\n\n【選択肢3：正しい ✅】\nヒス束は房室結節からの興奮を心室側の脚（右脚・左脚）へ伝え、心室収縮を開始させます。\n\n【選択肢4：誤り】\n下大静脈から血液を受け取るのは「右心房」です。\n\n【選択肢5：正しい ✅】\n僧帽弁は左心房と左心室の間にあります。"},
    {n:11,t:"心臓の疾患で正しいのはどれか。",m:false,o:["心臓サルコイドーシスでは心房細動を認める。","狭心症は心筋の炎症によって引き起こされる。","大動脈弁狭窄症は左心房への負荷を増加させる。","心筋梗塞は冠動脈の一時的な狭窄によって生じる。","拡張型心筋症は心室が拡張し収縮機能が低下する。"],c:[4],e:"【選択肢1：誤り】\n心サルコイドーシスで特徴的なのは「房室ブロック」や「心室頻拍」です。\n\n【選択肢2：誤り】\n狭心症は炎症ではなく冠動脈の狭窄による「虚血」です。\n\n【選択肢3：誤り】\n大動脈弁狭窄症は「左心室」に圧負荷をかけます。\n\n【選択肢4：誤り】\n心筋梗塞は「持続的な」冠閉塞により心筋壊死に至ります。\n\n【選択肢5：正しい ✅】\n拡張型心筋症（DCM）は心室が拡大し収縮能（EF）が著明に低下します。"},
    {n:12,t:"QCA（定量的冠動脈造影法）で正しいのはどれか。2つ選べ。",m:true,o:["冠動脈内圧の測定が必須である。","血流の評価に用いる機能的検査である。","冠動脈の解剖学的評価を行う手法である。","測定される狭窄率は冠動脈の機能的虚血を評価する。","カテーテルキャリブレーションは直線部をカテーテル径の3~4倍の長さをトレースする。"],c:[2,4],e:"【選択肢1：誤り】\n内圧測定（FFR等）はQCAには含まれません。\n\n【選択肢2：誤り】\nQCAは「形態評価」であり機能評価ではありません。\n\n【選択肢3：正しい ✅】\n血管の直径や狭窄率を数値化する解剖学的評価手法です。\n\n【選択肢4：誤り】\n狭窄率だけでは機能的虚血は評価できません。\n\n【選択肢5：正しい ✅】\nカテーテルの直線部をトレースして補正を行います。"},
    {n:13,t:"先天性疾患治療で正しいのはどれか。2つ選べ。",m:true,o:["大動脈縮窄は大動脈の動脈管近辺の狭窄である。","カテーテル手技で頻度が高い合併症として穿刺部の血管損傷がある。","ステント留置などの新生児の重症例に対する治療は合併症発生率が低い。","心房中隔欠損の診断には経胸壁心エコー法による欠損孔周囲縁の評価が重要である。","成人期の動脈管開存は長期の左心系容量負荷のため心房細動、僧帽弁閉鎖不全を合併することが多い。"],c:[0,4],e:"【選択肢1：正しい ✅】\n大動脈縮窄は下行大動脈の動脈管付着部付近が狭くなる疾患です。\n\n【選択肢2：誤り】\n頻度が高いのは「穿刺部の血腫」や「不整脈」です。\n\n【選択肢3：誤り】\n新生児の重症例は血管が細く脆弱なため合併症リスクは高いです。\n\n【選択肢4：誤り】\nASDの術前評価でより重要なのは「経食道エコー（TEE）」です。\n\n【選択肢5：正しい ✅】\n成人期のPDAは長期の左→右短絡により左心系に負荷がかかり心房細動などを合併しやすくなります。"},
    {n:14,t:"カテーテルアブレーションで正しいのはどれか。2つ選べ。",m:true,o:["WPW症候群に対する焼灼標的は遅伝導路である。","心房細動のトリガとなる期外収縮90%以上は上大静脈起源である。","冷凍アブレーションは標的組織を冷凍壊死し当該部位を電気的に隔離する。","パルスフィールドアブレーションは臨界電圧をはるかに超える磁場で細胞死を引き起こす。","パルスフィールドアブレーションでは標的心筋細胞を選択的に傷害するため周囲組織への影響を引き起こすリスクはきわめて低い。"],c:[2,4],e:"【選択肢1：誤り】\nWPW症候群の標的は「副伝導路（ケント束）」です。\n\n【選択肢2：誤り】\n心房細動のトリガーは「肺静脈」起源が約90%以上です。\n\n【選択肢3：正しい ✅】\n冷凍バルーンアブレーションは組織を凍結させて電気的に隔離します。\n\n【選択肢4：誤り】\nPFAは磁場ではなく「電場」を利用します（エレクトロポレーション）。\n\n【選択肢5：正しい ✅】\nPFAは心筋細胞への選択性が高く周囲組織を傷つけにくいのが特徴です。"},
    {n:15,t:"経皮的左心耳閉鎖術で正しいのはどれか。2つ選べ。",m:true,o:["機械的人工弁の植込み患者は適応ではない。","術前に左心耳形態や適応を評価する必要がある。","左心耳に由来しない血栓塞栓症に対するリスク低減を期待できる。","デバイス血栓の有無は経胸壁心エコーやCT検査を用いて評価する。","弁膜症性心房細動患者に対する血栓塞栓症のリスクを低減する目的で行われる。"],c:[0,1],e:"【選択肢1：正しい ✅】\n機械弁植込み患者は抗凝固継続が必要なため、この手技の適応外となるのが一般的です。\n\n【選択肢2：正しい ✅】\nデバイスのサイズ決定のため術前にCT等で左心耳形態を詳しく評価します。\n\n【選択肢3：誤り】\nこの手技は左心耳内で発生する血栓の飛散を防ぐものであり、それ以外由来の血栓には無効です。\n\n【選択肢4：誤り】\nデバイス表面の血栓評価には「経食道エコー（TEE）」が主に使われます。\n\n【選択肢5：誤り】\n対象は「非弁膜症性」心房細動患者です。"},
    {n:16,t:"PCI（経皮的冠動脈形成術）で正しいのはどれか。2つ選べ。",m:true,o:["大腿動脈アプローチを優先する。","機能的狭窄度評価に基づくPCIが推奨される。","すべてのPCIにおいてDCBを第1選択とする。","未分画ヘパリンを投与しACT（活性化凝固時間）を100～150秒にコントロールする。","HIT（heparin-induced thrombocytopenia）が疑われたためヘパリンの使用を中止し抗トロンビン薬を投与した。"],c:[1,4],e:"【選択肢1：誤り】\n現在は低侵襲な「橈骨動脈（TRI）」アプローチが優先されることが多いです。\n\n【選択肢2：正しい ✅】\nFFR/iFRなどの機能的指標に基づくPCIが強く推奨されています。\n\n【選択肢3：誤り】\n全PCIの第1選択はステント（DES）です。\n\n【選択肢4：誤り】\nACTの目標値は通常250〜300秒程度です。100〜150秒は低すぎます。\n\n【選択肢5：正しい ✅】\nHITが疑われる場合は直ちに中止しアルガトロバンなどの代替薬を用います。"},
    {n:17,t:"TAVI（経カテーテル的大動脈弁置換術）で正しいのはどれか。2つ選べ。",m:true,o:["弁輪面計測は心電同期CTの拡張期画像を用いる。","バルーン拡張型人工弁は心尖部アプローチが可能である。","自己拡張型人工弁はラピッドペーシング下にて留置を行う。","バルーン拡張型人工弁は術後のペースメーカの新規植込み率が高い。","自己拡張型人工弁は留置途中でリキャプチャし再留置が可能である。"],c:[1,4],e:"【選択肢1：誤り】\n弁輪計測は通常「収縮期」の画像で行います。\n\n【選択肢2：正しい ✅】\nサピエンなどのバルーン拡張型は心尖部（TA）からのアプローチも可能です。\n\n【選択肢3：誤り】\n自己拡張型はゆっくり展開するためラピッドペーシングは通常不要です。\n\n【選択肢4：誤り】\nペースメーカ植込み率はバルーン拡張型より自己拡張型の方が高い傾向にあります。\n\n【選択肢5：正しい ✅】\n自己拡張型（エボリュートなど）は完全に切り離す前であればリキャプチャが可能です。"},
    {n:18,t:"ASDのカテーテル治療の適応で正しいのはどれか。2つ選べ。",m:true,o:["一次孔心房中隔欠損。","奇異性塞栓に関連する。","欠損孔の径が42 mm以下。","容量負荷による左室の拡張。","原則として前縁を除く欠損周囲縁が5 mm以上である。"],c:[1,4],e:"【選択肢1：誤り】\n対象は「二次孔」のみです。一次孔は外科手術の適応です。\n\n【選択肢2：正しい ✅】\n奇異性塞栓（脳梗塞）は重要な適応理由です。\n\n【選択肢3：誤り】\n欠損孔径は通常38mm以下が対象です（42mmは誤り）。\n\n【選択肢4：誤り】\nASDは左→右短絡なので容量負荷がかかるのは「右室」です。\n\n【選択肢5：正しい ✅】\n原則として前縁を除く欠損周囲縁が5mm以上必要です。"},
    {n:19,t:"心房中隔穿刺術を使用しない手技はどれか。",m:false,o:["経皮的動脈管閉鎖術","経皮的左心耳閉鎖術","経皮的僧帽弁接合不全修復術","順行性大動脈弁バルーン形成術","心房細動に対する高周波カテーテルアブレーション"],c:[0],e:"【正解：選択肢1（使用しない手技）】\n経皮的動脈管閉鎖術（PDA閉鎖術）は大動脈と肺動脈の間を塞ぐ手技であり心房中隔穿刺は不要です。\n\n他の4手技はすべて「左房」へのアプローチが必要なため心房中隔穿刺術を使用します。"},
    {n:20,t:"不整脈疾患で正しいのはどれか。",m:false,o:["WPW症候群 ― デルタ波","洞不全症候群 ― Lown分類","心室性期外収縮 ― Rubenstein分類","MobitzⅡ型2度房室ブロック ― A-Hブロック","Wenckebach型2度房室ブロック ― ペースメーカ植込"],c:[0],e:"【正解：選択肢1 ✅】\nWPW症候群の特徴的な心電図所見はデルタ波とPR短縮です。\n\n【選択肢2：誤り】\nLown分類は「心室性期外収縮」の重症度分類です。洞不全はRubenstein分類です。\n\n【選択肢3：誤り】\nRubenstein分類は「洞不全症候群」の分類です。\n\n【選択肢4：誤り】\nMobitz II型はH-Vブロックが主でA-Hブロックではありません。\n\n【選択肢5：誤り】\nWenckebach型は良性不整脈とされペースメーカは不要なことが多いです。"},
    {n:21,t:"冠動脈造影の撮影技術で正しいのはどれか。2つ選べ。",m:true,o:["マイクロチャンネルの描出ではパニングを避ける。","動きの大きい右冠動脈は呼気での呼吸停止が有効である。","CTO症例は側副血行路の描出のため撮影時間を長くする。","小児の被曝低減のため撮影レートを15 f/sから7.5 f/sに変更する。","対側造影は右冠動脈がCTOの場合、右冠動脈から造影し直後に左冠動脈を造影する。"],c:[0,2],e:"【選択肢1：正しい ✅】\nマイクロチャンネルを見失わないよう「パニング」は控えます。\n\n【選択肢2：誤り】\n右冠動脈は「吸気」での呼吸停止が推奨されます。\n\n【選択肢3：正しい ✅】\nCTOでは遠位部への染まりが遅いため撮影時間を長く設定します。\n\n【選択肢4：誤り】\nフレームレートを下げるとガイドワイヤの動きが追えなくなり危険です。\n\n【選択肢5：誤り】\nCTOの対側造影は「同時に」造影します。"},
    {n:22,t:"IABPで正しいのはどれか。2つ選べ。",m:true,o:["上行大動脈に留置する。","冠動脈血流増大効果が見込める。","患者の体重でサイズを選択する。","心臓の拡張期にバルーンを拡張させる。","IMPELLAと併用することで効果をあげる。"],c:[1,3],e:"【選択肢1：誤り】\n留置場所は「下行大動脈」（左鎖骨下動脈の分岐直下）です。\n\n【選択肢2：正しい ✅】\n拡張期にバルーンを膨らませることでダイアストリック・オーグメンテーション効果があります。\n\n【選択肢3：誤り】\nサイズ選択は通常「身長」を目安に行います。\n\n【選択肢4：正しい ✅】\n心臓が休んでいる「拡張期」に合わせてバルーンを膨らませます。\n\n【選択肢5：誤り】\nIMPELLAはより強力な補助循環デバイスで役割が異なります。"},
    {n:23,t:"冠動脈造影法で正しいのはどれか。2つ選べ。",m:true,o:["撮影フレームレートは7.5~15 f/sが使用される。","造影剤注入量は左冠動脈より右冠動脈の方が多い。","バイプレーンシステムを使用することにより被曝線量を低減できる。","カテーテルに造影剤が満たされた場合、圧波形の高周波部分は減少する。","カテーテルをengageさせた時に拡張期圧の低下がみられた場合、直ちに確認造影を行う。"],c:[0,4],e:"【選択肢1：正しい ✅】\n一般的な撮影レートは7.5〜15 fps です。\n\n【選択肢2：誤り】\n造影剤量は「左冠動脈」の方が多いです（右は少なめ）。\n\n【選択肢3：誤り】\nバイプレーンは撮影時間を短縮できますが合計の被曝線量は増える傾向にあります。\n\n【選択肢4：誤り】\n造影剤で満たされると高周波成分が「強調」されます（減少ではない）。\n\n【選択肢5：正しい ✅】\n拡張期圧が下がったらDampingなどの異常を疑いテスト注入で確認します。"},
    {n:24,t:"心電図でST上昇が見られる疾患で誤っているのはどれか。",m:false,o:["異型狭心症","急性心膜炎","急性心筋梗塞","左脚ブロック","低カリウム血症"],c:[4],e:"【正解：選択肢5（誤り）】\n低カリウム血症ではST低下・T波平坦化・U波出現が見られます。ST上昇は起こりません。\n\n【ST上昇をきたす疾患（正しい選択肢）】\n・異型狭心症（冠攣縮）→ ST上昇 ✅\n・急性心膜炎 → 広範なSaddle型ST上昇 ✅\n・急性心筋梗塞（STEMI）→ ST上昇 ✅\n・左脚ブロック → 二次性ST変化（上昇含む）✅"},
    {n:25,t:"心臓血管撮影で正しいのはどれか。2つ選べ。",m:true,o:["撮影時はX線検出器を被写体から離す。","冠動脈用カテーテルには左右両用がある。","過去の撮影画像で病変の進行度を評価する。","左心室造影では大動脈弁逆流を評価することができる。","冠動脈造影で腎機能低下の患者に希釈造影剤を使用した。"],c:[1,2],e:"【選択肢1：誤り】\n検出器（FPD）は被写体に「密着（できるだけ近づける）」させます。\n\n【選択肢2：正しい ✅】\nタイガーカテーテルなど1本で左右両方にかけられる兼用タイプが存在します。\n\n【選択肢3：正しい ✅】\n過去の画像と並べて比較することで狭窄の進行度を正確に評価します。\n\n【選択肢4：誤り】\n左室造影で評価できるのは「僧帽弁」の逆流です。大動脈弁逆流は大動脈造影で評価します。\n\n【選択肢5：誤り】\n「希釈」するとヨード濃度が下がり血管の視認性が悪くなります。通常は原液を少量使います。"},{n:26,t:"Willis動脈輪を構成する血管で正しいのはどれか。2つ選べ。",m:true,o:["後大脳動脈","上小脳動脈","前交通動脈","脳梁辺縁動脈","後下小脳動脈"],c:[0,2],e:"【選択肢1：正しい】後大脳動脈（PCA）はWillis動脈輪の後部を構成します。\n【選択肢2：誤り】上小脳動脈はWillis動脈輪に含まれません。\n【選択肢3：正しい】前交通動脈（ACoA）は左右の前大脳動脈をつなぐ重要な構成血管です。\n【選択肢4：誤り】脳梁辺縁動脈は前大脳動脈の末梢分枝です。\n【選択肢5：誤り】後下小脳動脈（PICA）はWillis動脈輪に含まれません。"}
,{n:27,t:"前大脳動脈から分岐する血管で正しいのはどれか。",m:false,o:["橋動脈","角回動脈","前脊椎動脈","Heubner反回動脈","レンズ核線条体動脈"],c:[3],e:"【正解：選択肢4】Heubner（ホイブナー）反回動脈は前大脳動脈のA1またはA2セグメントから分岐し、レンズ核の一部や内包前脚を栄養する重要な穿通枝です。\n橋動脈→脳底動脈、角回動脈→MCA末梢、前脊椎動脈→椎骨動脈、レンズ核線条体動脈→主にMCA M1から分岐。"}
,{n:28,t:"急性期閉塞性脳血管障害の治療法で正しいのはどれか。2つ選べ。",m:true,o:["コイル塞栓術","クリッピング術","機械的血栓回収術","内頸動脈内膜剥離術","血流改変ステント留置術"],c:[2,3],e:"【選択肢1：誤り】コイル塞栓術は脳動脈瘤（出血性疾患）の治療です。\n【選択肢2：誤り】クリッピング術は脳動脈瘤（出血性疾患）の治療です。\n【選択肢3：正しい】機械的血栓回収術は急性期脳梗塞の標準治療です。\n【選択肢4：正しい】内頸動脈内膜剥離術（CEA）は狭窄症に対する治療で急性期の病態によっては検討されます。\n【選択肢5：誤り】血流改変ステントは動脈瘤治療に用いるデバイスです。"}
