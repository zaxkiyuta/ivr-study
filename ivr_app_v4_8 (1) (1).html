{n:2,m:true,t:"撮影・透視用X線装置で正しいのはどれか。2つ選べ。",o:["CアームでないX線装置の基準カーマ率はSID100 cmで測定された値。","CアームX線装置の患者照射基準点はアイソセンタからX線受像器方向へ15 cmの点。","X線源装置が患者支持器の上にあるX線装置の患者照射基準点は患者支持器から30 cm上。","X線源装置が患者支持器の下にあるX線装置の患者照射基準点は患者支持器から15 cm上。","CアームX線装置の基準空気カーマ率はX線受像器の接触可能表面から30 cmで測定された値。"],c:[2,3],e:"【正解：3と4】\nX線源が支持器上部の場合は基準点が支持器から30 cm上(3)、支持器下部の場合は15 cm上(4)と規定されています。"},
{n:3,m:true,t:"日本産業規格（JIS）の定義語で正しいのはどれか。2つ選べ。",o:["公称最短照射時間は制御された放射線量が要求される範囲に保たれる最短照射時間。","インタロックは事前に設定した条件が満たされている場合に装置の操作が行われるようにした手段。","インバータ式X線高電圧装置はX線照射中に交流電力を直流電力に変換して必要な高電圧を得るX線高電圧装置。","ラストイメージホールドX線像は透視照射の終了時から1つ又は複数の画像を取得することで得られる1つの画像。","変圧器形インバータ式X線高電圧装置はX線照射エネルギーを蓄電器設備から供給するようにしたインバータ式X線高電圧装置。"],c:[0,1],e:"【正解：1と2】\n公称最短照射時間は制御された放射線量が要求範囲に保たれる最短時間(1)。インタロックは条件満足時に操作を許可する安全手段(2)。"},
{n:4,m:true,t:"回転陽極X線管装置で正しいのはどれか。2つ選べ。",o:["X線源装置は医用X線管と照射野限定器を含めたもの。","ステータは回転陽極X線管の陽極回転子を支える部品。","陽極はX線を発生させるために電子ビームにより衝撃を与える部分。","陰極エミッション特性はフィラメント加熱電流、管電圧などの変数に対する管電流の依存性。","公称撮影陽極入力は照射時間0.1秒、負荷繰返し時間1分で繰り返し可能な単発X線管負荷に適用する公称陽極入力。"],c:[0,2],e:"【正解：1と3】\nX線源装置はX線管・管容器・照射野限定器を含む(1)。陽極は電子ビームを受けX線を発生させる部分(3)。ステータは電磁的に陽極を回転させる外部コイルで「支える」のはベアリング(2誤)。"},
{n:5,m:true,t:"X線管装置の特性で正しいのはどれか。2つ選べ。",o:["焦点寸法は線広がり係数で平均値の15%で測定する。","X線管（最大管電圧150 kV）の電極間距離は13 mmである。","金属外囲器X線管の管電流はX線管の陽極電流と一致しない。","最大対称照射野は基準軸上での空気カーマ率の90%以上低下しない。","X線管装置入力（電力）は回転陽極などに必要な全ての器具の電力を含むX線管装置に加える平均入力をいう。"],c:[0,4],e:"【正解：1と5】\n焦点寸法測定は線広がり係数ピーク値の15%で行います(1)。X線管装置入力は全器具の電力を含む平均入力です(5)。"},
{n:6,m:true,t:"X線源装置で正しいのはどれか。2つ選べ。",o:["X線管の管電流は電極間距離の2乗に比例する。","X線管の管電流特性は低管電圧・大管電流ほど飽和領域で動作する。","照射野限定器のX線照射野と開度表示との誤差はSIDの2%を超えない。","X線管の短時間許容負荷は管電圧波形が正弦波形に近いほど大きく取れる。","照射野限定器の最小X線照射野はSID100 cmにおいて5x5 cmを超えない。"],c:[2,4],e:"【正解：3と5】\n照射野と開度表示の誤差はSIDの2%以内(3)。最小照射野はSID100 cmで5x5 cm以下(5)。低管電圧・大管電流は空間電荷制限領域で動作(2誤)。"},
{n:7,m:true,t:"X線高電圧装置で正しいのはどれか。2つ選べ。",o:["変圧器式の電源電圧の調整は単巻変圧器で行う。","2ピーク形は電源の各周期ごとに整流出力波形を4つのピーク値を持つ。","方形波（非共振）形インバータ式の管電圧制御はチョッパ・フィルタ回路で行われる。","インバータ式の管電流制御は通常インバータ制御による半導体直流加熱方式が多い。","一般的な共振形インバータ式の管電圧制御はインバータ周波数を固定させ直流から交流に変換と同時に出力電圧を制御する。"],c:[0,3],e:"【正解：1と4】\n変圧器式の電源電圧調整には単巻変圧器（オートトランス）を使用(1)。インバータ式の管電流制御は半導体直流加熱方式が多い(4)。"},
{n:8,m:true,t:"インバータ式X線高電圧装置の特性で正しいのはどれか。2つ選べ。",o:["公称最大電力は電源容量で制限される。","管電圧の立下りは電源インピーダンスで変化する。","商用電源を交流に変換するので投入・遮断が任意にできる。","インバータ周波数が高いほど高電圧変圧器を小形化できる。","管電圧リプル百分率は高電圧ケーブルが短いほど低減される。"],c:[3,4],e:"【正解：4と5】\nインバータ周波数が高いほど変圧器の鉄心を小さくできます(4)。高電圧ケーブルが短いほど静電容量が減りリプルが低減されます(5)。"},
{n:9,m:false,t:"インバータ式X線高電圧装置の公称最大電力のX線条件の組合せで正しいのはどれか。",o:["80 kV - 0.1 s","100 kV - 1 s","100 kV - 0.1 s","80 kV - 200 mA - 0.1 s","100 kV - 200 mA - 0.1 s"],c:[2],e:"【正解：3（100 kV・0.1秒）】\nJIS規定によりインバータ式装置の公称最大電力は管電圧100 kV・照射時間0.1秒における最大出力電力（kW）として定義されます。"},
{n:10,m:true,t:"循環器用撮影装置で正しいのはどれか。2つ選べ。",o:["I.I.によるバイプレーン撮影はブランキング回路を設ける。","連続透視はパルス透視に比べて粒状性ノイズを低減させる。","FPDによるバイプレーン撮影は他方向のX線の影響を受けない。","自動輝度制御においてパルス透視時のパルスレートは適正露光の応答に影響される。","自動露出制御においてDSA撮影は被写体のX線吸収変化に応じ適正な照射線量を照射する。"],c:[3,4],e:"【正解：4と5】\nパルス透視のパルスレートは適正露光の応答速度に影響します(4)。DSA撮影では造影剤の吸収変化に応じた線量制御が行われます(5)。FPDバイプレーンでも他方向散乱線の影響を受けます(3誤)。"},
{n:11,m:true,t:"IVR用X線装置の放射線管理で正しいのはどれか。2つ選べ。",o:["空気カーマ率表示値の誤差は6 mGy/min以上で+-35%以下。","ラストイメージホールド画像は保存する機能の有無を問わない。","10パルス/s以下のX線透視画像管理は最後の300画像を記録。","通常透視のLowモードは基準空気カーマ率がNormalモードの50%を超えない値。","小児用X線装置は0.15 mmCuもしくは5.0 mmAl以上の付加フィルタを配置する手段を備える。"],c:[3,4],e:"【正解：4と5】\n透視Lowモードは基準空気カーマ率がNormalモードの50%以下(4)。小児用装置は0.15 mmCu以上の付加フィルタ手段が必要(5)。"},
{n:12,m:true,t:"IVR用X線装置で正しいのはどれか。2つ選べ。",o:["照射時は透視と撮影と同じ可聴音を発しなければならない。","テーブルサイドの操作部は見るだけで明確に識別できなければならない。","患者支持器の負荷質量は通常荷重の他に負荷質量50 kg以上の追加荷重に耐える構造。","足踏みスイッチは床が深さ10 mmの食塩水で覆われた時でも操作できなければならない。","小児用途に指定された装置の散乱線除去グリッドは工具を使用せずに容易に着脱可能な構造。"],c:[3,4],e:"【正解：4と5】\n足踏みスイッチは深さ10 mmの食塩水でも動作する防水構造が必要(4)。小児用装置のグリッドは工具なしで着脱可能な構造が必須(5)。透視と撮影では音色を変えて区別可能にする必要があります(1誤)。"},
{n:13,m:true,t:"X線FPD装置で正しいのはどれか。2つ選べ。",o:["X線像をリアルタイムでアナログ信号として出力する。","ゲイン調整は最大入射線量時の信号レベルを均一化する。","オフセット調整は画像の黒レベルをそろえ暗電流による画像ムラを取る。","直接変換方式はa-Siなどを用いてX線エネルギーに応じた電荷信号に変換する。","間接変換方式はX線検出膜にa-Seなどを用いてX線エネルギーに応じた電荷信号に変換する。"],c:[1,2],e:"【正解：2と3】\nゲイン調整は画素感度バラツキの均一化(2)。オフセット調整は暗電流による黒レベルムラの除去(3)。直接変換方式はa-Se（セレン）を使用(4誤)。"},
{n:14,m:false,t:"X線映像装置で正しいのはどれか。",o:["FPDのFOVの変更はディジタルズームで行う。","CCDのアスペクト比（画面の縦横比）は4:3で表す。","CCDは光を電荷に変換して蓄積しその電荷を電流の変化として取り出す撮像デバイス。","I.I.の入力蛍光面から放出される光電子は25〜30 kVで加速され出力蛍光面に蛍光像を結ぶ。","量子検出効率は入射X線のS/N比の2乗に対するI.I.出力像のS/N比の2乗の比で定義される。"],c:[2],e:"【正解：3（CCD）】\nCCDは光を電荷に変換・蓄積し電流として取り出す撮像素子です。"},
{n:15,m:true,t:"X線撮影・透視装置で正しいのはどれか。2つ選べ。",o:["DSAは均一画像を得るのにLog Ampを用いる。","I.I.装置の光学レンズはタンデムレンズが用いられる。","ディジタル画像はX線フィルムに比べ空間分解能が良い。","DR装置は撮像管から画像データをA/D変換し画像処理を行う。","撮像管は光電面を電子ビームで走査し画像をディジタル情報として得る素子である。"],c:[0,1],e:"【正解：1と2】\nDSAでは対数増幅（Log Amp）により均一なサブトラクション画像を得ます(1)。I.I.装置の光学系にはタンデムレンズが用いられます(2)。"},
{n:16,m:false,t:"MDCTとコーンビームCT（CBCT）の比較で正しいのはどれか。",o:["CT値は同じ数値をもつ。","空間分解能はCBCTが優れている。","低コントラスト分解能はCBCTが優れている。","コイル治療後の血管評価はMDCTが優れている。","CBCTにはビームハードニングによるアーチファクトがない。"],c:[1],e:"【正解：2（CBCT）】\n空間分解能（微細構造の識別）はCBCTが優れています。低コントラスト分解能はMDCTが優れます(3誤)。"},
{n:17,m:true,t:"心内圧測定で正しいのはどれか。2つ選べ。",o:["血圧アンプの校正は心臓の位置で行う。","Water-filled圧測定の値は時間的遅延を生じる。","左心系の測定は末梢静脈からピックテールカテーテルを挿入する。","右心系の測定は末梢動脈から逆行的にバルーンカテーテル等を挿入する。","Water-filled圧測定はカテーテルの内腔の広さや長さなどにより値が変わる。"],c:[0,4],e:"【正解：1と5】\n血圧アンプ校正は右房レベル（心臓高さ）で実施(1)。Water-filled法の精度はカテーテルの内腔径・長さ・気泡の有無で変化します(5)。"},
{n:18,m:false,t:"心電図で正しいのはどれか。",o:["P波は心室の興奮時に生じる波形である。","QRS波は心房の興奮時に生じる波形である。","T波は心室の興奮時から回復時に生じる波形である。","増幅単極肢誘導は二肢間の電位差を記録する誘導である。","標準肢誘導は不関電極に対する右手・左手・左足の電位を記録する誘導である。"],c:[2],e:"【正解：3（T波）】\nT波は心室の再分極（回復）過程を反映します。P波は心房の脱分極(1誤)、QRS波は心室の脱分極(2誤)。"},
{n:19,m:false,t:"心拍出量測定で誤っているのはどれか。",o:["Fick法は酸素摂取量と動静脈血液酸素飽和度から表す。","熱希釈法は左室の血液温度の低下から心拍出量を計測できる。","熱希釈法は三尖弁、肺動脈弁逆流があると信頼性が低くなる。","Fick法はシャント性心疾患など短絡病変がある場合に適している。","色素希釈法は細いスリット状のガラス管に動脈血を通して測定するキュベット法がある。"],c:[1],e:"【正解：2（誤り）】\n熱希釈法は冷却液を右房に注入し肺動脈で温度変化を測定します（「左室」ではなく右室〜肺動脈系）。"},
{n:20,m:false,t:"IVUSで誤っているのはどれか。",o:["低周波数では深部の観察が困難になる。","方位分解能は超音波ビーム幅で規定される。","パルス波の送信と送信の間に受信が行われる。","距離分解能は超音波の波長（周波数）により規定される。","探触子から送信されたパルス波は音響インピーダンスの差がある点で反射と透過（一部吸収）が起こる。"],c:[0],e:"【正解：1（誤り）】\n低周波数（低MHz）は深部の観察能力が「向上」します（分解能は低下しますが深達性は増します）。"},
{n:21,m:false,t:"IVUSで正しいのはどれか。",o:["カテーテルのエア抜きを行うために滅菌精製水を満たす。","simple stuckはガイドワイヤーが切断された状態をいう。","NUDRによる計測誤差をなくすにはカテーテルを蛇行させておく。","カテーテルの断線や回転ムラを予防するためYコネクターを強く締める。","complex stuckはExit portにテントストラットがはまりこむことで起こる。"],c:[0],e:"【正解：1】\nIVUSカテーテルのエア抜き・プライミングには滅菌精製水を使用します。"},
{n:22,m:false,t:"画像のディジタル化で誤っているのはどれか。",o:["標本化はアナログ情報を適切な間隔で読み取る。","サンプリング定理を用いると情報の歪や損失がない。","量子化とはアナログ情報を離散的な整数値で読み取る。","A/D変換とはディジタル情報をアナログ情報に変換する。","サンプリングエラーは標本化定理を満たさないときに発生する。"],c:[3],e:"【正解：4（誤り）】\nA/D変換はアナログ→デジタル変換です。デジタル→アナログ変換はD/A変換です。"},
{n:23,m:false,t:"DQEで正しいのはどれか。",o:["解像特性","雑音特性","信号検出能","コントラスト特性","X線光子の利用効率"],c:[4],e:"【正解：5（X線光子の利用効率）】\nDQE（量子検出効率）は入射したX線光子がいかに効率よく画像信号に変換されたかを示す指標です。"},
{n:24,m:false,t:"医療情報の安全管理対策で誤っているのはどれか。",o:["法的対策","人的対策","組織的対策","物理的対策","技術的対策"],c:[0],e:"【正解：1（法的対策）】\n医療情報安全管理対策の分類は「人的・組織的・物理的・技術的」の4種類です。「法的対策」は通常の分類には含まれません。"},
{n:25,m:true,t:"病院情報システムの「真正性」確保に直接関連するのはどれか。2つ選べ。",o:["IDと指紋で利用者認証を行う。","外部保存の管理を第三者に委ねる。","いつでも診療データが確認できるようにする。","データの自動バックアップシステムを用意する。","データ保存時に自動的にタイムスタンプをつける。"],c:[0,4],e:"【正解：1と5】\n真正性はなりすまし防止と改ざん防止の保証。IDと指紋による利用者認証(1)とタイムスタンプ付与(5)が直接関連します。バックアップは「可用性」の対策です。"}
  ],
  c16_clinical: [{"n":1,"m":true,"t":"Forrester分類で正しいのはどれか。2つ選べ。","o":["末梢循環不全の指標は平均肺動脈楔入圧18 mmHg、肺うっ血の指標は心係数2.2 L/min/㎡である。","SubsetⅠは肺動脈楔入圧18 mmHg未満、心係数2.2 L/min/㎡より大である。","SubsetⅡは肺動脈楔入圧18 mmHg未満、心係数2.2 L/min/㎡以下である。","SubsetⅢは肺動脈楔入圧18 mmHg以上、心係数2.2 L/min/㎡より大である。","SubsetⅣは肺動脈楔入圧18 mmHg以上、心係数2.2 L/min/㎡以下である。"],"c":[1,4],"e":"【正解：2と5】Forrester分類：SubsetⅠ（正常）はPCWP<18かつCI>2.2。SubsetⅡ（肺うっ血）はPCWP≧18かつCI>2.2。SubsetⅢ（低充満圧性ショック）はPCWP<18かつCI≦2.2。SubsetⅣ（心原性ショック）はPCWP≧18かつCI≦2.2。肺うっ血の指標がPCWP≧18、末梢循環不全の指標がCI≦2.2。"},{"n":2,"m":false,"t":"僧帽弁逆流症（MR）の分類で正しいのはどれか。","o":["僧帽弁逸脱症は二次性（機能性）である。","リウマチ性によるものは一次性（器質性）である。","左室機能不全によるものは一次性（器質性）である。","弁尖や弁輪の硬化・石灰化によるものは二次性（機能性）である。","心筋梗塞における乳頭筋断裂によるものは二次性（機能性）である。"],"c":[1],"e":"【正解：2】リウマチ性による変性は弁自体の損傷であり一次性（器質性）に分類される。僧帽弁逸脱症・弁石灰化・乳頭筋断裂はいずれも一次性（器質性）。左室機能不全によるものは弁自体に異常がない二次性（機能性）。"},{"n":3,"m":true,"t":"図1はPCI中にIVUSを引き抜いた際の心電図ならびにカテーテル先端圧である。正しいのはどれか。2つ選べ。","o":["心電図は心房細動である。","心電図にST上昇を認める。","カテーテル先端圧は楔入気味になった。","カテーテルの振動により先端圧にアーチファクトが見られる。","ガイディングカテーテルに気泡が入り圧波形になまりが見られる。"],"c":[1,2],"e":"【正解：2と3】心電図にP波が確認できるため心房細動ではなく、ST上昇が認められる。カテーテル先端が深く入り圧波形が平坦化（楔入）している。振動アーチファクトや気泡によるダンピングは見られない。"},{"n":4,"m":true,"t":"冠動脈造影にてLAO45°Cranial25°で撮影した場合、描出に優れている部位はどれか。2つ選べ。","o":["対角枝","右冠動脈中間部","右冠動脈房室枝","左回旋枝近位部","左冠動脈後側壁枝"],"c":[0,3],"e":"【正解：1と4】LAO45°/Cranial25°はLCAの前壁方向を伸展させる角度。対角枝（Diagonal branch）と左回旋枝（LCX）近位部が良好に描出される。後側壁枝はCaudal方向が適している。"},{"n":5,"m":true,"t":"下記の組合せで正しいのはどれか。2つ選べ。","o":["TIMI分類 ― 肺動脈の血流評価","AHA分類 ― 僧帽弁閉鎖不全症の重症度の評価","Sellers分類 ― 大動脈弁閉鎖不全症の重症度を評価","Stanford分類 ― 大動脈解離の評価","DeBakey分類 ― 駆出率評価"],"c":[2,3],"e":"【正解：3と4】Sellers分類は造影による弁逆流（AR/MR）の重症度評価。Stanford分類はA型・B型による大動脈解離の範囲分類。TIMI分類は冠動脈血流評価（0〜3）。AHA分類は冠動脈の解剖学的セグメント分類。DeBakeyも大動脈解離の分類であり駆出率はEF。"},{"n":6,"m":true,"t":"正常の心臓の構造・生理機能で正しいのはどれか。2つ選べ。","o":["前負荷が大きいほど1回拍出量は低下する。","左回旋枝は左房室間溝に沿って後方に向かう。","安静時における心拍出量は毎分約2000 mlである。","右冠動脈は右房室間溝に沿って走行し心臓十字に至る。","左前下行枝は肺動脈の右側を回って前室間溝に沿って下降する。"],"c":[1,3],"e":"【正解：2と4】左回旋枝（LCX）は左房室間溝に沿って心臓の左側から後方へ向かう。右冠動脈（RCA）は右房室間溝を走行し心臓十字（Crux）に至る。スターリングの法則により前負荷が大きいほど1回拍出量は増加（選択肢1は誤り）。安静時心拍出量は約5000 ml/min（選択肢3は誤り）。LADは肺動脈の左側を回る（選択肢5は誤り）。"},{"n":7,"m":false,"t":"刺激伝導系および心電図波形で誤っているのはどれか。","o":["P波は右房、左房の脱分極を表す。","正常のPQ間隔は0.30〜0.50秒である。","T波の異常には二峰性、テント状、陰転などがある。","QRS波の異常は脚ブロック、心肥大、心筋梗塞に見られる。","刺激伝導系は心房→房室結節→His束→左右の脚→プルキンエ線維→心室の順で心臓を興奮させる。"],"c":[1],"e":"【正解：2（誤り）】正常なPQ間隔は0.12〜0.20秒。0.30秒以上はⅠ度房室ブロックに相当する。"},{"n":8,"m":true,"t":"心疾患で正しい組合せはどれか。2つ選べ。","o":["拡張型心筋症 ― 心筋の肥厚","肥大型心筋症 ― 心筋の菲薄化","大動脈弁狭窄症 ― 重症弁口面積1 cm2未満","たこつぼ心筋症 ― 右室流出路狭窄","僧帽弁閉鎖不全症 ― 左房の拡大"],"c":[2,4],"e":"【正解：3と5】大動脈弁狭窄症の重症度基準は弁口面積1.0 cm²未満。僧帽弁閉鎖不全症では逆流により左房が拡大する。拡張型心筋症は心筋菲薄化・収縮低下。肥大型心筋症は心筋肥厚。たこつぼ心筋症は心尖部の無収縮が特徴。"},{"n":9,"m":true,"t":"図2は心臓CTの画像である。正しいのはどれか。2つ選べ。","o":["アはUlcerを認める。","イはSVG（Saphenous vein graft）である。","ウはポジティブリモデリングを認める。","エのcはナプキンリングサインを認める。","オの左右冠動脈は右冠尖から分岐している。"],"c":[2,3],"e":"【正解：3と4】ウ（LAD）において血管外径が拡大するポジティブリモデリングが見られる。エの「c」は低吸収のコアを囲む高吸収のリムがあるナプキンリングサイン。アはUlcer確定困難。イはSVGとは断定できない。オの左右冠動脈は別々の冠尖から分岐。"},{"n":10,"m":true,"t":"冠動脈造影の撮影角度で正しいのはどれか。2つ選べ。","o":["RCA：LAO30°Caudal20° ― 遠位部の描出","RCA：RAO30° ― LCA病変の側副血行路の評価","LCA：Caudal30° ― RCA病変の側副血行路評価","LCA：RAO30°Caudal30° ― LCA全体像の描出","LCA：RAO30°Cranial30° ― LCx近位部から中間部の描出"],"c":[1,4],"e":"【正解：2と5】RCA RAO30°はRCA経由で描出されるLCA側副血行路評価に用いる。LCA RAO30°/Cranial30°は回旋枝近位から中間部の伸展に適している。LCA全体像にはLAO系が必要。"},{"n":11,"m":true,"t":"冠動脈造影の撮影技術で正しいのはどれか。2つ選べ。","o":["マイクロチャンネルの描出ではパニングを避ける。","動きの大きい右冠動脈は呼気での呼吸停止が有効である。","CTO症例は側副血行路の描出のため撮影時間を長くする。","小児の冠動脈造影は撮影レートを15 F/sから7.5 F/sに変更する。","対側造影は右冠動脈がCTOの場合、右冠動脈から造影し直後に左冠動脈を造影する。"],"c":[0,2],"e":"【正解：1と3】マイクロチャンネル（側副血行路）は非常に細いためパニング（視野移動）は禁忌。CTO症例では末梢の側副血行路が染まるまでに時間がかかるため撮影時間を長くする。小児は心拍数が早いためレートを下げると診断に支障が出る（選択肢4は誤り）。"},{"n":12,"m":false,"t":"図3は冠動脈造影の画像である。正しいのはどれか。","o":["右室枝が発達している。","左前下行枝に高度狭窄を認める。","左回旋枝への側副血行路を認める。","右冠動脈はRAO Viewで造影されている。","左冠動脈はLAO Cranial Viewで造影されている。"],"c":[2],"e":"【正解：3】図3において右冠動脈（RCA）が閉塞または高度狭窄しており、左回旋枝へ向かう側副血行路が描出されている所見が認められる。"},{"n":13,"m":true,"t":"急性心筋梗塞におけるPCIで正しいのはどれか。2つ選べ。","o":["TIMI3からTIMI0を目指して治療を行う。","再灌流時に致死性不整脈を生じることがある。","door-to-balloon時間は120分以内が望ましい。","IABPは冠血流を増加させ左室の前負荷を軽減させる。","心電図におけるST波高はQRS波とST部分を繋ぐJ点で計測する。"],"c":[1,4],"e":"【正解：2と5】血流再開時にVTなどの再灌流不整脈（致死性不整脈）が起こることがある。ST高さはQRSとSTの接点であるJ点で計測するのが標準。治療目標はTIMI0からTIMI3への回復（選択肢1は逆）。D2B目標時間は90分以内（選択肢3は誤り）。IABPは後負荷を軽減（選択肢4は前負荷が誤り）。"},{"n":14,"m":true,"t":"僧帽弁で正しいのはどれか。2つ選べ。","o":["三尖弁である。","狭窄症に対してPTSMAが行われる。","右房から右室への逆流を防ぐ役割がある。","弁尖、弁輪、腱索、乳頭筋から構成される。","閉鎖不全症の治療にMitraClipが用いられる。"],"c":[3,4],"e":"【正解：4と5】弁装置は弁尖・弁輪・腱索・乳頭筋で構成される。重症MRの治療にはカテーテルでクリップするMitraClipが用いられる。僧帽弁は二尖弁（選択肢1は誤り）。PTSMAは肥大型心筋症の治療（選択肢2は誤り）。左房から左室への逆流を防ぐ（選択肢3は誤り）。"},{"n":15,"m":false,"t":"先天性心疾患で誤っているのはどれか。","o":["大動脈縮窄症では上下肢で血圧差が生じる。","動脈管開存症は右房と右室に容量負荷が発生する。","心房中隔欠損症は欠損孔拡大に伴いアイゼンメンジャ症候群をきたす。","ファロー四徴症は心室中隔欠損孔を介して静脈血が体循環側へ流入する。","心室中隔欠損症は左室から右室への短絡を介して肺循環血液量が増加する。"],"c":[1],"e":"【正解：2（誤り）】動脈管開存症（PDA）は大動脈から肺動脈へ流れるため左房・左室に容量負荷がかかる。右房・右室負荷はASDの特徴。"},{"n":16,"m":true,"t":"IVUSで正しいのはどれか。2つ選べ。","o":["ISRとはStentが圧着不良の状態である。","機械操作式では回転ムラによりNURDが発生する。","電子操作式ではガイドワイヤアーチファクトが発生する。","高度石灰化病変において石灰化の厚みを知ることができる。","Attenuation plaqueは拡張に伴い末梢塞栓のリスクを有している。"],"c":[1,4],"e":"【正解：2と5】機械走査式では回転軸の摩擦により回転ムラ（NURD）が発生する。Attenuation plaque（減衰を伴う脂質性プラーク）はPCI中に末梢塞栓を起こすリスクが高い。ISRはステント内再狭窄（圧着不良はMalapposition）。ガイドワイヤアーチファクトは電子走査式で発生。IVUSは石灰化の厚みを測れない（OCTは可能）。"},{"n":17,"m":true,"t":"大動脈弁狭窄症で正しいのはどれか。2つ選べ。","o":["大動脈弁の開放制限が起こり前負荷を増大させる。","引き抜き圧や同時圧測定で重症度を診断する事ができる。","原因として先天性、リウマチ性、加齢・動脈硬化性がある。","右室肥大に伴い微小循環障害が発生し胸痛を呈することがある。","BAV（バルーン大動脈弁形成術）は心室中隔穿刺を行って大動脈弁にアクセスする。"],"c":[1,2],"e":"【正解：2と3】弁の前後（左室と大動脈）の圧力差を測って重症度を判定する。原因には先天性（二尖弁）・リウマチ性・動脈硬化性（加齢）がある。ASでは後負荷が増大（前負荷ではない）。左室肥大をきたす（右室ではない）。BAVは大腿動脈から逆行的に行うのが通常。"},{"n":18,"m":true,"t":"図4の冠動脈造影で正しいのはどれか。2つ選べ。","o":["橈骨動脈アプローチである。","RCA近位部に50%以上の狭窄を認める。","LAD近位部に50%以上の狭窄を認める。","LCX近位部に50%以上の狭窄を認める。","LMはカテーテルのdeep engageのために評価困難である。"],"c":[1,2],"e":"【正解：2と3】図4においてRCA近位部およびLAD近位部の両方に50%以上の狭窄所見が認められる。"},{"n":19,"m":true,"t":"IABPで正しいのはどれか。2つ選べ。","o":["上行大動脈に留置する。","冠動脈血流増大効果が見込める。","心臓の拡張期にバルーンを拡張させる。","IMPELLAと併用することで効果をあげる。","バルーンの収縮により末梢血管抵抗が増大する。"],"c":[1,2],"e":"【正解：2と3】拡張期に膨らむことで冠動脈への血流を押し込む（オーグメンテーション）効果がある。心臓の拡張期（T波付近）に合わせてバルーンを膨らませる。留置場所は下行大動脈（上行は禁忌）。バルーン収縮により後負荷（末梢血管抵抗）を減少させる。"},{"n":20,"m":true,"t":"図5はCAGとIVUS画像である。正しいのはどれか。2つ選べ。","o":["脂質性プラークを疑う。","重度の石灰化病変を疑う。","LAO/Cranial viewである。","PCI時には末梢塞栓の危険性がある。","矢印（→）の病変部はAHA分類で#4に相当する。"],"c":[0,3],"e":"【正解：1と4】IVUSでプラークの背後が暗くなる「アッテネーション」が見られる場合、脂質性プラークを疑う。脂質性プラークはPCI刺激で崩れやすく末梢塞栓（Slow flow）の危険がある。"},{"n":21,"m":false,"t":"PCIの合併症と対処法で誤っているのはどれか。","o":["心室細動 ― 電気的除細動","冠動脈解離 ― STENT留置","心タンポナーデ ― 心嚢穿刺","無脈性電気活動（PEA） ― 電気的除細動","ヘパリン起因性血小板減少症（HIT） ― 抗トロンビン薬投与"],"c":[3],"e":"【正解：4（誤り）】PEA（無脈性電気活動）に対して電気的除細動は適応外（無効）。PEAには直ちにCPR（胸骨圧迫）とアドレナリン投与が必要。"},{"n":22,"m":true,"t":"心房中隔欠損症（ASD）で正しいのはどれか。2つ選べ。","o":["女性に多くみられる。","最も多いのは一次孔欠損である。","右房から左房のシャント疾患である。","先天性心疾患の中で20〜25%の割合を占める。","カテーテル治療で使用する閉鎖栓の径は6 mmからである。"],"c":[0,3],"e":"【正解：1と4】ASDは統計的に女性に多い。先天性心疾患の中で20〜25%の割合を占める。最も多い型は二次孔欠損（選択肢2は誤り）。左房から右房への短絡（選択肢3は逆）。"},{"n":23,"m":true,"t":"僧帽弁閉鎖不全症（MR）で正しいのはどれか。2つ選べ。","o":["一次性（MR）の原因疾患に心房細動がある。","二次性（MR）とは器質的異常によって生じる。","治療の第一選択は閉鎖栓によるカテーテル治療である。","重症度の判定に経胸壁心エコー図検査（TTE）を用いる。","右小開胸アプローチ（MICS）は侵襲度が低く早期回復が可能である。"],"c":[3,4],"e":"【正解：4と5】経胸壁心エコー（TTE）が診断と重症度評価の基本。MICS（右小開胸アプローチ）は従来の正中切開より回復が早い低侵襲手術。心房細動は二次性MRの原因（選択肢1は誤り）。二次性とは左室・左房の形態変化によるもの（選択肢2は逆）。"},{"n":24,"m":true,"t":"心血管造影検査で正しいのはどれか。2つ選べ。","o":["冠動脈造影のパルス幅は4〜8 msで撮影する。","肺動脈造影にはバーマンカテーテルを用いる。","右心室造影にはSwan-Ganzカテーテルを用いる。","パワーインジェクタ使用時はカテーテルの定格圧を考慮しない。","左心室造影の撮影方向は通常RAO 30°およびLAO 20°である。"],"c":[0,1],"e":"【正解：1と2】冠動脈造影は心臓の動きを止めて撮るため短いパルス幅（4〜8 ms）を使用。肺動脈造影には側孔のあるバーマンカテーテルが用いられる。右心室造影にはピッグテール型等を使用（Swan-Ganzは圧測定・採血用）。左心室造影の標準角度はRAO 30°およびLAO 60°。"},{"n":25,"m":true,"t":"冠動脈の病変評価法で正しいのはどれか。2つ選べ。","o":["石灰化が軽度の病変はType Cに該当する。","ACC/AHA分類に基づいた視覚評価法がある。","びまん性病変は10 mm以上の長さのものをいう。","TIMI Grade 3とは末梢まで正常に造影されることである。","狭窄度の判定は完全閉塞100%を含めて5つに分類される。"],"c":[1,3],"e":"【正解：2と4】PCIの難易度を予測するACC/AHA分類が広く用いられている。TIMI Grade 3は造影遅延がなく末梢まで正常に造影される状態。高度石灰化・屈曲・長い病変（>20mm）などがType C（軽度はA）。びまん性病変は20mm以上。"},{"n":26,"m":true,"t":"脳底動脈から分岐するのはどれか。2つ選べ。","o":["眼動脈","後頭動脈","上小脳動脈","浅側頭動脈","前下小脳動脈"],"c":[2,4],"e":"【正解：3と5】上小脳動脈（SCA）は脳底動脈先端付近から分岐。前下小脳動脈（AICA）は脳底動脈尾側から分岐。眼動脈は内頸動脈から、後頭動脈・浅側頭動脈は外頸動脈から分岐。"},{"n":27,"m":true,"t":"組合せで正しいのはどれか。2つ選べ。","o":["中心溝 ― Sylvius溝","外側溝 ― Rolando溝","前頭葉 ― Frontal lobe","頭頂葉 ― Parietal lobe","側頭葉 ― Occipital lobe"],"c":[2,3],"e":"【正解：3と4】前頭葉はFrontal lobe、頭頂葉はParietal lobe。中心溝はRolando溝、外側溝はSylvius溝（選択肢1・2は逆）。側頭葉はTemporal lobe（Occipital lobeは後頭葉）。"},{"n":28,"m":true,"t":"くも膜下出血の原因で正しいのはどれか。2つ選べ。","o":["外傷","心房細動","脳動静脈奇形","正常圧水頭症","たこつぼ心筋症"],"c":[0,2],"e":"【正解：1と3】外傷性くも膜下出血は頻度が高い。脳動静脈奇形（AVM）の異常血管破裂によりSAHを来す。心房細動は脳塞栓症の原因。正常圧水頭症はSAHの結果として起こることはあるが原因ではない。"},{"n":29,"m":false,"t":"脳出血と眼球位置（共同偏視）で誤っているのはどれか。","o":["橋出血 ― 正中位固定","視床出血 ― 下方共同偏視","被殻出血 ― 健側への共同偏視","小脳出血 ― 健側への共同偏視","皮質下出血 ― 病側への共同偏視"],"c":[2],"e":"【正解：3（誤り）】被殻出血では眼球は「病側（出血側）」を向く。健側を向くのは誤り。橋出血は正中位固定、視床出血は下方偏視、小脳出血は健側偏視、皮質下出血は病側偏視が正しい。"},{"n":30,"m":false,"t":"血液脳関門を通過できないのはどれか。","o":["水","酸素","造影剤","アルコール","グルコース"],"c":[2],"e":"【正解：3】ヨード造影剤は高分子・水溶性であり通常の状態ではBBBを通過しない。水・酸素・アルコール・グルコースはBBBを通過できる。"},{"n":31,"m":false,"t":"図6の丸で囲んだ血管はどれか。","o":["眼動脈","中大脳動脈","後大脳動脈","後下小脳動脈","前脈絡叢動脈"],"c":[1],"e":"【正解：2】図6の正面像において外側（シルビウス裂方向）へ向かう太い血管は中大脳動脈（MCA）。"},{"n":32,"m":true,"t":"総頚動脈撮影で正しいのはどれか。2つ選べ。","o":["Waters法で撮影する。","補償フィルタは不要である。","前頭部と頭頂部を含めて撮影する。","頭部は動きにくいので固定する必要がない。","正中矢状面を寝台に対し垂直にセッティングする。"],"c":[2,4],"e":"【正解：3と5】静脈相の流出まで評価するため前頭部・頭頂部を含む頭部全体を視野に入れる。左右対称な正面像を得るため正中矢状面を垂直にセッティングする。補償フィルタは白とびを防ぐために有用（選択肢2は誤り）。DSAでは体動に弱いため厳重な固定が必要（選択肢4は誤り）。"},{"n":33,"m":true,"t":"脳静脈洞血栓症の所見で正しいのはどれか。2つ選べ。","o":["単純CTで血栓は低信号となる。","造影CTでempty triangleがみられる。","造影MRIで血液プール造影効果欠損を認める。","急性期ではMRIのFLAIR像で低信号域を認める。","急性期ではMRIのT1WIで中等度〜低信号、T2WIで低信号となる。"],"c":[1,2],"e":"【正解：2と3】造影CTで静脈洞内の血栓が染まらずempty triangleが見られる。造影MRIで血管内の信号が欠損する。新鮮血栓は単純CTで高吸収（dense vein sign）を呈する（選択肢1は誤り）。"},{"n":34,"m":true,"t":"脳血管造影法で正しいのはどれか。2つ選べ。","o":["Matas法は側面画像で評価する。","Caldwell法は外頸動脈の描出に優れている。","Town法は内頚動脈の一般的な撮影方法である。","Matas法は前交通動脈を介する血流を評価する。","Alcock法は造影剤を注入する椎骨動脈の同側総頚動脈を用手圧迫の上で撮影する。"],"c":[3,4],"e":"【正解：4と5】Matas法は反対側ICAを圧迫し前交通動脈を介する血流を評価する（正面画像）。Alcock法はVAからの注入時に同側CCAを圧迫しPCoAを介した血流を評価する。Town法は主に椎骨動脈系（後方循環）の観察に用いられる（選択肢3は誤り）。"},{"n":35,"m":false,"t":"脳出血と破綻血管で正しいのはどれか。","o":["脳幹出血 ― 橋動脈","被殻出血 ― 上小脳動脈","小脳出血 ― 前脈絡叢動脈","視床出血 ― レンズ核線条体動脈","皮質下出血 ― 視床穿通動脈"],"c":[0],"e":"【正解：1】脳幹出血の主原因は脳底動脈の穿通枝である橋動脈の破綻。被殻出血はレンズ核線条体動脈、視床出血は視床穿通動脈が原因。"},{"n":36,"m":true,"t":"CASで正しいのはどれか。2つ選べ。","o":["主な合併症は脳梗塞である。","本邦での治療件数は内膜剥離術が多い。","施術前に抗血小板薬を服用することは推奨されていない。","施術後に脳血流が増加し過灌流症候群が起きることがある。","施術後多くの場合は高血圧となるが血圧が上がらない場合は十分な昇圧を行う必要がある。"],"c":[0,3],"e":"【正解：1と4】CASの主な合併症はプラーク飛散による脳梗塞。狭窄解除後の血流急増による過灌流症候群が起きることがある。血栓予防のためDAPT（2剤併用）が強く推奨される（選択肢3は誤り）。施術後は過灌流を防ぐための厳格な降圧が必要（選択肢5は誤り）。"},{"n":37,"m":true,"t":"CASで正しいのはどれか。2つ選べ。","o":["薬剤溶出性バルーンが用いられる。","バルーン拡張型ステントが使用される。","オープンセルタイプのステントは屈曲病変に強い。","バルーン拡張により頚動脈洞が刺激されると高度頻脈となり血圧の上昇に注意が必要である。","狭窄率50%以上の症候性病変または80%以上の無症候性病変のアテローム性病変に適応される。"],"c":[2,4],"e":"【正解：3と5】オープンセルタイプは柔軟性が高く蛇行血管・屈曲病変に適応。症候性50%以上・無症候性80%以上が現行の治療指針に基づく適応基準。頸動脈洞刺激により徐脈・血圧低下が起こる（選択肢4は逆）。自己拡張型ステントが標準（選択肢2は誤り）。"},{"n":38,"m":true,"t":"rt-PA療法の治療指針で正しいのはどれか。2つ選べ。","o":["抗凝固療法中の患者に適応はない。","GCS(Glasgow Coma Scale)を用いた客観的な重症度評価を行う。","静注血栓溶解療法の効果を確認してから機械的血栓回収療法を行う。","静注血栓溶解療法は機械的血栓回収療法前に開始することが強く勧められる。","1ヶ月以内の脳梗塞(症状が短時間に消失している場合を含まない)は適応外である。"],"c":[0,3],"e":"【正解：1と4】抗凝固療法中の患者への適応はない。静注血栓溶解療法は機械的血栓回収療法前に開始することが強く勧められる。重症度評価にはNIHSS（NIH Stroke Scale）を用いる（GCSではない）。静注療法の効果確認を待たずに並行して機械的回収を進めることが推奨される（選択肢3は誤り）。"},{"n":39,"m":false,"t":"rt-PAの治療開始可能時間で正しいのはどれか。","o":["3時間","4.5時間","6.5時間","8時間","16時間"],"c":[1],"e":"【正解：2（4.5時間）】rt-PA（アルテプラーゼ）による静注血栓溶解療法は発症から4.5時間以内に開始できる。"},{"n":40,"m":false,"t":"硬膜動静脈瘻の血管内治療で誤っているのはどれか。","o":["Onyxを使用する。","NBCAを使用する。","Onyx注入後、完全に固形化すると体積が20%程度膨張する。","静脈側でバルーンを用いたフローコントロールを行うことがある。","CBCTはShunt point、終末動脈、導出静脈の描出に有効である。"],"c":[2],"e":"【正解：3（誤り）】Onyxは硬化（固形化）後に体積は縮小（収縮）する。膨張するという記述は誤り。OnlyxとNBCAはともに液体塞栓物質として使用される。"},{"n":41,"m":true,"t":"硬膜動静脈瘻で正しいのはどれか。2つ選べ。","o":["先天性疾患である。","4 vessel studyが基本となる。","sinus typeはTVEが治療の基本となる。","シャントポイント把握のため高速撮影をする。","3D-DAでは流入動脈が確認できた時点で撮影を開始する。"],"c":[1,2],"e":"【正解：2と3】全ての栄養血管（左右ICA/ECA）を精査するため4 vessel studyが基本。sinus typeは静脈洞を塞栓するTVE（経静脈的塞栓術）が治療の基本。脳静脈洞血栓症などを原因とする後天性疾患（選択肢1は誤り）。3D-RAは目的血管が充満した後に回転を開始（選択肢5は誤り）。"},{"n":42,"m":false,"t":"脳動静脈奇形の外科手術前塞栓術で使用できる塞栓物質はどれか。","o":["Onyx","Lipiodol","DC Bead","Detachable coil","EO (Ethanolamine Oleate)"],"c":[0],"e":"【正解：1】Onyxは血管塊（ナイダス）の深部まで浸透させる液体塞栓物質として脳AVM術前塞栓の第一選択。Lipiodolは混合剤、DC Beadは体部用、EOは静脈瘤用。Detachable coilは流入動脈塞栓に用いる場合もある。"},{"n":43,"m":false,"t":"脳動脈瘤コイル塞栓術に使用されるステントで正しいのはどれか。","o":["Closed cell stentはradial forceが強い。","Closed cell stentは血管壁との密着性が良い。","Closed cell stentはステントセルが比較的大きい。","Open cell stentは全展開前であればリシースが可能である。","Open cell stentは高度屈曲部ではステントが十分に拡張しないことがある。"],"c":[0],"e":"【正解：1】Closed cell stentは網目が密で固定されているためradial force（血管を押し広げる力）が強い。セルは小さいのが特徴（選択肢3は誤り）。屈曲部での密着性はOpen cellの方が優れる（選択肢2は誤り）。リシース可能なのはClosed cell構造の特定ステント（選択肢4は誤り）。"},{"n":44,"m":true,"t":"脳動脈瘤の血管内治療で正しいのはどれか。2つ選べ。","o":["Radial approachでは施行できない。","脳動脈瘤の方向によってはchin upが有効である。","Flow diverter stent留置直後はeclipse signが観察できる。","Wide neckな嚢状動脈瘤に対してsimple techniqueが施行される。","母血管と動脈瘤を観察するために用いるBarrel Viewとは母血管の長軸像で観察できる角度をいう。"],"c":[1,2],"e":"【正解：2と3】顎を上げるchin upで内頸動脈の屈曲を伸ばせる。FD stent留置直後にステント断面が楕円形に見えるeclipse signが適切な展開状態の確認サインとなる。橈骨動脈アプローチも技術の進歩により可能（選択肢1は誤り）。Barrel Viewは母血管の短軸方向（輪切り）の角度（選択肢5は誤り）。"},{"n":45,"m":true,"t":"使用するデバイスの組合せで正しいのはどれか。2つ選べ。","o":["脳梗塞 ― Solitaire","脳動脈瘤 ― PRECISE","頚動脈狭窄 ― DCB","脳動静脈奇形 ― Detachable coil","海綿静脈洞部硬膜動静脈瘻 ― W-EB"],"c":[0,3],"e":"【正解：1と4】Solitaireはステントリトリーバの代表製品で脳梗塞の血栓回収に使用。Detachable coilは脳AVM流入動脈の塞栓に使用。PRECISEは頸動脈（CAS）用ステント（選択肢2は誤り）。WEBは嚢状動脈瘤の瘤内塞栓デバイス（選択肢5は誤り）。"},{"n":46,"m":true,"t":"Flow diverterで正しいのはどれか。2つ選べ。","o":["破裂急性期の動脈瘤が治療適応である。","拡張不良の場合はバルーンにて拡張する。","ナローネック(ネック長4 mm以下)の動脈瘤が適応である。","内頚動脈の錐体部から上下下垂体における動脈瘤が適応である。","大型(最大瘤径10〜25 mm)または巨大動脈瘤(最大瘤径25 mm以上)は適応外である。"],"c":[1,3],"e":"【正解：2と4】拡張不良の場合はバルーンでステントを壁に密着させる。内頸動脈の錐体部から上下下垂体が現在承認されている主な適応部位。抗血小板薬が必要なため破裂急性期は原則適応外（選択肢1は誤り）。大型・巨大動脈瘤が最大の適応（選択肢5は誤り）。"},{"n":47,"m":true,"t":"脳動静脈奇形（AVM）で正しいのはどれか。2つ選べ。","o":["動脈瘤を合併することがある。","外傷、手術などで後天的に発生する。","根治を目的とした血管内治療が第一選択である。","血管内治療ではdrainerを塞栓することが一般的である。","盗血現象によって周辺部の脳は乏血状態になることがある。"],"c":[0,4],"e":"【正解：1と5】流入動脈の負荷により動脈瘤を合併することがある。シャントへ血流が奪われる盗血現象により周辺脳が乏血状態になる。脳AVMは先天性（選択肢2は誤り）。開頭摘出や放射線治療を含めた集学的治療の一環（選択肢3は誤り）。ドレナージ静脈を先に塞栓すると内圧上昇・破裂のため禁忌（選択肢4は誤り）。"},{"n":48,"m":true,"t":"最終健常確認時刻から24時間以内の急性期脳梗塞患者への適応が承認されているステントリトリーバ―はどれか。2つ選べ。","o":["Tron FX","Trevo Pro","EmboTrap","REVIVE SE","Solitaire FR"],"c":[1,4],"e":"【正解：2と5】DAWN/DEFUSE-3試験においてTrevo ProとSolitaire FRが24時間以内（後期時間枠）への適応拡大で良好な成績を示し、承認・推奨されている。"},{"n":49,"m":true,"t":"脳疾患が疑われる症状で正しいのはどれか。2つ選べ。","o":["頭痛 ― 脳梗塞","めまい ― くも膜下出血","共同偏視 ― 脳梗塞","手足のしびれ ― 脳腫瘍","ろれつが回らない ― 血管の拡張"],"c":[2,3],"e":"【正解：3と4】共同偏視（眼球が一側を向く）は脳梗塞などの大脳・脳幹病変で生じる。手足のしびれは脳腫瘍（感覚野への圧迫）でも起こりうる。頭痛はくも膜下出血の代表症状（選択肢1の対応は逆）。めまいは脳梗塞（特に後方循環）の症状（選択肢2の対応は逆）。"},{"n":50,"m":true,"t":"Blank roadmapで正しいのはどれか。2つ選べ。","o":["3D-DAを利用する。","体動の影響を受けにくい。","標的血管への誘導に有用である。","注入時間が長いOnyx注入に有用である。","骨やそれまでに留置されたデバイスがサブトラクションされる。"],"c":[3,4],"e":"【正解：4と5】Blank roadmapはOnyx注入時の塞栓物質の広がりを骨を消して観察するのに適している。骨や既留置デバイスがサブトラクションされ塞栓物質のみが描出される。サブトラクション画像を用いるため体動に非常に弱い（選択肢2は誤り）。誘導には通常のロードマップを使用（選択肢3は誤り）。"},{"n":51,"m":false,"t":"腹部大動脈から分岐する血管の順番で3番目はどれか。","o":["右腎動脈","精巣動脈","腹腔動脈","上腸間膜動脈","下腸間膜動脈"],"c":[0],"e":"【正解：1（右腎動脈）】腹部大動脈からの分岐順は概ね：①腹腔動脈、②上腸間膜動脈、③腎動脈（左右）、④精巣（卵巣）動脈、⑤下腸間膜動脈。3番目は腎動脈（右腎動脈）に相当する。"},{"n":52,"m":false,"t":"図7は腹腔動脈造影である。矢印が示す血管はどれか。","o":["脾動脈","左胃動脈","右肝動脈","総肝動脈","固有肝動脈"],"c":[1],"e":"【正解：2（左胃動脈）】図7の腹腔動脈造影において矢印が示す血管は左胃動脈。腹腔動脈は左胃動脈・総肝動脈・脾動脈の3本に分岐するのが基本形（Michels分類Type I）。"},{"n":53,"m":true,"t":"胸腹部の血管解剖で正しいのはどれか。2つ選べ。","o":["膵臓は腹腔動脈と下腸間膜動脈によって栄養される。","気管支動脈は肺動脈から起始し主気管支に沿って走行する。","左腎静脈は下腸間膜動脈の後方を走行し下大静脈に環流する。","胸部大動脈は上行大動脈・大動脈弓・下行大動脈に区分される。","通常、右副腎静脈は下大静脈へ左副腎静脈は左腎静脈に環流する。"],"c":[3,4],"e":"【正解：4と5】胸部大動脈は上行大動脈・大動脈弓・下行大動脈に区分される。右副腎静脈は下大静脈へ、左副腎静脈は左腎静脈に環流するのが通常。膵臓は腹腔動脈と上腸間膜動脈によって栄養される（選択肢1は誤り）。気管支動脈は胸部大動脈から起始（選択肢2は誤り）。"},{"n":54,"m":false,"t":"図8は左腎動脈造影である。疑われる疾患はどれか。","o":["腎外傷","腎動脈瘤","腎細胞癌","腎動静脈瘻","腎血管筋脂肪種"],"c":[3],"e":"【正解：4（腎動静脈瘻）】図8の左腎動脈造影において早期静脈還流（early venous return）が認められる場合、腎動静脈瘻（AVF）が疑われる。"},{"n":55,"m":false,"t":"慢性血栓塞栓性肺高血圧の診断基準となっている肺動脈血管造影所見で誤っているのはどれか。","o":["完全閉塞","急激な先細り","血管壁の不整","壁在血栓による造影欠損","篩状あるいは線状の欠損像"],"c":[2],"e":"【正解：3（誤り）】CTEPH（慢性血栓塞栓性肺高血圧）の診断基準となる血管造影所見は完全閉塞・急激な先細り・壁在血栓による造影欠損・篩状または線状の欠損像。「血管壁の不整」は診断基準に含まれない。"},{"n":56,"m":true,"t":"子宮筋腫に対する子宮動脈塞栓術の絶対的禁忌はどれか。2つ選べ。","o":["貧血","妊娠中","月経過多","月経困難症","子宮または付属器の悪性腫瘍またはその疑い"],"c":[1,4],"e":"【正解：2と5】妊娠中および子宮・付属器の悪性腫瘍（またはその疑い）がUAEの絶対的禁忌。貧血・月経過多・月経困難症はUAEの適応（禁忌ではない）。"},{"n":57,"m":true,"t":"血管塞栓術の塞栓物質で正しいのはどれか。2つ選べ。","o":["消化管出血に対しエタノールを使用した。","骨盤内出血にゼラチンスポンジを使用した。","NBCAは水溶性造影剤と混合して使用する。","肺動静脈奇形に対し塞栓物質としてゼラチンスポンジを使用した。","肝細胞癌に対し肝動脈にリピオドールと抗癌剤を注入後、多孔性ゼラチン粒を使用した。"],"c":[1,4],"e":"【正解：2と5】骨盤内出血にはゼラチンスポンジが広く使用される。肝細胞癌TACEではリピオドール+抗癌剤注入後に多孔性ゼラチン粒（ジェルパート等）を使用する。NBCAはリピオドールと混合して使用（水溶性造影剤と混合すると重合するため不可）。エタノールは消化管出血には使用しない（組織壊死のリスク）。"},{"n":58,"m":true,"t":"慢性血栓塞栓症性肺高血圧症（CTEPH）に対する肺動脈バルーン形成術（BPA）で正しいのはどれか。2つ選べ。","o":["肺動脈血管造影はCTEPHのスクリーニング検査である。","CTEPHは器質化血栓により肺動脈が閉塞した病態である。","1回の治療で多くの血管を治療する単回治療が有効である。","完全閉塞病変ではpouch defectが造影CT所見として見られる。","呼気下でのデバイス操作は肺動脈が直線化し分枝への迷入を防ぐことができる。"],"c":[1,3],"e":"【正解：2と4】CTEPHは器質化血栓により肺動脈が閉塞した病態。完全閉塞病変では造影CTでpouch defect（盲端）が見られる。BPAは複数回に分けて行う（単回治療ではない）。スクリーニングにはV/Qシンチや心エコーが用いられる（選択肢1は誤り）。"},{"n":59,"m":false,"t":"門脈ステント留置術で誤っているのはどれか。","o":["悪性腫瘍に伴う開存期間は良性門脈閉塞と比較して短い。","肝外門脈閉塞による肝前性門脈圧亢進症に対して行なう。","Budd-Chiari syndromeによる門脈圧亢進症が適応である。","求肝性門脈側副路が存在する場合、側副路の塞栓も考慮する。","アプローチとして肝内門脈二次分枝あるいはその末梢へ超音波ガイド下で穿刺する。"],"c":[2],"e":"【正解：3（誤り）】Budd-Chiari syndrome（肝静脈閉塞による肝後性門脈圧亢進症）は門脈ステント留置の適応ではなく、下大静脈・肝静脈形成術やTIPSが適応となる。"},{"n":60,"m":false,"t":"腸間膜動脈の血栓溶解療法で正しいのはどれか。","o":["マイクロカテーテルは使用しない。","合併症として血管の解離や穿孔がある。","血管拡張や血栓吸引を併用することはない。","持続動注の際は末梢にカテーテルを留置する。","ウロキナーゼの持続動注のほかにヘパリンを併用する。"],"c":[4],"e":"【正解：5】ウロキナーゼの持続動注に加えてヘパリンを併用することが一般的。合併症として血管解離・穿孔があるが（選択肢2も正しい記述）、「正しいもの」として最も適切なのは選択肢5。マイクロカテーテルも使用する（選択肢1は誤り）。血管拡張や血栓吸引を併用することもある（選択肢3は誤り）。"},{"n":61,"m":true,"t":"肺血栓塞栓症（PTE）の血栓溶解療法で正しいのはどれか。2つ選べ。","o":["血栓溶解薬にモンテプラーゼを用いる。","ショックを伴う重症PTEは適応である。","ヘパリン単独治療群にくらべ脳出血の発生率は低い。","血行動態が安定した右心機能不全のPTEは適応である。","カテーテルを肺動脈に誘導し局所投与する方法が効果的である。"],"c":[0,1],"e":"【正解：1と2】血栓溶解薬としてモンテプラーゼ（モンテプラーゼ）が使用される。ショックを伴う重症PTEは血栓溶解療法の適応。ヘパリン単独群より脳出血発生率が高い（選択肢3は誤り）。血行動態が安定した右心機能不全は相対適応であり選択肢4は施設により異なる。局所投与より全身投与が標準（選択肢5は誤り）。"},{"n":62,"m":false,"t":"門脈圧亢進症の治療で保険適応外の治療はどれか。","o":["部分的脾動脈塞栓術（PSE）","経皮経肝的静脈瘤硬化術（PTS）","経皮経肝的静脈瘤塞栓術（PTO）","経静脈的肝内静脈門脈短絡術（TIPS）","バルーン閉塞下逆行性静脈塞栓術（B-RTO）"],"c":[3],"e":"【正解：4（TIPS）】日本においてTIPS（経静脈的肝内静脈門脈短絡術）は門脈圧亢進症に対して保険適応外とされている（2023年時点）。PSE・PTS・PTO・B-RTOは保険適応。"},{"n":63,"m":true,"t":"部分的脾動脈塞栓術（PSE）で正しいのはどれか。2つ選べ。","o":["血小板減少症には適応ではない。","脾静脈閉塞による静脈瘤出血には適応ではない。","非選択的PSEでは金属コイルが主に用いられる。","合併症として脾機能亢進の再発や脾膿瘍や腹水がある。","PSEによる脾梗塞の範囲が脾臓体積の50〜70%程度で塞栓を行う。"],"c":[3,4],"e":"【正解：4と5】PSEの合併症として脾機能亢進の再発・脾膿瘍・腹水がある。脾梗塞の範囲は脾臓体積の50〜70%程度が目安。血小板減少症はPSEの良い適応（選択肢1は誤り）。脾静脈閉塞による静脈瘤出血も適応となる（選択肢2は誤り）。"},{"n":64,"m":true,"t":"胸腹部のリンパ系IVRで正しいのはどれか。2つ選べ。","o":["リンパ管造影にはリピオドールを用いる。","術前診断にはMRIのT1強調像が有用である。","外科的手術後の乳び胸水は塞栓術の良い適用である。","リンパ漏出部の特定には足背からのリンパ管造影が有用である。","乳び腹水ではリンパ漏出部位より下流にアプローチし塞栓を行う。"],"c":[0,2],"e":"【正解：1と3】リンパ管造影にはリピオドール（油性造影剤）を用いる。外科的手術後の乳び胸水（術後乳び胸）は塞栓術の良い適応。乳び腹水では漏出部位より上流（中枢側）にアプローチして塞栓を行う（選択肢5は誤り）。"},{"n":65,"m":false,"t":"バルーン閉塞下逆行性静脈閉鎖術（B-RTO）で誤っているのはどれか。","o":["金属コイルを使用する。","下横隔静脈への短絡には注意を要する。","根治的食道静脈瘤治療の第一選択である。","術前の造影CTで血行動態の把握ができる。","炭酸ガスを用いた泡状硬化剤で治療を行う。"],"c":[2],"e":"【正解：3（誤り）】B-RTOは胃静脈瘤（特に孤立性胃静脈瘤）治療の第一選択。根治的食道静脈瘤治療の第一選択ではない（食道静脈瘤はEVL等が優先される場合が多い）。"},{"n":66,"m":false,"t":"肺動静脈奇形で誤っているはどれか。","o":["右→左シャント疾患である。","塞栓には液体塞栓物質を用いる。","奇異性塞栓症による脳卒中・脳膿瘍がある。","IVRにおける血管塞栓術が第一選択である。","無症候例でも流入動脈径が3 mmを超えた場合は治療適応である。"],"c":[1],"e":"【正解：2（誤り）】肺動静脈奇形の塞栓にはコイル（金属塞栓物質）が第一選択として使用される。液体塞栓物質（エタノール等）は一般的ではない。"},{"n":67,"m":true,"t":"内臓動脈瘤で正しいのはどれか。2つ選べ。","o":["動脈瘤の発生部位は腹腔動脈が最も多い。","コイルパッキングは仮性動脈瘤に有効である。","仮性動脈瘤のサイズによって治療の可否を決定する。","瘤内への塞栓には24%以上のコイル充填率が必要である。","真性動脈瘤に対するステントグラフトは保険適応外である。"],"c":[1,3],"e":"【正解：2と4】コイルパッキングは仮性動脈瘤の治療に有効。瘤内塞栓には24%以上のコイル充填率が必要とされる。内臓動脈瘤で最も多い発生部位は脾動脈（選択肢1は誤り）。仮性動脈瘤はサイズに関わらず治療適応（選択肢3は誤り）。"},{"n":68,"m":false,"t":"産科危機的出血におけるIVRで誤っているのはどれか。","o":["塞栓物質はゼラチンスポンジ細片を用いる。","子宮破裂による危機的出血は原則TAEを行う。","大動脈内バルーンオクルージョンの併用も考慮する。","子宮動脈分離には左右斜位25°程度での撮影が適している。","出血点が同定できない場合は両側内腸骨動脈前枝から塞栓する。"],"c":[1],"e":"【正解：2（誤り）】子宮破裂による危機的出血は外科的処置（手術）が原則であり、TAEは補助的手段。塞栓物質はゼラチンスポンジ細片（スラリー）を用いる（選択肢1は正しい）。"},{"n":69,"m":false,"t":"肺動静脈瘻（肺動静脈奇形）および起こりうる合併症で誤っているのはどれか。","o":["慢性低酸素血症。","労作性呼吸困難。","治療法の第一選択は塞栓術。","左心系の血液が毛細血管を介さずに右心系に流入する。","肺動脈と肺静脈が血管嚢あるいは迷路状拡張血管で交通する異常血管。"],"c":[3],"e":"【正解：4（誤り）】正しくは「右心系（肺動脈）から左心系（肺静脈）」への流入（右→左シャント）。左心系から右心系への流入という記述は誤り。慢性低酸素血症・労作性呼吸困難・塞栓術が第一選択・血管嚢による交通はすべて正しい記述。"},{"n":70,"m":true,"t":"TACEの読影技術で正しいのはどれか。2つ選べ。","o":["術前CT画像で下横隔動脈の肝細胞癌への関与を確認する。","肝動脈の前区域と後区域血管の分離は正面撮影のみで十分行える。","門脈腫瘍栓が確認された症例では腹腔動脈撮影の動脈相のみでよい。","抗癌剤注入を行う際カテーテル先端と胆嚢動脈の位置関係を同定する。","腹部血管CTAが術前に行われていたが血管撮影室のモニタに表示しなかった。"],"c":[0,3],"e":"【正解：1と4】術前CTで下横隔動脈等の異所性栄養血管の関与を確認することは重要。抗癌剤注入時に胆嚢動脈への誤注入を避けるためカテーテル先端と胆嚢動脈の位置関係を同定する。前・後区域の分離には側面撮影も必要（選択肢2は誤り）。術前CTA情報は撮影室モニタに表示して活用すべき（選択肢5は誤り）。"},{"n":71,"m":false,"t":"成人の胸部大動脈と腹部大動脈の血管径で正常範囲内の値はどれか。","o":["胸部大動脈60 mm、腹部大動脈50 mm","胸部大動脈50 mm、腹部大動脈40 mm","胸部大動脈40 mm、腹部大動脈30 mm","胸部大動脈30 mm、腹部大動脈20 mm","胸部大動脈20 mm、腹部大動脈10 mm"],"c":[2],"e":"【正解：3】成人の正常血管径の目安は胸部大動脈約30〜40 mm・腹部大動脈約20〜30 mm。胸部大動脈40 mm・腹部大動脈30 mmが正常範囲内の値として最も適切。"},{"n":72,"m":false,"t":"末梢動脈疾患の分類で正しいのはどれか。","o":["AHA分類","Stanford分類","Rentrope分類","Krichenko分類","Rutherford分類"],"c":[4],"e":"【正解：5（Rutherford分類）】末梢動脈疾患（PAD）の重症度分類にはRutherford分類とFontaine分類が用いられる。AHA分類は冠動脈、Stanford分類は大動脈解離、Krichenko分類は動脈管開存症の分類。"},{"n":73,"m":true,"t":"動脈と静脈の解剖で正しいのはどれか。2つ選べ。","o":["静脈は外膜と内膜の2層構造である。","静脈には逆流防止のための弁がある。","動脈は外膜、中膜、内膜の3層構造である。","動脈の中膜は平滑筋が少なく弾性力が乏しい。","動脈の外膜は平滑筋と弾性繊維で構成されている。"],"c":[1,2],"e":"【正解：2と3】静脈には逆流防止のための弁がある。動脈は外膜・中膜・内膜の3層構造。動脈の中膜は平滑筋と弾性繊維が豊富（選択肢4は誤り）。静脈も3層構造だが中膜が薄い（選択肢1は誤り）。"},{"n":74,"m":false,"t":"図9は足の血管造影画像である。矢印が示す血管はどれか。","o":["腓骨動脈","足背動脈","後脛骨動脈","前脛骨動脈","内側足底動脈"],"c":[1],"e":"【正解：2（足背動脈）】図9の足背部血管造影において白線（矢印）が示す血管は足背動脈。前脛骨動脈が足首を越えて足背部で足背動脈となる。"},{"n":75,"m":true,"t":"間欠性跛行患者の血行再建術で正しいのはどれか。2つ選べ","o":["腸骨動脈病変は血管内治療を第一選択とする。","総大腿動脈病変は血管内治療を第一選択とする。","跛行肢に対する膝下動脈病変の血行再建は推奨されない。","大腿膝窩動脈病変は病変長に関わらず外科的血行再建を第一選択とする。","動脈硬化リスクファクタの是正、薬物療法、運動療法を検討、実施していない跛行患者には血行再建術を行うことを推奨する。"],"c":[0,2],"e":"【正解：1と3】腸骨動脈病変は血管内治療（EVT）が第一選択。跛行（間欠性跛行）段階での膝下動脈への介入は通常推奨されない（重症下肢虚血が適応）。総大腿動脈は外科的手術が第一選択（選択肢2は誤り）。大腿膝窩動脈は病変長により治療法を選択（選択肢4は誤り）。"},{"n":76,"m":true,"t":"大動脈解離の分類で正しいのはどれか。2つ選べ。","o":["Stanford A型は下行大動脈に解離があるものである。","DeBakeyⅡ型は下行大動脈に解離が限局するものである。","急性期とは発症後2週間を超えて3ヵ月以内のことである。","偽腔閉塞型は偽腔を有しtearやULP及び偽腔内血流を認めないものである。","ULP型は偽腔の大部分に血流を認めないがtear近傍に限局した偽腔内血流を認めるものである。"],"c":[3,4],"e":"【正解：4と5】偽腔閉塞型は偽腔内に血流を認めず血栓で満たされているタイプ。ULP型はエントリー近傍にわずかな突出状血流を認めるタイプ。Stanford A型は上行大動脈に及ぶもの（選択肢1は誤り）。DeBakeyⅡ型は上行大動脈のみ限局（選択肢2は誤り）。急性期は発症後2週間以内（選択肢3は誤り）。"},{"n":77,"m":true,"t":"膝窩動脈から直接に分枝している血管はどれか。2つ選べ。","o":["腓骨動脈","足背動脈","足底動脈","前脛骨動脈","大腿深動脈"],"c":[3,0],"e":"【正解：4と1（前脛骨動脈と腓骨動脈）】膝窩動脈から最初に直接分岐するのは前脛骨動脈。腓骨動脈も下腿動脈幹から分岐する枝として膝窩動脈に近い位置で分岐する。足背動脈は前脛骨動脈の末梢、足底動脈は後脛骨動脈の末梢枝、大腿深動脈は鼠径部で分岐。"},{"n":78,"m":false,"t":"冠動脈バイパス術のグラフトに使用される下肢静脈血管はどれか。","o":["深部静脈","大伏在静脈","小伏在静脈","総大腿静脈","浅大腿静脈"],"c":[1],"e":"【正解：2（大伏在静脈）】下肢から採取されるCABGグラフトとして最も標準的なのは大伏在静脈。他に内胸動脈・橈骨動脈・胃大網動脈なども用いられる。"},{"n":79,"m":true,"t":"下肢動脈撮影の組合せで正しいのはどれか。2つ選べ。","o":["CO2造影 ― 半立位","補償フィルタ ― ハレーション抑制","被験者固定具 ― ポリスチレンビーズクッション","大腿動脈分岐部 ― 内側斜位","モーションアーチファクト ― 低浸透圧造影剤"],"c":[1,2],"e":"【正解：2と3】補償フィルタは足首など厚みが薄い部位の白とび（ハレーション）を防ぐ。被験者固定具にはポリスチレンビーズクッション（バキュームバッグ）を用いて下肢を厳重に固定する。CO2造影は仰臥位または足を上げた状態が基本（選択肢1は誤り）。大腿動脈分岐部は対側斜位を用いる（選択肢4は誤り）。"},{"n":80,"m":true,"t":"下肢の血管内イメージングで正しいのはどれか。2つ選べ。","o":["プラーク性状や血栓を観察できる。","IVUSでは血流除去が必須である。","病変拡張後の拡張不良部の評価に役立つ。","IVUSよりも血管造影で計測された血管径のほうが大きい。","光干渉断層診断（OFDI）システムは薬事承認されていない。"],"c":[0,2],"e":"【正解：1と3】IVUSやOFDIによりプラーク性状・血栓の有無を詳細に評価できる。ステントの圧着や拡張不良の評価に有用。血流除去が必要なのはOFDI/OCT（光学系）であり、IVUSは血液越しに観察可能（選択肢2は誤り）。血管造影は内腔のシルエットのみのためIVUSより小さく計測される（選択肢4は誤り）。OFDIは薬事承認済み（選択肢5は誤り）。"},{"n":81,"m":false,"t":"大腿膝窩領域のインターベンションに使用されないのはどれか。","o":["血流改変ステント","ナイチノールステント","薬剤コーテッドステント","薬剤コーティングバルーン","ヘパリン結合ステントグラフト"],"c":[0],"e":"【正解：1（血流改変ステント）】血流改変（フローダイバーター）ステントは脳動脈瘤治療用の特殊デバイスであり下肢には用いられない。ナイチノールステント・薬剤コーテッドステント・DCB・ヘパリン結合ステントグラフトはいずれも下肢EVTに使用される。"},{"n":82,"m":false,"t":"四肢領域の血管塞栓物質で誤っているのはどれか。","o":["NBCA","金属コイル","ウロキナーゼ","ゼラチン細片","マイクロスフェア"],"c":[2],"e":"【正解：3（誤り）】ウロキナーゼは血栓溶解剤であり血管を詰める塞栓物質ではない。NBCA・金属コイル・ゼラチン細片・マイクロスフェアはすべて塞栓物質。"},{"n":83,"m":true,"t":"四肢領域の血栓溶解療法で正しいのはどれか。2つ選べ。","o":["器質的狭窄に使用される。","血栓吸引はシリンジに陰圧をかけながら行う。","超音波を用いる場合はセクタ型プローブを用いる。","血栓溶解剤はウロキナーゼ12〜24万単位を用いる。","病変が短い場合に血栓溶解療法と血栓吸引が必要となる。"],"c":[1,3],"e":"【正解：2と4】血栓吸引はシリンジで陰圧をかけながら溶けた血栓を体外へ回収する。ウロキナーゼ12〜24万単位が標準的な投与量の一例。動脈硬化（器質的狭窄）自体は溶けないため急性血栓が対象（選択肢1は誤り）。病変が短い場合はPTA単独で済むことが多い（選択肢5は誤り）。"},{"n":84,"m":true,"t":"大動脈ステントグラフト治療後のエンドリークで正しいのはどれか。2つ選べ。","o":["TypeⅠは経過観察でよい。","TypeⅡは速やかに追加治療を行う。","TypeⅢは速やかに追加治療を行う。","TypeⅣは瘤径拡大を認めた場合に追加治療を行う。","TypeⅤは瘤径拡大を認めた場合に追加治療を行う。"],"c":[2,4],"e":"【正解：3と5】TypeⅢはグラフトの破損や接合不全であり速やかな治療が必要。TypeⅤ（エンドテンション）は瘤径拡大が見られれば治療対象。TypeⅠは接合部からの漏れで速やかな治療が必要（選択肢1は誤り）。TypeⅡは側枝からの逆流で瘤径拡大がなければ経過観察（選択肢2は誤り）。"},{"n":85,"m":true,"t":"四肢の動静脈奇形の治療で正しいのはどれか。2つ選べ。","o":["１回で治療を完結させる。","塞栓時の血流速度は関係ない。","粒状塞栓物質としてNBCAがある。","Nidusを直接穿刺して硬化剤を流す場合がある。","立体的に血行動態を把握するためにCBCTやCTの撮影を行う。"],"c":[3,4],"e":"【正解：4と5】カテーテル到達困難な部位のナイダスを直接刺して硬化剤を注入する場合がある。CBCTやCTで複雑なシャント構造を3次元的に把握する。再発率が高く複数回に分けて治療（選択肢1は誤り）。NBCAは液体塞栓物質であり粒状ではない（選択肢3は誤り）。"},{"n":86,"m":false,"t":"透析シャント（native shunt）の血栓性閉塞で誤っているのはどれか。","o":["病変部に近い動脈からアプローチする。","吻合部から静脈側にかけての閉塞が多い。","血栓溶解を行う場合は血流の上流から下流にかけて行う。","ウロキナーゼはヘパリンとともに生理食塩水に溶かして使用する。","血栓溶解に用いるウロキナーゼ総使用量は最大72万単位以下にする。"],"c":[0],"e":"【正解：1（誤り）】透析シャントの血栓性閉塞では通常、止血の安全性や手技の容易さから静脈側（シャント静脈）からアプローチする。動脈からのアプローチは原則的でない。"},{"n":87,"m":false,"t":"図10のTEVAR画像で正しいのはどれか。","o":["RAO30°の撮影である。","チムニー法を用いている。","中枢側landing部Zone 3のTEVARである。","左鎖骨下動脈はコイルとプラグで塞栓している。","左内頚動脈と左鎖骨下動脈をバイパスした1debranch-TEVARである。"],"c":[3],"e":"【正解：4】図10においてステントグラフトで左鎖骨下動脈（LSA）を覆い、LSA起始部をコイルとプラグで塞栓している像が確認できる。"},{"n":88,"m":true,"t":"Rutherford分類で正しいのはどれか。2つ選べ。","o":["1群：無症状","2群：軽度の間欠性跛行","3群：中等度の間欠性跛行","4群：虚血性安静時疼痛","5群：小さな組織欠損"],"c":[3,4],"e":"【正解：4と5】Rutherford分類：0群（無症状）、1群（軽度間欠性跛行）、2群（中等度間欠性跛行）、3群（重度間欠性跛行）、4群（虚血性安静時疼痛）、5群（小さな組織欠損）、6群（大きな組織欠損）。"},{"n":89,"m":false,"t":"血管損傷に対する末梢血管用ステントグラフトの適応血管で正しいのはどれか。","o":["冠動脈","脾動脈","総頚動脈","椎骨動脈","腕頭動脈"],"c":[1],"e":"【正解：2（脾動脈）】内臓動脈瘤（脾動脈瘤等）や外傷性損傷に対してカバードステント（ステントグラフト）による治療が行われる。脾動脈は末梢血管用ステントグラフトの適応血管。"},{"n":90,"m":false,"t":"ステントグラフトのエンドリーク分類で誤っているのはどれか。","o":["Ⅰa：動脈壁とステントグラフトの接合部分の末梢側からの血液漏れで瘤内に血液が流れ込むもの。","Ⅱ：大動脈瘤の側枝から血液が逆流して瘤内へ流れ込むもの。","Ⅲa：ステントグラフト－ステントグラフト間の接合部分からの瘤内への血液漏れ。","Ⅳ：ステントグラフトのポロシティからの血液漏れ。","Ⅴ：瘤内に血流が認められないにもかかわらず瘤が拡大傾向を示すもの。"],"c":[0],"e":"【正解：1（誤り）】TypeⅠaは中枢側（心臓側）の接合部からの漏れ。末梢側はTypeⅠbと呼ばれる。「末梢側からの漏れ」という記述は誤り。"},{"n":91,"m":false,"t":"造影剤腎症で誤っているのはどれか。","o":["造影剤投与量の減量は発症のリスクを減少させる。","造影剤投与後の血液透析療法は発症リスクを減少させる。","慢性腎臓病（CKD）患者は造影剤腎症発症のリスクファクタである。","造影検査前後に生理食塩水を経静脈的に投与することは発症リスクを減少させる。","ヨード造影剤投与後72時間以内に血清クレアチニン値が前値より0.5 mg/dl以上または25%以上増加した場合と定義されている。"],"c":[1],"e":"【正解：2（誤り）】造影剤投与後の予防的一律透析は造影剤腎症の発症を予防するエビデンスがなく推奨されていない。造影剤量の減量・CKD患者へのリスク配慮・補液（生食）は有効な予防策。"},{"n":92,"m":false,"t":"造影剤の注入方法で正しいのはどれか。","o":["最大注入量はカテーテルの種類によって異なる。","カテーテルが長いほど高い注入圧力が必要である。","冠動脈造影には造影剤自動注入装置は使用できない。","CBCT撮影は撮影開始と同時に造影剤注入を開始する。","造影剤自動注入装置の圧力リミットの設定値は常に使用するカテーテルの耐圧限界値に設定する。"],"c":[0],"e":"【正解：1】カテーテルの種類（太さ・定格圧）により安全に流せる最大注入量が決まる。カテーテルが長いほど抵抗が増し高い圧力が必要（選択肢2も正しいが、最も基本的な正答は1）。CBCT撮影は造影剤がある程度充満した後に撮影を開始するため同時開始は誤り（選択肢4は誤り）。"},{"n":93,"m":false,"t":"チーム医療推進の基本的な考え方で正しいのはどれか。","o":["職種間で競争意識を持たせることが必要である。","チーム医療を行う弊害として医療現場の疲弊があげられる。","チームのマネジメントは必ず医師が行なわなければならない。","スタッフ間で情報共有、意見交換を行い意思決定することが必要である。","コミュニケーションを円滑にするため専門用語を用いることが必要である。"],"c":[3],"e":"【正解：4】チーム医療では多職種間での情報共有・意見交換を通じた意思決定が基本。チームのマネジメントは必ずしも医師でなくてもよい（選択肢3は誤り）。専門用語は患者への説明では避けるべき（選択肢5は誤り）。"},{"n":94,"m":false,"t":"医療機器安全管理責任者の配置を義務付けている法律はどれか。","o":["医療法","製造物責任法","労働安全衛生法","診療放射線技師法","医薬品医療機器等法"],"c":[0],"e":"【正解：1（医療法）】医療法（第42条の2）により医療機器安全管理責任者の配置が義務付けられている。"},{"n":95,"m":true,"t":"造影剤で正しいのはどれか。2つ選べ","o":["低浸透圧造影剤は生体の浸透圧よりも低い。","水溶性造影剤の分子構造はトリヨードベンゼン環を持つ。","イオン性造影剤では複数の水酸基を有することで水溶性を獲得している。","同じヨード濃度の場合、非イオン性造影剤はイオン性造影剤よりも浸透圧が高い。","イオン性造影剤と非イオン性造影剤のいずれにもモノマー型とダイマー型がある。"],"c":[1,4],"e":"【正解：2と5】水溶性造影剤の分子構造はトリヨードベンゼン環を基本骨格とする。イオン性・非イオン性ともにモノマー型とダイマー型が存在する。低浸透圧造影剤は生体浸透圧より高い（約300mOsm/kgに対し600〜900程度）（選択肢1は誤り）。非イオン性はイオン性より浸透圧が低い（選択肢4は誤り）。"},{"n":96,"m":false,"t":"ヨード造影剤の副作用で正しいのはどれか。","o":["遅発性は起こらない。","副作用歴がない場合は発現率が高い。","アレルギー歴がある場合は発現率が低い。","発現率はイオン性造影剤に比べて非イオン性造影剤の方が高い。","重篤な副作用として呼吸困難や急激な血圧低下、心停止などがある。"],"c":[4],"e":"【正解：5】重篤な副作用（アナフィラキシー様反応）として呼吸困難・急激な血圧低下・心停止などがある。遅発性副作用（投与後1時間〜1週間）も起こる（選択肢1は誤り）。副作用歴がある場合に発現率が高い（選択肢2・3は誤り）。非イオン性造影剤の方が副作用発現率が低い（選択肢4は誤り）。"},{"n":97,"m":true,"t":"医療安全で正しいのはどれか。2つ選べ。","o":["医療事故調査制度は医療法で規定されている。","タイムアウトは手技や治療に関わる職種で行う。","タイムアウトは患者が居ないカテーテル室外で行う。","安全な医療を提供するためには患者とリスクを共有しない。","ブリーフィングは手技や治療が終わった後の振り返りである。"],"c":[0,1],"e":"【正解：1と2】医療事故調査制度は医療法で規定されている。タイムアウトは手技・治療に関わる全職種で実施する。タイムアウトは患者が在室した状態でカテーテル室内で行う（選択肢3は誤り）。ブリーフィングは手技前の準備確認（選択肢5は誤り。振り返りはデブリーフィング）。"},{"n":98,"m":false,"t":"感染対策で正しいのはどれか。","o":["血管撮影室内は陰圧とすべきである。","穿刺に先立って局所の剃毛は必ず行う。","再利用する器材の滅菌や消毒に先立つ洗浄は不要である。","目に見える汚染がある場合は石けんと流水による手洗いを行う。","標準予防策は医療従事者に対する感染リスクを低減するために行う。"],"c":[3],"e":"【正解：4】目に見える汚染（血液・体液等）がある場合は石けんと流水による手洗いが基本（速乾性手指消毒薬だけでは不十分）。血管撮影室は陽圧が基本（陰圧は結核等の感染症対策）（選択肢1は誤り）。剃毛は感染リスクを高めるため原則不要（選択肢2は誤り）。洗浄は滅菌・消毒前に必須（選択肢3は誤り）。"},{"n":99,"m":true,"t":"血管造影検査に従事する診療放射線技師の役割で正しいのはどれか。2つ選べ。","o":["抗凝固薬投与","清潔トレーの介助","患者への治療結果の説明","血管造影検査中止の判断","ワーキングアングルの提案"],"c":[1,4],"e":"【正解：2と5】清潔トレーの介助は診療放射線技師が担当できる業務。最適な撮影角度（ワーキングアングル）を術者に進言するのは技師の重要な役割。抗凝固薬投与・治療結果の説明・検査中止の判断は医師が行う（選択肢1・3・4は誤り）。"},{"n":100,"m":false,"t":"IVR手技に必要な衛生管理手法で誤っているのはどれか。","o":["人員の最小化","専用術衣の使用","消毒用スポンジの再利用","清潔野における手技の熟知","清潔野を被覆する滅菌ドレープの使用"],"c":[2],"e":"【正解：3（誤り）】消毒用スポンジの再利用は感染のリスクを高めるため行ってはならない（単回使用が原則）。人員最小化・専用術衣・清潔野の熟知・滅菌ドレープはすべて正しい衛生管理手法。"}],
  c17_rad: [{"n":1,"m":false,"t":"診断用X線防護用具の規格（JIS T 61331）で甲状腺防護具の鉛当量はどれか。","o":["0.125 mmPb以上","0.175 mmPb以上","0.25 mmPb以上","0.35 mmPb以上","0.5 mmPb以上"],"c":[2],"e":"【正解：3（0.25 mmPb以上）】\nJIS T 61331-3により甲状腺防護具（ネックガード）の鉛当量は0.25 mmPb以上と定められています。"},{"n":2,"m":true,"t":"放射線防護の基本三原則の内容で正しいのはどれか。2つ選べ。","o":["防護の最適化は被曝線量を最小化する。","防護の最適化は計画被曝状況のみに適応される。","線量限度は患者の介護者または介助者の被曝にも適応される。","線量限度は心臓専門医とスタッフの職業被曝なども適応される。","正当化は放射線診療の利益が不利益より上回る場合に適応される。"],"c":[3,4],"e":"【正解：4と5】\n選択肢4：正しい ✅ 線量限度は医師・スタッフなどの職業被曝および公衆被曝に対して適用されます。\n選択肢5：正しい ✅ 正当化の定義であり、便益が放射線による害を上回る場合にのみその行為が認められます。\n選択肢1：誤り。最適化（ALARA）は「最小化」ではなく「合理的に達成可能な限り低く」保つことです。\n選択肢3：誤り。患者の介護者・介助者（医療被曝に分類）への線量限度の適用はありません。"},{"n":3,"m":true,"t":"医療被曝で正しいのはどれか。2つ選べ。","o":["女性作業者の胎児の被曝","IVRを施行した医師の被曝","介助で受ける看護師の被曝","胸部集団検診時の被検者の被曝","生物医学研究のボランティアの被曝"],"c":[3,4],"e":"【正解：4と5】\n選択肢4：正しい ✅ 被検者（患者）が受ける被曝はすべて医療被曝です。\n選択肢5：正しい ✅ 生物医学研究のボランティアの被曝もICRPにより「医療被曝」に分類されます。\n選択肢1：誤り。女性作業者（放射線技師等）の胎児の被曝は職業被曝に関連します。\n選択肢2：誤り。医師の被曝は「職業被曝」です。"},{"n":4,"m":false,"t":"従事者の被曝低減対策で誤っているのはどれか。","o":["患者から離れる。","透視時間を減らす。","FPDを患者から離す。","パルスレートを下げる。","放射線防護具を使用する。"],"c":[2],"e":"【正解：3（誤り）】\nFPD（受像器）を患者から離すと散乱線が広がりスタッフの被曝および画像劣化を招きます。FPDは可能な限り患者に「密着（近づける）」させるのが正解です。"},{"n":5,"m":false,"t":"ICRPで勧告された一般公衆の年間実効線量限度（mSv）はどれか。","o":["0.1","0.5","1","20","50"],"c":[2],"e":"【正解：3（1 mSv）】\n一般公衆の年間実効線量限度は1 mSvです（ICRP 2007年勧告）。\n（20 mSvは職業被曝の5年平均の年制限、50 mSvは職業被曝の単年最大値です）"},{"n":6,"m":false,"t":"IVRの診断参考レベル（DRLs2020）でDRL値が設定されていないのはどれか。","o":["嚢状動脈瘤血管内治療","UAE（子宮動脈塞栓術）","TACE（肝動脈化学塞栓術）","TEVAR（胸部大動脈瘤血管内治療）","経皮的冠動脈インターベンション（非CTO PCI）"],"c":[1],"e":"【正解：2】\nJAPAN DRLs 2020においてUAE（子宮動脈塞栓術）には明確なDRL値が設定されていません。\n（動脈瘤・TACE・TEVAR・非CTO PCIはいずれもDRL値が存在します）"},{"n":7,"m":false,"t":"DRLs 2020で示された基準透視線量率(mGy/min)はどれか。","o":["10","12","15","17","20"],"c":[4],"e":"【正解：5（20 mGy/min）】\nDRLs 2020における装置基準透視線量率の参考値は20 mGy/minです。"},{"n":8,"m":false,"t":"診断参考レベルで正しいものはどれか。","o":["実効線量を用いて設定される。","超えてはならない線量である。","診療行為の是非を分ける境界である。","通常線量分布の平均値が用いられる。","最適化のプロセスを推進するためのツールである。"],"c":[4],"e":"【正解：5】\nDRLは放射線防護の「最適化」を推進するためのツールです。\n選択肢1：誤り。面積線量などの実用量で設定されます（実効線量ではない）。\n選択肢2：誤り。DRLは線量限度ではなく目安（参考値）です。\n選択肢4：誤り。分布の75パーセントタイル値が用いられます（平均値ではない）。"},{"n":9,"m":false,"t":"数Gyの全身被曝後に血球数が最も遅れて減少するのはどれか。","o":["赤血球","血小板","好酸球","好中球","リンパ球"],"c":[0],"e":"【正解：1（赤血球）】\n最も早く減少するのはリンパ球（数時間〜数日）。続いて好中球・血小板と減少し、寿命が約120日と長い赤血球が最も遅れて減少します。"},{"n":10,"m":false,"t":"ヒトの精子分化育成過程で放射線感受性が最も高い時期はどれか。","o":["精子","精子細胞","精原細胞","一次精母細胞","二次精母細胞"],"c":[2],"e":"【正解：3（精原細胞）】\nベルゴニー・トリボンドーの法則に基づき最も初期の「精原細胞」が最高感受性を示します（細胞分裂が盛んで未分化なため）。"},{"n":11,"m":false,"t":"図1に示す細胞周期で放射線感受性が最も低い時期はいつか。（図1：細胞周期図）","o":["G1期（DNA合成準備期）前期","G1期（DNA合成準備期）後期","S期（DNA合成期）後期","G2期（分裂準備期）","M期（分裂期）"],"c":[2],"e":"【正解：3（S期後期）】\nS期（DNA合成期）後半が最も放射線感受性が低く（耐性が高く）、逆にM期（分裂期）やG2期が最も感受性が高いとされています。"},{"n":12,"m":false,"t":"放射線の急性被曝による一時的脱毛のしきい線量（Gy）はどれか。","o":["0.1","0.5","1.0","3.0","6.0"],"c":[3],"e":"【正解：4（3.0 Gy）】\n一時的脱毛のしきい線量は3.0 Gyであり、被曝から約3週間後に発症します。"},{"n":13,"m":false,"t":"胎内被曝と胎児への影響で誤っているのはどれか。","o":["奇形 ― 組織反応","胚死亡 ― 組織反応","発がん ― 確率的影響","遺伝的影響 ― 確率的影響","精神発達遅延 ― 確率的影響"],"c":[4],"e":"【正解：5（誤り）】\n精神発達遅延はしきい値（約0.3〜0.5 Gy）を持つ「組織反応（確定的影響）」として扱われます（確率的影響ではありません）。最もリスクが高い時期は受胎後8〜15週です。"},{"n":14,"m":false,"t":"特性X線で正しいのはどれか。","o":["連続X線である。","非電離放射線である。","Duane-Huntの法則と関係がある。","コンプトン効果の際に放出される。","ターゲット物質に固有のエネルギーをもつ。"],"c":[4],"e":"【正解：5】\n特性X線はターゲット物質の軌道電子のエネルギー準位の差により決まるため、その物質に固有のエネルギーを持ちます（線スペクトル）。\n選択肢1：誤り。連続スペクトルを持つのは制動X線（制動放射）です。\n選択肢3：誤り。Duane-Huntの法則は制動X線の最短波長に関するものです。"},{"n":15,"m":false,"t":"光電効果で正しいのはどれか。","o":["消滅線が発生する。","電子と物質の相互作用である。","電子と陽電子の対を発生する現象である。","1.02 MeV以上のエネルギーが必要である。","軌道電子を原子の外に放出する現象である。"],"c":[4],"e":"【正解：5】\n光電効果は入射光子が軌道電子に全エネルギーを与え、その軌道電子を原子の外へ放出（光電子）する現象です。\n選択肢1,3,4：誤り。これらは「電子対生成（対生成）」の記述です（1.02 MeV以上が必要）。"},{"n":16,"m":true,"t":"ICRP2007における放射線加重係数で正しいのはどれか。2つ選べ。","o":["X線 ― 1","β線 ― 2","α線 ― 20","陽子線 ― 5","電子線 ― 20"],"c":[0,2],"e":"【正解：1と3】\n選択肢1：正しい ✅ X線・γ線・電子線・β線の加重係数はすべて1です。\n選択肢3：正しい ✅ α線の加重係数は20です。\n選択肢2：誤り。β線の加重係数は1です（2ではありません）。\n選択肢4：誤り。陽子線のICRP 2007における加重係数は2です（5は以前の値）。\n選択肢5：誤り。電子線の加重係数は1です。"},{"n":17,"m":false,"t":"X線の発生で誤っているのはどれか。","o":["ターゲットからX線が発生する。","X線は核外現象によって発生する。","フィラメントから熱電子が発生する。","電子がもっている運動エネルギーの大部分はX線になる。","熱電子は陽極と陰極の間で加速されターゲットに衝突する。"],"c":[3],"e":"【正解：4（誤り）】\nターゲットに衝突する電子のエネルギーのうち、X線になるのはわずか1%以下（診断領域）です。大部分（99%以上）は「熱」になります。"},{"n":18,"m":true,"t":"線量計の組合せで正しいのはどれか。2つ選べ。","o":["面積線量計 ― 患者最大皮膚線量表示","半導体検出器 ― リアルタイム測定表示","蛍光ガラス線量計 ― アニーリング","熱ルミネッセンス線量計 ― OSL","光刺激ルミネッセンス線量計 ― RPL"],"c":[1,2],"e":"【正解：2と3】\n選択肢2：正しい ✅ 半導体検出器は応答が速くリアルタイムでの測定・表示に適しています。\n選択肢3：正しい ✅ 蛍光ガラス線量計（RPL線量計）にはアニーリング処理（熱処理でリセット）が用いられます。\n選択肢4：誤り。OSL（光刺激ルミネッセンス）は光刺激ルミネッセンス線量計の方法です。\n選択肢5：誤り。RPL（ラジオフォトルミネッセンス）は蛍光ガラス線量計の方法です。"},{"n":19,"m":false,"t":"電離箱線量計の照射線量測定で誤っているのはどれか。","o":["気圧補正が必要である。","温度補正が必要である。","湿度補正が必要である。","測定単位はC/kgである。","空気との相互作用で測定する。"],"c":[2],"e":"【正解：3（誤り）】\n電離箱線量計（開放型）では気圧補正と温度補正が必要ですが、「湿度補正」は通常の状態（相対湿度20〜80%）では無視できるため一般的には不要とされます。"},{"n":20,"m":true,"t":"面積線量計で正しいのはどれか。2つ選べ。","o":["後方散乱も含まれる。","指頭型電離箱線量計である。","空気カーマと断面積の積で表される。","線錐中の距離に依存せず常に一定の値となる。","JISで面積線量計の指示値誤差は±10%以下とされている。"],"c":[2,3],"e":"【正解：3と4】\n選択肢3：正しい ✅ 面積空気カーマ積算値（PKA）は「空気カーマ × 照射野面積」を測定します。\n選択肢4：正しい ✅ 距離が離れると空気カーマは減りますが照射野面積がその分広がるため積（DAP値）は距離に依存せず一定になります。\n選択肢1：誤り。面積線量計は通常、照射野入射側に設置するため後方散乱は含まれません。"},{"n":21,"m":true,"t":"照射線量が定義されている放射線はどれか。2つ選べ。","o":["α線","β線","γ線","X線","電子線"],"c":[2,3],"e":"【正解：3と4】\n照射線量（C/kg）はX線およびγ線が空気中に生じた電離電荷として定義されています。\nα線・β線・電子線は荷電粒子であり、照射線量の定義の対象外です。"},{"n":22,"m":true,"t":"個人被曝線量測定に用いられるのはどれか。2つ選べ。","o":["ガラスバッジ","ポケット線量計","サーベイメータ","ハンドフットクロスモニタ","ウェル型シンチレーションカウンタ"],"c":[0,1],"e":"【正解：1と2】\n選択肢1：正しい ✅ ガラスバッジ（蛍光ガラス線量計）は個人の実効線量・等価線量を評価するために体に装着して測定します。\n選択肢2：正しい ✅ ポケット線量計も個人被曝管理に使用されます。\n選択肢3：誤り。サーベイメータは空間線量を測るものであり、個人線量計ではありません。"},{"n":23,"m":true,"t":"血管撮影室の空間線量分布測定で正しいのはどれか。2つ選べ。","o":["X線の照射方向は影響しない。","面積線量計は測定に使用できる。","指頭型電離箱線量計は測定に使用できる。","従事者の被曝予測や安全教育に有効である。","電離箱式サーベイメータは測定に使用できる。"],"c":[3,4],"e":"【正解：4と5】\n選択肢4：正しい ✅ スタッフの立ち位置による被曝の違いを把握でき、安全教育に非常に有効です。\n選択肢5：正しい ✅ 低線量の散乱線を感度良く測るため電離箱式サーベイメータが一般的に使用されます。\n選択肢1：誤り。IVR室の散乱線分布はX線の照射方向（アーム角度）によって劇的に変化します。"},{"n":24,"m":false,"t":"女性放射線従事者の妊娠期間の腹部表面における等価線量限度（mSv）はどれか。","o":["0.1","0.2","1","2","10"],"c":[3],"e":"【正解：4（2 mSv）】\n妊娠を申し出た女性放射線作業者の腹部表面における等価線量限度は出産までの期間において2 mSvです。"},{"n":25,"m":false,"t":"令和3年度より放射線業務従事者の水晶体等価線量限度が「5年ごとに区分した各期間につき（A）ミリシーベルト及び4月1日を始期とする1年間につき（B）ミリシーベルトを超えないこと」に改正された。A、Bに入る数値で正しい組み合わせはどれか。","o":["(A)50 (B)20","(A)100 (B)20","(A)100 (B)50","(A)150 (B)50","(A)150 (B)100"],"c":[2],"e":"【正解：3（A=100, B=50）】\n令和3年（2021年）の法改正により、放射線業務従事者の水晶体等価線量限度は「5年間で100 mSv」かつ「1年間で50 mSv」を超えないことと定められました。"}]
};

function keyToLabel(k){
  return k.replace('c18_','第18回 ').replace('c17_','第17回 ').replace('c16_','第16回 ')
    .replace('clinical','臨床概論').replace('device','医用機器').replace('rad','放射線防護')
    .replace('weak','苦手問題');
}
function keyToSubject(k){
  if(k.indexOf('clinical')>=0) return '臨床概論';
  if(k.indexOf('device')>=0) return '医用機器';
  if(k.indexOf('rad')>=0) return '放射線防護';
  return 'その他';
}
function keyToYear(k){
  if(k.indexOf('c18')>=0) return '第18回';
  if(k.indexOf('c17')>=0) return '第17回';
  if(k.indexOf('c16')>=0) return '第16回';
  return '';
}

function buildCalendar(){
  var el=document.getElementById('calTable');
  if(!el) return;
  // 直近14日の日付リスト生成
  var days=[];
  for(var i=13;i>=0;i--){
    var d=new Date(); d.setDate(d.getDate()-i);
    var s=d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();
    days.push(s);
  }
  // 科目リスト（全回横断）
  var subjects=['臨床概論（心臓）','臨床概論（脳神経）','臨床概論（腹部）','臨床概論（大動脈）','医用機器','放射線防護'];
  var keyMap={
    '臨床概論（心臓）':['c18_clinical_1_25','c17_clinical_1_25','c16_clinical_1_25'],
    '臨床概論（脳神経）':['c18_clinical_26_50','c17_clinical_26_50','c16_clinical_26_50'],
    '臨床概論（腹部）':['c18_clinical_51_75','c17_clinical_51_75','c16_clinical_51_75'],
    '臨床概論（大動脈）':['c18_clinical_76_100','c17_clinical_76_100','c16_clinical_76_100'],
    '医用機器':['c18_device','c17_device','c16_device'],
    '放射線防護':['c18_rad','c17_rad','c16_rad']
  };
  // historyをラベルキーで集計（日付×科目）
  var calData={};
  G.history.forEach(function(h){
    var d=h.date;
    if(!calData[d]) calData[d]={};
    var lbl=h.label;
    // ジャンル判定はlabelにgenre情報がないためkeyで判定
    var cat=null;
    if(lbl==='c18_device'||lbl==='c17_device'||lbl==='c16_device') cat='医用機器';
    else if(lbl==='c18_rad'||lbl==='c17_rad'||lbl==='c16_rad') cat='放射線防護';
    else if(lbl.indexOf('_clinical')>-1) cat='臨床概論（全体）';
    if(cat){
      if(!calData[d][cat]) calData[d][cat]={ok:0,ans:0};
      calData[d][cat].ok+=h.ok; calData[d][cat].ans+=h.ans;
    }
  });
  // テーブル生成（日付を列、科目を行）
  var cols=days.map(function(d){return d.slice(5);}); // MM-DD
  var html='<div style="overflow-x:auto"><table class="cal-table"><thead><tr><th>科目</th>';
  cols.forEach(function(c){ html+='<th>'+c+'</th>'; });
  html+='</tr></thead><tbody>';
  // 臨床概論全体+機器+防護の3行
  var rows=[
    {label:'臨床概論', keys:['c18_clinical','c17_clinical','c16_clinical']},
    {label:'医用機器', keys:['c18_device','c17_device','c16_device']},
    {label:'放射線防護', keys:['c18_rad','c17_rad','c16_rad']}
  ];
  rows.forEach(function(row){
    html+='<tr><td class="cal-date">'+row.label+'</td>';
    days.forEach(function(d){
      var data=calData[d];
      var matched=null;
      if(data){
        // 同じ日の全historyの中でこのkeyに一致するものを集計
        var ok=0,ans=0;
        G.history.forEach(function(h){
          if(h.date===d && row.keys.indexOf(h.label)>-1){ok+=h.ok;ans+=h.ans;}
        });
        if(ans>0) matched={ok:ok,ans:ans};
      }
      if(!matched){ html+='<td><span class="cal-cell none">－</span></td>'; }
      else {
        var rate=Math.round(matched.ok/matched.ans*100);
        if(rate>=60){ html+='<td><span class="cal-cell done">✓</span></td>'; }
        else { html+='<td><span class="cal-cell part">△</span></td>'; }
      }
    });
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  el.innerHTML=html;
}

function buildWeakBySubject(containerId){
  var keys=Object.keys(G.wrongMap);
  var el=document.getElementById(containerId);
  if(!el) return;
  if(!keys.length){el.innerHTML='<div class="empty-msg">苦手問題はまだありません 🎉</div>';return;}
  // group by subject
  var groups={};
  keys.forEach(function(k){
    var s=keyToSubject(k);
    var y=keyToYear(k);
    var label=(y?y+' ':'')+s;
    if(!groups[label]) groups[label]={keys:[],dk:k.split('__')[0]};
    groups[label].keys.push(k);
  });
  el.innerHTML=Object.keys(groups).sort().map(function(g){
    var cnt=groups[g].keys.length;
    var dk=groups[g].dk;
    return '<div class="subj-card"><div class="subj-top"><span class="subj-name">'+g+'</span><span class="subj-cnt">'+cnt+'問</span></div>'
      +'<button class="subj-btn" onclick="startWeakBySubject(\'' +dk+ '\')">この科目の苦手を復習</button></div>';
  }).join('');
}

function buildHome(){
  updateBadges();
  // stats
  document.getElementById('sTotal').textContent=G.totalAns;
  document.getElementById('sRate').textContent=G.totalAns>0?Math.round(G.totalOk/G.totalAns*100)+'%':'-';
  document.getElementById('sWeak').textContent=Object.keys(G.wrongMap).length;
  document.getElementById('sDays').textContent=Object.keys(G.days).length;
  // today
  var today=todayStr();
  var todayH=G.history.filter(function(h){return h.date===today;});
  var tEl=document.getElementById('todayInner');
  if(!todayH.length){
    tEl.innerHTML='<div class="today-empty">まだ学習していません</div>';
  } else {
    tEl.innerHTML=todayH.map(function(h){
      var rate=h.ans>0?Math.round(h.ok/h.ans*100):0;
      var rateColor=rate>=80?'#1a7f37':rate>=60?'#b35900':'#d1242f';
      return '<div class="today-row"><span>'+keyToLabel(h.label)+'</span>'
        +'<span><b>'+h.ans+'問</b> 正解率 <b style="color:'+rateColor+'">'+rate+'%</b></span></div>';
    }).join('');
  }
  // exam list
  var el=document.getElementById('examList');
  el.innerHTML='';
  EXAMS.forEach(function(exam){
    var div=document.createElement('div');
    div.className='exam-card';
    var hasAll=exam.cats.every(function(c){return c.available>0;});
    var badge=hasAll?'<span class="ebadge ok">全科目あり</span>':'<span class="ebadge warn">一部準備中</span>';
    var pills=exam.cats.map(function(c){
      if(c.available>0){
        var onclick;
        if(c.genre){
          onclick='startQuiz(\''+exam.year+'\',\''+c.name+'\',\''+c.key+'\','+c.genre[0]+','+c.genre[1]+')';
        } else {
          onclick='startQuiz(\''+exam.year+'\',\''+c.name+'\',\''+c.key+'\')';
        }
        var pillClass=c.genre?'cpill genre-pill ready':'cpill ready';
        return '<span class="'+pillClass+'" onclick="'+onclick+'">'+c.name+'<span class="cnt">'+c.available+'問</span></span>';
      } else {
        return '<span class="cpill soon">'+c.name+' 準備中</span>';
      }
    }).join('');
    div.innerHTML='<div class="exam-top"><span class="exam-name">'+exam.year+'</span>'+badge+'</div><div class="cat-pills">'+pills+'</div>';
    el.appendChild(div);
  });
  // calendar
  buildCalendar();
  // weak by subject
  buildWeakBySubject('weakBySubject');
  // weak btn
  var wc=Object.keys(G.wrongMap).length;
  var wb=document.getElementById('weakBtn');
  wb.textContent='苦手問題まとめて復習する（'+wc+'問）';
  wb.disabled=wc===0;
}

function startQuiz(year,catName,dataKey,genreMin,genreMax){
  var qs=QUESTIONS[dataKey];
  if(!qs||!qs.length){alert('このセットの問題データは準備中です');return;}
  if(genreMin&&genreMax){
    qs=qs.filter(function(q){return q.n>=genreMin&&q.n<=genreMax;});
  }
  Q.set=qs; Q.idx=0; Q.key=dataKey; Q.okCount=0; Q.startMs=Date.now(); Q.selMap={}; G.doneMap={};
  document.getElementById('nb-quiz').style.display='';
  goTab('quiz');
  renderQ();
}

function startWeak(){
  var keys=Object.keys(G.wrongMap);
  if(!keys.length){alert('苦手問題がありません');return;}
  // collect questions from all datasets
  var qs=[];
  keys.forEach(function(k){
    var parts=k.split('__');
    var dk=parts[0], n=parseInt(parts[1]);
    var arr=QUESTIONS[dk];
    if(arr){
      var found=arr.filter(function(q){return q.n===n;});
      if(found.length) qs.push({q:found[0],dk:dk});
    }
  });
  if(!qs.length){alert('データが見つかりません');return;}
  Q.set=qs.map(function(x){return x.q;});
  Q.key='weak';
  Q.idx=0; Q.okCount=0; Q.startMs=Date.now(); Q.selMap={}; G.doneMap={};
  document.getElementById('nb-quiz').style.display='';
  goTab('quiz');
  renderQ();
}

function startWeakBySubject(dataKey){
  var keys=Object.keys(G.wrongMap).filter(function(k){return k.indexOf(dataKey)===0;});
  if(!keys.length){alert('この科目の苦手問題がありません');return;}
  var qs=[];
  keys.forEach(function(k){
    var parts=k.split('__');
    var n=parseInt(parts[1]);
    var arr=QUESTIONS[dataKey];
    if(arr){
      var found=arr.filter(function(q){return q.n===n;});
      if(found.length) qs.push(found[0]);
    }
  });
  if(!qs.length){alert('データが見つかりません');return;}
  Q.set=qs; Q.key=dataKey; Q.idx=0; Q.okCount=0; Q.startMs=Date.now(); Q.selMap={}; G.doneMap={};
  document.getElementById('nb-quiz').style.display='';
  goTab('quiz');
  renderQ();
}

function renderQ(){
  if(!Q.set.length) return;
  var q=Q.set[Q.idx];
  var k=qKey(Q.key,q.n);
  Q.selMap={};

  // header
  document.getElementById('qPF').style.width=Math.round(Q.idx/Q.set.length*100)+'%';
  document.getElementById('qInfo').textContent=(Q.idx+1)+' / '+Q.set.length;
  document.getElementById('qScore').textContent='正解 '+Q.okCount;
  // question
  document.getElementById('qNum').textContent='問題 '+q.n;
  document.getElementById('qTag').textContent=q.tag||'';
  document.getElementById('qMtag').style.display=q.m?'':'none';
  document.getElementById('qText').textContent=q.t;
  // options
  var wrap=document.getElementById('qOpts');
  wrap.className='opts'+(q.m?' multi':'');
  wrap.innerHTML='';
  for(var i=0;i<q.o.length;i++){
    var btn=document.createElement('button');
    btn.className='opt';
    btn.setAttribute('data-i',i);
    btn.innerHTML='<span class="mk">'+(i+1)+'</span><span>'+q.o[i]+'</span>';
    wrap.appendChild(btn);
  }
  // attach events
  var btns=wrap.querySelectorAll('.opt');
  for(var i=0;i<btns.length;i++){
    btns[i].addEventListener('click', makeH(q,k));
  }
  // submit
  var sb=document.getElementById('qSub');
  sb.style.display='none';
  sb.disabled=true;
  sb.className='sbtn';
  // reset result/expl/next
  document.getElementById('qRbox').style.display='none';
  document.getElementById('qExpl').style.display='none';
  document.getElementById('qNext').style.display='none';
  // restore if done
  if(G.doneMap[k]) restoreAnswer(q,k);
}

function makeH(q,k){
  return function(){
    if(G.doneMap[k]) return;
    var idx=parseInt(this.getAttribute('data-i'));
    var sb=document.getElementById('qSub');
    if(q.m){
      if(Q.selMap[idx]){delete Q.selMap[idx];this.classList.remove('sel');}
      else{Q.selMap[idx]=true;this.classList.add('sel');}
      var cnt=Object.keys(Q.selMap).length;
      sb.style.display='';
      sb.disabled=cnt===0;
      sb.className='sbtn'+(cnt>0?' ready':'');
    } else {
      // single: radio behaviour
      var all=document.getElementById('qOpts').querySelectorAll('.opt');
      for(var j=0;j<all.length;j++) all[j].classList.remove('sel');
      Q.selMap={};
      Q.selMap[idx]=true;
      this.classList.add('sel');
      sb.style.display='';
      sb.disabled=false;
      sb.className='sbtn ready';
    }
  };
}

function doSubmit(){
  var q=Q.set[Q.idx];
  var k=qKey(Q.key,q.n);
  if(G.doneMap[k]) return;
  var userSel=Object.keys(Q.selMap).map(Number);
  var sc=q.c.slice().sort(function(a,b){return a-b;});
  var su=userSel.slice().sort(function(a,b){return a-b;});
  var ok=sc.join(',')=== su.join(',');
  if(ok){Q.okCount++;delete G.wrongMap[k];G.doneMap[k]='ok';G.totalOk++;}
  else{G.wrongMap[k]=true;G.doneMap[k]='ng';}
  G.totalAns++;
  G.days[todayStr()]=true;
  saveG();
  updateBadges();
  showAnswer(q,userSel,ok);
}

function showAnswer(q,userSel,ok){
  var btns=document.getElementById('qOpts').querySelectorAll('.opt');
  for(var i=0;i<btns.length;i++){
    btns[i].classList.remove('sel');
    btns[i].classList.add('dis');
    var idx=parseInt(btns[i].getAttribute('data-i'));
    var isC=q.c.indexOf(idx)>=0;
    var wasSel=userSel&&userSel.indexOf(idx)>=0;
    if(isC&&wasSel) btns[i].classList.add('ok');
    else if(!isC&&wasSel) btns[i].classList.add('ng');
    else if(isC&&!wasSel) btns[i].classList.add('miss');
  }
  document.getElementById('qSub').style.display='none';
  // result
  var rb=document.getElementById('qRbox');
  rb.style.display='block';
  rb.className='rbox '+(ok?'ok':'ng');
  var rl=document.getElementById('qRL');
  rl.className='rlabel '+(ok?'ok':'ng');
  rl.textContent=ok?'⭕ 正解！':'❌ 不正解';
  document.getElementById('qRA').textContent=ok?'':'正解：選択肢 '+q.c.map(function(x){return x+1;}).join(' と ');
  // expl
  document.getElementById('qExplTxt').textContent=q.e;
  document.getElementById('qExpl').style.display='block';
  // next
  var nb=document.getElementById('qNext');
  nb.style.display='block';
  nb.textContent=(Q.idx>=Q.set.length-1)?'結果を見る':'次の問題へ';
}

function restoreAnswer(q,k){
  var ok=G.doneMap[k]==='ok';
  showAnswer(q,null,ok);
}

function doNext(){
  if(Q.idx>=Q.set.length-1){endSession();return;}
  Q.idx++;
  document.getElementById('qPF').style.width=Math.round(Q.idx/Q.set.length*100)+'%';
  renderQ();
  window.scrollTo(0,0);
}

function endSession(){
  var mins=Math.round((Date.now()-Q.startMs)/60000);
  G.history.push({date:todayStr(),label:Q.key,ans:Q.set.length,ok:Q.okCount,mins:mins});
  if(G.history.length>100) G.history=G.history.slice(-100);
  saveG();
  document.getElementById('nb-quiz').style.display='none';
  alert('セット完了！\n'+Q.okCount+' / '+Q.set.length+'問正解（正答率'+Math.round(Q.okCount/Q.set.length*100)+'%）');
  goTab('home');
}

function exitQuiz(){
  var mins=Math.round((Date.now()-Q.startMs)/60000);
  G.history.push({date:todayStr(),label:Q.key,ans:Q.idx,ok:Q.okCount,mins:mins});
  if(G.history.length>100) G.history=G.history.slice(-100);
  saveG();
  document.getElementById('nb-quiz').style.display='none';
  goTab('home');
}

// ================================================================
// ANALYSIS
// ================================================================
function buildAnalysis(){
  var keys=Object.keys(G.wrongMap);
  var txt=document.getElementById('anText');
  var rate=G.totalAns>0?Math.round(G.totalOk/G.totalAns*100):0;
  if(!keys.length){
    txt.textContent='苦手問題はありません！累計正解率 '+rate+'% — 引き続き全科目を完璧にしましょう。';
  } else {
    var catCount={};
    keys.forEach(function(k){
      var s=keyToSubject(k);
      var y=keyToYear(k);
      var label=(y?y+' ':'')+s;
      catCount[label]=(catCount[label]||0)+1;
    });
    var sorted=Object.keys(catCount).sort(function(a,b){return catCount[b]-catCount[a];});
    var msg='累計正解率 '+rate+'% / 苦手問題 '+keys.length+'問 | 最も苦手な分野：'+sorted[0]+'（'+catCount[sorted[0]]+'問）';
    if(rate<60) msg+='→ 正解率60%未満。苦手問題の復習を最優先にしましょう。';
    else if(rate<80) msg+='→ あと一歩！苦手問題を重点的に潰しましょう。';
    else msg+='→ 素晴らしい正解率！引き続き苦手問題をゼロにしましょう。';
    txt.textContent=msg;
  }
  // weak list by subject
  buildWeakBySubject('weakListBySubject');
  // history - full log
  var hEl=document.getElementById('histList');
  var hist=G.history.slice().reverse();
  if(!hist.length){
    hEl.innerHTML='<div class="empty-msg">学習履歴がありません</div>';
  } else {
    hEl.innerHTML=hist.map(function(h){
      var r=h.ans>0?Math.round(h.ok/h.ans*100):0;
      var cls=r>=80?'hi-rate':r>=60?'hi-rate':'hi-rate low';
      return '<div class="hi"><div class="hi-d">'+h.date
        +(h.mins?' ('+h.mins+'分)':'')+'</div>'
        +'<div class="hi-row"><span>'+keyToLabel(h.label)+'</span>'
        +'<span class="'+cls+'">'+h.ok+'/'+h.ans+'問 '+r+'%</span></div></div>';
    }).join('');
  }
}

// ================================================================
// TAB
// ================================================================
function goTab(id){
  ['home','quiz','an'].forEach(function(t){
    document.getElementById('scr'+t.charAt(0).toUpperCase()+t.slice(1)).className='scr'+(t===id?' on':'');
    document.getElementById('nb-'+t) && (document.getElementById('nb-'+t).className='nav-btn'+(t===id?' on':''));
  });
  if(id==='home') buildHome();
  if(id==='an') buildAnalysis();
}

// init
buildHome();
</script>
